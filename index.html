  const bar = document.getElementById('cats');
  bar.innerHTML = ['all', ...CATS].map(c => {
    const cnt = c === 'all' ? QDATAS.length : QDATAS.filter(q => q.category === c).length;

  }).join('');
}

function setCat(c) {
  cat = c; buildCats();
  order = c === 'all' ? QDATAS.map(q=>q.id) : QDATAS.filter(q=>q.category===c).map(q=>q.id);
  if(!order.length) { document.getElementById('qa').innerHTML='<div class="empty"><span class="ei">🔍</span>該当なし</div>'; return; }
  idx = 0; cur = order[0]; buildSel(); showQ(order[0]);
}

// ===== TABS =====
function setTab(t) {
  ['quiz','list','wrong','checked'].forEach(id => {
    const pane = document.getElementById('pane-'+id);
    const tab = document.getElementById('tab-'+id);
    if(pane) pane.style.display = id===t ? 'block' : 'none';
    if(tab) tab.classList.toggle('active', id===t);
  });
  if(t === 'list') renderList('');
  if(t === 'wrong') renderWrong();
  if(t === 'checked') renderChecked();
}

// ===== DIFFICULTY =====
const DIFF_CLS = {1:'diff-1', 2:'diff-2', 3:'diff-3'};
const DIFF_ICON = {1:'🟢', 2:'🟠', 3:'🔴'};
const DIFF_LABEL = {1:'標準', 2:'やや難', 3:'難問'};

function calcDifficulty(qid) {
  const r = stats_rec[qid];
  if(!r) return 1;
  const total = r.correct + r.wrong;
  if(total < 2) return 1;
  const rate = r.correct / total;
  if(rate < 0.4) return 3;
  if(rate < 0.65) return 2;
  return 1;
}

function renderDiffBadge(qid) {
  const d = calcDifficulty(qid);
  return `<span class="diff-badge ${DIFF_CLS[d]}">${DIFF_ICON[d]} ${DIFF_LABEL[d]}</span>`;
}

// ===== CHECK BUTTON =====
function toggleCheck(qid, btn) {
  if(checks[qid]) {
    delete checks[qid];
    btn.textContent = '☐ チェック';
    btn.classList.remove('checked');
  } else {
    checks[qid] = true;
    btn.textContent = '☑ チェック済み';
    btn.classList.add('checked');
  }
  sv(); recalc();
}

// ===== RENDER QUESTION TEXT (code block support) =====
function renderQ(text) {
  // [[PRE]]...[[/PRE]] をコードブロック(<pre>)に変換し、それ以外は改行を<br>に
  const parts = text.split(/(\[\[PRE\]\][\s\S]*?\[\[\/PRE\]\])/);
  return parts.map(part => {
    if (part.startsWith('[[PRE]]')) {
      const code = part.slice(7, part.length - 9); // strip markers
      return '<pre>' + escHtml(code) + '</pre>';
    }
    // 通常テキスト: 改行を<br>に（white-space:pre-wrapなのでそのままでもいいが統一）
    return part.replace(/\n/g, '<br>');
  }).join('');
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===== SHOW QUESTION =====
function showQ(num, containerId) {
  cur = num;
  recalc();
  const d = QDATAS.find(q => q.id === num);
  if(!d) return;
  const r = stats_rec[num];
  const cc = ({"Apex基礎":"#e11d48","Apexテスト":"#7c3aed","非同期Apex":"#0891b2","自動化・実行順序":"#d97706","データ管理・セキュリティ":"#059669","DevOps・デプロイ":"#0176d3","統合・API":"#be185d","UI開発":"#ea580c","その他":"#8fa0b3"})[d.category] || '#8fa0b3';
  const isChecked = !!checks[num];
  const checkLabel = isChecked ? '☑ チェック済み' : '☐ チェック';
  const checkCls = isChecked ? 'check-btn checked' : 'check-btn';

  // 回答状態: stats_recに wrong > 0 なら不正解歴あり、correct > 0 なら正解歴あり
  // クイズモードでは「今回の回答前」はansweredフラグが必要
  // → 今回のセッションで回答したかを別途管理
  const answered = sessionAnswers[num]; // 単一選択: 文字列 / 複数選択: 配列 or null
  const isMulti = Array.isArray(d.answer) && d.answer.length > 1;
  const needed = isMulti ? d.answer.length : 1;
  // 複数選択: 選択中（未確定）の選択肢
  const pending = multiPending[num] || [];
  const isCommitted = !!answered; // 確定済みかどうか

  const chs = d.choices.map(c => {
    const L = c.charAt(0); let cls = 'ch';
    if(isCommitted) {
      // 確定後: 正解・不正解を表示
      cls += ' dis';
      const correctArr = Array.isArray(d.answer) ? d.answer : [d.answer];
      const selectedArr = Array.isArray(answered) ? answered : [answered];
      if(correctArr.includes(L)) cls += ' ok';
      else if(selectedArr.includes(L)) cls += ' ng';
    } else if(isMulti) {
      // 複数選択中: 選択済みをハイライト
      if(pending.includes(L)) cls += ' sel-pending';
    }
    const txt = c.length > 2 ? c.substring(3) : c;
    return `<div class="${cls}" onclick="doAns(${num},'${L}','${containerId||'qa'}')" ><span class="chl">${L}</span><span>${txt}</span></div>`;
  }).join('');

  // 複数選択: 確定ボタン
  const confirmBtn = (!isCommitted && isMulti && pending.length > 0)
    ? `<button class="btn btn-b" style="margin-top:10px" onclick="commitMulti(${num},'${containerId||'qa'}')">${pending.length}/${needed} 選択中 → 確定する</button>` : '';

  const links = answered && d.helpLinks && d.helpLinks.length
    ? `<div class="hl">${d.helpLinks.map(l=>`<a href="${l.url}" target="_blank">🔗 ${l.title}</a>`).join('')}</div>` : '';

  const statBadge = r && (r.correct+r.wrong) > 0
    ? `<span style="font-size:11px;color:var(--text3);margin-left:8px">過去: 🟢${r.correct} 🔴${r.wrong}</span>` : '';

  // 正解判定バッジ（確定後）
  let resultBadge = '';
  if(isCommitted) {
    const correctArr = Array.isArray(d.answer) ? d.answer : [d.answer];
    const selectedArr = Array.isArray(answered) ? answered : [answered];
    const isCorrect = correctArr.length === selectedArr.length && correctArr.every(a => selectedArr.includes(a));
    resultBadge = isCorrect ? '<span class="bdg bok">✓ 正解</span>' : '<span class="bdg bng">✗ 不正解</span>';
  }

  const html = `
    <div class="qcard">
      <div class="qmeta"><span style="margin-right:6px">${renderDiffBadge(d.id)}</span>
        <span class="bdg bn">第 ${num} 問</span>
        ${d.category ? `<span class="bdg bc" style="color:${cc};border-color:${cc}33">${d.category}</span>` : ''}
        ${resultBadge}
        ${statBadge}
        <span style="margin-left:auto"><button class="${checkCls}" id="check-btn-${num}" onclick="toggleCheck(${num},this)">${checkLabel}</button></span>
      </div>
      <div class="qt">${renderQ(d.q||'問題文なし')}</div>${isMulti?`<div style="font-size:12px;color:var(--blue);margin:-2px 0 8px;font-weight:600">※ ${needed}つ選択してください</div>`:''}
      <div class="chs">${chs}</div>
      ${confirmBtn}
      ${isCommitted ? `<div class="exp-wrap" id="exp-${num}"><button class="exp-toggle" onclick="(function(b){b.closest('.exp-wrap').classList.toggle('open')})(this)">💡 解説を見る <span class="exp-toggle-icon">▼</span></button><div class="exp-body"><div class="exp">${(d.explanation||'').replace(/\n/g,'<br>')}${links}</div></div></div>` : ''}
    </div>
    <div class="navr">
      <button class="btn btn-o" onclick="prevQ()">← 前の問題</button>
      <button class="btn btn-b" onclick="nextQ()">次の問題 →</button>
    </div>`;

  const target = containerId || 'qa';
  document.getElementById(target).innerHTML = html;
  const qsel = document.getElementById('qsel'); if(qsel) qsel.value = cur;
}

// セッション内回答記録（表示用）
let sessionAnswers = {};
let multiPending = {}; // 複数選択: 確定前の選択中選択肢 {num: ['A','C']}

function doAns(num, sel, containerId) {
  if(sessionAnswers[num]) return; // 確定済みなら無視
  const d = QDATAS.find(q => q.id === num); if(!d) return;
  const isMulti = Array.isArray(d.answer) && d.answer.length > 1;

  if(isMulti) {
    // 複数選択モード: トグル選択
    if(!multiPending[num]) multiPending[num] = [];
    const idx = multiPending[num].indexOf(sel);
    if(idx >= 0) {
      multiPending[num].splice(idx, 1); // 選択解除
    } else {
      multiPending[num].push(sel); // 選択追加
    }
    showQ(num, containerId);
  } else {
    // 単一選択: 即確定
    const correctArr = Array.isArray(d.answer) ? d.answer : [d.answer];
    const ok = correctArr.includes(sel);
    sessionAnswers[num] = sel;
    if(!stats_rec[num]) stats_rec[num] = {correct:0, wrong:0};
    if(ok) stats_rec[num].correct++;
    else stats_rec[num].wrong++;
    sv(); recalc(); buildSel();
    showQ(num, containerId);
  }
}

function commitMulti(num, containerId) {
  const d = QDATAS.find(q => q.id === num); if(!d) return;
  const selected = multiPending[num] || [];
  if(selected.length === 0) return;
  const correctArr = Array.isArray(d.answer) ? d.answer : [d.answer];
  const ok = correctArr.length === selected.length && correctArr.every(a => selected.includes(a));
  sessionAnswers[num] = selected.slice(); // 配列のコピーを保存
  if(!stats_rec[num]) stats_rec[num] = {correct:0, wrong:0};
  if(ok) stats_rec[num].correct++;
  else stats_rec[num].wrong++;
  sv(); recalc(); buildSel();
  showQ(num, containerId);
}

function prevQ() { if(idx>0){idx--;showQ(order[idx])} }
function nextQ() { if(idx<order.length-1){idx++;showQ(order[idx])}else toast('最後の問題です') }
function jumpTo(n) { cur=n; idx=order.indexOf(n); if(idx<0){ order=QDATAS.map(q=>q.id); idx=order.indexOf(n); } showQ(n); }
function rndQ() { const n=order[Math.floor(Math.random()*order.length)]; idx=order.indexOf(n); showQ(n); }
