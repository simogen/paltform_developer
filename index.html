ス向上には有用ですが、SOQLクエリ数を減らすわけではありません。\nC. 外部でのデータ結合は前処理として有用ですが、Salesforce内での関連レコード検索などでSOQLは依然必要です。\nD. Bulk APIでデータ挿入後も関連付けや整合性保持のためにSOQLが必要になる場合があります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 57, "q": "Lightning Web Components (LWC)で、ユーザーが入力した値をリアルタイムで表示し、その値を使用して別の計算を行う場合、どのリアクティブプロパティを使用するのが最適ですか？", "choices": ["A. @wire", "B. getter/setter", "C. @track", "D. public property (@api)"], "answer": ["B"], "category": "ユーザインターフェース", "explanation": "A. @wireはSalesforceデータやApexメソッドをリアクティブにプロビジョニングするためのもの。ユーザー入力への動的応答には適していません。\nB. 正解。getter/setterを使用するとプロパティ値が変更されるたびにカスタムロジックを実行できます。ユーザー入力をsetterで受け取り、計算を実行してリアルタイム表示が実現できます。\nC. @trackはオブジェクト/配列の深い変更を追跡するためのもの。\nD. @apiは親→子へのデータ渡し用で、コンポーネント内のユーザー入力処理には適していません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 58, "q": "複数のカスタムオブジェクト間で複雑なデータ連携とビジネスロジックを実装する必要がある場合、非同期処理のための推奨されるSalesforceプラットフォーム機能は何ですか？", "choices": ["A. ワークフロールールと項目自動更新", "B. プロセスビルダーとフロー", "C. ApexのFutureメソッドとキュー可能Apex", "D. スケジュール済みApexと入力規則"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "A. ワークフロールールは同期処理で、複雑なデータ連携や大量処理には限界があります。\nB. PBとフローは宣言的に多くを実装できますが、複雑なトランザクション制御や大量の非同期処理にはApexが適しています。\nC. 正解。@futureメソッドは単純な非同期処理・コールアウトに、Queueable Apexは高度な非同期処理・ジョブチェーニングに適しており、複雑なデータ連携に最適です。\nD. スケジュール済みApexは定期実行用で、イベント駆動型の非同期処理には適していません。入力規則は非同期処理と無関係。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 59, "q": "Apexトリガー内で、関連レコードの更新後に非同期処理を実行するための適切な方法を2つ選択してください。", "choices": ["A. トリガー内で直接Futureメソッドを呼び出す。", "B. トリガー内でキュー可能Apexジョブをエンキューする。", "C. トリガー内でバッチApexジョブを開始する。", "D. トリガー完了後に実行されるフローをトリガーする。"], "answer": ["B", "D"], "category": "ロジックとプロセスの自動化", "explanation": "A. トリガー内からFutureを呼び出すことは可能ですが、大量呼び出しでガバナ制限に達する可能性があります。\nB. 正解。Queueable Apexはより高度な非同期処理でジョブチェーニングも可能。トリガーから安全にエンキューできます。\nC. バッチApexもトリガーから起動可能ですが、単一イベントへの応答としては重すぎる場合が多い。\nD. 正解。トリガー後に起動するレコードトリガーフローを使用することで、宣言的に非同期処理を実行できます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 60, "q": "Salesforce組織で、複数の部署が共通のカスタムオブジェクトを使用しており、各部署が特定の項目に対して異なる入力規則を必要とする場合、これを実現するための最も効率的な方法は何ですか？", "choices": ["A. 各部署専用のページレイアウトを作成し、必須項目を設定する。", "B. 各部署のユーザープロファイルに基づいて異なる入力規則を作成する。", "C. 単一の入力規則を作成し、数式内でプロファイルまたはロールに基づいて条件分岐を行う。", "D. 各部署専用のカスタムオブジェクトを作成する。"], "answer": ["C"], "category": "上級デベロッパーの基本", "explanation": "A. ページレイアウトは項目の表示・編集性を制御しますが、データ検証ロジックを動的に変更できません。\nB. 部署ごとに入力規則を作成すると管理が煩雑になります。\nC. 正解。単一の入力規則内で$Profile.Nameや$UserRole.Nameなどのグローバル変数を使用して条件分岐することで、効率的に部署別の検証ルールを管理できます。\nD. 各部署に別オブジェクトを作成するとデータの重複・サイロ化が発生し非効率。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 61, "q": "Salesforceの保存実行順序において、レコードが更新された際にトリガーが複数登録されている場合、それらのトリガーが実行される順番を保証するものは何ですか？", "choices": ["A. トリガーの名前のアルファベット順。", "B. トリガーが作成された日時順。", "C. トリガーが最後に更新された日時順。", "D. トリガーの実行順序は保証されない。"], "answer": ["D"], "category": "ロジックとプロセスの自動化", "explanation": "A. トリガー名のアルファベット順は実行順序を決定しません。\nB. トリガーの作成日時は実行順序を決定しません。\nC. トリガーの最終更新日時も実行順序を決定しません。\nD. 正解。同一オブジェクトの同一イベントに複数トリガーが登録されている場合、実行順序は保証されません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 62, "q": "複数の国で事業を展開しており、各国のユーザーに対して現地の言語でエラーメッセージを表示する必要があるカスタムApexアプリケーションを開発しています。これを実現するための適切なSalesforce機能は何ですか？", "choices": ["A. カスタム表示ラベル", "B. カスタム設定（リスト型）", "C. カスタムメタデータ型", "D. グローバル変数"], "answer": ["A"], "category": "上級デベロッパーの基本", "explanation": "A. 正解。カスタム表示ラベルは翻訳ワークベンチと連携してテキストを複数言語に翻訳でき、ApexやUIコンポーネントからユーザーのロケールに応じた言語でアクセスできます。\nB. カスタム設定は翻訳機能を持たず、UIテキストのローカライズには適していません。\nC. カスタムメタデータ型も翻訳機能を提供しません。\nD. グローバル変数はユーザー/組織情報を提供しますが、カスタムテキストを格納・翻訳する機能はありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 63, "q": "商談(Opportunity)が更新され、特定の条件（例: Amount が $1,000,000 以上に変更）を満たした場合に、関連する取引先(Account)のカスタム項目 High_Value_Customer__c (チェックボックス) を true に更新するApexトリガーを考えます。取引先の更新処理が、他の自動化（プロセスビルダーやフローなど）によって再度、元の商談レコードを更新する可能性があるシナリオを想定します。これにより、商談トリガーが意図せず再帰的に呼び出され、無限ループやガバナ制限超過を引き起こす可能性があります。\n\n上記のトリガーコードにおいて、無限再帰を防ぐために挿入すべき、一般的で効果的なApexコードのパターンはどれでしょうか？（チェック処理と後処理を合わせて一つの選択肢として評価してください）", "choices": ["A. チェック: if (Trigger.operationType == System.TriggerOperation.AFTER_UPDATE) { return; }", "B. チェック: if (Trigger.size > 200) { return; }", "C. チェック: if (System.TriggerHandler.isTriggerExecuting('OpportunityTrigger')) { return; } （架空のクラスを想定）", "D. チェック: if (TriggerRecursionHelper.isOpportunityTriggerRunning) { return; } TriggerRecursionHelper.isOpportunityTriggerRunning = true; / 後処理: TriggerRecursionHelper.isOpportunityTriggerRunning = false;"], "answer": ["D"], "category": "ロジックとプロセスの自動化", "explanation": "A. Trigger.operationTypeのチェックは再帰かどうかを判定しません。最初の実行でreturnしてしまいます。\nB. Trigger.sizeはレコード数で、再帰の判定に使うのは不正確で正当なバルク処理を妨げます。\nC. System.TriggerHandlerという標準クラスは存在しません。\nD. 正解。静的Booleanフラグパターンは再帰呼び出し防止の最も一般的な方法。フラグが既にtrueなら再帰と判断してreturn。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 64, "q": "Apexで記述されたバッチ処理ジョブが、予期しない例外により途中で失敗しました。失敗したバッチジョブを特定し、エラーの詳細を確認するために使用できるSalesforceの監視ツールは何ですか？", "choices": ["A. 監査証跡", "B. デバッグログ", "C. Apexジョブキュー", "D. ヘルスチェック"], "answer": ["C"], "category": "上級デベロッパーの基本", "explanation": "A. 監査証跡は設定変更やユーザーアクティビティの履歴追跡用で、バッチジョブの詳細確認には適していません。\nB. デバッグログはコード実行中のイベントを記録しますが、失敗ジョブを一覧表示・管理する機能はありません。\nC. 正解。Apexジョブキューは非同期Apexジョブのステータス監視と管理ツールです。失敗したジョブとエラーメッセージ・スタックトレースを確認できます。\nD. ヘルスチェックは組織全体のセキュリティ設定に関する洞察を提供しますが、バッチジョブのエラー詳細確認機能はありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 65, "q": "Salesforce組織で、カスタムオブジェクトのレコードが作成または更新された際に、外部システムにリアルタイムに近いデータ連携を行うための適切なプラットフォーム機能と技術を2つ選択してください。", "choices": ["A. アウトバウンドメッセージ", "B. Salesforce Connect", "C. プラットフォームイベント", "D. ワークフロールールとHTTPコールアウト"], "answer": ["A", "C"], "category": "ロジックとプロセスの自動化", "explanation": "A. 正解。アウトバウンドメッセージはワークフロールールのアクションとして設定でき、条件を満たした際にSOAPメッセージを定義されたエンドポイントに送信します。\nB. Salesforce Connectは外部データをSalesforce内で参照するための機能で、外部へのデータ送信をトリガーするものではありません。\nC. 正解。プラットフォームイベントでSalesforce内のビジネスイベントをパブリッシュし、外部システムを含む購読者がほぼリアルタイムで処理できます。\nD. ワークフロールールからHTTPコールアウトを直接実行することはできません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 66, "q": "効率的なApexコードを記述し、ガバナ制限を回避するために考慮すべき主要なプラクティスを2つ選択してください。", "choices": ["A. 常にトリガー内でSOQLクエリを使用して関連データを取得する。", "B. バルク処理を実装して、一度に複数のレコードを処理する。", "C. 可能な限り多くのビジネスロジックをVisualforceコントローラに記述する。", "D. 不要なループを避け、コレクションを使用してデータを効率的に処理する。"], "answer": ["B", "D"], "category": "パフォーマンス", "explanation": "A. ループ内でSOQLを実行するとSOQLクエリのガバナ制限に達しやすくなります。\nB. 正解。Bulkificationを実装することでガバナ制限内でより多くのレコードを効率的に処理できます。\nC. ビジネスロジックはApexクラスに記述するのが再利用性・テスト容易性の観点から推奨されます。\nD. 正解。不要なループを削減し、コレクションを効果的に使用することでコードの効率性を向上させガバナ制限を回避できます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 67, "q": "Lightning Web Components (LWC)で、親コンポーネントが子コンポーネントで発生したカスタムイベントを処理するために行うべき設定は何ですか？", "choices": ["A. 子コンポーネントのJavaScriptファイルでイベントリスナーを定義する。", "B. 親コンポーネントのHTMLテンプレートで、子コンポーネントのタグにonプレフィックス付きの属性を追加する。", "C. 親コンポーネントのJavaScriptファイルで、子コンポーネントのインスタンスにイベントリスナーを追加する。", "D. 子コンポーネントのHTMLテンプレートで、イベントを発火する要素にonプレフィックス付きの属性を追加する。"], "answer": ["B"], "category": "ユーザインターフェース", "explanation": "A. イベントリスナーは受け取る側（親）で定義します。\nB. 正解。親コンポーネントのHTMLテンプレートで、子コンポーネントのタグにon+カスタムイベント名（例: onmyevent）の属性を追加し、ハンドラーメソッドを指定します。\nC. 技術的には可能ですが、LWCではHTMLテンプレートでの宣言的な方法が推奨されます。\nD. これは標準DOMイベントの処理方法で、親が子のカスタムイベントをリッスンするための設定ではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 68, "q": "Apexテストクラス内で、特定のユーザーコンテキストでコードを実行する必要がある場合、どのメソッドを使用すべきですか？", "choices": ["A. System.runAs()", "B. Test.startTest() および Test.stopTest()", "C. @testSetup", "D. Assert.areEqual()"], "answer": ["A"], "category": "テスト、デバッグ、リリース", "explanation": "A. 正解。System.runAs()を使用すると既存または新しいユーザーのコンテキストでコードブロックを実行できます。共有ルール、項目レベルセキュリティ、ユーザー権限をテストする際に使用します。\nB. Test.startTest/stopTestは非同期処理の境界定義とガバナ制限リセット用。\nC. @testSetupは共通テストデータ作成用アノテーション。\nD. Assert.areEqual()は値の等値検証用メソッド。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 69, "q": "Salesforce組織で、複数のシステムインテグレーションが異なる頻度で外部システムにデータを送信する必要がある場合、各インテグレーションの要件に合わせて柔軟にスケジュールを設定できる非同期Apexの機能は何ですか？", "choices": ["A. Futureメソッド", "B. キュー可能Apex", "C. バッチApex", "D. スケジュール済みApex"], "answer": ["D"], "category": "ロジックとプロセスの自動化", "explanation": "A. Futureメソッドはスケジュール設定機能を持ちません。\nB. Queueable ApexはFutureより高度ですが、実行スケジュールを柔軟に設定する機能は直接的にはありません。\nC. バッチApexはスケジュール可能ですが、各インテグレーションごとの複雑なスケジュール設定には限界があります。\nD. 正解。スケジュール済みApexはCron式で柔軟にスケジュール設定でき、各インテグレーションの異なる実行頻度・時間帯を個別に設定することが可能です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 70, "q": "Developer Console の匿名実行（Execute Anonymous）ウィンドウを使用して、特定の ID を持つケース(Case)レコードの状況(Status)を '対応完了' に、内部コメント(InternalComments)にメモを追加する Apex コードを実行したいと考えています。対象のケース ID は変数 caseId に格納されています。\n[[PRE]]\nId caseId = '500xxxxxxxxxxxxxxx'; // 対象のケースID (仮)\nString newStatus = '対応完了';\nString commentToAdd = '顧客に最終確認済み。' + System.now();\n\n// ★ ここにケースの状況と内部コメントを更新するコードを記述\n\nSystem.debug('Case update executed for ID: ' + caseId);[[/PRE]]\n上記のコードの「★ ここに適切なコードを記述」の部分として、指定された caseId のケースレコードの Status と InternalComments を更新するための、最も簡潔かつ一般的な Apex コードはどれでしょうか？", "choices": ["A. Case c = [SELECT Status, InternalComments FROM Case WHERE Id = :caseId]; c.Status = newStatus; c.InternalComments = commentToAdd; update c;", "B. Case c = new Case(Id = caseId, Status = newStatus, InternalComments = commentToAdd); update c;", "C. Database.executeBatch(new UpdateCaseBatch(caseId, newStatus, commentToAdd));", "D. Case c = new Case(); c.Id = caseId; c.put('Status', newStatus); c.put('InternalComments', commentToAdd); Database.update(c);"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "A. 機能しますが、まずSOQLクエリでレコードを取得してから更新するため冗長。1件更新なら事前取得は不要。\nB. 正解。sObjectコンストラクタでId・更新項目を直接設定し、updateで更新する最も簡潔な方法。\nC. バッチ処理は1件の更新には過剰で、クラスも未定義。\nD. put()メソッドは動的な項目設定に使いますが、項目が既知の場合はコンストラクタや直接代入の方がシンプル。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 71, "q": "Apexトリガー内で、大量のレコードを効率的に処理し、ガバナ制限を回避するために推奨されるプラクティスを2つ選択してください。", "choices": ["A. トリガー内でSOQLクエリを可能な限り避ける。", "B. トリガーの実行コンテキスト内でDML操作を直接実行する。", "C. バルク処理を実装し、一度に複数のレコードを処理する。", "D. トリガーが処理するレコード数を制限する。"], "answer": ["A", "C"], "category": "パフォーマンス", "explanation": "A. 正解。ループ内でのSOQLクエリ実行を避け、ループ前に一括クエリを行うことでSOQLクエリ数を最小化します。\nB. DML操作自体は必要ですが、重要なのはバルク化（リストでのDML）することでDMLステートメント数を最小化することです。\nC. 正解。Bulkificationを実装することで、ガバナ制限内で多くのレコードを効率的に処理できます。\nD. レコード数制限は根本的な解決策ではなく、バルク処理の実装が適切です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 72, "q": "Visualforceページ内で、Apexコントローラから返されたデータを表示し、ユーザーがそのデータを操作できるようにするために、開発者はどの技術を使用する必要がありますか？", "choices": ["A. JavaScript Remoting", "B. Lightning Web Components", "C. 標準コントローラ", "D. Apex REST Webサービス"], "answer": ["A"], "category": "ユーザインターフェース", "explanation": "A. 正解。JavaScript RemotingでVisualforceページからJavaScriptを通じてApexコントローラメソッドを非同期で呼び出せます。ページリロードなしにデータ取得・更新ができます。\nB. LWCはLightning Experience向けで、Visualforceページ内での直接使用は推奨されません。\nC. 標準コントローラは基本的なデータバインディングを提供しますが、JavaScript経由の非同期処理は含みません。\nD. Apex REST WebサービスはSalesforce外部との統合用で、Visualforce内での直接使用技術ではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 73, "q": "Salesforce組織で、カスタムApexクラスのテストカバレッジを向上させるために、開発者が従うべきベストプラクティスは何ですか？", "choices": ["A. すべてのテストメソッドで@isTest(SeeAllData=true)アノテーションを使用する。", "B. テストメソッド内でDML操作を避ける。", "C. テストメソッド内でSystem.debug()文を多用する。", "D. テストメソッドが、クラスのすべてのコードパスを網羅するように設計する。"], "answer": ["D"], "category": "テスト、デバッグ、リリース", "explanation": "A. SeeAllData=trueはテストの独立性を損なうため非推奨。\nB. テストに必要なデータのDML操作は行う必要があります。\nC. System.debug()はカバレッジやテスト結果に影響しません。\nD. 正解。テストカバレッジ向上には、if分岐のtrue/false、try-catchブロック、ループなど、クラス内の全実行パスを網羅するようにテストを設計する必要があります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 74, "q": "Salesforce組織で、カスタムApexクラスから外部Webサービスを呼び出す際に、コールアウトのタイムアウト時間を設定し、処理が長時間化しないようにするために使用するApexメソッドは何ですか？", "choices": ["A. HttpRequest.setTimeout()", "B. Http.setReadTimeout()", "C. Http.setTimeout()", "D. HttpRequest.setReadTimeout()"], "answer": ["D"], "category": "ロジックとプロセスの自動化", "explanation": "A. HttpRequest.setTimeout()というメソッドは存在しません。\nB. Http.setReadTimeout()というメソッドは存在しません。\nC. Http.setTimeout()というメソッドは存在しません。\nD. 正解。HttpRequest.setReadTimeout()メソッドでコールアウトのタイムアウト時間をミリ秒単位で設定できます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 75, "q": "Salesforce組織で、カスタムメタデータ型を使用して、開発者が環境間で移行する必要があるアプリケーション設定データを管理する場合、カスタムメタデータ型の主な利点を2つ選択してください。", "choices": ["A. カスタムメタデータ型は、SOQLクエリのガバナ制限の対象外である。", "B. カスタムメタデータ型のレコードは、パッケージングおよびデプロイメントツールを使用して組織間で簡単に移行できる。", "C. カスタムメタデータ型は、ユーザーインターフェースから直接編集できるため、管理者が簡単に設定を変更できる。", "D. カスタムメタデータ型は、Apexコードで直接参照できるため、コード内で設定値をハードコーディングする必要がない。"], "answer": ["B", "D"], "category": "上級デベロッパーの基本", "explanation": "A. カスタムメタデータ型のレコードもSOQLのガバナ制限の対象です。\nB. 正解。カスタムメタデータ型のレコードはメタデータとして扱われ、変更セット・パッケージ・DXで環境間を容易に移行できます。\nC. 管理者による直接変更はカスタム設定の利点。\nD. 正解。SOQLクエリでApexコードから参照でき、設定値をコードにハードコードせず動的に変更できます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 76, "q": "各リードソース(LeadSource)ごとに、そのソースから発生したリード(Lead)の数をカウントする必要があります。以下のApexコードは、GROUP BY LeadSource を使用したSOQL集約クエリを実行し、その結果からリードソースごとの件数を取得しようとしています。\n[[PRE]]\n// リードソースごとのリード件数を取得するSOQLクエリ\nList<AggregateResult> results = [SELECT LeadSource, COUNT(Id) recordCount\n                                 FROM Lead\n                                 WHERE LeadSource != null\n                                 GROUP BY LeadSource];\n\nMap<String, Integer> leadSourceCountMap = new Map<String, Integer>();\n\nfor (AggregateResult ar : results) {\n    String leadSourceValue;\n    Integer countValue;\n\n    // ★ ここで AggregateResult から LeadSource と recordCount を取得し、変数に代入する\n\n    if (leadSourceValue != null) {\n        leadSourceCountMap.put(leadSourceValue, countValue);\n    }\n}\n\nSystem.debug('Lead counts per source: ' + leadSourceCountMap);[[/PRE]]\n上記の for ループ内（コメント「★ ここで AggregateResult から LeadSource と recordCount を取得し、変数に代入する」の部分）で、AggregateResult オブジェクト ar から LeadSource の値と集計件数 (recordCount) を取得し、それぞれのローカル変数に代入するための正しいApexコードはどれでしょうか？", "choices": ["A. leadSourceValue = (String)ar.get('LeadSource'); countValue = (Integer)ar.get('recordCount');", "B. leadSourceValue = ar.LeadSource; countValue = ar.recordCount;", "C. leadSourceValue = (String)ar.get('expr0'); countValue = (Integer)ar.get('expr1');", "D. leadSourceValue = ar.get(0).toString(); countValue = Integer.valueOf(ar.get(1));"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. 正解。AggregateResultから値を取得するにはget(fieldOrAliasName)メソッドを使用します。LeadSourceは項目名で、recordCountはCOUNT(Id)に付けたエイリアス名。Object型を返すのでキャストが必要です。\nB. AggregateResultのプロパティにドット表記でアクセスすることはできません。コンパイルエラーになります。\nC. エイリアスが指定されていない場合はexpr0, expr1が使われますが、このクエリではrecordCountというエイリアスが付いています。\nD. get()メソッドに数値インデックスを渡すことはできません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 77, "q": "Lightning Web Components (LWC)で、コンポーネントのパフォーマンスを最適化し、不必要な再レンダリングを避けるために、開発者はどのプラクティスに従うべきですか？", "choices": ["A. すべてのプロパティを @track でデコレートする。", "B. connectedCallback() ライフサイクルフック内でDOM操作を行う。", "C. 変更されないデータを表示する際に、テンプレート内で関数を呼び出す。", "D. プロパティの変更時にのみコンポーネントが再レンダリングされるようにする。"], "answer": ["D"], "category": "パフォーマンス", "explanation": "A. プリミティブ値の変更は自動検出され、@track は不要です。不必要に使用するとパフォーマンスが低下する可能性があります。\nB. connectedCallback()内でのDOM操作はパフォーマンスに影響する可能性があります。\nC. テンプレート内での関数呼び出しは再レンダリングのたびに実行されます。\nD. 正解。LWCはプロパティが変更されたときにのみ再レンダリングします。不必要なプロパティ変更を避けることでパフォーマンスが最適化されます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 78, "q": "Salesforce組織で、Apexトリガーが実行された際に、トリガーが更新されたレコードの古い値を参照するために使用できるコンテキスト変数は何ですか？", "choices": ["A. Trigger.new", "B. Trigger.old", "C. Trigger.newMap", "D. Trigger.oldMap"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "A. Trigger.newは新しいバージョンのsObjectレコードのリストで、古い値参照には使用しません。\nB. 正解。Trigger.oldはupdateまたはdeleteトリガーで、更新・削除される前のsObjectレコードのリストを返します。\nC. Trigger.newMapはupdateの新しいバージョンのID→sObjectマップ。\nD. Trigger.oldMapはupdateの古いバージョンのID→sObjectマップ（Listではなくマップで返す）。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 79, "q": "Salesforce組織で、Apexコード内でSOQLクエリを使用してデータを取得する際に、ガバナ制限を回避し、パフォーマンスを最適化するために従うべきベストプラクティスは何ですか？", "choices": ["A. すべてのSOQLクエリでFORループを使用して結果を処理する。", "B. 必要な項目のみを選択し、不必要な項目は取得しない。", "C. SOQLクエリを可能な限りトリガー内で実行する。", "D. SOQLクエリの結果をキャッシュするためにプラットフォームキャッシュを使用しない。"], "answer": ["B"], "category": "パフォーマンス", "explanation": "A. FORループは大量データのヒープサイズ対策に有効な場合がありますが、全クエリで必須ではありません。\nB. 正解。必要な項目のみSELECTすることでクエリのパフォーマンスを向上させ、ガバナ制限の節約にも繋がります。\nC. トリガー内でのSOQLクエリはガバナ制限に達しやすくなります。\nD. プラットフォームキャッシュの使用は推奨されます（使用しないことは推奨されません）。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 80, "q": "Salesforce DXプロジェクトで開発を行っている開発者が、デフォルトとして設定されているスクラッチ組織で行ったApexクラスとカスタム項目の変更を、ローカルのプロジェクトディレクトリに同期させたいと考えています。バージョン管理システムに変更をコミットする前段階として、この同期操作を実行するために使用するべきSalesforce CLIコマンドはどれでしょうか？", "choices": ["A. sf project deploy start", "B. sf org retrieve metadata", "C. sf project retrieve start", "D. sf org create"], "answer": ["C"], "category": "テスト、デバッグ、リリース", "explanation": "A. sf project deploy startはローカル→組織へのデプロイ（逆方向）。\nB. sf org retrieve metadataは特定メタデータタイプ指定の取得コマンド。\nC. 正解。sf project retrieve startはデフォルトの組織（スクラッチ組織）からローカルプロジェクトへメタデータ変更を取得・同期するコマンドです。\nD. sf org createは新しいスクラッチ組織作成用です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 81, "q": "あるグローバル企業では、国ごとに異なる製品サポートの応答時間目標（SLA）を定義する必要があります。これらのSLA値は、Apexトリガーやフローなどの自動化ロジック内から参照され、将来的に管理者がSalesforceの設定画面から容易に変更できる必要があります。また、これらの設定値は、Sandboxから本番環境へのデプロイ時に、変更セットやSalesforce DXを通じてメタデータとして移行できることが求められています。この要件に最も適したソリューションはどれでしょうか？", "choices": ["A. 国名とSLA値を項目として持つカスタムオブジェクトを作成し、ApexコードでSOQLクエリを使用して参照する。", "B. 階層カスタム設定を作成し、組織のデフォルト値として国ごとのSLA値を設定する。", "C. リストカスタム設定を作成し、各レコードに国名とSLA値を保存し、Apexコードから getAll() や getInstance() メソッドでアクセスする。", "D. 国名とSLA値の項目を持つカスタムメタデータ型を作成し、国ごとにレコードを作成してSLA値を定義し、Apexやフローから参照する。"], "answer": ["D"], "category": "上級デベロッパーの基本", "explanation": "A. カスタムオブジェクトはデータとして扱われ、変更セット等によるメタデータとしてのデプロイは難しく、別途データ移行が必要。\nB. 階層カスタム設定はユーザー/プロファイルごとの上書きに適しており、設定データもデータとして扱われます。\nC. リストカスタム設定も設定データをデータとして扱うため、メタデータとしてのデプロイには適していません。\nD. 正解。カスタムメタデータ型はメタデータとして扱われ、変更セット・DXでシームレスにデプロイ可能。ApexやフローからSOQLやgetInstance()でアクセスでき、管理者もUIから更新できます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 82, "q": "あるVisualforceページには、取引先IDを入力し、「取引先詳細を取得」ボタンを押すと、Apexコントローラーメソッドを呼び出して取引先の詳細情報（名前と電話番号）を取得し、ページの一部を更新して表示する機能があります。\n\nApexコントローラー内（コメント「★ ここで accountId を使って取引先のNameとPhoneを取得し、acc 変数に代入する」の部分）で、入力された accountId に対応する取引先の Name と Phone を取得し、コントローラーの acc プロパティに代入するための最も適切なApexコードはどれでしょうか？", "choices": ["A. acc = [SELECT Name, Phone FROM Account WHERE Id = :accountId];", "B. List<Account> accounts = Database.query('SELECT Name, Phone FROM Account WHERE Id = \\'' + accountId + '\\''); if (!accounts.isEmpty()) { acc = accounts[0]; }", "C. acc = new Account(Id = accountId); Database.refresh(acc);", "D. acc = AccountUtility.findAccountById(accountId);"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. 正解。静的SOQLクエリでバインド変数:accountIdを使用し、取引先を直接acc変数に代入する最も標準的で簡潔な方法です。\nB. 動的SQLでaccountIdをエスケープせずに結合しておりSOQLインジェクションのリスクあり。静的SOQLが推奨されます。\nC. Database.refresh()はメモリ内のsObject変数をデータベースの最新状態で更新しますが、新しいインスタンスのId指定ではName, Phone等は取得できません。\nD. AccountUtilityクラスはこの文脈では定義されていません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 83, "q": "Salesforce組織で、Apexテストクラス内でテストデータを効率的に作成し、テストメソッド間の独立性を保つために推奨されるアノテーションは何ですか？", "choices": ["A. @isTest(SeeAllData=true)", "B. @testSetup", "C. @future", "D. @ReadOnly"], "answer": ["B"], "category": "テスト、デバッグ、リリース", "explanation": "A. SeeAllData=trueはテストの独立性を損なうため非推奨。\nB. 正解。@testSetupを付与したメソッドは各テストメソッド実行前に一度だけ実行され、共通テストデータを効率的に作成。各テストメソッド後にデータはロールバックされ独立性も保たれます。\nC. @futureは非同期処理の実行用アノテーション。\nD. @ReadOnlyはVisualforceコントローラメソッドがDBを変更しないことを宣言するもの。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 84, "q": "外部の気象情報サービスAPIを呼び出して、複数の取引先レコードに関連する地域の最新の天候情報を取得し、取引先レコードのカスタム項目を更新する処理を実装する必要があります。このAPI呼び出しは応答に時間がかかることがあり、また、一度に多くの取引先に対して実行される可能性があるため、同期処理におけるガバナ制限（特にコールアウトのタイムアウトや総実行時間）に抵触する懸念があります。この要件を満たすために、Apexにおける非同期実行の選択肢として適切なものはどれですか？（2つ選択）", "choices": ["A. Queueable Apex インターフェースを実装したクラスを作成し、その execute メソッド内でAPIコールアウトとレコード更新を行う。", "B. 即時実行のスケジュール済みフローを作成し、そのフロー内でAPIコールアウトアクションを実行する。", "C. @future(callout=true) アノテーションを付与した静的メソッドを作成し、そのメソッド内でAPIコールアウトとレコード更新ロジックを実装する。", "D. 取引先オブジェクトのトリガーから直接、同期的にAPIコールアウトを実行する Apex コードを記述する。"], "answer": ["A", "C"], "category": "ロジックとプロセスの自動化", "explanation": "A. 正解。Queueable Apexは非同期実行でコールアウトも可能（Database.AllowsCallouts実装で）。ジョブIDの取得や複雑なデータ型の引数渡しも可能。\nB. 即時実行のスケジュール済みフローは一般的な概念ではなく、フロー内コールアウトも時間制限があります。\nC. 正解。@future(callout=true)は外部コールアウトを非同期実行する基本的な方法です。\nD. トリガーから直接同期コールアウトは実行できません（CalloutException発生）。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 85, "q": "Salesforce組織で、Apexトリガー内で実行されるSOQLクエリの数を最小限に抑え、ガバナ制限を回避するために推奨されるプラクティスは何ですか？", "choices": ["A. トリガー内でSOQLクエリを可能な限り避ける。", "B. すべてのSOQLクエリでFOR UPDATE句を使用する。", "C. SOQLクエリの結果をApexヒープにキャッシュする。", "D. トリガーごとに1つのSOQLクエリのみを実行する。"], "answer": ["A"], "category": "パフォーマンス", "explanation": "A. 正解。ループ内でのSOQLクエリ実行を避け、ループ前に必要なデータを一括取得することでSOQLクエリ数を最小化します（Bulkificationパターン）。\nB. FOR UPDATE句はレコードをロックして同時更新防止に使うもので、SOQLクエリ数削減とは関係ありません。\nC. Apexヒープへのキャッシュは同一トランザクション内での再クエリを防ぐ有効な方法ですが、A（ループ外でのバルクSOQL）との組み合わせで考えるべきです。\nD. 「トリガーごとに1つ」という制限はありません。重要なのはループ内でのSOQL実行を避けることです。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 86, "q": "Visualforceページで、取引先に関連する多数の取引先責任者を表示し、ユーザーが特定の条件で絞り込みを行えるようにする必要があります。パフォーマンスを考慮し、サーバーへの負荷とビュー ステート サイズを最小限に抑えるために、コントローラーで大量の取引先責任者データを処理する際の最も推奨される方法はどれですか？", "choices": ["A. getContacts() メソッド内でSOQLクエリを発行して contacts リストに全件を格納し、Visualforceページ側でJavaScriptを使用して表示するデータを絞り込みます。", "B. StandardSetControllerを利用してページネーションを実装します。コントローラーのコンストラクタでSOQLクエリを指定し、getRecords() メソッドで現在のページのレコードを取得します。", "C. getContacts() メソッドでは、絞り込み条件を含めたSOQLクエリに LIMIT と OFFSET 句を動的に追加し、一度に表示する分のデータのみを取得するようにします。", "D. Apexコントローラーのプロパティとして transient キーワードを contacts リスト変数に付与します。"], "answer": ["B"], "category": "ユーザインターフェース", "explanation": "A. 全件をメモリにロードしてビューステートに含めるとガバナ制限とビューステートサイズ問題の両方を引き起こします。\nB. 正解。StandardSetControllerはSalesforce標準のページネーション機能を提供し、現在のページ分のレコードのみを管理するため、ビューステートサイズとサーバー負荷を効率的に抑えられます。\nC. カスタムページネーションも機能しますが、StandardSetControllerを使う方が標準機能として最適化されています。\nD. transientキーワードはビューステートサイズ削減には有効ですが、ページ再表示のたびに全件再クエリが実行されるためサーバー負荷が増加します。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 87, "q": "Salesforce組織で、Apexコードを記述する際に、SOQLクエリが返すレコード数を制限し、ガバナ制限を回避するための最も効果的な方法はどれですか？", "choices": ["A. すべてのSOQLクエリでLIMIT 200句を使用する。", "B. SOQLクエリの結果をプラットフォームキャッシュに保存する。", "C. 必要な項目のみを選択し、関連オブジェクトのデータを取得するためにSOQLリレーションクエリを使用する。", "D. Apexトリガー内でSOQLクエリを実行しない。"], "answer": ["C"], "category": "パフォーマンス", "explanation": "A. 常にLIMIT 200を使用すると必要なデータが全て取得できない場合があります。\nB. プラットフォームキャッシュは有効な最適化ですが、主要な制限回避策ではありません。\nC. 正解。必要な項目のみSELECTすることでパフォーマンスを向上させ、SOQLリレーションクエリ（サブクエリ）を使用すると複数オブジェクトのデータを1回のクエリで効率的に取得でき、クエリ数を最小化します。\nD. トリガー内のSOQLを完全に避けることは現実的ではなく、バルク化した効率的なSOQLであれば問題ありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 88, "q": "Salesforce組織で、Apexコードの実行中にガバナ制限に達した場合に発生する可能性のある問題を回避するために、開発者が従うべき最も重要なプラクティスは何ですか？", "choices": ["A. すべてのApexコードをFutureメソッドで非同期的に実行する。", "B. SOQLクエリの結果をプラットフォームキャッシュに保存する。", "C. バルク処理を実装し、一度に複数のレコードを処理する。", "D. Apexトリガー内でDML操作を実行しない。"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "A. 全てのコードをFutureで実行する必要はなく、同期処理が適切な場合も多くあります。\nB. プラットフォームキャッシュは有効な最適化ですが、ガバナ制限回避の最重要プラクティスではありません。\nC. 正解。バルク処理（Bulkification）はガバナ制限を回避するための最も重要なプラクティスです。SOQLクエリのバルク化とDMLのバルク化により、同一トランザクション内でのガバナ制限消費を最小化します。\nD. トリガー内でDML操作を実行すること自体は問題なく、バルク化して実行することが重要です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 89, "q": "Salesforce組織で、Apexコードの実行中に発生する可能性のあるエラーをログに記録し、システムの問題をデバッグするために使用できるApexの機能として適切なものを2つ選択してください。", "choices": ["A. System.debug()", "B. System.assert()", "C. デバッグログ", "D. プラットフォームイベント"], "answer": ["A", "C"], "category": "ロジックとプロセスの自動化", "explanation": "A. 正解。System.debug()メソッドはデバッグログに情報を出力し、変数の値やコードの実行フローを追跡できます。\nB. System.assert()は主にテストコードでの条件検証用で、一般的なエラーログ記録には適していません。\nC. 正解。デバッグログはSalesforce組織内で発生するイベントを記録する機能で、System.debug()の出力も含まれます。\nD. プラットフォームイベントはリアルタイムのビジネスイベント通知用で、Apexコードのデバッグには直接使用されません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 90, "q": "商談オブジェクトに実装されたApexトリガーのテストクラスを作成しています。このトリガーは、商談が特定のフェーズ（例: '成約'）に更新されたときに、関連するカスタムオブジェクトのレコードを作成するロジックを含んでいます。このトリガーに対する堅牢で保守性の高いテストクラスを作成するためのベストプラクティスとして推奨されるアプローチはどれですか？（2つ選択）", "choices": ["A. テストメソッドに @IsTest(SeeAllData=true) アノテーションを付与し、Sandbox組織に存在する実際の商談データを使用してテストを実行する。", "B. テストメソッド内で、テスト対象の商談レコードを更新するDML操作の前後を Test.startTest() と Test.stopTest() で囲む。", "C. 複数のテストメソッドで再利用可能なテストデータ（取引先、商談など）を作成するためのユーティリティクラス（テストデータファクトリ）を実装する。", "D. トリガー内のロジックをテストするために、トリガーを一時的に無効化し、トリガーハンドラークラスのメソッドをテストクラスから直接呼び出す。"], "answer": ["B", "C"], "category": "テスト、デバッグ、リリース", "explanation": "A. SeeAllData=trueはテストの独立性と信頼性を低下させ、環境間の移植性を損なうため非推奨。\nB. 正解。Test.startTest/stopTestはガバナ制限をリセットし、stopTest後に非同期処理が完了するため、トリガーのリソース消費を正確にテストできます。\nC. 正解。テストデータファクトリパターンはデータ作成ロジックを一元化し、コードの重複を減らしてテストの可読性と保守性を向上させるベストプラクティスです。\nD. トリガーのテストはDML操作を通じてトリガーを実際に起動させ結果を検証すべきです。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 91, "q": "外部の人事システムに存在する従業員データを、Salesforceのカスタムオブジェクト「従業員」に定期的にインポートし、更新する必要があります。人事システム側の従業員IDをキーとして、Salesforce内に既に存在する従業員レコードは更新し、存在しない場合は新規に従業員レコードを作成する、いわゆるUpsert操作を行いたいと考えています。このUpsert操作を効率的かつ正確に行うために、Salesforceの「従業員」カスタムオブジェクトのどの項目に設定を適用すべきでしょうか？", "choices": ["A. 人事システムの従業員IDを格納するカスタム項目を作成し、その項目属性として「外部ID」を設定する。", "B. 人事システムの従業員IDを格納するカスタム項目を作成し、その項目属性として「必須」を設定する。", "C. 従業員オブジェクトに積み上げ集計項目を作成し、関連レコードの数をカウントする。", "D. 人事システムの従業員IDを格納するカスタム項目を作成し、その項目属性として「一意」を設定する。"], "answer": ["A"], "category": "上級デベロッパーの基本", "explanation": "A. 正解。外部ID属性を設定すると、Data LoaderやAPIによるUpsert操作の際に照合キーとして使用できます。また自動インデックスが付与されクエリのパフォーマンスも向上します。\nB. 「必須」はデータ検証属性で、Upsertの照合機能とは別。\nC. 積み上げ集計項目は集計用で、外部ID機能とは無関係。\nD. 「一意」は重複排除の検証ですが、Upsertの照合キーとして「外部ID」属性のような特化した機能はありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 92, "q": "Apexトランザクション内で複数のDML操作（取引先レコードの更新と、それに関連するカスタムオブジェクトレコードの作成）を実行しています。カスタムオブジェクトレコードの作成中に予期せぬエラーが発生した場合、すでに行われた取引先レコードの更新を取り消し、トランザクション開始前の状態に戻すためには、どのApex機能を利用するのが最も適切でしょうか？", "choices": ["A. try-catch ブロックを使用して、エラー発生時に例外を捕捉しログに記録する。", "B. Database.setSavepoint() メソッドでセーブポイントを設定し、エラー発生時に Database.rollback() メソッドでロールバックする。", "C. 各DML操作の前に System.assert() を使用してデータの整合性を確認する。", "D. @future アノテーションを使用して、カスタムオブジェクトレコードの作成処理を非同期で実行する。"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "A. try-catchはエラー捕捉に不可欠ですが、それ自体ではロールバック機能を持ちません。\nB. 正解。Database.setSavepoint()でトランザクション内の特定ポイントをマークし、Database.rollback()でそのポイント以降の変更を取り消せます。\nC. System.assert()は主にテストコード用で、ロールバックメカニズムではありません。\nD. @futureで非同期化すると独立したトランザクションになり、元のトランザクションのロールバック目的には適していません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 93, "q": "取引先レコードが作成または更新された際に、関連する商談の特定の項目も更新するApexトリガーについて、潜在的な問題とその最も適切な改善策の組み合わせはどれですか？（Trigger.isInsertの場合もAnnualRevenueの比較を行おうとしているコードの問題）", "choices": ["A. SOQLクエリをTrigger.newのループ内で実行しているため、ガバナ制限に抵触する可能性があります。", "B. ワークフロールールによるレコード更新がafterトリガーの前に実行され、afterトリガーが更新前の値を参照しています。", "C. 商談の更新処理(update oppsToUpdate)がトリガーコンテキスト内で直接実行されています。更新処理をQueueable Apexで非同期に実行する必要があります。", "D. AnnualRevenueの比較ロジックが、Trigger.isInsertの場合も評価されるため、NullPointerExceptionが発生する可能性があります。Trigger.isUpdateの条件分岐内でこの評価を行うように修正が必要です。"], "answer": ["D"], "category": "ロジックとプロセスの自動化", "explanation": "A. SOQLクエリはTrigger.newのループ内ではなく、その外側で一度だけ実行されています。\nB. この問題はワークフロールールとafterトリガーの競合ではなく、insertコンテキストでのoldMapアクセスの問題です。\nC. DML操作をトリガー内で行うこと自体は一般的で、必ずしも非同期化が必要ではありません。\nD. 正解。Trigger.isInsertの場合、Trigger.oldMapは空でoldMap.get(acc.Id)がnullを返します。その.AnnualRevenueアクセスでNullPointerExceptionが発生します。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 94, "q": "取引先オブジェクトのApexトリガーで、関連するすべての商談レコードの合計金額を計算し、取引先のカスタム項目「総商談金額」に反映させる処理を実装する最も推奨されるアプローチはどれでしょうか？", "choices": ["A. トリガー内で取引先ごとにループ処理を行い、ループ内でその取引先に関連する商談を取得するSOQLクエリを実行する。", "B. トリガーからQueueable Apexジョブを起動し、非同期トランザクション内で各取引先に関連する商談の合計金額を計算して更新する。", "C. トリガー内でTrigger.newから取引先IDのリストを取得し、集約SOQLクエリ（AggregateResultを使用）を使って1回のクエリで取引先ごとの商談合計金額を取得し、取引先レコードを更新する。", "D. 取引先オブジェクトに、商談オブジェクトの金額項目を合計する積み上げ集計項目を作成する。"], "answer": ["D"], "category": "上級デベロッパーの基本", "explanation": "A. ループ内でSOQLを実行するアンチパターンで、ガバナ制限に即座に達します。\nB. 非同期化はガバナ制限緩和に役立ちますが、よりシンプルな宣言的解決策が存在します。\nC. 集約SOQLを使った効率的な実装ですが、さらにシンプルな方法があります。\nD. 正解。取引先と商談の関係が主従関係である場合、積み上げ集計項目を使用するのが最も推奨されます。コーディング不要で、Salesforceが自動計算・更新し、ガバナ制限の影響も受けません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 95, "q": "開発者がSalesforce DXプロジェクトで作業しており、本番組織に加えられた最新のApexクラスの変更をローカルのプロジェクトに取り込む必要があります。使用すべきSalesforce CLI (sf コマンド) コマンドは何でしょうか？", "choices": ["A. sf project deploy start", "B. sf data query", "C. sf apex run", "D. sf project retrieve start"], "answer": ["D"], "category": "テスト、デバッグ、リリース", "explanation": "A. sf project deploy startはローカル→組織へのデプロイ（逆方向）。\nB. sf data queryはSOQLクエリを実行してレコードデータを取得するコマンド。\nC. sf apex runはApexコードを匿名で実行するコマンドで、メタデータ取得機能はありません。\nD. 正解。sf project retrieve startは指定した組織からメタデータコンポーネント（Apexクラス等）を取得し、ローカルのDXプロジェクトディレクトリにダウンロードします。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 96, "q": "あるApexトリガー内で、関連する多数の子レコードに対して複雑な計算処理を行い、その結果に基づいてさらに複数の更新処理を実行する必要があります。この一連の処理が、単一の同期トランザクション内で実行されると、CPU時間制限やDMLステートメント数のガバナ制限を超える可能性が高いことが判明しました。トリガーの同期実行コンテキストからこれらの重い処理を分離し、ガバナ制限の抵触リスクを低減するための一般的な非同期Apexパターンとして、最も適切なものはどれでしょうか？", "choices": ["A. プラットフォームイベントを定義し、トリガーからイベントを発行して、別のApexトリガーでそのイベントを購読・処理する。", "B. Queueable インターフェースを実装したApexクラスを作成し、トリガーからそのクラスのインスタンスをシステムキューに追加する。", "C. Schedulable インターフェースを実装したApexクラスを作成し、定期的なスケジュールで実行されるように設定する。", "D. トリガー内で System.Limits クラスのメソッドを呼び出し、制限に近づいたら処理を分割して複数回実行するロジックを実装する。"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "A. Platform Eventsも有効な選択肢ですが、比較的シンプルな処理分離にはQueueable Apexの方が実装が容易な場合があります。\nB. 正解。Queueable Apexは現在の同期トランザクションから処理を切り離して、後で独立した非同期トランザクションとして実行します。ガバナ制限消費を抑えられます。\nC. スケジュール済みApexは定期的なバッチ処理起動用で、イベント駆動型の即時非同期応答には適していません。\nD. System.Limitsで制限を監視することは有用ですが、同期処理の枠内での分割では根本的なガバナ制限回避にならないことが多い。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 97, "q": "開発中のアプリケーションにおいて、地域ごとの割引率や特定の機能の有効/無効フラグなど、環境によって異なる可能性のある設定値を管理する必要があります。これらの設定値は、Apexコードから容易に参照でき、かつ、Sandboxから本番環境へのリリース時に、変更セットやパッケージに含めて移行できる必要があります。これらの要件を満たすために利用できるSalesforceの機能はどれですか？（2つ選択）", "choices": ["A. 階層カスタム設定", "B. 静的リソース", "C. リストカスタム設定", "D. カスタムオブジェクト"], "answer": ["A", "C"], "category": "上級デベロッパーの基本", "explanation": "A. 正解。階層カスタム設定は組織全体・プロファイル別・ユーザ別に設定値を持たせられます。設定データもメタデータとして扱われ、変更セット等での移行が可能です。\nB. 静的リソースは静的コンテンツ（画像、CSS、JS等）の格納用で、設定値管理には一般的ではありません。\nC. 正解。リストカスタム設定は組織全体の共通設定データを格納でき、Apexからgetall()/getInstance()でアクセス可能。設定データはメタデータとして扱われデプロイ可能です。\nD. カスタムオブジェクトはデータとして扱われ、変更セット等によるメタデータとしてのデプロイには適していません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 98, "q": "取引先レコードが更新された際に起動する自動化プロセスがあります。まず、Apexトリガー（Before Updateコンテキスト）が特定のデータ整合性チェックを実行し、次に、更新後のレコードトリガーフローが関連する取引先責任者レコードの項目を更新するように設定されています。データ整合性チェックのロジック自体は正しいにも関わらず、特定の条件下で取引先責任者の更新が行われないという問題が発生しています。この現象の最も可能性の高い原因として考えられるものはどれでしょうか？", "choices": ["A. レコードトリガーフローが、Apexトリガーよりも先に実行されるように設定されている。", "B. Apexトリガー内のデータ整合性チェックロジックで、条件によっては addError() メソッドが呼び出され、保存プロセスが中断されている。", "C. レコードトリガーフローが、有効化されていないか、または古いバージョンが有効になっている。", "D. Apexトリガーとレコードトリガーフローの間で、同一トランザクション内のガバナ制限が競合している。"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "A. Salesforceの実行順序でBefore SaveのApexトリガーはAfter Saveのレコードトリガーフローより前に実行されます。\nB. 正解。BeforeコンテキストのApexトリガー内でaddError()が呼ばれると保存プロセスはその時点で中断されます。後続のAfterコンテキストの自動化（フロー含む）は実行されず、トランザクション全体がロールバックされます。\nC. フローが有効でなければ実行されないのは事実ですが、「特定の条件下で」という説明にはaddError()による条件分岐の中断の方が合致します。\nD. ガバナ制限超過は明確なエラーメッセージが表示されるため、addError()による中断とは異なるシナリオです。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 99, "q": "プラットフォームイベント Order_Received__e を受信し、そのイベントデータに基づいて関連する取引先レコードのカスタム項目 Last_Order_Date__c を更新するApexトリガーをテストする際、最も適切な方法はどれですか？", "choices": ["A. テスト用の取引先レコードを作成します。Test.startTest() と Test.stopTest() ブロックの間で、Order_Received__e オブジェクトのインスタンスを作成し Database.insert() を使用して挿入します。", "B. @isTest(IsParallel=true) アノテーションをテストクラスに付与します。テストメソッド内でテスト用の取引先を作成し、Order_Received__e イベントを発行するために EventBus.publish() を呼び出します。", "C. HttpCalloutMock インターフェースを使用してモッククラスを作成します。テストメソッド内で Test.setMock() を設定し、擬似的なレスポンスをトリガーに返します。", "D. テストメソッド内で、テスト用の取引先レコードを作成します。Test.startTest() と Test.stopTest() ブロックの間で、EventBus.publish() メソッドを使用して Order_Received__e イベントのインスタンスを発行します。Test.stopTest() の呼び出しにより、イベントの非同期処理が完了するため、その後に取引先レコードを再クエリし、Last_Order_Date__c が更新されていることをアサートします。"], "answer": ["D"], "category": "テスト、デバッグ、リリース", "explanation": "A. プラットフォームイベントはDatabase.insert()では発行されません。EventBus.publish()を使用する必要があります。\nB. IsParallel=trueはテストの並列実行許可で、イベント発行方法とは関係なし。また、Test.startTest/stopTestがなく非同期処理の完了が保証されません。\nC. HttpCalloutMockはHTTPコールアウトのテスト用で、プラットフォームイベントとは無関係。\nD. 正解。EventBus.publish()でイベントを発行し、Test.stopTest()でイベントの非同期トリガー処理が強制完了します。その後に取引先を再クエリしてアサーションで検証する正しい手順です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 100, "q": "マルチ通貨が有効になっているSalesforce組織で、様々な通貨で記録されている複数の商談レコードの金額（Amount項目）を、コードを実行しているユーザのデフォルト通貨に換算した上で処理を行う必要があります。SOQLクエリを使用してこの通貨換算を効率的に行うには、どの機能を利用するのが最も適切でしょうか？", "choices": ["A. UserInfo.getDefaultCurrency() メソッドでユーザのデフォルト通貨コードを取得し、取得した商談金額に対してApex内で自作の換算ロジックを適用する。", "B. SOQLクエリのSELECT句で FORMAT(Amount) 関数を使用し、金額をユーザのロケールに応じた書式で取得する。", "C. 通貨項目（Amount）をSOQLで取得した後、別途 CurrencyType オブジェクトをクエリして関連する換算レートを取得し、Apexコード内で手動計算を行う。", "D. SOQLクエリのSELECT句で convertCurrency(Amount) 関数を使用し、取得する金額項目をユーザのデフォルト通貨に換算する。"], "answer": ["D"], "category": "ロジックとプロセスの自動化", "explanation": "A. 自作換算ロジックは複雑（特に高度な通貨管理での日付指定レート）で、標準機能を使う方が信頼性が高い。\nB. FORMAT()は金額をロケールに応じた表示用文字列にフォーマットする関数で、通貨換算は行いません。\nC. CurrencyTypeからレートを取得して手動計算するのは実装が複雑で、高度な通貨管理には対応しにくい。\nD. 正解。convertCurrency()関数をSOQLのSELECT句で使用すると、指定した通貨項目の値をクエリ実行ユーザのデフォルト通貨に自動換算して返します。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 101, "q": "SalesforceのバッチApexに関する次の記述のうち、正しいものを選択してください。", "choices": ["A) バッチApexは、一度に1万レコードを処理することが可能であり、この限界を超えると自動的に次のバッチ処理が開始されます。", "B) バッチクラス内でDatabase.QueryLocatorを使用する場合、SOQLクエリで取得できるレコード数に上限はありません。", "C) バッチApexのexecuteメソッドは、各トランザクションで最大200レコードを処理しますが、この数は開発者が変更することはできません。", "D) startメソッド内で実行されるSOQLクエリは、トランザクションごとに100万レコードのガバナ制限を受けます。"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "A) 不正解: バッチApexは一度に処理できるレコード数に制限がありますが、この数はデフォルトで200レコードです。開発者はDatabase.executeBatchメソッドの第二引数でこの数を指定でき、最大で2000レコードまで増やすことが可能です。1万レコードを自動的に超えると次のバッチが開始されるわけではありませんが、バッチ処理は自動的に続けて実行されます。\n\nB) 正解: Database.QueryLocatorオブジェクトを使用すると、バッチApexはSOQLクエリによって返されるレコード数に対する制限を超えて処理することができます。これにより、大量のデータを効率的に処理することが可能になります。\n\nC) 不正解: executeメソッドが一度に処理するレコードの数はデフォルトで200ですが、これはDatabase.executeBatchメソッドを呼び出す際に指定することで変更可能です。最大で2000レコードまで設定できます。\n\nD) 不正解: startメソッド内で実行されるSOQLクエリには、トランザクションごとに適用されるガバナ制限がありますが、具体的に100万レコードという数値は正しくありません。SOQLクエリのガバナ制限は、クエリが返すことができる最大レコード数として設定されており、Database.QueryLocatorを使用する場合、この制限を超えて処理を行うことが可能です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 102, "q": "Salesforceでのカスタム開発プロジェクトにおいて、高品質なコードを保証するために開発者が取り入れるべき実践は何ですか？以下の選択肢から最も適切なものを２つ選んでください。", "choices": ["A. コードレビューを定期的に行い、同僚からのフィードバックを積極的に取り入れます。", "B. プロジェクトの初期段階でのみユニットテストを書き、その後はコード変更が少ないときに限りテストを更新します。", "C. Apexコードのデプロイ前に、可能な限り手動テストを行って自動化されたテストの必要性を減らします。", "D. ガバナー制限を常に意識し、効率的なクエリとループ処理のためのベストプラクティスを適用します。"], "answer": ["A", "D"], "category": "ロジックとプロセスの自動化", "explanation": "A. 正解。コードレビューは、コードの品質を向上させ、エラーやバグを早期に発見するのに非常に効果的な方法です。他の開発者からの視点は、コードの改善点を指摘し、ベストプラクティスの共有にもつながります。\n\nB. 不正解。ユニットテストはコードの変更があるたびに更新し続けるべきであり、プロジェクトのライフサイクル全体を通じて継続的にテストを行うことが重要です。これにより、変更がコードの他の部分に悪影響を与えていないことを保証できます。\n\nC. 不正解。手動テストは有用ですが、自動化されたテストの代わりになるものではありません。自動化テストは継続的インテグレーションプロセスの一部として実行でき、繰り返し実行することでコードの品質を一貫して保証します。\n\nD. 正解。Salesforceのガバナー制限は、プラットフォームのパフォーマンスと安定性を保つために設けられています。開発者はこれらの制限内で効率的に動作するコードを書くために、SOQLクエリの最適化やループ処理の効率化などのベストプラクティスを適用する必要があります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 103, "q": "Salesforceプラットフォームでの効果的なエラーハンドリング戦略を構築する際、開発者が考慮すべきポイントはどれですか？以下の選択肢から適切なものを3つ選んでください。", "choices": ["A. エラーメッセージをユーザーフレンドリーにするために、技術的な詳細を排除し、一般的な説明のみを提供します。", "B. Apexクラスとトリガーにtry-catchブロックを使用し、すべての可能な例外をキャッチしてログに記録します。", "C. エラーが発生した場合は、自動的に管理者に電子メール通知を送信し、即時の対応を促します。", "D. カスタムエラーページを作成し、エラー発生時にユーザーをそのページにリダイレクトします。"], "answer": ["B", "C", "D"], "category": "ロジックとプロセスの自動化", "explanation": "A. 不正解。ユーザーフレンドリーなエラーメッセージは重要ですが、技術的な詳細を完全に排除することは推奨されません。開発者や管理者が問題を迅速に特定し解決するためには、適切な詳細を含める必要があります。ただし、エンドユーザーには理解しやすい形でエラーメッセージを提示することが重要です。\n\nB. 正解。例外を適切にキャッチし、ログに記録することは、問題の診断と修正を容易にするために重要です。これにより、システムの安定性を維持しつつ、エラーの原因を効率的に特定できます。\n\nC. 正解。重要なエラーが発生した場合に管理者に通知することは、迅速な問題解決に役立ちます。これにより、システムのダウンタイムを最小限に抑え、ユーザー体験の低下を防ぐことができます。\n\nD. 正解。カスタムエラーページを使用することで、エラーが発生した際にユーザーにより良い体験を提供できます。また、エラーページには、問題の報告方法や、次に何をすべきかといった有用な情報を提供することができます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 104, "q": "開発者は、メタデータを取得してデプロイし、クエリ結果の単純な CSV エクスポートを実行し、JSON 応答を表示して APEX Rest 呼び出しをデバッグしたいと考えています。開発者はどのツールを使用する必要がありますか?", "choices": ["A.Force.com 移行ツール", "B.Force.com IDE", "C.開発者コンソール", "D.ワークベンチ"], "answer": ["D"], "category": "テスト、デバッグ、リリース", "explanation": "ワークベンチ（Workbench）は、Salesforce管理者や開発者がSalesforce組織とやりとりするための強力なツールです。ワークベンチを使用すると、メタデータAPIやREST/SOAP APIを使って様々な操作を行うことができます。\n\nA. Force.com移行ツールは主にメタデータのデプロイや取得のためのツールであり、API呼び出しのデバッグやクエリ結果のエクスポートには向いていません。\n\nB. Force.com IDEはEclipseベースの開発環境であり、APEXやVisualforceのコーディングには適していますが、API呼び出しのデバッグやクエリ結果のエクスポートのための直接の機能は持っていません。\n\nC. 開発者コンソールはAPEXのデバッグや実行ログの表示、SOQLの実行などを行うためのツールですが、メタデータのデプロイや取得、APIのデバッグのための直接の機能は持っていません。\n\nD. ワークベンチは上記の要件をすべて満たすツールです。メタデータの取得やデプロイ、SOQLの実行と結果のエクスポート、REST/SOAP APIの呼び出しとデバッグなど、多様な操作が可能です。\n\nしたがって、開発者が求める機能を利用するためには、ワークベンチを使用するのが最適です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 105, "q": "<apex:commandButton> が実行されている場合と実行されていない場合に、開発者が異なるテキストを表示するには、どのタグを使用する必要がありますか?", "choices": ["A.<ApexactionStatus>", "B.<ApexpageMessages>", "C.<ApexactionSupper>", "D.<apexactionPoller>"], "answer": ["A"], "category": "ユーザインターフェース", "explanation": "A. <ApexactionStatus> - 正解です。このタグは、Ajaxリクエストの状態（実行中、完了など）を表示するために使用されます。このタグを利用して、apex: commandButtonの操作が実行されている間や終了した後に、異なるテキストや画像を表示させることができます。\n\nB. <ApexpageMessages> - 不正解です。このタグは、ページ上のバリデーションエラーメッセージやその他のメッセージを表示するために使用されます。Ajax操作の状態を表示するためには使用されません。\n\nC. <ApexactionSupper> - 不正解です。この選択肢は正しいタグ名ではありません。Salesforce Visualforceにはapex: actionSupportタグが存在し、特定のイベントが発生した際にサーバー側のアクションを呼び出すために使用されますが、このコンテキストでの使用は不適切です。\n\nD. <apexactionPoller> - 不正解です。この選択肢は正しいタグ名ではありません。Salesforce Visualforceにはapex: actionPollerタグが存在し、定期的にサーバー側のアクションを呼び出すために使用されますが、コマンドボタンの実行状態を表示するためには使用されません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 106, "q": "Salesforce のカスタム設定を使用して、アプリケーション全体で使用する設定値を管理しています。カスタム設定のデータをApexコードから取得する方法として、最も適切なものはどれですか？", "choices": ["A. SObject.get()メソッドを使用して、カスタム設定レコードを取得する", "B. Custom_Setting__c.getAll()メソッドを使用して、すべてのカスタム設定レコードを取得する", "C. Custom_Setting__c.getOrgDefaults()メソッドを使用して、組織デフォルト値を取得する", "D. Custom_Setting__c.getInstance()メソッドを使用して、特定のカスタム設定レコードを取得する"], "answer": ["D"], "category": "上級デベロッパーの基本", "explanation": "A. SObject.get()メソッドは、カスタム設定レコードの取得には使用されません。このメソッドは、一般的なSObjectレコードの値を取得するために使用されます。\n\nB. Custom_Setting__c.getAll()メソッドは、すべてのカスタム設定レコードを取得するために使用されます。ただし、多くの場合、特定のレコードやデフォルト値のみが必要とされるため、このメソッドは適切ではありません。\n\nC. Custom_Setting__c.getOrgDefaults()メソッドは、カスタム設定の組織デフォルト値を取得するために使用されます。組織デフォルト値は、階層的カスタム設定で定義されている場合に使用されます。\n\nD. Custom_Setting__c.getInstance()メソッドは、特定のカスタム設定レコードを取得するために使用されます。このメソッドを使用することで、必要な設定値を効率的に取得できます。getInstance()メソッドは、リストカスタム設定とhierarchical hierarchical custom settingの両方で使用できます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 107, "q": "ある会社は、Salesforce を使用して製品を顧客に販売しています。また、製品の記録システムである外部製品情報管理 (PIM) システムも備えています。\n開発者は次の要件を受け取りました。\n\n* PIM で商品が作成または更新されるたびに、Salesforce で Product2 レコードとして商品を作成または更新する必要があり、PricebookEntry レコードは Salesforce によって自動的に作成または更新される必要があります。\n* PricebookEntry は、カスタム設定で指定された Pricebook2 で作成する必要があります。\n\nこれらの要件を満たすために、開発者は何を使用する必要がありますか?", "choices": ["A.SObJect ツリー", "B.Apex REST", "C.呼び出し可能なアクション", "D.イベント監視"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "正しい解答はBです。\n\nApex RESTを使用すると、外部システムがSalesforceデータにアクセスしたり操作したりするためのカスタムRESTful Webサービスを作成できます。\nこのシナリオでは、外部の製品情報管理(PIM)システムとSalesforce間でデータをやり取りするためのカスタムインターフェースが必要です。PIMシステムでの商品の作成や更新をトリガーとして、それに応じてSalesforceでのProduct2レコードやPricebookEntryレコードの作成や更新が必要とされています。\nApex RESTを使用すると、外部システムからの具体的なリクエスト（商品の作成や更新など）に対して、Salesforce内での処理をカスタマイズして実行することができます。また、このカスタムRESTful Webサービスを介して、PricebookEntryがカスタム設定で指定されたPricebook2で作成されるように制御することも可能です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 108, "q": "次のコード スニペットを検討してください。\n<c-order> コンポーネントは、ユーザーが注文を選択したことを <c-order-order> コンポーネントにどのように伝える必要がありますか?", "choices": ["A.カスタム イベントの作成とディスパッチ", "B.アプリケーション イベントを作成して起動します。", "C.標準の DOM イベントを作成して起動します。", "D.コンポーネント イベントを作成して起動します。"], "answer": ["A"], "category": "ユーザインターフェース", "explanation": "Lightning Web コンポーネントでは、コンポーネント間で情報を伝達するためにカスタムイベントを使用します。\n\nこの場合、\n<c-order> コンポーネントから <c-order-order> コンポーネントへ情報を伝達するには、<c-order> コンポーネントでカスタムイベントを作成し、そのイベントをディスパッチする必要があります。 <c-order-order> コンポーネントは、このイベントをリッスンして所定の処理を行います。\n\nしたがって、ユーザーが注文を選択したことを <c-order-order> コンポーネントに伝えるためには、カスタムイベントの作成とディスパッチが必要です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 109, "q": "Salesforceプラットフォーム上でカスタム機能を実装する際、大量データ処理を効率的に行うためのベストプラクティスは何ですか？以下の選択肢から最も適切なものを２つ選んでください。", "choices": ["A. すべてのデータ操作を同期的に行い、処理の完了を保証します。", "B. バッチApexを使用して、大量データをチャンクに分割し、非同期に処理します。", "C. SOQLクエリ内での「LIMIT 1」を使用して、必要なデータのみを高速に取得します。", "D. 外部システムからのデータインポートには、カスタムApexコードの代わりにSalesforceデータインポートウィザードを使用します。"], "answer": ["B", "D"], "category": "ロジックとプロセスの自動化", "explanation": "A. 不正解。同期的なデータ操作は、小規模なデータセットに適していますが、大量データを扱う場合にはパフォーマンスの問題を引き起こす可能性があります。非同期処理の方が効率的です。\n\nB. 正解。バッチApexは大量データの処理に最適なツールです。データを小さな単位に分割して非同期に処理することで、ガバナーリミットを超えることなく効率的にデータを扱うことができます。\n\nC. 不正解。「LIMIT 1」は特定のケースでのみ有用であり、大量データ処理の文脈においてベストプラクティスとは言えません。大量データ処理では、適切なクエリとデータのチャンク処理が重要です。\n\nD. 正解。Salesforceデータインポートウィザードは、非開発者でも簡単に大量データをインポートできるツールです。カスタムApexコードを書くよりも効率的で、ガバナーリミットの問題を回避できます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 110, "q": "ビジネス プロセスでは、新しい Account レコードを外部システムに送信する必要があります。取引先がエラーなしで挿入されると、取引先名、ID、CreatedDate、および Created ById がほぼリアルタイムで外部システムに渡される必要があります。\n開発者はこれをどのように達成する必要がありますか?", "choices": ["A.before insert トリガーと @future メソッドを使用する", "B.before insert トリガーと Queueable クラスを使用する", "C.@InvocableMethod メソッドを呼び出すプロセス ビルダーを使用する", "D.@InvocableMethod メソッドを呼び出すワークフロー ルールを使用する"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "C. @InvocableMethod メソッドを呼び出すプロセス ビルダーを使用する\n\nこのオプションは、ビジネスプロセスの要件に最も適しています。@InvocableMethod アノテーションは、プロセスビルダーやフローなどの宣言的なツールから呼び出すためにApexメソッドを公開します。取引先がエラーなしで挿入された後に、情報を外部システムに送信するためにこのメソッドを使用できます。プロセスビルダーは、特定の条件が満たされたときに自動的にアクションをトリガーする宣言的なツールです。\n\nAやBのオプションは、before insert トリガーを使用するため、実際の挿入が発生する前に動作します。このため、CreatedDate や CreatedById などの情報はまだ利用できません。\n\nDのオプションは、ワークフロールールを使用することを提案していますが、ワークフローは@InvocableMethodを直接呼び出す能力を持っていません。\n\nしたがって、Cの選択肢がこのシナリオの要件を満たす最も適切な方法です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 111, "q": "Salesforceのカスタムメタデータタイプに関して正しい記述を選択してください。", "choices": ["A) カスタムメタデータタイプのレコードは、Apexコードから直接作成、更新、削除することはできません。", "B) カスタムメタデータタイプは、管理パッケージに含めることができず、サンドボックス環境と本番環境間で手動で同期する必要があります。", "C) カスタムメタデータタイプの項目には、テキスト、日付、数値だけでなく、リッチテキスト項目もサポートしています。", "D) カスタムメタデータタイプは、設定データを保存するために使用され、Apexクラス、ビジュアルフォースページ、プロセスビルダーからアクセスできます。"], "answer": ["D"], "category": "上級デベロッパーの基本", "explanation": "A) 不正解: カスタムメタデータタイプのレコードは、Apexコードを使って直接作成、更新はできませんが、読み取りアクセスは可能です。メタデータAPIを通じてプログラム的に作成や更新を行うことは可能です。\n\nB) 不正解: カスタムメタデータタイプは、管理されたパッケージに含めることができます。これにより、サンドボックスから本番環境への移行プロセスを簡素化し、メタデータの同期を容易にします。\n\nC) 不正解: カスタムメタデータタイプは、テキスト、日付、数値などの項目タイプをサポートしていますが、リッチテキスト項目はサポートしていません。\n\nD) 正解: カスタムメタデータタイプは設定データの保存に使用され、そのデータはApexクラス、ビジュアルフォースページ、プロセスビルダーからアクセス可能です。これにより、コード内でハードコーディングされた値を避け、より柔軟で保守しやすいアプリケーションを作成することができます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 112, "q": "REST API __________。", "choices": ["A.EST 原則に基づいており、大量のデータ セットの読み込みまたは削除用に最適化されています。これを使用して、バッチを送信することにより、多くのレコードを非同期的にクエリ、queryAll、insert、update、upsert、または削除できます。", "B.Salesforce と対話するための、強力で便利でシンプルな REST ベースの Web サービス インターフェイスを提供します。その利点には、統合と開発の容易さが含まれ、モバイル アプリケーションや Web プロジェクトで使用するための優れたテクノロジの選択肢です。", "C.取引先、見込み客、カスタム オブジェクトなどのレコードを作成、取得、更新、または削除するために使用され、パスワードの維持、検索の実行などを可能にします。", "D.組織のカスタマイズを取得、リリース、作成、更新、または削除するために使用されます。最も一般的な用途は、変更を Sandbox またはテスト組織から本番環境に移行することです。"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "B. Salesforce と対話するための、強力で便利でシンプルな REST ベースの Web サービス インターフェイスを提供します。その利点には、統合と開発の容易さが含まれ、モバイル アプリケーションや Web プロジェクトで使用するための優れたテクノロジの選択肢です。\n\nSalesforceのREST APIは、RESTプロトコルに基づいて作成されており、Salesforceのデータと対話するためのインターフェイスを提供します。\n\nREST APIを使用することで、外部システムやアプリケーションとSalesforceとの間でデータの作成、更新、読み取り、削除などの操作を行うことができます。\n\nこのAPIは非常に柔軟性があり、多くのプログラミング言語やフレームワークでサポートされており、モバイルアプリケーションやWebアプリケーションの開発でよく使用されます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 113, "q": "Salesforceのカスタム設定とカスタムメタデータタイプに関する以下の記述のうち、正しいものを選択してください。", "choices": ["A) カスタム設定は、Apexコードからのみアクセス可能であり、プロセスビルダーやワークフローからはアクセスできません。", "B) カスタムメタデータタイプは、プロセスビルダー、フロー、および検証ルールから直接参照できますが、カスタム設定はこれらのツールから参照できません。", "C) カスタム設定とカスタムメタデータタイプの主な違いは、カスタム設定が実行時にのみデータを提供するのに対し、カスタムメタデータタイプはコンパイル時にもデータを提供できる点です。", "D) カスタムメタデータタイプのレコードは、Apexコードからのみ作成、更新、または削除できますが、カスタム設定のレコードはユーザーインターフェイスを通じても管理できます。"], "answer": ["B"], "category": "上級デベロッパーの基本", "explanation": "A) 不正解: カスタム設定は、Apexコードからアクセスできるだけでなく、数式項目やビジュアルフォースページからもアクセス可能です。ただし、プロセスビルダーやフローなどのいくつかの自動化ツールでは直接参照することはできませんが、この選択肢の表現は完全に正確ではありません。\n\nB) 正解: カスタムメタデータタイプは、その柔軟性と機能の拡張性のために導入されました。プロセスビルダー、フロー、検証ルールから直接参照できる点は、カスタム設定と比較して明確な利点です。これにより、設定データをより広範囲のアプリケーションと統合することができます。\n\nC) 不正解: カスタム設定とカスタムメタデータタイプの主な違いは、アクセス方法や使用可能な機能にありますが、実行時とコンパイル時のデータ提供の観点から区別されるわけではありません。両方とも実行時にデータを提供することができ、カスタムメタデータタイプはそのデータがメタデータとして扱われ、展開可能であり、APIを通じてアクセス可能という点が特徴です。\n\nD) 不正解: カスタムメタデータタイプのレコードは、SetupメニューからのUI操作やメタデータAPIを通じても作成、更新、削除が可能です。この点でカスタム設定と似ていますが、カスタムメタデータタイプはより堅牢な展開機能とアプリケーションのカスタマイズにおいてより多くのユースケースをサポートします。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 114, "q": "Salesforceでのカスタム開発における効率的なデータアクセスを実現するためのベストプラクティスは何ですか？以下の選択肢から適切なものを２つ選んでください。", "choices": ["A. すべてのデータアクセスにカスタムApex REST APIを使用し、外部システムとの統合を容易にします。", "B. SOQLクエリのSELECT *を使用して、必要なすべての項目を一度に取得します。", "C. 共有ルールと項目レベルのセキュリティを適切に使用して、データアクセスを制御します。", "D. バルクAPIを活用して、大量のデータ操作を効率的に処理します。"], "answer": ["C", "D"], "category": "上級デベロッパーの基本", "explanation": "A. 不正解。カスタムApex REST APIは外部システムとの統合に有用ですが、内部でのすべてのデータアクセスにこれを使用するのは非効率的です。また、管理とセキュリティの観点からも最適ではありません。\n\nB. 不正解。SOQLではSELECT *構文はサポートされておらず、また、必要な項目のみを指定することがパフォーマンス最適化のために推奨されています。\n\nC. 正解。データアクセスのセキュリティと効率性は、共有ルールや項目レベルのセキュリティの適切な設定によって大きく改善されます。これにより、ユーザーがアクセスできるデータを正確に制御し、システムのパフォーマンスを保つことができます。\n\nD. 正解。バルクAPIは大量のデータを取り扱う場合に最適化されており、効率的なデータのインポートやエクスポートを可能にします。これにより、システムの負荷を軽減し、パフォーマンスを向上させることができます。\n\nしたがって、効率的なデータアクセスを実現するためのベストプラクティスには、データアクセスのセキュリティと効率性の両方を考慮した共有ルールと項目レベルのセキュリティの適切な使用、および大量データ処理のためのバルクAPIの活用が含まれます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 115, "q": "Salesforceのプラットフォームイベントに関する次の記述のうち、正しいものを選択してください。", "choices": ["A) プラットフォームイベントは同期的にのみ発行され、非同期処理はサポートしていません。", "B) プラットフォームイベントの発行後、イベントメッセージはSalesforceの外部システムでのみ消費可能であり、Salesforce内部からはアクセスできません。", "C) プラットフォームイベントに対してトリガーを定義することができ、これによりイベントメッセージを受信した際にカスタムロジックを実行できます。", "D) プラットフォームイベントはSalesforce内でのデータ変更を追跡するために使用され、外部システムとの統合には使用されません。"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "A) 不正解: プラットフォームイベントは非同期処理をサポートしています。イベントメッセージは発行された後に非同期に処理され、リアルタイムまたは近似リアルタイムのイベント駆動型アーキテクチャを実現します。\n\nB) 不正解: プラットフォームイベントはSalesforce内部や外部のシステムの両方で消費可能です。Salesforce内でイベントメッセージを購読し、Apexトリガーやプロセスビルダーを使用してカスタムロジックを実行することができます。\n\nC) 正解: プラットフォームイベントに対してはApexトリガーを定義できます。これにより、イベントメッセージがプラットフォームによって発行された際に、カスタムロジックが自動的に実行されるように設定できます。これは、Salesforce内外のシステム間での非同期統合を容易にします。\n\nD) 不正解: プラットフォームイベントはSalesforce内でのデータ変更追跡だけでなく、外部システムとの統合用途にも広く使用されます。これにより、異なるシステム間でのイベントベースのメッセージングが可能になり、統合アーキテクチャにおいて柔軟性とスケーラビリティを提供します。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 116, "q": "Salesforceプラットフォーム上で開発者がカスタムアプリケーションを構築する際に、セキュリティを強化するために採用すべきプラクティスはどれですか？以下の選択肢から適切なものを2つ選んでください。", "choices": ["A. 全てのユーザーに管理者権限を付与し、開発プロセスを加速します。", "B. セキュリティトークンを使用して、外部システムからのAPI呼び出しを認証します。", "C. Apexクラスとメソッドに「with sharing」キーワードを適切に使用して、データアクセスを制御します。", "D. ユーザー入力のサニタイズを行わずに、動的SOQLクエリを構築します。"], "answer": ["B", "C"], "category": "上級デベロッパーの基本", "explanation": "A. 不正解。全てのユーザーに管理者権限を付与することは、セキュリティリスクを大幅に高める行為です。最小限の権限原則に従い、必要な権限のみをユーザーに付与することがセキュリティを強化するために重要です。\n\nB. セキリティトークンを使用して、外部システムからのAPI呼び出しを認証します。 - 正解。セキュリティトークンは、外部システムからのAPI呼び出しを安全に認証するための重要なメカニズムです。これにより、不正なアクセスを防ぎ、システムのセキュリティを強化します。\n\nC. 正解。「with sharing」キーワードは、Apexクラスが現在のユーザーの共有ルールに従ってデータにアクセスすることを保証します。これにより、不適切なデータアクセスを防ぎ、アプリケーションのセキュリティを強化します。\n\nD. 不正解。ユーザー入力をサニタイズせずに動的SOQLクエリを構築することは、SQLインジェクション攻撃に対して脆弱な状態を作り出します。セキュリティを強化するためには、ユーザー入力を適切にサニタイズすることが重要です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 117, "q": "企業には、データ設定の一部として取引先 レコードを作成するさまざまな単体テスト方法があります。取引先に新しい必須項目が追加され、すべての単体テストが失敗するようになりました。開発者が問題を解決するための最適な方法は何ですか?", "choices": ["A.必須項目を、システム管理者プロファイルを除外する検証ルールに変更します。", "B.すべての単体テストのデータ設定に必要な項目を追加します。", "C.単体テスト用の取引先を作成する単一の場所として機能する TestDataFactory クラスを作成し、そこに必要な項目を設定します。", "D.取引先に before insert トリガーを追加して、必須項目の値を設定します。"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "C. 単体テスト用の取引先を作成する単一の場所として機能するTestDataFactory クラスを作成し、そこに必要な項目を設定します。 このアプローチは、将来の変更や必須項目の追加があった場合にも、一箇所でテストデータの更新を行うことができるため、最も効率的です。TestDataFactory クラスは、再利用可能なテストデータの設定方法を提供し、単一の場所で変更を管理できるため、テストのメンテナンスを容易にします。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 118, "q": "Salesforce Apexのテストクラスとテストメソッドに関する以下の記述のうち、正しいものを選択してください。", "choices": ["A) テストクラスは@isTestアノテーションを使用して定義され、テストメソッドにはこのアノテーションを付ける必要はありません。", "B) テストメソッド内でSystem.debug()を使用しても、テスト実行時のデバッグログには出力されません。", "C) テストメソッドは、本番環境にデプロイする前に少なくとも75%のApexコードカバレッジを達成する必要がありますが、個々のクラスのカバレッジ率は問われません。", "D) SeeAllData=trueアノテーションをテストクラスに指定することで、テストメソッドは実際の組織データにアクセスできますが、これは推奨される実践ではありません。"], "answer": ["D"], "category": "上級デベロッパーの基本", "explanation": "A) 正解: テストクラスは@isTestアノテーションを使用して定義されます。Apexのバージョンによっては、テストメソッドにも@isTestを付ける必要がありますが、クラスレベルで@isTestが定義されていれば、それがテストクラスであることを意味し、メソッドレベルで再度指定する必要はありません。\n\nB) 不正解: テストメソッド内でSystem.debug()を使用すると、その出力はテスト実行時のデバッグログに含まれます。これにより、テスト実行の際の問題の診断に役立ちます。\n\nC) 不正解: Salesforceでは、デプロイメント前に全体で最低75%のApexコードカバレッジが必要です。しかし、それぞれのトリガーとクラスについても、最低1%のカバレッジが求められます。このため、全体のカバレッジ率だけでなく、個々のクラスやトリガーに対するカバレッジ率も重要です。\n\nD) 正解: SeeAllData=trueアノテーションをテストクラスやメソッドに指定することで、テスト中に実際の組織データにアクセスできます。しかし、これはテストの隔離性を損ない、予期しないサイドエフェクトや依存性を生じさせる可能性があるため、推奨される実践ではありません。テストデータは@testSetupメソッドなどを使用して、テスト実行前にセットアップするべきです。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 119, "q": "開発者は、従来のオンプレミス SQL データベースと統合されています。\n開発者は、統合されるデータが Salesforce の適切なレコードと一致していることを確認するために何を使用する必要がありますか?", "choices": ["A.外部オブジェクト", "B.外部 ID 項目", "C.参照項目", "D.式項目"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "B. 外部 ID 項目 外部 ID 項目は、Salesforce以外のシステムで一意のIDを持つレコードを参照するために使用されます。Salesforceにレコードをインポートまたは統合する場合、この外部 ID項目を使用して、他のシステムのデータとSalesforceのデータが正しく一致していることを確認することができます。従って、オンプレミス SQL データベースとの統合において、外部のデータベースの特定のレコードとSalesforceのレコードを一致させるために外部 ID 項目を使用することが推奨されます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 120, "q": "開発者は、Do_Not_Delete_c チェックボックスがオンになっている関連する取引先責任者がある場合、取引先が削除されないようにするよう求められました。開発者はこれをどのように達成できますか?", "choices": ["A.取引先 オブジェクトで入力規則を作成します。", "B.取引先オブジェクトに Before Delete トリガーを作成します。", "C.取引先責任者オブジェクトに入力規則を作成します。", "D取引先責任者オブジェクトに Before Delete トリガーを作成します。"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "B. 取引先オブジェクトに Before Delete トリガーを作成します。 取引先が削除される前に特定の条件を確認し、その条件に基づいて取引先の削除を防ぐには、Before Delete トリガーを使用するのが適切です。このケースでは、関連する取引先責任者のDo_Not_Delete__c チェックボックスがオンの場合、取引先の削除を防ぐため、Account オブジェクトに Before Delete トリガーを作成します。このトリガー内で、関連する取引先責任者を確認し、条件に一致する場合は削除操作を中止します。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 121, "q": "一部のユーザがまだ Salesforce Classic を使用している組織では、[取引先の編集] ボタンを上書きする必要があります。組織には、オーバーライドに必要な作業を行う Lightning コンポーネントが既にあり、クライアントはそれを再利用できるようにしたいと考えています。開発者はこれをどのように実装する必要がありますか?", "choices": ["A.Lightning コンポーネントを使用して、Lightning と Classic の両方の編集ボタンをオーバーライドします。", "B.Lightning ページで Lightning の編集ボタンをオーバーライドします。Classic の場合は、Lightning コンポーネントを含む Visualforce ページで編集ボタンをオーバーライドします。", "C.Lightning の編集ボタンを Lightning コンポーネントでオーバーライドします。Classic の場合は、Lightning コンポーネントを含む Visualforce ページで編集ボタンをオーバーライドします。", "D.Lightning と Classic の両方の編集ボタンを、新しい Visualforce ページを備えた Lightning コンポーネントでオーバーライドします。"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "C. Lightning の編集ボタンを Lightning コンポーネントでオーバーライドします。Classic の場合は、Lightning コンポーネントを含む Visualforce ページで編集ボタンをオーバーライドします。\n\nLightning Experienceでは、ボタンやアクションのオーバーライドに直接Lightningコンポーネントを使用できます。しかし、Salesforce Classicでは、直接Lightningコンポーネントを使用してボタンをオーバーライドすることはできません。そのため、Salesforce ClassicでLightningコンポーネントを使用してボタンのオーバーライドを実装するには、そのコンポーネントを埋め込むVisualforceページを使用する必要があります。このアプローチにより、同じLightningコンポーネントを再利用し、Lightning ExperienceとSalesforce Classicの両方で一貫した動作を提供できます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 122, "q": "Salesforceのガバナ制限に関する以下の記述のうち、正しいものを選択してください。", "choices": ["A) ApexでのHTTPリクエストの同期呼び出しは、単一のトランザクションにつき最大10回まで許可されています。", "B) 一度のトランザクションで許可されている最大SOQLクエリ数は、同期トランザクションで100回、非同期トランザクションで200回です。", "C) カスタムApexコードによるDML操作は、単一のトランザクションで最大150回まで実行できます。", "D) 一つのApexトリガー実行で処理できる最大レコード数は、200レコードです。"], "answer": ["D"], "category": "ロジックとプロセスの自動化", "explanation": "A) 正解: ApexでのHTTPリクエストの同期呼び出しに関するガバナ制限は、単一のトランザクションにつき最大10回までと定められています。これは正確な情報であり、外部システムとの通信を行う際の制限を示しています。\n\nB) 不正解: 一度のトランザクションで許可されている最大SOQLクエリ数は、同期トランザクションで100回です。しかし、非同期トランザクションの場合、最大SOQLクエリ数は200回ではなく、通常は200回以上許可されています（具体的な数値はSalesforceのリリースによって変わる可能性がありますが、基本的には非同期トランザクションではより多くのSOQLクエリが許可されます）。\n\nC) 不正解: カスタムApexコードによるDML操作のガバナ制限は、単一のトランザクションで最大150回ではありません。実際には、単一のトランザクションで許可されているDML操作の回数はより少なく、通常は同期トランザクションでは100回、非同期トランザクションでは150回です。\n\nD) 不正解: 私の説明に誤りがありました。一つのApexトリガー実行で処理できる最大レコード数は200レコードとされていますが、これはガバナ制限というよりは、Salesforceのプラットフォームによって設定された制限です。この限界を超えるレコードが操作される場合、Salesforceは自動的にそれらをバッチに分割し、複数のトリガー呼び出しを行います。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 123, "q": "開発者は、Lightning Aura コンポーネントから Apex サーバ側コントローラを呼び出したいと考えています。コントローラによって返されるデータに対する 2 つの制限は何ですか? 2つ答えを選択してください", "choices": ["A.基本データ型と sObject のみが、Lightning Aura コンポーネントによって呼び出される Apex コントローラの戻り値の型としてサポートされています。", "B.カスタム Apex クラスを返すことができますが、@AuraEnabled アノテーションが付けられたパブリック インスタンス プロパティとメソッドの値のみがシリアル化されて返されます。", "C.基本的なデータ型はサポートされていますが、数値の最大サイズなどの既定値は、マップ先のオブジェクトによって定義されます。", "D.カスタム Apex クラスのリストは、Lightning Aura コンポーネントによって呼び出される Apex コントローラによって返されることはありません。"], "answer": ["B", "C"], "category": "テスト、デバッグ、リリース", "explanation": "B. カスタム Apex クラスを返すことができますが、@AuraEnabled アノテーションが付けられたパブリック インスタンス プロパティとメソッドの値のみがシリアル化されて返されます。\n\nLightning Aura コンポーネントと Apex サーバ側コントローラ間でのデータの通信を可能にするために、Apex メソッドやプロパティに @AuraEnabled アノテーションを使用する必要があります。このアノテーションが付けられていないプロパティやメソッドは、Aura コンポーネントに返されません。\n\nC. 基本的なデータ型はサポートされていますが、数値の最大サイズなどの既定値は、マップ先のオブジェクトによって定義されます。\n\nLightning Aura コンポーネントと Apex サーバ側コントローラ間のデータ通信において、基本的なデータ型（例：String, Integer, Booleanなど）はサポートされていますが、それぞれの型に関する制限や既定の最大/最小値は、Apex サーバ側や Lightning コンポーネント側の定義によって異なる場合があります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 124, "q": "Visualforce ページで使用される <apex:actionSupport> タグは何ですか?", "choices": ["A.ボタンまたはリンクがクリックされたときに 2 番目のアクションをトリガーします。", "B.コントローラー アクションをトリガーできる Javascript 関数を作成します。", "C.ボタンとリンクのヘルプとサポート コンテンツを提供します。", "D.DOM 要素のイベントに応答してコントローラー アクションをトリガーします。"], "answer": ["D"], "category": "ユーザインターフェース", "explanation": "D. DOM 要素のイベントに応答してコントローラー アクションをトリガーします。\n\n<apex:actionSupport> タグは、Visualforce ページの DOM 要素（例：入力項目やボタンなど）に関連するイベント（例：onclickやonchangeなど）が発生したときに、特定の Apex コントローラー アクションをトリガーするために使用されます。このタグを使用することで、ページ内の特定の要素がユーザーとの対話を通じてトリガーされたイベントに応答して、Apex コードを実行することができます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 125, "q": "Salesforceプラットフォーム上でのエンタープライズレベルのアプリケーション開発において、ソースコードの管理と協業を効率化するために開発者が採用すべきベストプラクティスは何ですか？以下の選択肢から最も適切なものを選んでください。", "choices": ["A. ソースコードの変更を追跡するために、各開発者がローカルマシン上で個別のバージョン管理システムを使用します。", "B. Salesforce DXを使用して、バージョン管理、チーム協業、および継続的な統合・デプロイメントプロセスをサポートします。", "C. 開発作業を効率化するため、全ての開発者が単一の共有開発環境（org）で作業を行います。", "D. コードレビューのプロセスを省略し、開発速度を最大化します。"], "answer": ["B"], "category": "テスト、デバッグ、リリース", "explanation": "A. 不正解。このアプローチでは、チーム内でのコードの変更を効率的に共有および統合することが困難になります。バージョン管理はチーム全体で統一されたシステムを使用することが重要です。\n\nB. 正解。Salesforce DXは、開発者がソース駆動型のアプローチで作業できるように設計されており、バージョン管理、チーム間の協業、継続的な統合（CI）および継続的なデプロイメント（CD）をサポートします。これにより、開発プロセスが効率化され、エンタープライズレベルのアプリケーション開発が容易になります。\n\nC. 不正解。単一の共有開発環境での作業は、複数の開発者間でコンフリクトが発生しやすく、作業の隔離が困難になるため、推奨されません。Salesforce DXは、各開発者が独立したスクラッチorgで作業できるようにすることで、この問題を解決します。\n\nD. 不正解。コードレビューは品質保証の重要なステップであり、コードの品質を向上させ、バグを早期に発見するために必要です。開発速度を重視することは大切ですが、品質を犠牲にしてはなりません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 126, "q": "Salesforce上でのApexコード実行時に、ガバナ制限を遵守しながら処理効率を最大化するために開発者が採用すべき最適なアプローチはどれですか？", "choices": ["A. すべてのSOQLクエリをforループ内に配置する", "B. SOQLクエリの結果をキャッシュして複数のメソッドで再利用する", "C. 静的リソースを利用してコード内のハードコーディングを回避する", "D. @futureアノテーションを使用して非同期処理を実行する"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "A. 不正解です。forループ内にSOQLクエリを配置すると、ループの各イテレーションでクエリが実行され、ガバナ制限に迅速に達する可能性があります。これは一般的に推奨されない実践であり、処理効率を低下させます。\n\nB. 正解です。SOQLクエリの結果をキャッシュし、同一トランザクション内の複数の場所でその結果を再利用することは、ガバナ制限を遵守しつつ効率を高める強力な方法です。これにより、不要なクエリ実行を減らし、システムリソースの使用を最適化できます。\n\nC. 不正解です。静的リソースの使用は、コードの管理性を向上させることができますが、直接的にガバナ制限の遵守や処理効率の最大化に貢献するわけではありません。このアプローチは、コードのメンテナンス性を向上させるために有用ですが、問題文の主旨とは異なります。\n\nD. 不正解です。@futureアノテーションを使用した非同期処理は、特定のケースで有効な手段ですが、一般的にSOQLクエリの処理効率を直接最大化する方法ではありません。非同期処理は、リアルタイム処理が必要ない重い処理や、リミットを超えるリクエストを分割する際に有用です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 127, "q": "開発者は、新しいリードが作成されたときにタスクを挿入する新しいトリガーを作成しました。本番環境にデプロイした後、外部統合によって定期的にエラーが報告されます。\nビジネスロジックへの影響を最小限に抑えて統合が影響を受けないようにするために、開発者はどの変更を加える必要がありますか?", "choices": ["A.統合を実行する前にトリガーを無効にします。", "B.insert ステートメントの後に Try/Catch ブロックを使用します。", "C.統合ユーザーのプロファイルから Apex クラスを削除します。", "D.allOrNone を False に設定して Database メソッドを使用します。"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "B. insert ステートメントの後に Try/Catch ブロックを使用します。\n\nTry/Catch ブロックは、エラーが発生したときにトリガーがクラッシュするのを防ぎます。これにより、外部統合がトリガーのエラーのために失敗することを防ぐことができます。エラーがトリガー内でキャッチされると、エラー情報を適切にロギングし、統合が進行を続けることができます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 128, "q": "SalesforceのVisualforceページに関するセキュリティのベストプラクティスについて、以下の記述のうち正しいものを選択してください。", "choices": ["A) VisualforceページはデフォルトでXSS（クロスサイトスクリプティング）攻撃に対して脆弱です。開発者は特別な注意を払ってこれを防ぐ必要があります。", "B) Visualforceページでユーザー入力を処理する場合、apex:inputTextタグのescape属性をfalseに設定することで、入力値のHTMLエスケープを無効にし、XSS攻撃のリスクを低減できます。", "C) Visualforceページ内でApexクラスから返されるデータを表示する際は、{!}バインディングを使用することで自動的にHTMLエスケープされ、XSS攻撃を防ぐことができます。", "D) SalesforceのVisualforceページは、CRSF（クロスサイトリクエストフォージェリ）攻撃に対して自動的に保護されています。追加のセキュリティ対策を施す必要はありません。"], "answer": ["C"], "category": "上級デベロッパーの基本", "explanation": "A) 不正解: Visualforceページは、Salesforceによって多くのセキュリティ対策が施されており、デフォルトでXSS攻撃に対する保護が提供されています。ただし、開発者は引き続きセキュリティベストプラクティスに従い、潜在的な脆弱性から保護するための追加対策を講じるべきです。\n\nB) 不正解: apex:inputTextタグのescape属性をfalseに設定することは、XSS攻撃のリスクを増加させる可能性があります。この設定はHTMLエスケープを無効にし、ユーザーからの入力がそのままページに表示されるため、悪意のあるスクリプトが実行されるリスクを高めます。\n\nC) 正解: Visualforceページで{!}バインディングを使用すると、表示されるデータは自動的にHTMLエスケープされます。これはXSS攻撃に対する重要な防御策であり、ユーザーからの入力やデータベースからのデータを安全に表示するために推奨されます。\n\nD) 不正解: SalesforceはVisualforceページにおいてCRSF攻撃に対する保護を提供していますが、開発者はフォームの送信に<apex:form>タグを使用するなど、適切な使用方法に従う必要があります。CRSFトークンが自動的に管理されるため、一般的には追加のセキュリティ対策が不要ですが、セキュリティ意識を持って開発を行うことが重要です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 129, "q": "ある開発者が Apex クラスを作成して、外部システムへの複数のコールアウトを作成しました。\nこれらのコールアウトで使用される URL が頻繁に変更される場合、Apex クラスに必要な変更を最小限に抑えるために、開発者はどの機能を使用する必要がありますか?", "choices": ["A.指定資格証明", "B.セッション ID", "C.リモートサイト設定", "D.接続されたアプリ"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "C. リモートサイト設定\n\nSalesforceで外部システムにコールアウトを行う前に、そのシステムのURLを「リモートサイト設定」で許可する必要があります。\n\nリモートサイト設定を使用すると、Apex コード内で URL をハードコーディングするのではなく、管理設定から URL を変更できるため、Apex コードの変更を行う必要がなくなります。\n\nよって、URLが頻繁に変更される場合には、リモートサイト設定を使用してURLを管理することで、Apexクラスの変更を最小限に抑えることができます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 130, "q": "Salesforceプラットフォーム上でカスタムアプリケーションの維持可能性を高めるために開発者が採用すべきプラクティスは何ですか？以下の選択肢から適切なものを２つ選んでください。", "choices": ["A. 開発プロセスの初期段階でハードコーディングされた値を使用し、後でカスタム設定やカスタムメタデータに置き換えます。", "B. コード内でマジックナンバーやマジックストリングを避け、カスタムラベルやカスタム設定を使用して再利用可能な値を管理します。", "C. 全てのビジネスロジックを単一のApexクラスに集約し、コードの中央管理を容易にします。", "D. モジュール式の設計原則に従い、機能を小さな、独立したコンポーネントに分割します。"], "answer": ["B", "D"], "category": "ロジックとプロセスの自動化", "explanation": "A. 不正解。ハードコーディングされた値を使用することは、将来の変更が必要になったときにコードの変更を強いることになり、維持可能性を低下させます。最初からカスタム設定やカスタムメタデータを使用することが望ましいです。\n\nB. 正解。マジックナンバーやマジックストリングの使用を避けることは、コードの可読性と維持可能性を高めます。カスタムラベルやカスタム設定を使用することで、値の変更が必要になった場合に、コードを変更することなく対応できるようになります。\n\nC. 不正解。ビジネスロジックを単一のクラスに集約することは、コードの複雑性を増加させ、維持管理を困難にします。モジュール式の設計を採用することが望ましいです。\n\nD. 正解。モジュール式の設計は、コードの再利用性と維持可能性を高めるための重要なプラクティスです。機能を独立したコンポーネントに分割することで、個々のコンポーネントを独立してテストし、再利用することが容易になります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 131, "q": "SalesforceのLightning Platform上で、カスタムユーザーインターフェースを開発する際にパフォーマンスとユーザーエクスペリエンスを最適化するために重要な要素は何ですか？以下の選択肢から最も適切なものを選んでください。", "choices": ["A. Lightningコンポーネントのレンダリング前に、すべてのデータとリソースをプリロードします。", "B. カスタムJavaScriptとCSSを多用して、デザインと機能性を向上させます。", "C. Lightning Data Serviceを使用して、サーバーとのデータ交換を最小化し、キャッシュを活用します。", "D. 可能な限りVisualforceページを組み込んで、従来の開発手法を維持します。"], "answer": ["C"], "category": "パフォーマンス", "explanation": "A. これはパフォーマンスを改善する方法として考えられますが、不必要なリソースのプリロードは初期ロード時間を長くし、ユーザーエクスペリエンスを損なう可能性があります。正解ではありません。\n\nB. カスタムJavaScriptとCSSの使用は見た目と機能性を向上させることができますが、過度に使用するとページのパフォーマンスが低下する原因にもなります。最適化の観点からは最良の選択ではありません。\n\nC. 正解。Lightning Data Serviceは、サーバーとのデータ通信を最適化し、自動的にデータのキャッシュを管理するため、アプリケーションのパフォーマンスを向上させることができます。これにより、ユーザーエクスペリエンスが大きく改善されます。\n\nD. Lightning Experienceのコンテキストでは、VisualforceページよりもLightningコンポーネントの使用が推奨されます。Visualforceページは特定のケースで依然として有効ですが、パフォーマンスとユーザーエクスペリエンスの最適化の観点からは、この選択肢は最適ではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 132, "q": "Universal Containers には、取引先が顧客としてマークされたときに取引先計画レコードを作成する取引先に Apex トリガーがあります。最近、ワークフロー ルールが追加され、取引先が顧客としてマークされるたびに、「顧客開始日」の日付項目が今日の日付で更新されます。\nワークフロー ルールが追加されてから、取引先が顧客としてマークされるたびに、2 つの取引先 プラン レコードが作成されます。\nこれが発生する原因は何ですか?", "choices": ["A.Apex トリガーは、静的変数を使用せず、確実に 1 回だけ起動します。", "B.Apex トリガーはバルクセーフではなく、for ループ内で挿入を呼び出します。", "C.ワークフロー ルール 項目の更新は、「項目変更後にワークフロー ルールを再評価する」としてマークされます。", "D.ワークフロー ルールは、レコードが作成されたときと編集されるたびに評価するように構成されています。"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "C. ワークフロー ルール 項目の更新は、「項目変更後にワークフロー ルールを再評価する」としてマークされます。\n\nSalesforceのワークフローは、特定の項目の更新に基づいてトリガされます。\n\n「項目変更後にワークフロー ルールを再評価する」オプションが有効になっている場合、ワークフローが項目を更新すると、レコードは再びトリガの条件を満たすかどうかを評価されます。\n\nこのシナリオでは、取引先が顧客としてマークされると、Apexトリガーが取引先計画レコードを作成し、その後ワークフロールールが「顧客開始日」を更新します。この項目の更新により、トリガーが再評価され、再度取引先計画レコードが作成されます。\n\n結果として、1つのアクションで2つの取引先計画レコードが作成されることになります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 133, "q": "次の要素のうち、公開グループのメンバーになることができるのはどれですか? （3つ選んでください。）", "choices": ["A.ケースチーム", "B.プロファイル", "C.ロール", "D.テリトリー", "E.ユーザー"], "answer": ["C", "D", "E"], "category": "ユーザインターフェース", "explanation": "公開グループは、Salesforce内で特定のユーザーグループにレコードアクセスを提供するために使用されます。公開グループのメンバーに追加できる主要な要素は次のとおりです：\n\nC. ロール - Salesforceのロール階層に基づくユーザーのグループ。特定のロールに属するすべてのユーザーを一度に追加することができます。\n\nD. テリトリー - テリトリーマネジメントを使用している場合、特定のテリトリーに割り当てられたユーザーを追加することができます。\n\nE. ユーザー - 個々のSalesforceユーザー。特定のユーザーを公開グループに直接追加することができます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 134, "q": "Salesforceの動的SOQLに関する次の記述のうち、正しいものを選択してください。", "choices": ["A) 動的SOQLクエリでは、findキーワードを使用して、Salesforceのすべてのオブジェクトと項目を横断的に検索することができます。", "B) 動的SOQLを使用すると、コンパイル時ではなく実行時にクエリ文字列を評価するため、クエリを柔軟に構築して実行時の条件に基づいて結果を取得できます。", "C) 動的SOQLクエリの実行には、常にDatabase.query()メソッドを使用する必要があり、[ ]を使用してSOQLクエリを実行することはできません。", "D) 動的SOQLクエリを使用する際には、SOQLインジェクション攻撃を防ぐために、ユーザー入力を直接クエリに組み込むことが推奨されます。"], "answer": ["B"], "category": "ユーザインターフェース", "explanation": "A) 不正解: findキーワードは、Salesforceのグローバル検索に使用されるSOSLクエリで使われますが、動的SOQLでは使用されません。動的SOQLは特定のオブジェクトに対する検索に使用され、findキーワードは関係ありません。\n\nB) 正解: 動的SOQLの主な利点の一つは、クエリを実行時に構築できる柔軟性です。これにより、アプリケーションのロジックに基づいて条件を動的に変更し、その条件に基づいて結果セットを取得することが可能になります。これは、コンパイル時には不明な条件に基づいてクエリを実行する必要がある場合に特に有用です。\n\nC) 正解: 動的SOQLクエリの実行にはDatabase.query()メソッドを使用します。静的SOQLクエリは[ ]内に直接記述されますが、動的SOQLではこの方法は使用できません。Database.query()メソッドは、文字列として提供されたクエリを実行時に評価します。\n\nD) 不正解: 動的SOQLクエリを使用する際には、SOQLインジェクション攻撃を防ぐために、ユーザー入力を直接クエリに組み込むことは推奨されません。代わりに、適切なエスケープ処理を行うか、バインド変数を使用することが推奨されます。これにより、悪意のあるユーザーがクエリを改ざんするリスクを減らすことができます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 135, "q": "Salesforceでカスタムビジネスプロセスを自動化する際、開発者が選択すべき最も効果的なツールや技術は何ですか？以下の選択肢から適切なものを２つ選んでください。", "choices": ["A. 全てのビジネスロジックをVisualforceページのコントローラー内に直接実装し、ユーザーインタラクションに応じて処理を行います。", "B. プロセスビルダーを使用して、複雑なビジネスルールに基づくアクションの自動化を設定します。", "C. Apexトリガーを使用して、データの作成、更新、削除時にカスタムロジックを実行します。", "D. Lightningコンポーネントでカスタムイベントを定義し、ユーザーのアクションに基づいてビジネスプロセスをトリガーします。"], "answer": ["B", "C"], "category": "ロジックとプロセスの自動化", "explanation": "A. 不正解。このアプローチは、ビジネスロジックをUI層と深く結びつけることになり、再利用性やメンテナンスの観点から問題があります。ビジネスロジックは、可能な限り再利用可能な形で分離して実装すべきです。\n\nB. 正解。プロセスビルダーは、コーディング不要で複雑なビジネスプロセスを自動化できる強力なツールです。これにより、効率的にビジネスロジックを実装し、保守性と再利用性を向上させることができます。\n\nC. 正解。Apexトリガーは、データベースレベルのイベントに応じたカスタムロジックの実行に非常に適しており、複雑なビジネスルールやデータ整合性の保持に役立ちます。\n\nD. 不正解。LightningコンポーネントでのカスタムイベントはUIレベルのインタラクションを管理するのに適していますが、ビジネスプロセスの自動化には直接関連しません。プロセスビルダーやApexトリガーのようなツールが、その目的にはより適しています。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 136, "q": "Salesforceの複数のレコードタイプを持つカスタムオブジェクトがあります。Apexクラスを作成し、特定のレコードタイプのレコードのみを取得したいと考えています。レコードタイプを指定してレコードを取得するために使用するメソッドはどれですか？", "choices": ["A. Database.query()", "B. SOQL文のWHERE句", "C. Schema.SObjectType.{ObjectName}.getRecordTypeInfosByName()", "D. SObject.getSObjectType()"], "answer": ["B"], "category": "ユーザインターフェース", "explanation": "A. Database.query()メソッドは、SOQL文を実行してレコードを取得するために使用されます。レコードタイプを指定するには、SOQL文のWHERE句を使用する必要があります。\n\nB. SOQL文のWHERE句を使用して、RecordType.Name や RecordType.DeveloperName を指定することで、特定のレコードタイプのレコードのみを取得できます。これが、レコードタイプを指定してレコードを取得する最も直接的な方法です。\n\nC. Schema.SObjectType.{ObjectName}.getRecordTypeInfosByName()メソッドは、オブジェクトのレコードタイプ情報をレコードタイプ名で取得するために使用されます。レコードタイプIDを取得することはできますが、レコードを直接取得するためのメソッドではありません。\n\nD. SObject.getSObjectType()メソッドは、SObjectのオブジェクトタイプを取得するために使用されます。レコードタイプを指定してレコードを取得するためのメソッドではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 137, "q": "SalesforceのApexクラスで、コードの実行中にエラーが発生した場合に、エラーの詳細をログに記録するために使用する方法として最も適切なものはどれですか？", "choices": ["A. System.debug()メソッドを使用して、エラーメッセージをデバッグログに出力する", "B. ApexPages.addMessage()メソッドを使用して、エラーメッセージをページメッセージとして表示する", "C. try-catch文を使用して、エラーを捕捉し、例外の詳細をデバッグログに出力する", "D. Custom Settingsを使用して、エラーメッセージを保存し、後で参照できるようにする"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "A. System.debug()メソッドを使用してデバッグログにエラーメッセージを出力することは可能ですが、エラー処理の体系的な方法ではありません。エラーが発生した場合、デバッグステートメントが実行されない可能性があります。\n\nB. ApexPages.addMessage()メソッドは、Visualforceページ上にエラーメッセージを表示するために使用されます。Apexクラスでエラーをログに記録するためには適していません。\n\nC. try-catch文を使用してエラーを捕捉し、例外の詳細をデバッグログに出力することが、Apexクラスでエラーをログに記録する最も適切な方法です。これにより、エラーが発生した場合でも、エラーの詳細を確実にログに記録できます。\n\nD. Custom Settingsを使用してエラーメッセージを保存することは可能ですが、エラーの発生時にリアルタイムでログに記録するためには適していません。Custom Settingsは、設定データを保存するために主に使用されます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 138, "q": "開発者がアプリケーションをリファクタリングし、サンドボックスで Apex クラスの名前を変更したため、変更を本番環境にリリースする必要があります。これはどのように達成できますか？2つ答えを選択してください", "choices": ["A.新しい Apex クラスをデプロイしてから、本番環境にログインし、クラスを手動で削除します。", "B.Force.com IDE を使用して、古い Apex クラスをプロジェクトから削除し、変更を本番環境にリリースします。", "C.Force.com 移行ツールを使用して新しい Apex クラスをリリースし、destructiveChanges.xml に古い名前を設定します。", "D.変更セットを使用して、古い Apex クラスを削除し、新しい Apex クラスを本番環境にリリースします。"], "answer": ["B", "C"], "category": "ユーザインターフェース", "explanation": "B. Force.com IDE を使用して、古い Apex クラスをプロジェクトから削除し、変更を本番環境にリリースします。\n\nForce.com IDEを使用して、メタデータを編集し、デプロイメントを実行することで、新しいApexクラスを本番環境に移行させ、古いクラスを削除することができます。\n\nC. Force.com 移行ツールを使用して新しい Apex クラスをリリースし、destructiveChanges.xml に古い名前を設定します。\n\nForce.com移行ツールを使用して、新しいApexクラスを本番環境にデプロイすることができます。さらに、destructiveChanges.xmlファイルを使用して、古いApexクラスを明示的に削除することができます。このファイルには、削除したいメタデータコンポーネントの名前をリストアップします。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 139, "q": "<apex:actionFunction> の正しい定義を選択してください。", "choices": ["A.AJAX リクエスト (actionFunction/actionSupport/actionPoller) に関連付けることができ、リクエストのステータス (進行中/完了) に応じてコンテンツを条件付きで表示します。「id」項目を使用して名前を指定します。関連するコンポーネントの「ステータス」項目を使用してそれらを接続します", "B.AJAX サポートを別のコンポーネントに追加します (例: onClick、onMouseUp、onFocus など)", "C.AJAX リクエストが生成されたときに、サーバーが処理する必要があるコンポーネントを示します", "D.コントローラ メソッドを Javascript から直接呼び出すことができます。する必要があります| <apex:form> タグにカプセル化されています。actionSupport とは異なり、これらの関数 <apex:actionPoller> は Javascript コードから直接呼び出すことができます"], "answer": ["A"], "category": "ユーザインターフェース", "explanation": "A. <apex:actionFunction>は、VisualforceページのJavaScriptからApexコントローラのメソッドを呼び出すための機能を提供するVisualforceコンポーネントです。これは、AJAXリクエストをサーバーに送信し、レスポンスを待つことができるものです。このコンポーネントは、id属性を使用して名前を指定し、その名前はJavaScriptからその関数を呼び出すときに使用されます。さらに、status属性は、リクエストのステータスに基づいてコンテンツを条件付きで表示するための別のVisualforceコンポーネント（通常は<apex:actionStatus>）に関連付けるために使用されます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 140, "q": "企業は、エンタープライズ リソース プランニング (ERP) の crder__c レコードで、取引先への参照項目を使用して顧客の注文を受け付けます。Account オブジェクトには、外部 ID 項目 ERP_Customer_ID__c があります。\n正しい取引先に自動的に関連付けられる新しい Order__c レコードを作成するには、統合で何を使用する必要がありますか?", "choices": ["A.取引先をアップサートし、ERP_Customer_ID__c を指定します。", "B.Order__c オブジェクトに挿入し、続いて Order__c オブジェクトを更新します。", "C.Order__c オブジェクトをアップサートし、ERP_Customer_ID__c を指定します。", "D.Order__c オブジェクトをマージし、ERP_Customer_ID__c を指定します。"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "B. このシナリオでは、ERPからのデータを使用してOrder__cレコードを作成し、その際にAccountオブジェクトの外部ID項目であるERP_Customer_ID__cを使用して正しい取引先に自動的に関連付けることを目指しています。\n\n具体的には、Order__cレコードを最初に挿入します。そして、関連する取引先の外部ID（ERP_Customer_ID__c）を使用してOrder__cオブジェクトを更新することで、正しい取引先とOrder__cレコードとを関連付けます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 141, "q": "開発者は、Apex ヒープ サイズを超えていることを示すエラーに遭遇します。ヒープサイズを削減できるテクニックはどれですか?", "choices": ["A.インスタンス変数の代わりに静的変数を使用します。", "B.標準の SOQL クエリの代わりに SOQL for ループを使用します。", "C.変数定義を関数のスコープ内に移動します。", "D.transient キーワードを変数定義に追加します。"], "answer": ["B"], "category": "パフォーマンス", "explanation": "B. 標準の SOQL クエリの代わりに SOQL for ループを使用します。\n\nSOQL for ループは、クエリ結果のレコードを1つずつ処理することができるため、大量のレコードを一度にメモリにロードする必要がありません。これにより、ヒープサイズの使用量を大幅に削減することができます。大量のレコードを取得する場合には特に効果的です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 142, "q": "Lightning コンポーネントはプレビューモードで機能し、Lightning アプリケーションビルダーページ内で使用する必要がありますが、使用できません。コンポーネントにどのような変更を適用する必要がありますか?", "choices": ["A.implements および access 属性を使用してマークアップで公開します。", "B.サンドボックスを更新し、最新の API バージョンにアップグレードします。", "C.コンポーネント、メタデータ、Apex コントローラを削除して再作成します。", "D.JavaScript コントローラーのロジックでエラーを探します。"], "answer": ["A"], "category": "上級デベロッパーの基本", "explanation": "A. implements および access 属性を使用してマークアップで公開します。\n\nLightning コンポーネントが Lightning アプリケーションビルダーページで使用されるためには、コンポーネントのマークアップに特定のインターフェースをimplements属性で実装する必要があります。具体的には、force:appHostableやflexipage:availableForAllPageTypesなどのインターフェースを実装することで、コンポーネントをアプリケーションビルダーページで使用できるようになります。また、access属性を使用してコンポーネントを公開することで、他のユーザーや管理者がそれを使用できるようになります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 143, "q": "Salesforceの大規模データボリュームを管理する際に、開発者が採用すべき最も効果的なアーキテクチャ戦略はどれですか？", "choices": ["A. カスタムインデックスの積極的な使用", "B. シングルトンデザインパターンの採用", "C. 外部ID項目を使用した外部システムとの統合の最適化", "D. バルクAPIを使用した非同期データ処理"], "answer": ["D"], "category": "ロジックとプロセスの自動化", "explanation": "A. 不正解です。カスタムインデックスはSOQLクエリのパフォーマンスを向上させるために有用ですが、大規模データボリュームを管理する際の全体的なアーキテクチャ戦略としては、他のアプローチに比べて限定的な影響しか持ちません。\n\nB. 不正解です。シングルトンデザインパターンは、インスタンス化されるクラスの数を制限するために使用されますが、これは主にメモリ管理やインスタンスの共有に関連する設計パターンであり、大規模データボリュームの管理に直接関連するものではありません。\n\nC. 不正解です。外部ID項目を使用することは、Salesforceと外部システム間のデータ統合を効率化する手法ですが、これ自体が大規模データボリュームを扱う際のアーキテクチャ戦略としては不十分です。外部IDは統合の特定の側面を改善しますが、データボリューム管理の包括的な課題に対処するものではありません。\n\nD. 正解です。バルクAPIを使用した非同期データ処理は、大量のデータレコードを効率的に処理し、Salesforce内外でのデータ移動を最適化するための強力な手段です。このアプローチにより、開発者は大規模データボリュームの挿入、更新、削除、およびクエリ処理を高速かつ効率的に行うことができます。これは、大規模データを管理する際に直面する多くの課題に対処する上で、最も効果的なアーキテクチャ戦略の一つです。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 144, "q": "UC Loans は非常勤の Salesforce 管理者がいる小さな会社です。UC Loans は、商談が成立するたびに Loan__c レコードを作成したいと考えています。\nUC Loans がこれを達成するための最適なソリューションは何ですか?", "choices": ["A.プロセスビルダー", "B.クイックアクション", "C.ワークフロー ルール", "D.アペックストリガー"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. プロセスビルダー\n\nプロセスビルダーは、特定の条件が満たされたときにレコードの変更や新しいレコードの作成などの自動化アクションを設定するためのツールです。UC Loansが商談が成立するたびにLoan__cレコードを自動的に作成したい場合、プロセスビルダーを使用して、商談のステージやステータスが「成立」となったときに新しいLoan__cレコードを作成するアクションを設定することができます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 145, "q": "SalesforceのLightningコンポーネントフレームワークにおいて、コンポーネント間の通信に関する次の記述のうち、正しいものを選択してください。", "choices": ["A) Lightningイベントは、親コンポーネントから子コンポーネントへの通信にのみ使用され、兄弟コンポーネント間では使用できません。", "B) アプリケーションイベントを使用すると、関連するすべてのコンポーネント間でメッセージをブロードキャストでき、これにより、兄弟コンポーネント間や親子コンポーネント間でのデータの共有が可能になります。", "C) コンポーネントイベントは、ネストされたコンポーネント構造内でのみバブリングとキャプチャをサポートしており、アプリケーション全体にはイベントを伝播させることができません。", "D) Lightningコンポーネントフレームワークでは、コンポーネント間の通信にはHTTPリクエストを使用し、REST API経由でのみデータ交換が行われます。"], "answer": ["B"], "category": "ユーザインターフェース", "explanation": "A) 不正解: Lightningイベントシステムには、コンポーネントイベントとアプリケーションイベントの二種類があります。この記述はコンポーネントイベントの使用法を簡略化し過ぎています。実際には、コンポーネントイベントは主に親コンポーネントとその直接の子コンポーネント間で使用されますが、兄弟コンポーネント間の通信にはアプリケーションイベントが使用されることがあります。\n\nB) 正解: アプリケーションイベントはアプリケーション全体でリスナーを持つコンポーネント間でイベントをブロードキャストするために使用されます。これにより、任意のコンポーネント間でのデータ共有が可能になり、特に関連しないコンポーネント間（例えば、兄弟コンポーネント間）での通信に有効です。\n\nC) 正解: コンポーネントイベントは、主に親コンポーネントとその子コンポーネント間での通信に使用されます。これらのイベントは、発生源のコンポーネントから上方向（バブリング）または下方向（キャプチャ）に伝播しますが、アプリケーション全体には伝播しません。\n\nD) 不正解: Lightningコンポーネントフレームワークにおけるコンポーネント間通信は、HTTPリクエストやREST APIを直接使用するのではなく、イベントベースの通信メカニズムを使用します。HTTPリクエストやREST APIは、外部システムとの通信やSalesforceのサーバーサイドリソースへのアクセスに使用されることがありますが、コンポーネント間の通信の主な方法ではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 146, "q": "Apex メソッドを Lightning Web コンポーネントから命令的に呼び出す必要がある 2 つのシナリオはどれですか?\n2つ答えを選択してください", "choices": ["A.Lightning Web コンポーネントのメイン コントローラの外部にあるメソッドを呼び出す", "B.cacheable=true のアノテーションが付けられていないメソッドの呼び出し", "C.Web サービスの呼び出しを行うメソッドの呼び出し", "D.ボタンをクリックしてメソッドを呼び出す"], "answer": ["B", "D"], "category": "ユーザインターフェース", "explanation": "B. cacheable=true のアノテーションが付けられていないメソッドの呼び出し\n\nLightning Web コンポーネントからApexメソッドを呼び出す際、そのメソッドが@AuraEnabled(cacheable=true)のアノテーションを持っていれば、コンポーネントはデータをキャッシュして再利用することができます。しかし、cacheable=trueが付けられていない場合、命令的に（即時に）そのメソッドを呼び出す必要があります。\n\nD. ボタンをクリックしてメソッドを呼び出す\n\nユーザのインタラクション（例: ボタンのクリック）に応じて即時にApexメソッドを呼び出す場合、命令的な呼び出しを使用します。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 147, "q": "ある組織で、商談の進捗状況を可視化するために、商談オブジェクトにカスタム項目「進捗状況」を作成しました。\n\nこのカスタム項目を利用して、商談リストビューで商談を「未着手」「進行中」「完了」の3つの進捗状況でフィルタリングできるようにするには、どうすればよいですか？", "choices": ["A. 商談オブジェクトに「進捗状況」項目の種別を「選択リスト」に変更する", "B. 商談オブジェクトに「進捗状況」項目の種別を「数値」に変更し、各進捗状況に数値を割り当てる", "C. 商談オブジェクトに「進捗状況」項目の種別を「チェックボックス」に変更し、各進捗状況に対応するチェックボックスを作成する", "D. 商談オブジェクトに「進捗状況」項目の種別を「選択リスト」に変更し、各進捗状況に対応する選択肢を作成する"], "answer": ["D"], "category": "ロジックとプロセスの自動化", "explanation": "A. 不正解です。ただし、「選択リスト」に変更すること自体は正しいアプローチですが、この選択肢だけでは「未着手」「進行中」「完了」の3つの進捗状況をフィルタリングするための具体的な方法が欠けています。\n\nB. 不正解です。数値を使用して進捗状況を管理することは可能ですが、ユーザーが理解しやすい形ではありません。また、リストビューでのフィルタリングにおいて直感的ではなくなります。\n\nC. 不正解です。「チェックボックス」を使用すると、進捗状況が重複してしまう可能性があります。例えば、商談が「未着手」でありながら「完了」とマークされているなどの状況が生じやすくなります。\n\nD. 正解です。この方法では、「未着手」「進行中」「完了」という進捗状況を明確に分けることができ、リストビューでのフィルタリングも直感的に行えます。選択リストを使用することで、ユーザーが容易に商談の進捗状況を更新し、フィルタリングできるようになります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 148, "q": "開発者は、送信された電子メールを処理するサービスを作成し、電子メールの内容をレコードのデータとして使用して取引先と取引先責任者を作成する必要があります。開発者はこの要件をどのように達成できますか?", "choices": ["A.Heroku データ クリップを使用して電子メールを処理します。", "B.Fuel API をメール データ拡張機能と共に使用します。", "C.Apex Inbound Email Handler を使用します。", "D.自動起動フローとプロセスビルダーを使用します。"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "C. Apex Inbound Email Handler を使用します。\n\nApex Inbound Email Handlerは、Salesforceが受信した電子メールを処理するためのクラスを提供します。これを使用すると、電子メールの内容を解析し、そのデータを基にSalesforce内のレコード（この場合、取引先や取引先責任者）を作成または更新するカスタムロジックを記述することができます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 149, "q": "Salesforceでライトニングコンポーネントを開発する際に、サーバーサイドのコントローラーで非推奨とされている機能はどれですか？", "choices": ["A. @AuraEnabled アノテーション", "B. @Deprecated アノテーション", "C. @Future アノテーション", "D. @TestVisible アノテーション"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "A. @AuraEnabled アノテーション: このアノテーションは、ライトニングコンポーネントやAuraコンポーネントが、Apexメソッドにアクセスするために必要なマークです。このアノテーションがなければ、コンポーネントからApexメソッドを呼び出すことはできません。使用が推奨されているため、不正解です。\n\nB. @Deprecated アノテーション: このアノテーションは、Apexクラスやメソッドが将来的に使用されなくなる（廃止予定である）ことを示します。APIなどで古いメソッドをサポートしつつも、新しい開発での使用を避けるよう促す目的で使用されます。サーバーサイドのコントローラーで非推奨とされているわけではないため、不正解です。\n\nC. @Future アノテーション: このアノテーションは、Apexメソッドが非同期で実行されることを示すために使用されます。しかし、ライトニングコンポーネントでは、@AuraEnabledと組み合わせて使うことは推奨されていません。ライトニングフレームワークは、非同期処理を別の方法（例えば、PromiseやAsync/Await）で実現することを推奨しているため、非推奨とされる機能の一つです。正解。\n\nD. @TestVisible アノテーション: このアノテーションは、テストメソッドからのみアクセスが可能で通常のアクセス修飾子で隠蔽されたメンバにテストからアクセスするために使用されます。サーバーサイドのコントローラーで非推奨とされているわけではなく、特定のテストケースを効率的に書くために便利な機能です。不正解。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 150, "q": "ある組織で、顧客満足度向上のため、ケースオブジェクトにカスタム項目「満足度」を作成しました。\nこのカスタム項目を利用して、ケースを「満足」「普通」「不満」の3つの満足度で分類できるようにするには、どうすればよいですか？", "choices": ["A. ケースオブジェクトに「満足度」項目の種別を「数値」に変更し、各満足度に数値を割り当てる", "B. ケースオブジェクトに「満足度」項目の種別を「チェックボックス」に変更し、各満足度に対応するチェックボックスを作成する", "C. ケースオブジェクトに「満足度」項目の種別を「選択リスト」に変更し、各満足度に対応する選択肢を作成する", "D. ケースオブジェクトに「満足度」項目の種別を「ピクセル値」に変更し、各満足度に対応する色を設定する"], "answer": ["C"], "category": "ユーザインターフェース", "explanation": "ケースを「満足」「普通」「不満」の3つの満足度で分類するには、カスタム項目「満足度」の種別を「選択リスト」に変更し、各満足度に対応する選択肢を作成する必要があります。\n各選択肢の解説\nA. 不正解: 種別を「数値」に変更すると、ケースを分類することができません。 B. 不正解: 種別を「チェックボックス」に変更すると、「満足」「普通」「不満」の3つの満足度を同時に選択することができません。 D. 不正解: 種別を「ピクセル値」に変更すると、ケースを分類することができません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 151, "q": "開発者は、SOAP API を使用してコミュニティ ユーザーを認証するソリューションを作成しました。login() 呼び出しを発行するときに必要なものは何ですか? （2つ選んでください。）", "choices": ["A.セキュリティトークン", "B.ユーザー名とパスワード", "C.セッション ID", "D.組織 ID"], "answer": ["B", "D"], "category": "ロジックとプロセスの自動化", "explanation": "B. ユーザー名とパスワード\n\nSalesforce SOAP APIのlogin()呼び出しを使用するときには、認証にユーザー名とパスワードを必要とします。\n\nD. 組織 ID\n\nコミュニティユーザーを認証する際、特定のコミュニティ、そしてそのコミュニティが存在する組織に関連付けるための情報として組織IDが必要です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 152, "q": "ユーザーは、カスタム Lightning Web コンポーネントのボタンが機能していないと報告しています。ただし、その他の詳細は提供されていません。エラー メッセージが適切に表示されるようにするために、開発者は何を使用する必要がありますか?", "choices": ["A.allOrNone を false に設定して Database メソッドを使用します。", "B.DML ステートメントを囲む Try/Catch ブロックを追加します。", "C.<apex:messages/> タグをコンポーネントに追加します。", "D.JavaScript と HTML を追加して、エラー メッセージを表示します。"], "answer": ["C"], "category": "ユーザインターフェース", "explanation": "C. apex:messages/ タグをコンポーネントに追加します。\n\n<apex:messages/> タグはVisualforceページで使用されるもので、ページ上でのエラーメッセージやその他のメッセージを表示するために使用されます。このタグをページに追加することで、バックエンド（Apexコード）からのエラーメッセージや情報メッセージをユーザーに表示することができます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 153, "q": "Cloud Kicks社のSalesforceシステムでは、大量のデータを処理するバッチジョブを実装する必要があります。このバッチジョブは、一度に処理するレコード数を制限し、ジョブの進捗状況を追跡できるようにする必要があります。\n\nこの要件を満たすために、開発者が使用すべきApexのクラスおよびインターフェースの組み合わせは何ですか？", "choices": ["A. Batchableインターフェースと、Schedulableインターフェース", "B. Batchableインターフェースと、Queueableインターフェース", "C. Batchableインターフェースと、Iterableインターフェース", "D. Batchableインターフェースと、Callableインターフェース"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "A. Schedulableインターフェースは、スケジュールされたジョブを実行するために使用されます。バッチジョブの実装には直接関係ありません。\n\nB. Queueableインターフェースは、非同期処理を実行するために使用されます。バッチジョブの実装には直接関係ありません。\n\nC. Batchableインターフェースは、バッチジョブを実装するために使用されます。Iterableインターフェースは、バッチジョブで処理するレコードのリストを返すために使用されます。この組み合わせにより、一度に処理するレコード数を制限し、ジョブの進捗状況を追跡できるバッチジョブを実装できます。\n\nD. Callableインターフェースは、Apexクラスをプログラムで呼び出すために使用されます。バッチジョブの実装には直接関係ありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 154, "q": "カスタム Lightning コンポーネントの一部には、組織内の商談の総数 (数百万) が表示されます。Lightning コンポーネントは、Apex コントローラを使用して必要なデータを取得します。開発者が Lightning コンポーネントの商談の総数を取得する最適な方法は何ですか?", "choices": ["A.商談レコードの数をカウントする Apex Batch ジョブ", "B.商談レコードの数をカウントする SOQL for ループ", "C.商談 オブジェクトに対する SUM() SOQL 集計クエリ", "D.商談オブジェクトに対する COUNT() SOQL 集計クエリ"], "answer": ["D"], "category": "ユーザインターフェース", "explanation": "D. 商談 オブジェクトに対する COUNT() SOQL 集計クエリ\n\n集計クエリは、指定されたオブジェクトの特定の項目に対して集計関数 (COUNT、SUM、AVGなど) を使用してデータを要約するために使用されます。特定のオブジェクトのレコードの総数を取得するには、COUNT() 集計関数を使用するのが最も効率的です。この方法であれば、数百万の商談レコードの総数を迅速に取得することができます。他の方法と比較して、レスポンス時間が短く、サーバー上のリソース消費も少ないです。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 155, "q": "Visualforce ページの GET 要求の実行順序で、このステップの後に何が起こりますか?\nコントローラーと拡張機能のコンストラクターを評価する", "choices": ["A.HTML レスポンス
