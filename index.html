ustomer__Number_c を持っています。\n\nUCはまた、外部システムから送信される請求書を表すために、取引先への参照を持つカスタムの Invoice__c オブジェクトを持っています。\n\nUCは、営業担当が顧客が請求書を期限内に支払ったかどうかを確認できるように、請求書データをSalesforceに統合したいと考えています。\nこれを実装するための最適な方法は何ですか？", "choices": ["A. カスタム請求システムに各顧客のSalesforce取引先IDを持つ相互参照テーブルを作成し、請求書データを毎晩挿入する。", "B. Customer_Number__c が外部IDであり、かつカスタム項目 Invoice_Number__c が外部IDであることを確認し、請求書データを毎晩Upsert（アップサート）する。", "C. Salesforce Connectと外部データオブジェクトを使用して、カスタムコードなしで請求書データをSalesforceにシームレスにインポートする。", "D. 請求書データを挿入するたびに取引先オブジェクトにクエリを発行し、請求書上の顧客番号に対応するSalesforce IDを取得する。"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "A. このアプローチは、外部システム側にSalesforce IDを保持する改修を必要とします。これはシステム間の結合度を高め、外部IDを使用する方法（B）に比べて柔軟性が低くなります。\nB. 正解です。Customer_Number__c を外部IDにすることで、Upsert 操作時にSalesforce IDの代わりにこの既知の番号を使用して、Invoice__c レコードが属する取引先を自動的に紐付けることができます。また、Invoice_Number__c も外部IDにすることで、Upsert が可能になり、夜間バッチ処理の冪等性（べきとうせい、何度実行しても同じ結果になること）が保証され、重複レコードの作成を防げます。\nC. Salesforce Connectは、外部データをSalesforce内に インポート（コピー） するのではなく、仮想的に表示（参照） するための機能です。要件はデータをSalesforce内の Invoice__c オブジェクトに統合することであるため、適していません。\nD. この方法は、特に夜間バッチで大量のデータをロードする場合、非常に非効率です。データローダやAPIが Upsert 操作（B）で外部ID参照を使用すれば、この「IDを取得するためのクエリ」をSalesforceプラットフォームが裏側で効率的に処理してくれます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 327, "q": "ある組織が、配送先住所の項目を持つカスタムオブジェクト order__c に顧客の注文情報を記録しています。開発者は、配送先住所の地域に関連付けられた固定のパーセンテージ（率）に基づいて、注文の配送料を計算するコードを追加するよう任されました。計算が機能するために、変更が本番環境にデプロイされた際に追加のステップを必要としないように、開発者は地域ごとのレートを保存するために何を使用すべきですか？", "choices": ["A. カスタム階層設定", "B. カスタムメタデータ型", "C. カスタムリスト設定", "D. カスタムオブジェクト"], "answer": ["B"], "category": "上級デベロッパーの基本", "explanation": "A. カスタム階層設定は、組織、プロファイル、ユーザのレベルで設定を上書きするために使用されます。地域ごとのレートのリスト（例: 地域A = 5%、地域B = 7%）を保存する用途には適していません。\nB. 正解です。カスタムメタデータ型は、設定データ（この場合は地域別レート）をレコードとして保存できます。これらのレコードはメタデータとして扱われるため、変更セットやデプロイパッケージに含めて本番環境に直接移行できます。これにより、デプロイ後にデータを手動で投入する必要がなく、「追加のステップが不要」という要件を満たします。\nC. カスタムリスト設定は、地域ごとのレートのようなデータを保存するのに適しています。しかし、カスタム設定の データ（レコード）はメタデータとは見なされず、デプロイパッケージに自動的に含まれません。デプロイ後に手動またはデータローダでデータを移行する必要があるため、要件を満たしません。\nD. カスタムオブジェクトは主にビジネスデータを保存するために使用されます。設定データを保存するために使用することもできますが、データは別途移行する必要があり、カスタムメタデータ型を使用する利便性に欠けます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 328, "q": "Universal Containersは、バッチApexプロセスのfinishメソッドから直接サポート担当者にEメールを送信するのを待つ代わりに、未処理の例外が発生した場合に外部システムに通知したいと考えています。この要件を満たすための適切なパブリッシュ/サブスクライブ（公開/購読）ロジックは何ですか？", "choices": ["A. Eventbus.publish() メソッドを使用してエラーイベントを公開する。", "B. 公開は必要ありません。外部システムに BatchApexErrorEvent をサブスクライブ（購読）させる。", "C. addError メソッドを使用してエラーイベントを公開する。", "D. フローを使用してエラーイベントを公開する。"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "A. このメソッドは、カスタムプラットフォームイベントを公開するために使用されます。バッチApex内で例外をキャッチし、手動でカスタムイベントを公開することも理論上は可能ですが、「未処理の例外」を自動的に通知する標準的な仕組みではありません。\nB. 正解です。バッチクラスが Database.RaisesPlatformEvents インターフェースを実装している場合、そのバッチジョブで未処理の例外が発生すると、Salesforceプラットフォームが自動的に標準の BatchApexErrorEvent を発行します。開発者が手動で公開ロジックを実装する必要はなく、外部システムはこのイベントをサブスクライブするだけで通知を受け取れます。\nC. addError() メソッドは、トリガやApexコントローラなどでDML操作を失敗させ、ユーザインターフェースにエラーメッセージを表示するために使用されます。プラットフォームイベントを発行する機能はありません。\nD. フローは、Apexの未処理の例外を自動的にキャッチして公開する機能は持っていません。フローは、BatchApexErrorEvent のようなイベントを サブスクライブ して、それに応じたアクション（例: 別のコールアウト）を実行するために使用することはできます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 329, "q": "カスタムインターフェースの一環として、開発チームが複数の新しいLightning Webコンポーネントを作成しました。各コンポーネントは、エラー処理にトーストメッセージを使用しています。開発完了後、すべてのコンポーネントが同じLightningページに追加されました。受け入れテスト中、コンポーネントの読み込み時にエラーが発生すると、トーストメッセージが連鎖して（次々と）表示されることについて、ユーザから不満が出ています。ユーザエクスペリエンスを向上させるために、開発者が実装すべき2つのテクニックはどれですか？ 2つ選択してください", "choices": ["A. Lightning Webコンポーネントを使用して、すべてのエラーを集約して表示する。", "B. window.alert() メソッドを使用してエラーメッセージを表示する。", "C. <template> タグを使用して、インプレース（その場）のエラーメッセージを表示する。", "D. 各コンポーネントの公開プロパティを使用して、エラーメッセージを表示する。"], "answer": ["A", "D"], "category": "ユーザインターフェース", "explanation": "A. 正解です。これは「エラーパネル」と呼ばれる一般的なUXパターンです。各コンポーネントが個別にトーストを出す代わりに、ページ上の単一のコンポーネントが、発生したすべてのエラーを集約して一箇所に表示します。これにより、トーストの連鎖が解消されます。\nB. window.alert() は、ユーザの操作をブロックするブラウザのダイアログです。これは通常、トーストメッセージよりもUX（ユーザエクスペリエンス）が悪いと見なされます。トーストの連鎖をアラートの連鎖に置き換えるだけで、問題は解決しません。\nC. これは、エラーが発生したコンポーネントの 内部 に <template if:true={error}> などを使ってエラーを表示するパターンです。これもトーストの連鎖を解決する有効なアプローチですが、(A)と(D)の組み合わせは、エラーを 集約する という特定の実装メカニズムを説明しています。\nD. 正解です。これは(A)の集約コンポーネントを機能させるためのメカニズムを指します。(A)の集約コンポーネント（エラーパネル）に公開プロパティ（例: @api errors）を定義します。親ページは、子コンポーネントから（通常はカスタムイベント経由で）エラーをキャッチし、そのエラーリストを(A)のコンポーネントの公開プロパティ(D)に渡すことで、エラーパネルに表示させることができます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 330, "q": "ある企業が、ネイティブiOSの注文アプリを持っており、Salesforceに接続して、多くの異なるオブジェクトから集約された情報をJSON形式で取得する必要があります。Salesforceでこれを実装するための最適な方法は何ですか？", "choices": ["A. Apex REST Webサービス", "B. Apex SOAP Webサービス", "C. Apex SOAPコールアウト", "D. Apex RESTコールアウト"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. 正解です。これは、外部システム（この場合はiOSアプリ）がSalesforceに接続し、データを要求する（インバウンド）ための機能です。Apex RESTサービスは、リクエストを受け取り、Apexでロジックを実行して（例: 複数のオブジェクトから情報を集約し）、結果をJSON形式で返すことができるため、要件に最適です。\nB. これもインバウンドのWebサービスですが、主にXMLベースのSOAPプロトコルを使用します。要件は「JSON形式」と明記されているため、JSONネイティブであるRESTがSOAPよりも適しています。\nC. コールアウトは、Salesforceが 外部 のシステムを呼び出す（アウトバウンド）ために使用されます。このシナリオでは、iOSアプリがSalesforceを呼び出す（インバウンド）必要があるため、逆です。\nD. これもアウトバウンドの通信（Salesforceから外部へ）です。Cと同様に、インバウンドである要件を満たしません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 331, "q": "非同期Apexを使用することによってのみ実行可能なユースケースはどれですか？", "choices": ["A. 数万件のレコードをクエリする", "B. 将来完了するようにバッチプロセスをスケジュールする呼び出しを行う", "C. ApexトリガからWebサービスを呼び出す", "D. insertの完了後にレコードを更新する"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "A. 同期Apexでも、ガバナ制限（SOQLクエリで取得できる合計レコード数は50,000件）の範囲内であれば、数万件のレコードをクエリすることは可能です。したがって、非同期Apex のみ が必要というわけではありません。\nB. System.scheduleBatch メソッドなどを使用してバッチプロセスをスケジュールする行為自体は、同期的に実行されます。スケジュールされたジョブが非同期に実行されるだけで、スケジューリングの呼び出し自体は同期的です。\nC. 正解です。Salesforceのガバナ制限により、トリガなどの同期トランザクション内から直接Webサービス（コールアウト）を呼び出すことは禁止されています。これを実行する唯一の方法は、トリガから非同期Apex（例: @future メソッドやQueueable Apex）を呼び出し、その非同期プロセス内からコールアウトを行うことです。\nD. 挿入の完了後にレコードを更新する - これは、after insert トリガを使用すれば、同期的に（同じトランザクション内で）実行できます。非同期で行うこともできますが、非同期が唯一の方法ではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 332, "q": "Salesforceユーザが取引先を保存する際に、「トリガの最大深度を超えました」というエラーが継続して発生します。開発者はこのエラーをどのように修正できますか？", "choices": ["A. トリガのロジックを2つの別々のトリガに分割する", "B. トリガを@futureアノテーションを使用するように変換する", "C. トリガが@isMultiThread=trueアノテーションを使用するように修正する", "D. ヘルパークラスでBooleanをTRUEに設定しFALSEの場合のみトリガを起動するよう修正する"], "answer": ["D"], "category": "ロジックとプロセスの自動化", "explanation": "A. トリガロジックを分割しても、トリガが実行する更新によって同じトリガが再度呼び出される（再帰）という根本的な問題が解決されない限り、エラーは解消されません。\nB. トリガを @future アノテーションを使用するように変換し、その後の取引先オブジェクトへのトリガ呼び出しを連鎖させる。 - トリガ自体を @future（非同期）にすることはできません。トリガから @future メソッドを呼び出すことは可能ですが、これは再帰を制御するための適切な方法ではなく、トランザクションの整合性の問題や非同期ガバナ制限の問題を引き起こす可能性があります。\nC. トリガが @isMultiThread=true アノテーションを使用するように修正する。 - @isMultiThread=true というアノテーションはApexに存在しません。\nD. ヘルパークラスを使用して、トリガが初回に起動されたときにBoolean（ブール値）を TRUE に設定し、その後、そのBooleanが FALSE の場合にのみトリガが起動するように修正する。 - 正解です。これは、トリガの再帰を防ぐための標準的なデザインパターンです。静的（static）なBoolean変数を使用して、現在のトランザクションでトリガが既に実行されたかを追跡します。2回目以降の呼び出しでは、Booleanが TRUE になっているためロジックが実行されず、無限ループを防ぐことができます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 333, "q": "開発者が、ユーザのチェックボックス選択に基づいて子コンポーネントを条件付きで表示するLightning WebコンポーネントのJestテストを作成しています。各シナリオで正しいコンポーネントが表示され、非表示になることを適切にテストするために、開発者は何をすべきですか？", "choices": ["A. テストごとに新しいdescribeブロックを作成する", "B. 各テストの後にafterEach()メソッドでDOMをリセットする", "C. 各テストの後にティアダウンブロックを追加してDOMをリセットする", "D. テストごとに新しいjsdomインスタンスを作成する"], "answer": ["B"], "category": "テスト、デバッグ、リリース", "explanation": "A. テストごとに新しい describe ブロックを作成する。 - describe ブロックは、関連するテストケースをグループ化するために使用されます。テスト（it ブロック）ごとにDOMの状態をリセットする必要があるため、describe ブロックを追加しても問題は解決しません。\nB. 各テストの後に afterEach() メソッドでDOMをリセットする。 - 正解です。Jestのテスト（特にLWCのテスト）では、各テストケース（it ブロック）が互いに独立している必要があります。afterEach() フックは各テストの直後に実行されるため、これを使用してDOMの状態をクリーンアップ（リセット）することで、前のテストによる変更が次のテストに影響を与えるのを防ぎます。\nC. 「ティアダウンブロック」はJestの特定の用語ではありません。afterEach() が、各テスト後のクリーンアップ処理を行うための正しいフックです。\nD. テストごとに新しい jsdom インスタンスを作成する。 - jsdom（DOMのシミュレーション環境）は、通常Jestによってテストファイル単位で管理されます。テストケース（it）ごとに新しいインスタンスを手動で作成するのは標準的なプラクティスではなく、afterEach() でDOMをリセットする方が適切です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 334, "q": "Universal Containersは、顧客サポートのケースを管理するためにカスタムSalesforceアプリケーションを使用しています。サポートチームは、特定のケースを解決するために外部パートナーと協力する必要があります。しかし、彼らは外部パートナーと共有されるケースの表示可能性とアクセスを制御したいと考えています。この要件を達成するのに役立つSalesforceの機能はどれですか？", "choices": ["A. ロール階層", "B. 条件に基づく共有ルール", "C. Apexによる管理共有", "D. 共有セット"], "answer": ["C"], "category": "上級デベロッパーの基本", "explanation": "A. ロール階層は、主に組織内部のユーザ（例: マネージャが部下のレコードを見る）間のアクセス権を制御します。外部パートナーは通常、この内部階層の外にいるため、この機能では要件を満たせません。\nB. このルールは、レコードの項目値（例: ケースの種別）に基づいて、公開グループやロールにレコードを共有します。外部パートナーを公開グループに入れることはできますが、これは静的なルールであり、「特定のケース」を「特定の外部パートナー」に動的に割り当てるような、きめ細かな制御には適していない場合があります。\nC. 正解です。Apex（通常はトリガ）を使用して共有レコード（この場合は CaseShare）をプログラムで作成することにより、アクセスをきめ細かく制御できます。これにより、「特定のケース」を「特定の外部パートナーユーザ」に（例えば参照のみで）共有し、そのアクセスを必要に応じて追加・削除するという要件を最も柔軟に満たすことができます。\nD. 共有セットは、コミュニティ（Experience Cloud）ユーザ向けの機能です。外部ユーザが属する取引先に関連するレコード（例: ケース）へのアクセスを自動的に付与するために使用されます。要件は「特定のケース」へのアクセスを「制御」することであり、共有セットの仕組みとは異なります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 335, "q": "Universal Containers（UC）の採用責任者は、新しい採用アプリ経由で、すべての内部ユーザに役割、部門、場所で募集中のポジションを検索する機能を提供したいと考えています。検索に加えて、アプリのユーザは友人を推薦したり、ポジションに応募したり、現在の応募状況を確認したりできる必要があります。このアプリは、Salesforceが提供する標準のモバイルアプリ経由で、UCの既存のiOSおよびAndroidユーザに表示されます。カスタムユーザインターフェースデザインを持ち、オフラインアクセスは必要ありません。これらの要件を考慮して、アプリを開発するための推奨アプローチは何ですか？", "choices": ["A. Lightning Experience Builder", "B. Lightning Webコンポーネント", "C. Visualforce", "D. Salesforce SDK"], "answer": ["B"], "category": "ユーザインターフェース", "explanation": "A. Lightning Experience Builder（またはLightningアプリケーションビルダー）は、主にコンポーネントをLightningページ上にドラッグアンドドロップで配置・構成するために使用される宣言的なツールです。「カスタムユーザインターフェースデザイン」を持つコンポーネント自体を 開発する ための技術ではなく、ページを組み立てるためのツールです。\nB. 正解です。Lightning Webコンポーネント（LWC）は、Lightning ExperienceおよびSalesforce標準モバイルアプリ内で動作する、パフォーマンスの高いカスタムUIを構築するための最新の推奨フレームワークです。要件である「カスタムユーザインターフェースデザイン」と「標準モバイルアプリでの表示」の両方を満たします。\nC. VisualforceはSalesforceのレガシー（旧）UIフレームワークです。Salesforceモバイルアプリ内で表示させることは可能ですが、現在ではLWCが推奨されており、モバイルでのユーザエクスペリエンスもLWCの方が優れています。\nD. Salesforce SDK（Mobile SDK）は、Salesforceに接続する スタンドアロンのカスタムネイティブアプリ をiOSやAndroid向けにゼロから構築するために使用されます。今回の要件は「Salesforceが提供する標準のモバイルアプリ」内で機能を表示することであるため、SDKを使用して別のアプリを構築するのは適切ではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 336, "q": "Universal Containersは、顧客がSalesforceコミュニティにログインし、カスタムVisualforceページ経由で注文を更新することを許可しています。Universal Containersの営業担当も、同じVisualforceページで注文を編集できます。Apexテストクラス内で、レコード共有がVisualforceページで強制されていることをテストするために、開発者は何を使用すべきですか？", "choices": ["A. 営業担当とコミュニティユーザとしてSystem.profiles=()を使用する", "B. 管理者とコミュニティユーザとしてSystem.profiles()を使用する", "C. 営業担当とコミュニティユーザとしてSystem.profiles1h=()を使用する", "D. 管理者とコミュニティユーザとしてSystem.runsAs()を使用する"], "answer": ["D"], "category": "テスト、デバッグ、リリース", "explanation": "A. 営業担当とコミュニティユーザとしてテストするために System. profiles=() を使用する。 - System.profiles=() という構文はApexに存在しません。\nB. 管理者とコミュニティユーザとしてテストするために System. profiles() を使用する。 - System.profiles() という名前のメソッドはApexに存在しません。\nC. 営業担当とコミュニティユーザとしてテストするために System. profiles1h=() を使用する。 - System.profiles1h=() という構文はApexに存在しません。\nD. 管理者とコミュニティユーザとしてテストするために System.runsAs() を使用する。 - 正解です。System.runAs(User u) メソッドは、テスト実行中にコードブロックを特定のユーザのコンテキストで実行するために使用されます。レコード共有が適用されていることを確認するには、アクセス権が異なるユーザ（例: 共有ルールが適用されるコミュニティユーザ）としてテストを実行し、期待通りにデータアクセスが制限されるかを検証する必要があります。他の選択肢は有効なApexメソッドではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 337, "q": "開発者が、Leads（リード）に関する情報を収集するために lightning-record-edit-form を使用するLightning Webコンポーネントを作成しました。ユーザは、Lead（リード）レコードを保存しようとすると、入力に関するエラーメッセージが一度に1つしか表示されないと不満を述べています。複数の項目でバリデーションを実行し、最小限のJavaScript介入で複数のエラーメッセージを同時に表示するための推奨されるアプローチは何ですか？", "choices": ["A. Try/catch/finallyブロック", "B. 外部JavaScriptライブラリ", "C. 入力規則", "D. Apexトリガ"], "answer": ["B"], "category": "ユーザインターフェース", "explanation": "A. Try/catch/finally ブロック - これは、JavaScriptコード実行時の例外（エラー）を処理するための構文です。フォームの入力値を検証（バリデーション）するロジックを定義したり、複数のエラーメッセージをUIに表示したりする機能ではありません。\nB. 正解です。lightning-record-edit-form の標準のクライアントサイドバリデーション（必須項目チェックなど）は、ユーザの操作（フォーカス移動など）に応じて逐次的に（一度に一つ）エラーを表示することがあります。外部のバリデーションライブラリ（例: yup や zod）を使用すると、onsubmit イベントで、定義したすべてのルールに基づいて全項目を一括で検証し、すべてのエラーをまとめて取得できます。その後、取得したエラーをループ処理し、各項目にカスタムエラーとして設定することで、「複数のエラーを同時に表示する」という要件を満たすことができます。\nC. 入力規則は、主にサーバサイドで実行され、複数のエラーを返すことができます。しかし、フォームの保存が実行される前に、標準のクライアントサイドバリデーション（例: 必須項目が空）が先に検知され、一度に一つのエラーしか表示されないというユーザの不満を解決できない可能性があります。\nD. Apexトリガも入力規則と同様にサーバサイドの検証です。フォームが送信される前のクライアントサイドでの逐次的なエラー表示の問題を解決するものではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 338, "q": "あるApexトリガは、商談レコードが「成約」としてマークされるたびに、Contract（契約）レコードを作成します。このトリガはうまく機能していますが、最近の買収により、過去の商談レコードをSalesforceインスタンスにロードする必要があります。レコードのテストバッチがロードされると、Apexトリガは契約レコードを作成してしまいます。開発者は、商談の一括ロード時には契約レコードが作成されないようにし、かつ、日常のユーザには引き続き契約レコードが作成されるようにするよう任されました。この目的を達成するためにApexトリガを更新する最も拡張性の高い方法は何ですか？", "choices": ["A. データをロードするユーザのプロファイルIDをトリガにハードコードする", "B. データをロードするユーザによる契約の作成を防ぐために入力規則を追加する", "C. データをロードするユーザについてはトリガ内のロジックをスキップするために階層カスタム設定を使用する", "D. データをロードするユーザに対してトリガを無効化するためにリストカスタム設定を使用する"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "A. データをロードするユーザのプロファイルIDをトリガに追加し、このユーザに対してはトリガが起動しないようにする。 - これは、プロファイルIDをApexコード内にハードコーディングすることを意味します。もし将来、別のユーザやプロファイルがデータロードを行う必要が出た場合、コードの変更と再デプロイが必要になるため、拡張性が低く推奨されません。\nB. データをロードするユーザによる契約の作成を防ぐために、契約オブジェクトに入力規則を追加する。 - これにより契約の作成はブロックされますが、トリガ自体は実行されてしまい、DML操作の失敗エラーがロード処理中に発生する可能性があります。ロジックをクリーンに「スキップ」する方法ではありません。\nC. データをロードするユーザについてはトリガ内のロジックの実行をスキップするために、階層カスタム設定を使用する。 - 正解です。階層カスタム設定を使用して（例: 「トリガを無効化」というチェックボックスを作成）、トリガロジックの実行をユーザまたはプロファイルレベルで制御できます。管理者は、データをロードするユーザのカスタム設定でこのチェックをオンにするだけで、コードを変更せずにロジックをバイパスできます。これが最も拡張性が高く柔軟な方法です。\nD. データをロードするユーザに対してトリガを無効化するために、リストカスタム設定を使用する。 - リストカスタム設定は、ユーザやプロファイルに基づいて自動的に設定を上書きする階層機能を持っていません。階層カスタム設定の getInstance() メソッドを使う方が、現在の実行ユーザの設定を効率的に取得できるため、このユースケースには階層カスタム設定の方が適しています。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 339, "q": "テストクラスでVisualforceページを初期化するためのベストプラクティスは何ですか？", "choices": ["A. Test.setCurrentPage(Page.MyTestPage);を使用する", "B. Test.currentPage.getParameters().put(MyTestPage);を使用する", "C. controller.currentPage.setPage(MyTestPage);を使用する", "D. Test.setCurrentPage MyTestPage;を使用する"], "answer": ["A"], "category": "テスト、デバッグ、リリース", "explanation": "A. Test.setCurrentPage(Page.MyTestPage); を使用する。 - 正解です。これは、テストメソッドの実行コンテキストにおいて、どのVisualforceページが現在処理中であるかを設定するための標準的な静的メソッドです。これにより、コントローラ内で ApexPages.currentPage() を呼び出した際に、指定したページ（Page.MyTestPage）の参照が正しく返されるようになります。\nB. Test.currentPage.getParameters().put(MyTestPage); を使用する。 - Test.currentPage は現在のページ参照を取得するプロパティですが、getParameters().put() はURLクエリパラメータを設定するためのものです。ページ自体を初期化（設定）する目的では使用されません。\nC. controller.currentPage.setPage(MyTestPage); を使用する。 - PageReference クラス（通常 currentPage が指す型）には setPage というメソッドは存在しません。これはページコンテキストを設定する正しい方法ではありません。\nD. Test.setCurrentPage MyTestPage; を使用する。 - これは有効なApex構文ではありません。Test.setCurrentPage はメソッドであるため、引数を括弧 () で囲んで呼び出す必要があります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 340, "q": "Lightning Webコンポーネントが読み込まれたときに、カスタムロジックを実行できる手法はどれですか？", "choices": ["A. aura:handler initイベントを使用して関数を呼び出す", "B. renderedCallback(){}メソッドを使用する", "C. $A.enqueueActionを呼び出し呼び出すメソッドを渡す", "D. connectedCallback(){}メソッドを使用する"], "answer": ["D"], "category": "ユーザインターフェース", "explanation": "A. aura:handler init イベントを使用して関数を呼び出す。 - これは、Lightning Webコンポーネント（LWC）ではなく、Auraコンポーネントの初期化ロジックで使用される構文です。\nB. renderedCallback() { } メソッドを使用する。 - renderedCallback() は、コンポーネントがDOMに 描画された後 に呼び出されるLWCのライフサイクルフックです。これは再レンダリングのたびに複数回呼び出される可能性があり、コンポーネントが 読み込まれた ときの（一度だけの）初期化には connectedCallback() の方が適しています。\nC. $A.enqueueAction を呼び出し、呼び出すメソッドを渡す。 - $A.enqueueAction は、AuraコンポーネントがサーバサイドのApexメソッドを呼び出すために使用するメカニズムです。LWCでは使用されません。\nD. connectedCallback() { } メソッドを使用する。 - 正解です。connectedCallback() は、LWCがDOMに挿入されたときに一度だけ呼び出される標準のライフサイクルフックです。これは、コンポーネントの読み込み時に初期化ロジック（データの取得など）を実行するための正しい場所です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 341, "q": "ある企業が、CatalogとCatalog Itemという名前のカスタムオブジェクトで製品オファリングに関する情報を管理しています。Catalog ItemはCatalogへの主従関係項目を持っており、各Catalogは最大100,000件のCatalog Itemを持つことがあります。両方のカスタムオブジェクトには、使用すべき通貨コードを含むCurrencylsoCodeテキスト項目があります。もしCatalogのCurrencylsoCodeが変更された場合、そのすべての子であるCatalog ItemのCurrencylsoCodeも同様に変更されるべきです。CatalogのCurrencylsoCodeが変更されたときにCatalog ItemのCurrencylsoCodeを更新するために、開発者は何を使用すべきですか？", "choices": ["A. Catalog ItemオブジェクトをクエリしCatalogのCurrencyIsoCodeが異なればCatalog Itemを更新するDatabase.SchedulableとBatchableクラス", "B. CatalogのCurrencyIsoCodeが異なればCatalog Itemを更新するCatalogのafter insertトリガ", "C. CatalogのCurrencyIsoCodeが異なればCatalog Itemを更新するCatalog Itemのafter insertトリガ", "D. CatalogオブジェクトをクエリしCatalogのCurrencyIsoCodeが異なればCatalog Itemを更新するDatabase.SchedulableとBatchableクラス"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. Catalog Itemオブジェクトにクエリを発行し、もしCatalogのCurrencylSoCodeが異なればCatalog Itemを更新する Database.Schedulable および Database.Batchable クラス - 正解です。100,000件という大量の子レコードを更新する必要があるため、同期処理（トリガなど）ではガバナ制限（DML行数制限）に必ず抵触します。Database.Batchable（バッチApex）は、このような大規模なデータ処理を非同期で行うために設計されています。Database.Schedulable（スケジュール可能）クラスを使用してこのバッチを定期的に実行し、親とコードが一致しない Catalog Item レコードを検索して更新するのが最も安全でスケーラブルな方法です。\nB. もしCatalogのCurrencylsoCodeが異なればCatalog Itemを更新する、Catalogのafter insertトリガ - このアプローチには2つの問題があります。第一に、after insert（挿入後）は要件（変更時）と異なる間違ったイベントです。第二に、トリガは同期的に実行されるため、100,000件のレコードを一度に更新しようとするとガバナ制限で失敗します。\nC. もしCatalogのCurrencylsoCodeが異なればCatalog Itemを更新する、Catalog Itemのafter insertトリガ - これは、ロジックの起点となるオブジェクト（親であるCatalogの変更）とイベント（挿入ではなく更新）の両方が間違っています。\nD. Catalogオブジェクトにクエリを発行し、もしCatalogのCurrencylSoCodeが異なればCatalog Itemを更新する Database.Schedulable および Database.Batchable クラス - この選択肢は非同期（Batchable）という点では正しいですが、実装のアプローチが非効率的です。もしバッチがCatalog（親）オブジェクトをクエリ対象とした場合、execute メソッドの1回の実行（1トランザクション）で、100,000件の子レコードを更新しようとしてガバナ制限で失敗します。バッチのクエリ対象は、処理単位となるCatalog Item（子）であるべきです。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 342, "q": "Universal Containersは、経費精算のための新しい承認プロセスを実装しています。このプロセスでは、経費の金額、従業員の役割、プロジェクトタイプなどの要因に基づいて、適切な承認者を決定するための複雑なロジックが必要です。このソリューションは、承認ルールの将来的な変更や柔軟性に対応できる必要があります。このロジックを実装するために、どのアプローチが最も適していますか？", "choices": ["A. カスタムApexクラスで適切な承認者を決定するメソッドを作成する", "B. 承認ロジックを処理するカスタムLightningコンポーネントを開発する", "C. 承認者を計算するカスタム数式項目を実装する", "D. Salesforceの標準承認プロセス機能を使用する"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. 指定された条件に基づいて適切な承認者を決定するメソッドを持つ、カスタムApexクラスを作成する。 - 正解です。「複雑なロジック」と「柔軟性および将来の変更への対応」が要件であるため、Apexクラスが最も適しています。Apexは、標準の承認プロセスでは実現が難しい、動的で複雑な承認者決定ロジックを実装できる最大限の柔軟性を提供します。このApexは、標準の承認プロセスから「承認者」として呼び出される形で使用されます。\nB. 承認ロジックを処理するカスタムLightningコンポーネントを開発し、それを経費精算レコードページに統合する。 - Lightningコンポーネントは、ユーザインターフェース（UI）を構築するためのものです。承認ロジックのようなバックエンドのビジネスプロセスは、UIレイヤではなくサーバサイド（Apexなど）で処理されるべきです。\nC. 指定された条件に基づいて適切な承認者を計算・決定するために、カスタム数式項目を実装する。 - 数式項目は、レコードの値に基づいて別の値を計算・表示するためのものです。承認プロセスにおいて承認者を動的に「決定」し、そのユーザにレコードを申請するロジックを実行することはできません。\nD. Salesforceの承認プロセス機能を使用し、エントリ条件と承認の割り当てを持つ複数の承認ステップを定義する。 - 標準の承認プロセスは基本的な承認フローに適しています。しかし、問題文が「複雑なロジック」と「将来の変更への柔軟性」を特に強調している点を考慮すると、宣言的なステップの組み合わせだけでは限界があります。Apex(A)は、その複雑なロジック自体を実装する上で最も柔軟な手段です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 343, "q": "ある組織には、取引先責任者と取引先の住所が保存されるたびに、Apexコードによって会社の標準形式に正規化されるべきという要件があります。これを実装する最適な方法は何ですか？", "choices": ["A. 住所を正規化するヘルパークラスを呼び出す取引先責任者と取引先のApexトリガ", "B. 住所を正規化するために取引先責任者のトリガを呼び出す取引先のApexトリガ", "C. 住所を正規化する取引先責任者と取引先のApexトリガ（別々）", "D. 住所を正規化するために取引先のトリガを呼び出す取引先責任者のApexトリガ"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. 住所を正規化するヘルパークラスを呼び出す、取引先責任者と取引先のApexトリガ - 正解です。これはApexトリガのベストプラクティスです。住所の正規化という共通のビジネスロジックを単一のヘルパークラス（またはメソッド）に分離し、取引先トリガと取引先責任者トリガの両方がそのヘルパーを呼び出します。これにより、コードの重複を避け、保守性を最大化できます。\nB. 住所を正規化するために取引先責任者のトリガを呼び出す、取引先のApexトリガ - トリガから別のトリガをプログラムで直接呼び出すことはできません。このアプローチは実現不可能であり、ロジックを共有する正しい方法でもありません。\nC. 住所を正規化する、取引先責任者と取引先のApexトリガ - このアプローチでは、同じ正規化ロジックを取引先トリガと取引先責任者トリガの 両方 にコピー＆ペースト（複製）することになります。これはコードの重複を生み出し、将来正規化ルールを変更する際に2箇所を修正する必要があるため、保守性が低く最適ではありません。\nD. 住所を正規化するために取引先のトリガを呼び出す、取引先責任者のApexトリガ - Bと同様に、トリガから別のトリガを直接呼び出すことはできません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 344, "q": "開発者は、様々なデバイスでレスポンシブに動作するLightning Webコンポーネントを作成するよう任されました。この目標を達成するのに役立つ2つのコンポーネントはどれですか？ 2つ選択してください", "choices": ["A. lightning-navigation", "B. lightning-input-location", "C. lightning-layout", "D. lightning-layout-item"], "answer": ["C", "D"], "category": "ユーザインターフェース", "explanation": "A. このコンポーネントは、Lightning ExperienceやSalesforceモバイルアプリ内でのページナビゲーション（移動）を管理するために使用されます。画面のレイアウト（配置）を制御するものではありません。\nB. このコンポーネントは、緯度と経度を入力するための専用の入力項目を提供します。レスポンシブなレイアウト構築には使用されません。\nC. 正解です。これは、lightning-layout-item コンポーネントを内包するコンテナ（親）として機能します。CSS Flexboxをベースにしており、レスポンシブなグリッドシステムを構築するための基礎となります。\nD. 正解です。これは lightning-layout コンテナ（親）の中で使用される個々の列（子）を表します。size や small-device-size などの属性を使用して、異なる画面サイズ（デバイス）に応じた列の幅や動作を指定でき、レスポンシブデザインを実現します。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 345, "q": "複数通貨が有効になっている組織で、開発者は、ログインユーザが最近アクセスした商談の上位10件を表示するLightningコンポーネントを構築するよう任されました。開発者は、Amount（金額）とLastModifiedDate（最終更新日）の項目値がユーザのロケールに従って表示されるようにする必要があります。表示される値がユーザのロケール設定を尊重することを保証するための最も効果的なアプローチは何ですか？", "choices": ["A. SOQL経由で取得した値をフォーマットするためにREGEX式を使用する", "B. SOQL経由で取得した値をフォーマットするためにラッパークラスを使用する", "C. SOQLクエリでFOR VIEW句を使用する", "D. SOQLクエリでFORMAT()関数を使用する"], "answer": ["D"], "category": "ロジックとプロセスの自動化", "explanation": "A. SOQL経由で取得した値をフォーマットするためにREGEX（正規表現）式を使用する。 - Apex側で正規表現を使用して、日付、時刻、通貨のロケール固有のフォーマット（例: $1,000.00 vs 1.000,00 €）を正確に処理するのは、非常に複雑で信頼性が低いため、適切なアプローチではありません。\nB. SOQLで生のデータを取得した後、Apex側で Decimal.format() や Datetime.format() メソッドを使用して値をフォーマットし、それをラッパークラスに格納することは可能です。しかし、SOQLクエリ自体でフォーマットできるDの選択肢と比べると、Apex側での追加の処理が必要になります。\nC. SOQLクエリで FOR VIEW 句を使用する。 - FOR VIEW 句は、クエリされたレコードの LastViewedDate（最終参照日）項目を更新するために使用されます。データの表示フォーマット（書式設定）とは関係ありません。\nD. SOQLクエリで FORMAT() 関数を使用する。 - 正解です。FORMAT() 関数はSOQLクエリ内で使用でき、数値、通貨、日付、時刻の項目を、クエリを実行しているユーザのロケールに基づいたフォーマット済みの文字列として返します。これにより、ApexやJavaScript側で追加のフォーマット処理を行う必要がなくなり、最も効果的です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 346, "q": "ある企業が最近、組織内の商談に関する情報のデータグリッドを持つカスタムコントローラを使用したVisualforceページをデプロイしました。ユーザは、特定の条件下で「ビューステートの最大サイズ制限」エラーメッセージが表示されると報告しています。Visualforceのベストプラクティスによれば、ビューステートを削減するために開発者が取るべき3つのアクションはどれですか？ 3つ選択してください", "choices": ["A. コントローラ内の変数にprivateキーワードを使用する", "B. ページに関連するデータのみを返すようにSOQLクエリを絞り込む", "C. データの量を減らすためにフィルタとページネーションを使用する", "D. 変更されない変数についてコントローラでfinalキーワードを使用する", "E. 状態を維持する必要がない変数についてApexコントローラでtransientキーワードを使用する"], "answer": ["B", "C", "E"], "category": "パフォーマンス", "explanation": "A. コントローラ内の変数に private キーワードを使用する。 - private キーワードは、変数のスコープ（可視性）をクラス内に制限するものであり、ビューステートにシリアライズされるかどうかには影響しません。\nB. ページに関連するデータのみを返すように、SOQLクエリを絞り込む。 - 正解です。ビューステートには、コントローラで保持される変数のデータ（SOQLの結果など）が含まれます。クエリで取得する項目やレコードを、ページ表示に必要な最小限に絞り込むことで、ビューステートのサイズを直接削減できます。\nC. データの量を減らすために、フィルタとページネーションを使用する。 - 正解です。一度に数千件のレコードをリストとして保持する代わりに、ページネーション（例: 20件ずつ表示）を実装すれば、コントローラが一度に保持するデータ量が減り、ビューステートが大幅に削減されます。\nD. 変更されない変数については、コントローラで final キーワードを使用する。 - final キーワードは、変数が一度割り当てられた後に再割り当てできないことを保証しますが、その変数がビューステートに含まれること自体は防げません。\nE. 状態を維持する必要がない変数については、Apexコントローラで transient キーワードを使用する。 - 正解です。transient キーワードは、その変数をビューステートのシリアライズ対象から除外するよう指定します。ポストバック（サーバへの再送信）間で値を保持する必要がない変数（計算用の一時変数など）に指定することで、ビューステートを削減できます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 347, "q": "Universal Containers（UC）は、顧客情報を保存するERPシステムを持っています。Salesforceで取引先が作成される際、新規顧客を作成するためのERPシステムのRESTエンドポイントが、取引先情報と共に自動的に呼び出されなければなりません。もしERPシステムへのコールが失敗した場合でも、取引先は作成されるべきです。UC組織の取引先は、UCの顧客オンボーディング部門のユーザによって、一度に1件ずつしか作成されません。ERPシステムのRESTエンドポイントへのコールアウトを実行するために、開発者は何を実装すべきですか？", "choices": ["A. JavaScriptからのRESTコール", "B. ヘッドレスクイックアクション", "C. トリガからQueueableを呼び出す", "D. Apex Continuation"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "A. これはクライアントサイドの実装であり、UIに依存します。もし取引先がUI以外（例: APIやデータローダ）で作成された場合、コールアウトが実行されないため、要件を満たしません。\nB. これもLightningコンポーネントを使用したクライアントサイドのアクションです。Aと同様に、レコードがデータベースに保存されるすべてのシナリオ（例: API経由）をカバーできません。\nC. 正解です。これは、トリガからコールアウトを行うための標準的なデザインパターンです。トリガ（after insert）がQueueableジョブをキューに入れ、そのジョブが非同期（別のトランザクション）でRESTコールアウトを実行します。非同期であるため、コールアウトが失敗しても元の取引先作成トランザクションはロールバックされず、「コールが失敗した場合でも、取引先は作成されるべき」という要件を満たします。\nD. Continuationは、主にVisualforceページやAuraコンポーネントからコールアウトを行い、応答を待つ間のサーバのリソースを解放するためのUIパターンです。サーバサイドのレコード作成イベント（トリガ）から呼び出すものではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 348, "q": "開発者が、カスタム画面のためにVisualforceコンポーネントとLightningコンポーネントのどちらを作成するかを決定しようとしています。最終的な決定に影響を与える機能上の考慮事項はどれですか？", "choices": ["A. 画面がLightning Experience UIからアクセス可能である必要があるか", "B. 画面がサードパーティアプリなしにPDFとしてレンダリングされる必要があるか", "C. 画面がJavaScriptフレームワークを利用するか", "D. 画面がモバイルアプリ経由でアクセスされるか"], "answer": ["B"], "category": "ユーザインターフェース", "explanation": "A. LightningコンポーネントもVisualforceページも、どちらもLightning Experience UI内で表示させることが可能です。したがって、これは決定的な要因にはなりません。\nB. 画面がサードパーティアプリケーションを使用せずにPDFとしてレンダリングされる必要があるか？ - 正解です。Visualforceには、renderAs=\"pdf\" 属性を使用してページをサーバサイドでPDFとしてネイティブに生成する独自の機能があります。Lightningコンポーネントにはこのネイティブ機能がないため、「サードパーティ製品なしでPDFを生成する」必要がある場合、Visualforceを選択する決定的な理由となります。\nC. Lightningコンポーネント自体がモダンなJavaScriptフレームワークに基づいています。Visualforceページ内でも外部のJavaScriptフレームワーク（jQueryなど）を利用することは可能です。したがって、これは決定的な要因にはなりません。\nD. LightningコンポーネントもVisualforceページも、どちらもSalesforceモバイルアプリからアクセス可能です（ただし、モバイルでの最適なエクスペリエンスは通常Lightningコンポーネントで実現されます）。しかし、両方ともアクセス可能であるため、これは決定的な要因ではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 349, "q": "ある組織には、商談が編集されて商談の Amount（金額）が変更されたときに、カスタム項目 CommissionBaseAmount__c（手数料基準額）を設定するプロセス（プロセスビルダーで構築）が既存で存在します。最近、開発者が商談の before update トリガをデプロイしました。このトリガは、商談のフェーズが「成約」に変更されたときに、CommissionBaseAmount__c と複雑なロジックを使用して、カスタム項目 CommissionAmount__c（手数料額）の値を計算するものです。ユーザから、商談を「成約」に変更し、かつ 同じ保存（セーブ）操作で Amount（金額）も変更すると、CommissionAmount__c が不正になるという報告がありました。この問題を修正するために、開発者はどのアクションを実行すべきですか？", "choices": ["A. プロセスを「項目をすばやく更新」のレコードトリガフローに置き換える", "B. プロセスからトリガを呼び出す", "C. トリガからプロセスを呼び出す"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. 正解です。これは「実行順序」の問題が原因です。before update トリガ（CommissionAmount__c を計算）は、プロセスビルダー（CommissionBaseAmount__c を設定）よりも 前に 実行されます。そのため、トリガは 古い CommissionBaseAmount__c に基づいて計算してしまい、その直後にプロセスビルダーが CommissionBaseAmount__c を更新するため、計算が不正になります。「項目をすばやく更新」フロー（保存前フロー）は、before トリガと同じ、レコードが保存される 前 のフェーズで実行されます。プロセスをこのタイプのフローに置き換えることで、CommissionBaseAmount__c の更新が、CommissionAmount__c の計算トリガと同じフェーズで（またはそれより先に）実行されるようになり、トリガが正しい基準額にアクセスできるようになります。\nB. プロセスビルダーからApexトリガを直接呼び出すことはできません。Apexメソッド（呼び出し可能なアクション）を呼び出すことはできますが、トリガの実行順序の問題は解決しません。\nC. Apexトリガからプロセスビルダーを直接呼び出すことはできません。このアプローチは実現不可能です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 350, "q": "ユーザーがカスタムLightningコンポーネントを操作中に、一般的な「内部サーバーエラーが発生しました」を受け取ります。開発者は、より意味のあるメッセージを保証するために何をすべきですか？", "choices": ["A. tagにonerrorイベントハンドラを追加する", "B. マークアップにerror-viewコンポーネントを追加する", "C. エラーを処理するためにプラットフォームイベントを使用する", "D. try-catchブロックでAuraHandledexceptionを使用する"], "answer": ["D"], "category": "ユーザインターフェース", "explanation": "A. tag に onerror イベントハンドラを追加する。 - onerror イベントハンドラは、特定のUIコンポーネント（例: lightning-record-edit-form）で発生したエラーをキャッチするために使用されますが、「内部サーバーエラー」は通常、Apexコントローラ（サーバサイド）から発生する例外を指します。\nB. マークアップに error-view コンポーネントを追加する。 - これはエラーを表示する 方法（UI）の一つかもしれませんが、エラーを キャッチ し、一般的なサーバエラーを「より意味のあるメッセージ」に変換するロジック（D）の代わりにはなりません。\nC. プラットフォームイベントは、Salesforce内外のシステム間で非同期に通信するためのものです。Lightningコンポーネントの同期的なApex呼び出しで発生したエラーを処理し、ユーザに直接フィードバックする用途には適していません。\nD. try-catch ブロックで AuraHandledexception を使用する。 - 正解です。このエラーは、Apexコントローラで未処理の例外が発生した場合に表示されます。Apex側の try-catch ブロックで例外をキャッチし、AuraHandledException を（より意味のあるメッセージを付けて）スローすることで、そのカスタムメッセージがクライアントサイド（Lightningコンポーネント）に安全に伝達され、ユーザに表示できます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 351, "q": "Visualforceページのコントローラで transient キーワードを使用することは、どの一般的なパフォーマンス問題に役立ちますか？", "choices": ["A. ロード時間を短縮する", "B. ページ転送を改善する", "C. ビューステートを削減する", "D. クエリのパフォーマンスを改善する"], "answer": ["C"], "category": "パフォーマンス", "explanation": "A. transient キーワードはビューステートのサイズを削減することに直接貢献します。ビューステートが小さくなると、サーバとの送受信データ量が減るため、結果としてロード時間が短縮される可能性はありますが、最も直接的な効果はビューステートの削減です。\nB. Aと同様に、ビューステートを削減した結果としてページ転送が改善（高速化）することはありますが、transient キーワードが解決する主要な問題はビューステートのサイズそのものです。\nC. 正解です。transient キーワードで宣言された変数は、Visualforceページがサーバにポストバック（再送信）される際に、その値を保持する必要がないことを示します。そのため、これらの変数はビューステートにシリアライズ（保存）されなくなり、ビューステート全体のサイズを削減できます。\nD. transient キーワードは、変数がビューステートに保存されるかどうかを制御するものであり、SOQLクエリの実行効率やパフォーマンスには影響を与えません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 352, "q": "ある企業が、カスタムの取引先テリトリー割り当てを管理するために外部システムを使用しています。四半期ごとに、外部システムでテリトリー割り当てが完了すると、Salesforce内の何百万もの取引先が新しい所有者で更新される可能性があります。外部システムから取引先を更新するための最適な方法は何ですか？", "choices": ["A. コンポジットREST API", "B. SOAP API", "C. Bulk API", "D. Apex REST Webサービス"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "A. コンポジットREST APIは、関連する複数のレコードを1回のコールで処理（例: 取引先と取引先責任者を同時に作成）するのに適しています。しかし、トランザクションベースであり、ガバナ制限があるため、「何百万」という規模のデータ更新には最適化されていません。\nB. SOAP APIは、標準的なサーバ間のインテグレーションに使用されます。しかし、これもトランザクションベースであり、一度に処理できるレコード数も限られているため、「何百万」件という大規模なデータロードには適していません。\nC. 正解です。Bulk APIは、Salesforceが提供する「何百万」件ものレコードを非同期で効率的にロード（挿入、更新、削除）するために特別に設計された、RESTベースのAPIです。大量のデータを一括で処理するのに最適です。\nD. これは、外部システムがSalesforceのカスタムApexロジックを呼び出すためのインバウンドAPIを作成する機能です。この方法でデータを受け取ることは可能ですが、Apexの実行には厳格なガバナ制限（CPU時間、DML行数など）があるため、「何百万」件のレコードを処理するのには全く適しておらず、最適とは言えません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 353, "q": "ある企業のサポートプロセスでは、ケースが「修正できず」の状況でクローズされるたびに、Engineering Reviewカスタムオブジェクトレコードが作成され、そのケース、取引先責任者、およびケースに関連するすべての製品からの情報が入力される必要があります。Apexトリガを使用してこれを自動化する正しい方法は何ですか？", "choices": ["A. ケースのafter updateトリガ", "B. ケースのafter upsertトリガ", "C. ケースのbefore updateトリガ", "D. ケースのbefore upsertトリガ"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. Engineering Reviewレコードを作成して挿入する、ケースの after update トリガ - 正解です。after トリガは、トリガを起動したレコード（ケース）がデータベースに正常に保存された 後 で実行されます。関連する新しいレコード（Engineering Review）を作成（DML挿入）する操作は、親レコードの保存が確定したこのタイミングで行うのがベストプラクティスです。\nB. Engineering Reviewレコードを作成して挿入する、ケースの after upset トリガ - \"after upsert\"（または原文の\"upset\"）は、有効なトリガイベントではありません。upsert DML操作は、レコードが存在するかどうかに応じて after insert または after update のいずれかのトリガを起動します。\nC. Engineering Reviewレコードを作成して挿入する、ケースの before update トリガ - before トリガは、レコードがデータベースに保存される 前 に実行されます。このコンテキストは、保存されるレコード自体の値を検証したり変更したりするためのものです。before トリガ内で関連レコードを挿入（DML操作）すると、もしその後のケースの保存が（入力規則などで）失敗した場合に、データが不整合な状態になる可能性があるため推奨されません。\nD. Engineering Reviewレコードを作成して挿入する、ケースの before upset トリガ - \"before upsert\"（または原文の\"upset\"）は有効なトリガイベントではありません。また、Cと同様に、before コンテキストは関連レコードのDML操作には不適切です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 354, "q": "ある企業が、7年後に機密情報を自動的に削除する必要があります。これにより、毎日100万件近くのレコードが削除される可能性があります。どうすればこれを達成できますか？", "choices": ["A. @futureプロセスをスケジュールし1000レコードバッチで再帰的に呼び出す", "B. 集計関数で古いレコードをクエリしaggregateResultsオブジェクトを削除する", "C. 7年より古いレコードをクエリして削除するバッチApexプロセスを毎日スケジュールする", "D. SOSLステートメントで古いレコードを検索し結果セット全体を削除する"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "A. 7年より古いレコードをクエリする @future プロセスをスケジュールし、それらを削除するために1,000レコードのバッチで自身を再帰的に呼び出す。 - @future メソッドは非同期処理ですが、「毎日100万件」という大規模なデータセットの処理には最適化されていません。再帰呼び出しはガバナ制限（1トランザクションあたりのfuture呼び出し回数）にすぐに達する可能性があり、バッチApexに比べて堅牢ではありません。\nB. 7年より古いレコードをクエリするために集計関数を使用し、その後 aggregateResults オブジェクトを削除する。 - 集計関数（COUNT、SUMなど）は、レコードのグループ化や集計値の計算に使用されます。レコード自体を取得するものではないため、aggregateResults オブジェクトを削除しても、元のレコードは削除されません。\nC. 7年より古いレコードをクエリして削除するバッチApexプロセスを、毎日実行するようにスケジュールする。 - 正解です。バッチApex（Database.Batchable インターフェース）は、まさにこのような「100万件」といった大規模なデータセットを非同期でチャンク（塊）に分けて処理するために設計されています。Schedulable インターフェースと組み合わせることで、このプロセスを毎日自動実行できます。\nD. 7年より古いレコードを見つけるためにSOSLステートメントを実行し、その後、結果セット全体を削除する。 - SOSLは、複数のオブジェクトにまたがるテキストベースの 検索 に使用されます。日付（7年より古い）のような構造化された条件で大量のレコードを取得・削除するにはSOQLを使用すべきです。また、100万件のレコードを一度に削除しようとするとガバナ制限に抵触します。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 355, "q": "開発者は、取引先責任者を検索するLightning Webコンポーネントを構築しています。このコンポーネントは、検索が完了したときに、異なるDOMツリーにある、関連のない他のLightning Webコンポーネントに検索結果を伝える必要があります。この通信を実装するために、開発者は何をすべきですか？", "choices": ["A. アプリケーションイベントを発行する", "B. イベントチャネルでイベントを公開する", "C. カスタムコンポーネントイベントを発行する", "D. メッセージチャネルでメッセージを公開する"], "answer": ["D"], "category": "ユーザインターフェース", "explanation": "A. アプリケーションイベントは、主にAuraコンポーネントフレームワークで使用されるものであり、Lightning Webコンポーネント（LWC）間の通信で推奨される現代的な方法ではありません。\nB. 「イベントチャネル」は、Salesforceの標準的なLWC通信メカニズム（LMSやDOMイベント）の正確な用語ではありません。\nC. カスタムコンポーネントイベントは、DOMツリーを上って（子から親へ）通信するために使用されます。「異なるDOMツリーにある」「関連のない」コンポーネント間の通信という要件は満たせません。\nD. 正解です。Lightning Message Service（LMS）は、定義された「メッセージチャネル」を使用してメッセージを公開（Publish）します。これにより、コンポーネント階層やDOMツリーに関係なく、サブスクライブ（購読）している他のLWCやAuraコンポーネントと通信できます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 356, "q": "営業チームが個々の顧客レコードを表示するとき、その顧客の最近のインタラクションを確認する必要があります。これらのインタラクションには、販売注文、電話、またはケースがあります。最近のインタラクションの日付範囲は、顧客レコードタイプごとに異なります。これはどのように達成できますか？", "choices": ["A. バッチApexを使用して最新のインタラクションをクエリする", "B. Lightning Flowを使用して最近のインタラクションを動的にクエリして表示する", "C. Lightningコンポーネントを使用してdesign:attributeで渡されたレコードタイプに基づきインタラクションをクエリして表示する", "D. 動的フォームを使用して最近のインタラクションを表示する"], "answer": ["C"], "category": "ユーザインターフェース", "explanation": "A. 顧客の表示画面が読み込まれたときに、バッチApexを使用して最新のインタラクションをクエリする。 - バッチApexは、大規模なデータセットに対する非同期（バックグラウンド）処理用です。レコードページの読み込みのような、リアルタイムの同期的なデータ取得には適していません。\nB. Lightning Flowを使用して顧客のレコードタイプを読み取り、その後、最近のインタラクションを動的にクエリして表示ページに表示する。 - 画面フローはレコードページに配置できますが、複数の異なるオブジェクト（販売注文、電話、ケース）のデータを集約し、レコードタイプごとに異なる日付ロジックを適用して表示するような複雑なクエリと表示は、フローの標準機能では困難または不可能です。\nC. Lightningコンポーネントを使用して、Lightningページから design:attribute を使用して渡されたレコードタイプに基づき、インタラクションをクエリして表示する。 - 正解です。Lightningコンポーネント（AuraまたはLWC）は、Apexコントローラを呼び出すことができます。Apex側では、現在のレコードのレコードタイプに基づいた複雑なビジネスロジック（レコードタイプごとに異なる日付範囲の決定）や、複数のオブジェクト（販売注文、電話、ケース）からのデータ集約を実行できます。\nD. 顧客レコードページの動的フォームを使用して、最近のインタラクションを表示する。 - 動的フォーム（Dynamic Forms）は、Lightningレコードページ上の 項目 や 項目セクション の表示/非表示を条件付きで制御する機能です。関連する複数のオブジェクトからデータを集約して表示するカスタムコンポーネントの代わりにはなりません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 357, "q": "開発者が新しいAppExchangeアプリケーションを開発するよう依頼されました。プログラムの機能として、ケースが特定のフェーズに達し、かつ特定のレコードタイプである場合に、Surveyレコードを作成するものがあります。異なるSalesforceインスタンスでは異なるタイミングでSurveyが必要とされるため、この機能は設定可能である必要があります。さらに、標準装備のAppExchangeアプリには、ほとんどの顧客に適用できるベストプラクティスの設定セットが付属している必要があります。アプリのカスタム設定情報を保存し、パッケージ化するために、開発者は何を使用すべきですか？", "choices": ["A. カスタムオブジェクト", "B. カスタム設定", "C. カスタムメタデータ", "D. カスタムラベル"], "answer": ["C"], "category": "上級デベロッパーの基本", "explanation": "A. カスタムオブジェクトは、主にビジネスデータ（取引先や商談など）を保存するために使用されます。設定情報を保存することもできますが、その データ（レコード） はパッケージに自動的に含まれないため、デプロイ後に手動でデータをロードする必要があり、「設定セットが付属」という要件を満たすには最適ではありません。\nB. カスタム設定も設定情報を保存するために使用されます。しかし、カスタムオブジェクトと同様に、カスタム設定の データ（レコード） はメタデータとして扱われず、パッケージに含めてデプロイすることができません。\nC. 正解です。カスタムメタデータ型は、設定情報をレコードとして保存できます。最大の特徴は、これらの設定レコード自体がメタデータとして扱われるため、AppExchangeパッケージに含めて顧客の組織に一緒にデプロイできる点です。これにより、「ベストプラクティスの設定セットが付属」という要件を満たせます。\nD. カスタムラベルは、アプリケーション内のテキスト（例: ボタンのラベルやエラーメッセージ）を多言語化したり、カスタマイズ可能にしたりするために使用されます。ケースのフェーズやレコードタイプといった複雑な設定ルールを保存するのには適していません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 358, "q": "開発者が「トリガの最大深度を超えました」というエラーを受け取りました。このエラーメッセージが表示される理由として考えられるものは何ですか？", "choices": ["A. トリガが16回を超えて再帰的に呼び出されている", "B. SOQLガバナ制限に達している", "C. トリガロジック内に多数のDML操作がある", "D. フロートリガが何度も含まれている"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. 正解です。Salesforceでは、トリガが同じトランザクション内で無限にループ（再帰）するのを防ぐため、スタックの深さに16回という制限を設けています。例えば、取引先トリガが取引先を更新し、それによって再び取引先トリガが起動する、という連鎖が16回を超えるとこのエラーが発生します。\nB. SOQLガバナ制限（例: 1トランザクションあたりのSOQL発行回数）に達した場合、「Too many SOQL queries」といった別の種類のエラーメッセージが表示されます。\nC. DML操作の回数制限に達した場合は、「Too many DML statements」といったエラーメッセージが表示されます。これは「深度」の問題とは異なります。\nD. 「フロートリガ」という用語は一般的ではありませんが、フローがトリガの実行と相互に作用して再帰を引き起こすことはあります。しかし、エラーメッセージが直接示す原因は、Aで説明されているプラットフォームの16回の再帰深度制限に達したことです。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 359, "q": "Lightningレコードページのボタンをクリックすることでモーダルダイアログに表示されるようにするために、Auraコンポーネントによって実装される必要があるインターフェースはどれですか？", "choices": ["A. farce:lightningEditRAation", "B. lightning:editiction", "C. force:lightningQuickAction", "D. lightning:quickAction"], "answer": ["C"], "category": "ユーザインターフェース", "explanation": "A. この名前のインターフェースはSalesforceの標準機能には存在しません。\nB. この名前のインターフェースはSalesforceの標準機能には存在しません。\nC. force:lightningQuickhction - 正解です。（これは一般的に force:lightningQuickAction と認識されます）。AuraコンポーネントをLightningクイックアクションとして（例: レコードページのボタンから）モーダルダイアログで起動できるようにするには、force:lightningQuickAction インターフェースを実装する必要があります。\nD. このインターフェースは、Auraコンポーネントではなく、Lightning Webコンポーネント（LWC）を（通常ヘッダーやフッターのない）クイックアクションとして公開するために使用されます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 360, "q": "開発者がカレンダーを表示するLightning Webコンポーネントを作成しています。このコンポーネントは複数の国で使用されます。ロケールによっては、週の最初の日が月曜日、土曜日、または日曜日になります。すべてのロケールのユーザに対してカレンダーが正確に表示されるようにするために、開発者は何をすべきですか？", "choices": ["A. 現在のユーザのロケールからFirstDayofweek項目をクエリする", "B. @salesforce/i18nモジュールをインポートしfirstdayofweek国際化プロパティを使用する", "C. キー/値のペアを保存するためにカスタムメタデータ型を使用する", "D. コンポーネントでUserInfo.getLocale()を使用する"], "answer": ["B"], "category": "ユーザインターフェース", "explanation": "A. 現在のユーザのロケールから FirstDayofweek 項目をクエリする。 - Locale（ロケール）情報をSObjectのようにクエリして FirstDayofweek という項目を取得する標準的な方法はありません。\nB. @salesforce/i18n モジュールをインポートし、firstdayofweek 国際化プロパティを使用する。 - 正解です。@salesforce/i18n モジュールは、Lightning Webコンポーネントがクライアントサイドでユーザのロケール情報（通貨、日付、数値の形式、そして週の開始日など）にアクセスするために提供されています。\nC. カスタムメタデータは、組織固有の設定を保存・管理するためのものです。Salesforceのユーザ設定に既に存在するロケール情報を、重複して手動で管理するのは非効率であり、正しいアプローチではありません。\nD. コンポーネントで UserInfo.getLocale() を使用する。 - UserInfo.getLocale() は、Lightning WebコンポーネントのJavaScriptファイル内ではなく、Apex（サーバサイド）で使用されるメソッドです。サーバを呼び出す必要があり、クライアントサイドで完結するBの選択肢に比べて効率的ではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 361, "q": "コンプライアンス目的で、ある企業は組織内の長期的な製品使用状況を追跡する必要があります。ログに記録する必要がある情報は、複数のオブジェクトから収集され、時間が経つにつれて、何億ものレコードになると予測されています。開発者はこれを実装するために何を使用すべきですか？", "choices": ["A. 設定変更履歴", "B. 項目監査履歴", "C. Big Object", "D. 項目履歴管理"], "answer": ["C"], "category": "上級デベロッパーの基本", "explanation": "A. 設定変更履歴は、Salesforceの設定（プロファイルの変更、項目の作成など）に加えられた変更を追跡します。これは、製品の使用状況のようなデータレコードを保存するためのものではありません。\nB. 項目監査履歴は、項目履歴管理（D）の拡張機能であり、特定の項目に対する変更履歴を長期間（最大10年）保存します。これは既存のレコードの「変更履歴」を追跡するものであり、複数のオブジェクトから収集した新しいログレコード（使用状況）を保存するものではありません。\nC. 正解です。Big Objectは、Salesforceプラットフォーム上で「何億」ものレコード（数億〜数十億規模）を保存・管理するために特別に設計されたスケーラブルなストレージソリューションです。パフォーマンスへの影響を最小限に抑えながら、コンプライアンスに必要な長期的な大量データを保持するのに最適です。\nD. 項目履歴管理は、標準オブジェクトまたはカスタムオブジェクトの特定の項目に加えられた変更を追跡します。これはB（項目監査履歴）と同様に「変更履歴」であり、新しい使用状況ログを保存するものではありません。また、何億ものレコードを処理するスケーラビリティもありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 362, "q": "開発者は、時折変更される設定データを保存するためにカスタム設定を使用しました。しかし、最近更新（リフレッシュ）された一部のサンドボックスで、テストが失敗するようになりました。今後この問題を解消するために、何をすべきですか？", "choices": ["A. カスタム設定の設定タイプを「リスト」に設定する", "B. カスタム設定を静的リソースに置き換える", "C. カスタム設定の設定タイプを「階層」に設定する", "D. カスタム設定をカスタムメタデータに置き換える"], "answer": ["D"], "category": "上級デベロッパーの基本", "explanation": "A. カスタム設定のタイプ（リストか階層か）は、この問題の根本原因とは関係ありません。どちらのタイプでも、カスタム設定の レコード は「データ」として扱われ、サンドボックスの更新時に失われるため、テストの失敗は解決しません。\nB. 静的リソースはメタデータであり、デプロイ可能ですが、主にファイル（CSS、画像、JavaScriptなど）を保存するためのものです。設定データを保存するために使用するのは非効率であり、コードから参照・利用するのも複雑になります。\nC. Aと同様に、カスタム設定のタイプを変更しても、「データ」であることには変わりません。サンドボックスの更新時にデータが失われる問題は解決しません。\nD. 正解です。カスタムメタデータの レコード は「メタデータ」として扱われます。これにより、デプロイ（変更セットやパッケージ）に含めることができ、サンドボックスの更新後もデータが保持されます。テストが依存する設定データが常に存在するため、テストの失敗を防ぐことができます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 363, "q": "Universal Containersは、Customer Community Plusライセンスを持つカスタマーコミュニティを使用して、顧客がレンタルしているコンテナの数と返却期限を追跡できるようにしたいと考えています。Universal Containersは、外部ユーザに対して非公開の共有モデルを使用しています。顧客の多くは、複雑な取引先階層を持つ多国籍企業です。階層上の各取引先は、同じビジネス内の部門を表します。要件の1つは、取引先責任者を（部門を表す）さまざまな取引先レコードに関連付けるカスタム連結オブジェクトに基づき、同じ取引先階層内の一部のコミュニティユーザが、複数の部門のコンテナを参照できるようにすることです。どのソリューションがこれらの要件を解決しますか？", "choices": ["A. without sharingを使ったカスタムコントローラのVisualforceページ", "B. 連結オブジェクトのリレーションシップに基づいてApexによる管理共有レコードを作成するApexトリガ", "C. Lightningデータサービスを使うLWC", "D. 所有者ベースのフィルタを持つカスタムリストビュー"], "answer": ["B"], "category": "上級デベロッパーの基本", "explanation": "A. レコードを公開するために [without sharing] を指定したカスタムコントローラを使用するVisualforceページ - without sharing を使用すると、コントローラは共有設定を無視してデータを表示できますが、これはレコードへのアクセス権自体を付与するものではありません。特定のコンポーネント内でのみデータが見えるだけであり、Salesforce全体での共有要件を解決する適切な方法ではありません。\nB. 正解です。組織の共有設定が「非公開」の場合、特定のレコード（この場合はコンテナや部門の取引先）へのアクセス権を動的に付与する唯一の方法は、プログラムによる共有（Apexによる管理共有）です。Customer Community Plusライセンスユーザはロールを持たないため、この方法で、連結オブジェクトのロジックに基づき特定のユーザにアクセス権を付与する必要があります。\nC. Lightningデータサービスを使用する、コミュニティホームページ上のLightning Webコンポーネント - Lightningデータサービス（LDS）は、ユーザの既存のアクセス権（共有設定）を尊重してデータを取得・表示します。LDS自体が、ユーザにアクセス権を 付与 する機能を持っているわけではありません。\nD. 所有者に基づいて適切なレコードを表示するフィルタを備えた、連結オブジェクトのカスタムリストビュー - リストビューは、ユーザが 既にアクセス権を持っている レコードをフィルタリングして表示する機能です。レコードへのアクセス権自体を 付与 するものではないため、非公開モデルの共有の問題は解決しません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 364, "q": "ある企業が、一部のオブジェクトは異なり、一部のオブジェクトは共通である、多くの異なるSalesforce組織を持っています。そして、それらすべての異なる組織で共通オブジェクトのレコードを作成、取得、更新できる単一のJavaアプリケーションを構築したいと考えています。このアプリケーションはどの統合メソッドを使用すべきですか？", "choices": ["A. SOAP APIとパートナーWSDL", "B. Apex REST Webサービス", "C. SOAP APIとエンタープライズWSDL", "D. メタデータAPI"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. SOAP API と パートナーWSDL - 正解です。パートナーWSDLは、特定の組織のスキーマに依存しない（緩やかに型付けされた）WSDLです。これにより、単一のJavaアプリケーションが、それぞれ異なるカスタムオブジェクトや項目を持つ可能性のある 複数 のSalesforce組織に接続し、共通のsObject（例: 取引先やカスタムオブジェクト）を動的に操作することが可能になります。\nB. これは、Salesforceが外部からのリクエストを受け取る（インバウンド）ために、各組織にカスタムApexコードをデプロイする必要がある方法です。単一のJavaアプリケーションからすべての組織を操作するという要件には適していません。\nC. SOAP API と エンタープライズWSDL - エンタープライズWSDLは、単一 のSalesforce組織の特定のスキーマ（すべてのカスタム項目など）に強く結びついています（強く型付けされています）。このWSDLで構築されたアプリケーションは、その特定の組織専用となり、異なる設定を持つ他の組織には接続できません。\nD. メタデータAPIは、オブジェクト、項目、ページレイアウトといった 設定（メタデータ） を管理するために使用されます。取引先レコードのような データ を作成、取得、更新する目的には使用されません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 365, "q": "Visualforce Remote Objectsに対するJavaScript Remotingの利点は何ですか？", "choices": ["A. JavaScriptコードを必要としない", "B. 複雑なサーバサイドのアプリケーションロジックをサポートする", "C. Apexコードを必要としない", "D. 指定された再レンダリングの対象を許可する"], "answer": ["B"], "category": "ユーザインターフェース", "explanation": "A. JavaScript RemotingもVisualforce Remote Objectsも、Apexメソッドを呼び出したりデータを操作したりするためにJavaScriptを必要とします。\nB. 正解です。JavaScript Remotingは、@RemoteAction アノテーションが付いたカスタムApexメソッドを呼び出します。これにより、開発者はそのメソッド内で、単純なDML操作だけでなく、複雑なクエリ、計算、他のサービスへのコールアウトなど、任意のビジネスロジックを実行できます。\nC. JavaScript Remotingは、@RemoteAction メソッドを持つApexコントローラクラスを明示的に必要とします。\nD. これは、Visualforceの標準コンポーネント（例: <apex:commandButton>）の reRender 属性の機能です。JavaScript Remotingはデータを返すだけで、ページのどの部分を更新するかはJavaScriptのコールバック関数内で開発者が手動で制御する必要があります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 366, "q": "あるビジネス要件で、すべての親レコードは子レコードを必ず持つ必要があります。開発者は、親レコードと子レコードを挿入するために2つのDMLステートメントを持つApexメソッドを作成しました。入力規則が子レコードの作成をブロックします。メソッドはDML例外を処理するためにtry/catchブロックを使用しています。親が常に子レコードを持つことを保証するために、開発者は何をすべきですか？", "choices": ["A. Database.insert()でallOrNoneをtrueに設定する", "B. 子レコードのDML操作でエラーが発生した場合catchで親レコードを削除する", "C. データベースのセーブポイントを設定しエラー発生時にロールバックする", "D. 子レコードでエラーが発生した場合親レコードでaddError()を使用する"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "A. Database.insert() を使用し、allOrNone パラメータを true に設定する。 - allOrNone パラメータは、1回のDML操作（例: 1つのリストの挿入）内のレコード群に適用されます。このシナリオは、親の挿入と子の挿入という2つの異なるDML操作にまたがっているため、allOrNone ではトランザクションを制御できません。\nB. 子レコードのDML操作でエラーが発生した場合、catchステートメントで親レコードを削除する。 - これは手動でのロールバックの試みであり、安全ではありません。もし親レコードを削除するDML操作が（別のトリガなどによって）失敗した場合、データが不整合な状態（親のみが存在する）で残ってしまいます。\nC. データベースのセーブポイントを設定し、エラーが発生した場合にロールバックする。 - 正解です。これは、複数のDML操作を1つの論理トランザクションとして扱うための正しい方法です。親レコードを挿入した後に Database.setSavepoint() を設定し、子の挿入が失敗した catch ブロック内で Database.rollback() を呼び出すことで、親の挿入操作を安全に取り消すことができます。\nD. 子レコードでエラーが発生した場合、親レコードで addError() を使用する。 - addError() はDML操作を失敗させるために使用されますが、この catch ブロックが実行される時点では、親レコードの挿入は既に完了しています。catch ブロック内で addError() を使用しても、既にコミットされた親レコードの挿入を取り消すことはできません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 367, "q": "あるソフトウェア会社が、ソフトウェアのバグを追跡するためにカスタムオブジェクト Defect__c を使用しています。Defect__c の組織の共有設定は非公開に設定されています。各 Defect__c には Reviewer__c レコードの関連リストがあり、それぞれに User への参照項目があります。これは、そのユーザが Defect__c をレビューすることを示すために使用されます。Reviewer__c レコード上のユーザに、その Reviewer__c レコード（が関連する） Defect__c レコードへの参照のみアクセス権を付与するには、何を使用すべきですか？", "choices": ["A. Apexによる管理共有", "B. 条件に基づく共有", "C. Lightning Webコンポーネント", "D. Defect__cに対する「すべて表示」"], "answer": ["A"], "category": "上級デベロッパーの基本", "explanation": "A. 正解です。組織の共有設定（OWD）が非公開の場合、レコードへのアクセス権は制限されます。Reviewer__c レコードの参照項目で指定された特定のユーザに、親である Defect__c レコードへのアクセス権を動的に付与するには、Apex（通常はトリガ）を使用して共有レコード（Defect__Share）をプログラムで作成するのが唯一の柔軟な方法です。\nB. 条件に基づく共有ルールは、レコードの項目値に基づいて、公開グループ や ロール に対してアクセス権を付与します。参照項目で指定された 特定のユーザ に対して直接共有することはできません。\nC. Lightning Webコンポーネントはユーザインターフェースを構築するための技術であり、レコードの共有やアクセス権を管理するバックエンドのセキュリティ機能ではありません。\nD. Defect__c に対する「すべて表示」 - この権限をユーザ（のプロファイルや権限セット）に付与すると、そのユーザは すべて の Defect__c レコードを参照できてしまいます。要件は、レビュー担当として割り当てられた 特定 のレコードのみを参照できるようにすることです。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 368, "q": "Visualforceページ内のカスタムデータテーブルの描画時間が遅いというユーザからの苦情があります。このテーブルは一度に数千件の取引先レコードを読み込んでいます。開発者はこれらの問題を軽減するために何をすべきですか？", "choices": ["A. JavaScript Remotingを使用して取引先をクエリする", "B. 取引先レコードをクエリする際にtransientキーワードを使用する", "C. サードパーティのデータテーブルライブラリを静的リソースとしてアップロードする", "D. 標準の取引先リストコントローラを使用しページネーションを実装する"], "answer": ["D"], "category": "パフォーマンス", "explanation": "A. JavaScript Remotingは、ビューステートを使用せずにサーバから非同期でデータを取得する方法です。ページの初期ロードは速くなるかもしれませんが、一度に数千件のデータを取得してクライアント側でテーブルを描画する根本的なパフォーマンスの問題は解決しません。\nB. 取引先レコードをクエリする際にApexコードで transient キーワードを使用する。 - transient キーワードは、変数をビューステートに保存しないようにするために使用されます。これはビューステートのサイズを削減するのに役立ちますが、数千件のレコードをクエリしてページに描画することによる初期ロードの遅延を直接解決するものではありません。\nC. ライブラリをアップロードするだけでは、パフォーマンスの問題は解決しません。どのようなライブラリかにもよりますが、根本的な原因は一度にロードするデータ量が多すぎることです。\nD. 標準の取引先リストコントローラを使用し、ページネーションを実装する。 - 正解です。一度に数千件のレコードをすべて読み込むのではなく、ページネーション（例: 1ページあたり50件ずつ表示）を実装することが、この問題に対するベストプラクティスです。標準リストコントローラには、ページネーション機能が組み込まれており、これを活用することで、一度に処理するデータ量を大幅に削減し、描画時間を劇的に改善できます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 369, "q": "開発者がアプリケーションイベントを作成したところ、無限ループを引き起こしました。何がこの問題を引き起こした可能性がありますか？", "choices": ["A. イベントがカスタムレンダラから発行された", "B. イベントがプロジェクト内で複数のハンドラを登録している", "C. イベントハンドラがトリガを呼び出す", "D. イベントが'ontouchend'で発行され未処理である"], "answer": ["B"], "category": "ユーザインターフェース", "explanation": "A. カスタムレンダラ（Auraコンポーネントのライフサイクルの一部）からイベントを発行すること自体は、無限ループの直接的な原因ではありません。\nB. 正解です。これはAuraコンポーネントのアプリケーションイベントで発生しうる問題です。無限ループは、イベントを処理（ハンドル）するロジックが、その結果として（直接または間接的に）再度同じイベントを発行してしまう場合に発生します。複数のハンドラが存在すると、コンポーネント間が相互にイベントを発行しあい、このような循環的なロジック（ループ）が発生する可能性が高まります。\nC. イベントハンドラ（クライアントサイド）がサーバサイドのApex（トリガ）を呼び出すことは、クライアントサイドのイベントループとは直接関係ありません。\nD. イベントが 'ontouchend' で発行され、未処理である。 - ontouchend はタッチイベントに関連するもので、無限ループとは無関係です。また、イベントが「未処理（unhandled）」であれば、何も実行されないためループは発生しません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 370, "q": "開発者は、商談のフェーズが変更された回数を追跡する既存の機能に取り組んでいます。商談のフェーズが変更されると、ワークフロールールが起動して項目の値を1増やします。開発者は、項目が4から5に変更されたときに子レコードを作成するafterトリガを作成しました。あるユーザが商談のフェーズを変更し、手動でカウント項目を4に設定しました。カウント項目は5に更新されますが、子レコードは作成されません。これはなぜですか？", "choices": ["A. Trigger.oldにはカウント項目の更新された値が含まれていない", "B. afterトリガはワークフロールールより先に起動する", "C. Trigger.newは項目更新の後では変更されない", "D. afterトリガは項目更新の後では起動されない"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. Trigger.old には、カウント項目の更新された値が含まれていません。 - 正解です。これは実行順序の問題です。ユーザが保存した時点（カウント=4）でトリガの1回目の実行（Pass 1）が起動します。この時、Trigger.old はユーザが変更する 前 の値（例: 3）を保持しています。開発者のロジック（4から5への変更を検知）は、Trigger.old が4であることを期待していますが、そうではないため失敗します。\nB. afterトリガはワークフロールールより先に起動します。 - この記述は正しく、問題の根本的な原因です。トリガ（Pass 1）がワークフロールール（項目を5に更新する）の 前 に実行されるため、トリガは期待するデータ（4から5への変更）を検知できません。\nC. Trigger.new は項目更新の後では変更されません。 - これは間違いです。ワークフローによる項目更新（4から5へ）は、2回目のトリガ実行（Pass 2）を引き起こし、その際 Trigger.new は更新後の値（5）を保持します。\nD. afterトリガは項目更新の後では起動されません。 - これも間違いです。ワークフロールールによる項目更新は、afterトリガを再度（Pass 2として）起動させます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 371, "q": "開発者は、商談が成約されるたびに、商談の取引先にあるカスタムの最終販売日項目を更新する商談トリガーを作成しました。このトリガーのテストクラスで、最終販売日項目を検証するアサーションが失敗します。アサーションが失敗する原因として何が考えられますか？", "choices": ["A. テストクラスがテストデータ挿入時に取引先の所有者を定義していない", "B. テストクラスがseeAllData=trueを実装していない", "C. テストクラスが商談更新後に取引先レコードを再クエリしていない", "D. テストクラスがSystem.runAs()を使用していない"], "answer": ["C"], "category": "テスト、デバッグ、リリース", "explanation": "A. テストクラスが、テストデータ挿入時に取引先の所有者を定義していない。 - 取引先の所有者が未定義であっても、トリガーの実行自体には通常影響しません。テストデータ（取引先）の挿入が成功していれば、これがアサーション失敗の直接的な原因である可能性は低いです。\nB. テストクラスが、テストメソッドで seealldata=true を実装していない。 - テストメソッドはデフォルトで組織の既存データにアクセスせず、テスト内で作成されたデータのみを使用します。seealldata=true の有無は、トリガーによって更新された値がテストメソッドの変数に反映されるかどうかとは無関係です。\nC. テストクラスが、商談の更新後に取引先レコードを再クエリ（再取得）していない。 - 正解です。トリガーはデータベース上の取引先レコードを更新しますが、テストメソッドがDML操作（商談の更新）の前にメモリ上に保持していた取引先変数の情報は古いままです。トリガーによる変更を確認するためには、DML操作の後に再度SOQLクエリを実行し、データベースから最新の取引先レコードを取得してアサーションを行う必要があります。\nD. テストクラスが、Salesforce管理者としてテストを実行するために System.runAs() を使用していない。 - System.runAs() は、特定のユーザー（管理者や特定のプロファイルを持つユーザーなど）のコンテキストでコードの実行をテストするために使用されます。テストはデフォルトでシステムモード（全データアクセス可能）で実行されるため、このアサーション失敗の原因ではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 372, "q": "ある企業には、複数の大規模なデータベース操作とWebサービスコールアウトを行うApexプロセスがあります。データベース処理とWebサービスは実行に時間がかかり、かつ順次実行する必要があります。開発者がガバナ制限とシステム制限に抵触せずにこのApexコードを記述するには、どうすればよいですか？", "choices": ["A. Queueable Apexを使用してジョブを順次実行するようにチェーンする", "B. Apexスケジューラを使用して各プロセスをスケジュールする", "C. 各プロセスとコールアウトに複数の@futureメソッドを使用する", "D. Limitsクラスを使用してガバナ制限に達したらプロセス全体を停止する"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. Queueable Apexを使用して、ジョブを順次実行するようにチェーン（連結）します。 - 正解です。Queueable Apexは非同期処理であり、1つのジョブのexecuteメソッド内から次のQueueableジョブをSystem.enqueueJobで呼び出すことができます。これにより、各処理が独立したガバナ制限のセット内で実行され、大規模な処理を順次連結（チェーン）する要件を満たせます。\nB. Apexスケジューラを使用して各プロセスをスケジュールします。 - Apexスケジューラは、特定の時刻（例：毎日午前3時）にジョブを実行するために使用されます。前のジョブが完了した直後に次のジョブを開始する、という動的な順次実行の制御には適していません。\nC. 各プロセスとコールアウトに複数の @future メソッドを使用します。 - @future メソッドは非同期処理やコールアウトに役立ちますが、@future メソッドから別の @future メソッドを呼び出すことはできないため、複数のプロセスを順次実行するチェーンには適していません。\nD. Limitsクラスを使用して、ガバナ制限に達したらプロセス全体を停止します。 - Limitsクラスは、現在のトランザクションで消費されているガバナ制限（発行されたSOQLクエリの数など）を確認するために使用されます。ガバナ制限に達するのを回避するためのアーキテクチャではなく、また、制限に達したときにプロセスを停止する機能も持ちません（制限を超えるとシステムが例外をスローします）。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 373, "q": "ある開発者が、フロントデスクのキオスクでゲストが到着時に自己登録するためのAuraコンポーネントを作成しました。次に、開発者は、ゲストがフロントデスクに到着するたびにユーザーに警告（アラート）するためのコンポーネントをユーティリティトレイに作成する必要があります。何を使用すべきでしょうか？", "choices": ["A. DML操作", "B. 変更ログ", "C. アプリケーションイベント", "D. コンポーネントイベント"], "answer": ["C"], "category": "ユーザインターフェース", "explanation": "A. DML操作は、データベース内のレコードを挿入、更新、削除、または復元するための操作です。コンポーネント間の通信メカニズムではありません。\nB. 変更ログは、通常、システムやデータの変更履歴を記録するものであり、Auraコンポーネント間のリアルタイムな通信には使用されません。\nC. 正解です。アプリケーションイベントは、パブリッシュ/サブスクライブモデル（発行/購読モデル）に従います。イベントを発行すると、そのイベントを処理するように登録されているすべてのコンポーネントにブロードキャストされます。今回のケースのように、直接の親子関係にない（または階層的に離れている）コンポーネント間（キオスクのコンポーネントとユーティリティトレイのコンポーネント）で通信する場合に適しています。\nD. コンポーネントイベントは、コンポーネント階層を上方向（親コンポーネント）に伝播（バブル）します。主に子コンポーネントから親コンポーネントへの通信に使用されます。今回のシナリオでは、2つのコンポーネントが直接の親子関係にあるとは限らないため、アプリケーションイベントの方が適切です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 374, "q": "Universal Containersは、外部のJavaScriptとC55ファイルを含める必要があるVisualforceページを開発しています。彼らはページの効率的な読み込みとキャッシュを確実にしたいと考えています。この目標を達成するために、どの機能を利用すべきでしょうか？", "choices": ["A. ActionFunction", "B. PageBlockTable", "C. 静的リソース", "D. RemoteAction"], "answer": ["C"], "category": "ユーザインターフェース", "explanation": "A. ActionFunctionは、JavaScriptからコントローラのApexメソッドをAJAXリクエストで呼び出すために使用されるVisualforceコンポーネントです。ファイルのインクルードや効率的な読み込み・キャッシュには関係ありません。\nB. PageBlockTableは、データのリスト（レコードのリストなど）を表形式で表示するために使用されるVisualforceコンポーネントです。ファイルのインクルードには使用されません。\nC. 正解です。静的リソースは、JavaScriptファイル、CSSファイル、画像などのコンテンツをSalesforceにアップロードし、Visualforceページから参照するための機能です。静的リソースはSalesforceプラットフォームによって最適化され、ブラウザでのキャッシュが促進されるため、効率的な読み込みが実現します。\nD. RemoteAction (通常 @RemoteAction アノテーションを指します) は、VisualforceページのJavaScriptからApexメソッドを直接呼び出す（JavaScript Remoting）ために使用されます。ファイルのインクルードやキャッシュ管理には使用されません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 375, "q": "ある開発者は、関連する商談が高額とみなされた場合に取引先の評価を更新する商談トリガを作成しました。現在、商談が高額とみなされる基準は、金額が$1,000,000以上であることです。しかし、この基準値は時間とともに変更される可能性があります。高額な商談をLightning Webコンポーネントにも表示するという新しい要件があります。開発者がこれらのビジネス要件を満たし、さらに高額な商談を取得するビジネスロジックが複数の場所で繰り返されるのを防ぐためには、どの2つのアクションを実行すべきでしょうか？ 2つの答えを選んでください。", "choices": ["A. LWCからトリガを呼び出す", "B. 高額な商談を取得するヘルパークラスを作成する", "C. 効率化のためビジネスロジックのコードをトリガ内に残す", "D. カスタムメタデータを使用して高額な金額を保持する"], "answer": ["B", "D"], "category": "ロジックとプロセスの自動化", "explanation": "A. Lightning Webコンポーネントからトリガを呼び出す。 - Lightning Webコンポーネントから直接Apexトリガを呼び出すことはできません。トリガはデータベースのDML操作（挿入、更新など）によって自動的に起動されます。コンポーネントはデータを取得するために、@AuraEnabledアノテーションが付いたApexメソッドを呼び出す必要があります。\nB. 正解です。ビジネスロジック（高額な商談を特定する条件など）をトリガ本体から分離し、独立したヘルパークラスに配置することはApexのベストプラクティスです。これにより、トリガとLightning Webコンポーネントの両方からこの共通ロジックを呼び出して再利用でき、コードの重複を防ぎ、保守性を高めることができます。\nC. 効率化のため、ビジネスロジックのコードをトリガ内に残す。 - このアプローチでは、Lightning Webコンポーネントが同じロジックを再利用できません。コンポーネント側で同じ基準（高額な商談の定義）を再度実装する必要があり、結果としてコードが重複し、将来の変更が困難になります。\nD. 正解です。高額商談の基準値（$1,000,000）は変更される可能性があるため、この値をApexコード内に直接書き込む（ハードコーディングする）べきではありません。カスタムメタデータ型を使用してこの値を保存することで、管理者がコードを変更せずに基準値を更新でき、Apexクラス（ヘルパークラス）からこの値を動的に参照できるため、柔軟性と保守性が大幅に向上します。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 376, "q": "開発者が動作するビジネスロジックコードを持っていますが、テストクラスで次のエラーが表示されます: 「未コミットの作業が保留中です。コールアウトを実行する前にコミットまたはロールバックしてください。」 解決策として考えられるものは何ですか？", "choices": ["A. 外部コードのエラーである可能性が高いためサポートに問い合わせる", "B. コールアウトの前にTest.isRunningTestを使ってバイパスする", "C. テストクラスの先頭でseeAllDataをtrueに設定する", "D. @TestVisibleをコールアウトに設定してビジネスロジックとテストクラスを書き直す"], "answer": ["C"], "category": "テスト、デバッグ、リリース", "explanation": "A. 外部コードのエラーである可能性が高いため、対象のエンドポイントについてサポートに問い合わせる。 - このエラーは外部システムの問題ではなく、「未コミットの作業」（DML操作）と同じトランザクション内で外部コールアウトを実行しようとしたときに発生する、Salesforceプラットフォーム内部のトランザクション制御エラーです。\nB. コールアウトの前に mast. T=RunningTes={} を使用して、テスト実行時にそれをバイパスする。 - 選択肢の構文は不明瞭ですが、Test.isRunningTest() を使ってコールアウトをバイパスすることを意図している可能性があります。しかし、コールアウトをバイパスすることは、そのロジックをテストしないことであり、エラーの根本的な解決策ではありません。\nC. 実際にはコードが失敗しないため、テストクラスの先頭で seeAllData を true に設定する。 - 正解です。このエラーは、テストデータを準備するためのDML操作（INSERTなど）の後にコールアウトが実行されるために発生します。@isTest(seeAllData=true) を設定すると、テストクラスは組織の既存データにアクセスできます。これにより、テストデータを DML で作成する必要がなくなり、「未コミットの作業」が発生しなくなるため、エラーを回避できる可能性があります。ただし、これはベストプラクティスとは見なされていません。\nD. @TestVisible をコールアウトに設定して、ビジネスロジックとテストクラスを書き直す。 - @TestVisible アノテーションは、privateなクラスメンバー（メソッドや変数）をテストコードからアクセス可能にするために使用されます。コールアウトのトランザクションエラーとは全く関係ありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 377, "q": "Universal Containersは、外部REST APIとの頻繁なやり取りを必要とするSalesforceアプリケーションを開発しています。コードの重複を避け、保守性を向上させるために、コードを再利用するためのAPI連携をどのように実装すべきですか？", "choices": ["A. APIエンドポイントごとに別々のApexクラスを使用して連携ロジックをカプセル化する", "B. それを必要とする各ApexクラスにAPI連携コードを直接含める", "C. API連携のための再利用可能なApexクラスを作成し関連するApexクラスからそれを呼び出す", "D. API連携コードを静的リソースとして保存し各Apexクラスでそれを参照する"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "A. APIエンドポイントごとに別々のApexクラスを使用して、連携ロジックをカプセル化する。 - エンドポイントごとにクラスを分けることはロジックをカプセル化しますが、複数のエンドポイントで共通のロジック（認証、エラー処理など）が必要な場合、コードの重複が発生する可能性があり、再利用性としては最適ではありません。\nB. このアプローチは、問題文で避けたいとされている「コードの重複」をまさに引き起こします。保守性が著しく低下し、APIの仕様変更があった場合に多くのクラスを修正する必要があります。\nC. API連携のための再利用可能なApexクラスを作成し、関連するApexクラスからそれを呼び出す。 - 正解です。これはApexのベストプラクティスであり、サービスレイヤー設計の一環です。共通のAPIコールアウトロジック（認証、リクエスト構築、レスポンス処理、エラーハンドリングなど）を単一のクラスに集約し、他のクラスがそのクラスのメソッドを呼び出すことで、コードの再利用性を最大化し、保守性を劇的に向上させます。\nD. API連携コードを静的リソースとして保存し、各Apexクラスでそれを参照する。 - 静的リソースは、Apexコードではなく、JavaScriptファイル、画像、CSSなどの静的ファイルを保存するためのものです。Apexコードを静的リソースに保存して実行することは、標準的な開発方法ではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 378, "q": "開発者は、取引先責任者および Survey Response c というカスタムオブジェクトにシステム入力されるメールアドレスが、ブロック対象ドメインのリストに属していないことを保証するタスクを負っています。ブロック対象ドメインのリストは、ユーザーによるメンテナンスを容易にするためにカスタムオブジェクトに保存されています。Survey Response c オブジェクトは、カスタムVisualforceページを介して入力されます。これを実装するための最適な方法は何ですか？", "choices": ["A. 取引先責任者とSurvey_Response__cの入力規則にロジックを実装する", "B. 取引先責任者トリガとVFページコントローラから呼び出されるヘルパークラスにロジックを実装する", "C. 取引先責任者トリガとコントローラ内にもロジックを実装する", "D. カスタムVFページコントローラにロジックを実装し取引先責任者トリガからそのメソッドを呼び出す"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "A. 取引先責任者オブジェクトと Survey Response_c オブジェクトの入力規則でロジックを実装する。 - 入力規則は、他のオブジェクト（この場合はブロック対象ドメインのカスタムオブジェクト）のレコードをクエリして検証ロジックを実行することができません。そのため、この要件は入力規則では実現不可能です。\nB. 取引先責任者に関するApexトリガとカスタムVisualforceページコントローラから呼び出されるヘルパークラスにロジックを実装する。 - 正解です。ドメイン検証ロジック（カスタムオブジェクトへのクエリを含む）を単一のヘルパークラスに集約するのが最適です。このヘルパークラスのメソッドを、取引先責任者トリガ（DML操作を捕捉）とVisualforceページコントローラ（UIからの保存操作を捕捉）の両方から呼び出します。これにより、ロジックが中央集権化され、コードの重複が避けられ、保守性が向上します。\nC. 取引先責任者に関するApexトリガでロジックを実装し、さらにカスタムVisualforceページコントローラ内にもロジックを実装する。 - このアプローチは、同じ検証ロジックを2つの異なる場所（トリガとコントローラ）に重複して記述することを意味します。これは保守性を著しく低下させ、将来ロジックの変更が必要になった場合にエラーを引き起こす可能性があるため、最適ではありません。\nD. カスタムVisualforceページコントローラにロジックを実装し、取引先責任者に関するApexトリガからそのメソッドを呼び出す。 - Apexトリガ（サーバサイドのデータベースイベント）が、Visualforceページコントローラ（通常UIセッションに関連付けられる）のメソッドを直接呼び出すのは、標準的な設計パターンではありません。ロジックは、両方から呼び出し可能な独立したヘルパークラスに配置すべきです。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 379, "q": "このコードを最適化するために、開発者が実装すべき2つのベストプラクティスはどれですか？ 2つの答えを選んでください。", "choices": ["A. トリガのコンテキストをafter update、after insertに変更する", "B. DMLステートメントを削除する", "C. DMLステートメントにコレクション（リスト）を使用する", "D. ループの外でDriving-Structure__cレコードをクエリする"], "answer": ["C", "D"], "category": "ロジックとプロセスの自動化", "explanation": "この問題は、提示されたコードがApexのガバナ制限に違反する非効率なパターンを含んでいることを前提としています。正解の選択肢から、そのコードにはループ内にSOQLクエリとDMLステートメントが含まれていると推測されます。\nA. トリガのコンテキストを after update, after insert に変更する。 - トリガの実行コンテキスト（beforeまたはafter）の変更は、コードの実行タイミングに関わるものであり、ループ処理に関する最適化（一括処理）とは別の問題です。ループ内の非効率な操作の問題は解決しません。\nB. DML操作（データの挿入、更新、削除）がビジネスロジックの要件である場合、それを削除することは解決策になりません。問題はDML操作の存在そのものではなく、それがループ内で非効率に実行されていることです。\nC. 正解です。これは、元のコードがループ内でDML操作（例：update record;）を1件ずつ実行していることを示唆しています。ベストプラクティスは、処理対象のレコードをループ内でリスト（コレクション）に追加し、ループが終了した後にそのリストに対して1回だけDML操作を実行することです。これにより、DMLステートメントの上限（通常150回）に達するのを防ぎます。\nD. ループの外で Driving-Structure_C レコードをクエリする。 - 正解です。これは、元のコードがループ内でSOQLクエリを1件ずつ実行している（SOQL in Loop）ことを示唆しています。これはSOQLクエリの上限（通常100回）にすぐに達してしまうため、最も避けるべきパターンの一つです。ベストプラクティスは、ループの前に1回のSOQLクエリで必要なデータをすべて取得し、Mapなどを使ってループ内で効率的にアクセスすることです。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 380, "q": "開発者は、Lightning Webコンポーネントのスタイルと動作を制御するための変数を保存する必要があります。変数が本番環境とすべてのSandboxの両方でテスト可能であることを保証するために、どの機能を使用できますか？", "choices": ["A. カスタム設定", "B. カスタムオブジェクト", "C. カスタム変数", "D. カスタムメタデータ"], "answer": ["D"], "category": "上級デベロッパーの基本", "explanation": "A. カスタム設定はアプリケーションの構成データを保存するために使用できますが、これらは「データ」として扱われます。そのため、デプロイメント（移行）は可能ですが、カスタムメタデータほどシームレスではなく、主に階層設定やリスト設定として組織のキャッシュデータに利用されます。\nB. カスタムオブジェクトは、取引先や商談のようなビジネスデータを保存するためのものであり、アプリケーションの動作を制御する設定変数を保存する目的には適していません。デプロイも「データ」の移行として扱う必要があります。\nC. 「カスタム変数」は、Salesforceにおいて設定を環境間で移行するための特定の機能ではありません。これはApexやJavaScriptコード内で定義される一般的なプログラミング用語です。\nD. 正解です。カスタムメタデータ型は「メタデータ」として扱われます。これは、ApexクラスやLightningコンポーネント自体と同様に、変更セットやメタデータAPIを通じて、Sandboxから本番環境へシームレスにデプロイ（移行）できることを意味します。これにより、すべての環境で一貫した設定値が利用可能であることが保証され、テストが容易になります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 381, "q": "Salesforce組織でプラットフォームイベントが定義された後、どのメカニズムを介してイベントを公開（パブリッシュ）できますか？", "choices": ["A. 外部アプリケーションはAPIを使用してイベントメッセージを公開する", "B. 内部アプリケーションはエンタイトルメントプロセスを使用できる", "C. 外部アプリケーションは標準のストリーミングAPIを必要とする", "D. 内部アプリケーションはアウトバウンドメッセージを使用できる"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. 正解です。外部アプリケーションは、SalesforceのAPI（REST API、SOAP API、Pub/Sub APIなど）を利用して、Salesforce組織に対してプラットフォームイベントメッセージを公開（作成）することが可能です。\nB. エンタイトルメントプロセスは、主にケース管理においてサービスレベル契約（SLA）を追跡・適用するための機能であり、プラットフォームイベントを公開するメカニズムではありません。\nC. ストリーミングAPIは、プラットフォームイベントや変更データキャプチャなどのイベントを 購読（受信）するために主に使用されます。イベントの 公開（送信）には、標準のデータ操作API（REST/SOAP）やPub/Sub APIが使われます。\nD. アウトバウンドメッセージは、Salesforceから外部システムへSOAPメッセージを送信するための宣言的な機能です。Salesforce内部のプラットフォームイベントを公開するためには使用されません。内部的な公開はApex、Flow、またはProcess Builderを介して行われます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 382, "q": "アウトバウンドメッセージの代わりに、開発者がApexコールアウトを使用する必要があるシナリオはどれですか？", "choices": ["A. 対象システムがREST APIを使用している", "B. 対象システムがSOAP APIを使用している", "C. コールアウトが非同期である必要がある", "D. コールアウトがフローから呼び出される必要がある"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. 正解です。アウトバウンドメッセージは、SOAP API（XMLベース）のメッセージのみをサポートしています。対象システムがREST API（JSONベース）のような異なる形式を必要とする場合、カスタムリクエストを構築して送信するためにApexコールアウトが必要になります。\nB. アウトバウンドメッセージは、まさにSOAP APIと連携するように設計されています。対象システムがSOAPを使用する場合、アウトバウンドメッセージは宣言的な（コード不要な）選択肢として利用可能です。\nC. アウトバウンドメッセージは本質的に非同期です。メッセージをキューに入れ、エンドポイントが利用できない場合は再試行します。Apexコールアウトも非同期（@futureメソッドやQueueable Apexの使用など）にできますが、非同期性自体はアウトバウンドメッセージの特徴でもあります。\nD. アウトバウンドメッセージ（フローのアクションとして）とApexコールアウト（Apexアクション経由）は、両方ともフローから呼び出すことができます。この要件は、アウトバウンドメッセージではなくApexコールアウトの使用を強制するものではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 383, "q": "開発者が開発SandboxでVisualforceページを作成しテストしましたが、本番環境で使用するとユーザがビューステートエラーに遭遇するという報告を現在受けています。これらのエラーを修正するために、開発者は何を確実に行うべきですか？", "choices": ["A. クエリがガバナ制限を超えないようにする", "B. プロパティがprivateとしてマークされていることを確認する", "C. 変数がtransientとしてマークされていることを確認する", "D. プロファイルがVisualforceページにアクセスできることを確認する"], "answer": ["C"], "category": "パフォーマンス", "explanation": "A. SOQLクエリがガバナ制限を超えた場合、ビューステートエラーではなく、通常 LimitException がスローされます。これは問題の原因とは異なります。\nB. プロパティが private としてマークされていることを確認する。 - private キーワードは、変数のアクセス可視性をクラス内に制限するものですが、その変数がビューステートに保存されるかどうかには影響しません。\nC. 変数が transient としてマークされていることを確認する。 - 正解です。ビューステートエラーは、ページのビューステート（コントローラの変数など）のサイズがSalesforceの上限（170KB）を超えたときに発生します。transient キーワードを変数に付与すると、その変数はビューステートの一部として保存されなくなるため、ビューステートのサイズを削減できます。本番環境のデータ量がSandboxより多いために、このエラーが発生することがよくあります。\nD. ユーザがページへのアクセス権を持っていない場合、「権限がありません」というエラーが表示されます。これは、ページの利用中に発生するビューステートエラーとは異なります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 384, "q": "部分的なページ更新を実行するためにAjaxの動作を開始するのに使用できるVisualforceコンポーネントはどれですか？ 3つの答えを選んでください。", "choices": ["A. apex:commandLink", "B. apex:commandButton", "C. apex:form", "D. apex:actionsStatus", "E. apex:actionSupport"], "answer": ["A", "B", "E"], "category": "ユーザインターフェース", "explanation": "A. 正解です。このコンポーネントはHTMLのリンクを生成します。reRender 属性を設定することで、クリック時にページ全体の更新ではなく、Ajaxリクエスト（部分的なページ更新）を開始するように設定できます。\nB. 正解です。このコンポーネントはHTMLのボタンを生成します。apex:commandLink と同様に、reRender 属性を設定することで、クリック時にAjaxリクエストを開始できます。\nC. apex:form は、入力項目やコマンドコンポーネントを囲むコンテナです。フォーム送信の範囲を定義しますが、それ自体がAjaxの動作を「開始」するわけではありません。フォーム内のボタンやリンクがアクションを開始します。\nD. このコンポーネントは、Ajaxリクエストの状態（例：「読み込み中...」）を 表示 するために使用されます。リクエストを開始する機能はなく、リクエスト中の視覚的なフィードバックを提供します。\nE. 正解です。このコンポーネントは、標準ではAjax機能を持たない他のVisualforceコンポーネント（例：apex:inputText）にAjaxサポートを 追加 するために特別に設計されています。特定のイベント（例：onchange）でAjaxリクエストをトリガするように設定できます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 385, "q": "開発者が、外部システムに対して複数のコールアウトを行うApexクラスを作成しました。これらのコールアウトで使用されるURLが頻繁に変更される場合、Apexクラスへの変更を最小限に抑えるために、開発者はどの機能を使用すべきですか？", "choices": ["A. セッションID", "B. 接続アプリケーション", "C. 指定ログイン情報", "D. リモートサイトの設定"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "A. セッションIDは、Salesforceへのログインセッションを識別するためのものです。外部システムのコールアウトURLを管理する機能ではありません。\nB. 接続アプリケーションは、主に外部アプリケーションがSalesforceに接続する際の認証（インバウンド）や、Salesforceからの認証（アウトバウンド）を管理するために使用されます。エンドポイントURLを動的に管理する目的には適していません。\nC. 正解です。指定ログイン情報は、コールアウトのエンドポイントURLと認証情報を一元管理できる機能です。Apexコード内では、ハードコードされたURLの代わりに指定ログイン情報の名前を参照します。URLが頻繁に変更されても、Apexコードを修正することなく、指定ログイン情報の設定を変更するだけで対応できるため、保守性が大幅に向上します。\nD. リモートサイトの設定は、Apexが外部ドメインへコールアウトすることを許可するために必要なセキュリティ設定です。しかし、これ自体はURLをコードから分離する機能は持っておらず、コード内のURLを変更する必要性は残ります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 386, "q": "開発者がAuraコンポーネントに複数のJavaScriptライブラリを効率的に組み込むにはどうすればよいですか？", "choices": ["A. JavaScript Remotingとscriptタグを使用する。", "B. script属性を持つCDNを使用する。", "C. ライブラリを別々のヘルパーファイルに実装する。", "D. 静的リソースから複数のアセットを結合する。"], "answer": ["D"], "category": "ユーザインターフェース", "explanation": "A. JavaScript Remotingは主にVisualforceでApexコントローラメソッドを非同期に呼び出すための機能であり、Auraコンポーネントへのライブラリ組み込み方法ではありません。\nB. <ltng:require> タグを使用してCDNからライブラリを読み込むことは可能ですが、複数のライブラリがある場合、リクエストが分散します。静的リソースにまとめる方が、Salesforceプラットフォーム上でのパフォーマンスと管理の観点から効率的とされています。\nC. ヘルパー（helper.js）は、コンポーネント固有のビジネスロジックやイベントハンドラを記述する場所です。外部の汎用JavaScriptライブラリのコードを直接コピー＆ペーストする場所ではなく、保守性が著しく低下します。\nD. 正解です。複数のJavaScriptライブラリを1つのZIPファイルにまとめ、それを静的リソースとしてアップロードします。Auraコンポーネントでは <ltng:require> タグを使用して、この静的リソース内の特定のファイル（または結合された単一のファイル）を読み込むことができます。これにより、サーバへのリクエスト回数を最小限に抑え、読み込みパフォーマンスを効率化できます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 387, "q": "ある会社のサポートプロセスでは、ケースが「修正不可」のステータスでクローズされるたびに、Engineering Reviewカスタムオブジェクトレコードを作成し、そのケース、取引先責任者、およびケースに関連する製品の情報を入力する必要があると定められています。Apexトリガを使用してこれを自動化する正しい方法は何ですか？", "choices": ["A. Engineering Reviewレコードを作成して挿入する、ケースの after update トリガ。", "B. Engineering Reviewレコードを作成して挿入する、ケースの after upsert トリガ。", "C. Engineering Reviewレコードを作成して挿入する、ケースの before update トリガ。", "D. Engineering Reviewレコードを作成して挿入する、ケースの before upsert トリガ。"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. 正解です。ケースのステータス変更（update）がデータベースに正常に保存された 後 に、別のオブジェクト（Engineering Review）のレコードを作成（insert）するのがこの要件の正しい実装です。after コンテキストにより、ケースの更新が成功したことが保証されます。\nB. after upsert は、レコードが挿入された場合と更新された場合の両方で実行されます。この要件は特にケースが 更新 されてクローズされる場合を対象としているため、after update の方がより正確で適切なコンテキストです。\nC. before update トリガは、トリガ対象のレコード（ケース）がデータベースに保存される 前 に実行されます。このコンテキストで別のオブジェクト（Engineering Review）に対してDML操作（insert）を実行することは、一般的にベストプラクティスではなく、トランザクションの問題を引き起こす可能性があります。\nD. before コンテキストは、Cの解説と同様の理由で不適切です。関連レコードのDML操作は、トリガ対象のレコードが正常に保存された after コンテキストで実行するのが最適です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 388, "q": "ある組織には、1つの取引先には常に1人かつ唯一の取引先責任者をプライマリとしてリストするという要件があります。そのため、1人の取引先責任者を選択すると、他の取引先責任者は選択解除されます。クライアントは、この機能を制御するために、取引先責任者にある 'Is Primary' (プライマリ) というチェックボックスを望んでいます。クライアントはまた、すべての取引先責任者の姓が完全に大文字で保存されることも望んでいます。これらの要件を実装するための最適な方法は何ですか？", "choices": ["A. 「Is Primary」ロジックのために取引先責任者に入力規則を書き、姓のロジックのために取引先責任者に before update トリガを書く。", "B. 「Is Primary」ロジックのために取引先責任者に after update トリガを書き、姓のロジックのために取引先責任者に別の before update トリガを書く。", "C. after update と before update の両方のために取引先責任者に単一のトリガを書き、各ロジックセットを処理するためにヘルパークラスを呼び出す。", "D. 「Is Primary」ロジックのために取引先に after update トリガを書き、姓のロジックのために取引先責任者に before update トリガを書く。"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "A. 入力規則はアクション（他のチェックボックスの選択を解除するなど）を実行できません。保存を停止させることしかできません。要件は他の関連レコードを自動的に更新することであり、入力規則では不可能です。\nB. この方法は機能しますが、取引先責任者オブジェクトに対して2つの異なるトリガ（after update用とbefore update用）を作成することになり、「1オブジェクトにつき1トリガ」というSalesforceのベストプラクティスに違反します。これは最適とは言えません。\nC. 正解です。これは「1オブジェクトにつき1トリガ」のベストプラクティスに従っています。単一のトリガがすべてのコンテキスト（姓のロジックのための before update、プライマリロジックのための after update）を処理し、そのロジックをヘルパークラスに委任することで、クリーンで保守性の高いコードを実現できます。\nD. 「Is Primary」ロジックは、取引先責任者オブジェクトのチェックボックスが変更されることによって発生するため、トリガは取引先オブジェクトではなく取引先責任者オブジェクトに配置する必要があります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 389, "q": "Universal Containers (UC) はトランスレーションワークベンチを有効にし、選択リストの値を翻訳しました。UCは取引先オブジェクトに Product__c というカスタム複数選択の選択リスト項目を持っており、営業担当は取引先がどのUC製品を既に持っているかを指定できます。開発者は、Product__c 項目を含む取引先レコードを取得するApexメソッドを作成するよう任されました。開発者が Products__c の値が現在のユーザの言語であることを保証するためには、何をすべきですか？", "choices": ["A. SOQLクエリの項目リストで toLabel(Products__c) を使用する。", "B. SOQL結果リストの各レコードにロケールを設定する。", "C. SOQL結果リストの各レコードで translate メソッドを呼び出す。", "D. SOQLクエリで Locale 句を使用する。"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. 正解です。toLabel() はSOQL関数であり、トランスレーションワークベンチで翻訳が設定されている選択リスト（複数選択を含む）の項目をクエリする際に使用します。これにより、保存されているAPI名ではなく、Apexを実行している現在のユーザの言語に基づいた翻訳済みの表示ラベルが返されます。\nB. このような操作は標準のApexでは提供されていません。SOQLクエリの結果は、クエリの実行方法に基づいてデータを返し、個々のレコードにロケールを設定して翻訳を制御する仕組みはありません。\nC. ApexのsObjectレコードに、SOQLで取得した選択リスト値を翻訳するための translate という標準メソッドは存在しません。\nD. SOQLクエリ構文には、選択リストの翻訳を制御するための Locale 句というものは存在しません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 390, "q": "開発者は、カスタム画面用にVisualforceコンポーネントまたはLightningコンポーネントを作成するかを決定しようとしています。どの機能に関する考慮事項が、最終決定に影響を与えますか？", "choices": ["A. 画面はLightning Experience UIからアクセスできる必要がありますか？", "B. 画面はサードパーティのアプリケーションを使用せずにPDFとしてレンダリングされる必要がありますか？", "C. 画面はJavaScriptフレームワークを利用しますか？", "D. 画面はモバイルアプリケーション経由でアクセスされますか？"], "answer": ["B"], "category": "ユーザインターフェース", "explanation": "A. VisualforceページとLightningコンポーネントは、どちらもLightning Experience UIに表示することが可能です。Visualforceはタブやコンポーネントラッパーを介して、Lightningはネイティブに表示されます。したがって、これは決定的な要因にはなりません。\nB. 正解です。Visualforceは、ページの renderAs=\"pdf\" 属性を使用することで、サードパーティのツールなしに、サーバサイドでコンテンツをPDFとしてネイティブにレンダリングする独自の機能を備えています。Lightningコンポーネントにはこのネイティブ機能がないため、PDFを生成するにはクライアントサイドのJavaScriptライブラリ（サードパーティ）を使用するか、バックグラウンドでVisualforceページを利用するApexを呼び出す必要があります。\nC. Lightningコンポーネント（特にLWC）は、それ自体が最新のJavaScriptフレームワークに基づいています。Visualforceページも、静的リソースを介して外部のJavaScriptフレームワークをインポートして使用することが可能です。\nD. Visualforceページ（モバイル有効化が必要）とLightningコンポーネントは、どちらもSalesforceモバイルアプリケーションからアクセスできます。Lightningの方がモバイル体験には最適化されていますが、アクセス自体は両方とも可能です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 391, "q": "開発者は、機密データを保存し、どのプロファイルやユーザがどの機密データにアクセスできるかを指定できる機能を持つ方法を見つけるよう求められています。このデータを保存するために何を使用すべきですか？", "choices": ["A. system.Cookieクラス", "B. カスタム設定", "C. 静的リソース", "D. カスタムメタデータ"], "answer": ["D"], "category": "上級デベロッパーの基本", "explanation": "A. system.Cookieクラスは、Visualforceページでブラウザのクッキーを管理するためのものです。これはクライアントサイドのストレージであり、サーバサイドの機密データを安全に保存し、プロファイルベースでアクセスを制御する目的には適していません。\nB. カスタム設定はアプリケーションの構成データを保存するために使用されます。階層カスタム設定はプロファイルやユーザごとに異なる値を提供できますが、これは主に設定の上書きのためであり、機密データへのアクセスを厳密に制限（誰が読み取れるかを制御）するためのものではありません。\nC. 静的リソースは、JavaScript、CSS、画像、ZIPファイルなどの静的ファイルを保存するためのものです。機密性の高い個別のデータ（APIキーなど）を保存し、プロファイルやユーザレベルでアクセスを細かく制御する目的には適していません。\nD. 正解です。カスタムメタデータ型は、アプリケーションの構成データを保存する最新の方法です。特に、管理パッケージ内でカスタムメタデータ型を「保護（Protected）」としてマークすると、そのレコードに保存された機密データは、そのパッケージのネームスペース内のApexコードからのみアクセス可能となり、他のユーザやコードから隠蔽されます。これにより、機密データを安全に保存し、アクセスを制御できます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 392, "q": "あるApexトリガは、営業担当者が商談を成立させるたびに、注文レコードを作成します。最近、このトリガが2つの注文を作成しています。開発者がこれをトラブルシューティングするための最適な手法は何ですか？", "choices": ["A. すべてのフローを無効にし、一度に1つずつ再度有効にして、どれがエラーを引き起こしているかを確認する。", "B. ApexトリガのApexテストクラスを実行し、コードがまだ十分なコードカバレッジを持っていることを確認する。", "C. すべての営業担当者に対してデバッグログを設定し、ログを監視してエラーや例外がないか確認する。", "D. コードに system.debug() ステートメントを追加し、開発者コンソールのログを使用してコードをトレースする。"], "answer": ["D"], "category": "テスト、デバッグ、リリース", "explanation": "A. フローが原因である可能性もありますが、本番環境でいきなり全てのフローを無効化するのは影響が大きすぎます。まずは、何が起きているかをログで調査するのが最適な最初のステップです。\nB. コードカバレッジは、コードがテストされている範囲を示すものであり、ランタイムで発生している「レコードが2つ作成される」というロジックの問題をデバッグするのには役立ちません。\nC. デバッグログを設定することは正しいアプローチですが、この問題は「エラーや例外」ではなく、意図しない動作（2件作成）です。そのため、ログを監視するだけでなく、実行のトレースが必要です。\nD. 正解です。トリガが2回呼び出されているのか、またはトリガ内のロジックが2件の注文を作成しているのかを特定するために、system.debug() ステートメントをコードに追加して実行フローを追跡するのが、最も直接的で最適なトラブルシューティング手法です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 393, "q": "ユーザがカスタムLightningコンポーネントを操作しているときに、一般的な「内部サーバエラーが発生しました」というエラーを受け取ります。より意味のあるメッセージを保証するために、開発者は何をすべきですか？", "choices": ["A. tag に onerror イベントハンドラを追加する。", "B. マークアップに error-view コンポーネントを追加する。", "C. エラーを処理するためにプラットフォームイベントを使用する。", "D. try-catchブロックで AuraHandledException を使用する。"], "answer": ["D"], "category": "ユーザインターフェース", "explanation": "A. どのタグかが不明確ですが、これは通常、クライアントサイドのJavaScriptエラーやリソースの読み込みエラーを処理するもので、「内部サーバエラー」（通常はApexサーバサイドエラー）を捕捉して意味のあるメッセージに置き換えるためのものではありません。\nB. error-view という標準のLightningコンポーネントは存在しません。エラーを表示するカスタムコンポーネントを作成することは可能ですが、そのためにはまずサーバから意味のあるエラーメッセージを取得する必要があります。\nC. プラットフォームイベントは非同期のイベント通知メカニズムであり、ユーザの同期操作に対する直接的なエラーレスポンスを処理するのには適していません。\nD. 正解です。Auraコンポーネントから呼び出されるApexメソッド（@AuraEnabled）内でエラーが発生した場合、それを try-catch ブロックで捕捉し、AuraHandledException としてカスタムメッセージを付けてスローすることで、クライアントサイドのコンポーネントは一般的な「内部サーバエラー」ではなく、その特定のメッセージを受け取ることができます。これにより、ユーザに分かりやすいエラー表示が可能になります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 394, "q": "ある会社が最近、組織内の商談に関する情報データグリッドを持つカスタムコントローラを使用したVisualforceページをデプロイしました。ユーザは、特定の条件下で「最大ビューステートサイズ制限」エラーメッセージを受け取ると報告しています。Visualforceのベストプラクティスによると、ビューステートを削減するために開発者が実行すべき3つのアクションはどれですか？ 3つの答えを選んでください。", "choices": ["A. フィルタとページネーションを使用してデータ量を減らす。", "B. 状態を維持する必要のない変数について、Apexコントローラで transient キーワードを使用する。", "C. コントローラ内の変数に private キーワードを使用する。", "D. 変更されない変数について、コントローラで final キーワードを使用する。", "E. ページに関連するデータのみを返すようにSOQLクエリを絞り込む。"], "answer": ["A", "B", "E"], "category": "パフォーマンス", "explanation": "A. 正解です。一度にページに表示（およびコントローラに保持）するレコード数を制限することで、ビューステートに保存されるデータ量が直接的に減少し、エラーを回避できます。\nB. 正解です。transient キーワードを使用すると、その変数はビューステートに保存されなくなります。ポストバック間で値を維持する必要のない一時的な変数や計算結果などに使用することで、ビューステートのサイズを大幅に削減できます。\nC. private キーワードは変数のアクセス可視性を制御するものですが、ビューステートへの保存を防ぐものではありません。private変数もビューステートに含まれます。\nD. final キーワードは変数を定数（再代入不可）にするものですが、ビューステートへの保存には影響しません。\nE. 正解です。ビューステートには、コントローラクラスのメンバ変数が保持するデータが含まれます。SOQLクエリを最適化し、本当に必要な項目やレコードのみを取得するようにすれば、コントローラが保持するデータ量が減り、結果としてビューステートのサイズも削減されます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 395, "q": "開発者は、標準のケース作成画面を、ケースを作成する前にウィザードをユーザーに案内するカスタム画面に置き換えるよう依頼されました。この組織には、Lightning Experienceを実行しているユーザーしかいません。要件を満たすために、開発者はケースの「新規」アクションを何で上書きすべきですか？", "choices": ["A. Lightningページ", "B. Lightningレコードページ", "C. Lightningコンポーネント", "D. Lightning Flow"], "answer": ["D"], "category": "ロジックとプロセスの自動化", "explanation": "A. Lightningページ（アプリケーションページやホームページなど）は、コンポーネントを配置するためのコンテナであり、アクションの上書き対象としてウィザードロジックを直接提供するものではありません。\nB. Lightningレコードページは、既存のレコード（ケースの詳細ページなど）のレイアウトを定義するためのものであり、「新規」アクションのプロセス（ウィザード）を定義するものではありません。\nC. Lightningコンポーネント（AuraまたはLWC）で「新規」アクションを上書きし、カスタムウィザードをコーディングすることは可能ですが、要件である「ウィザード」を実装するための最も効率的なソリューションではありません。\nD. 正解です。Lightning Flow（特にスクリーンフロー）は、複数の画面を遷移する「ウィザード」形式のユーザインターフェースを宣言的に（コードを最小限にして）作成するために設計された最適なツールです。標準の「新規」アクションは、作成したスクリーンフローを起動するように簡単上書きできます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 396, "q": "ある企業には多くの異なるSalesforce組織があり、一部のオブジェクトは異なり、一部のオブジェクトは共通しています。そして、すべての異なる組織にある共通オブジェクトのレコードを作成、取得、更新できる単一のJavaアプリケーションを構築したいと考えています。このアプリケーションはどの連携メソッドを使用すべきですか？", "choices": ["A. パートナーWSDLを使用したSOAP API", "B. Apex REST Webサービス", "C. エンタープライズWSDLを使用したSOAP API", "D. メタデータAPI"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. 正解です。パートナーWSDLは、特定のSalesforce組織のスキーマ（データモデル）に依存しない（型が緩い）ように設計されています。これにより、単一のWSDLから生成されたJavaアプリケーションが、それぞれ異なるカスタムオブジェクトや項目を持つ可能性のある複数のSalesforce組織に接続し、共通のオブジェクトを操作することが可能になります。\nB. Apex REST Webサービスは、外部システムが呼び出すことができるカスタムAPIをSalesforce内に作成する方法です。このシナリオは、外部のJavaアプリケーションがSalesforceを呼び出す側であるため、Salesforceが標準で提供するAPIを利用するのが適切です。\nC. エンタープライズWSDLは、単一の Salesforce組織の特定のスキーマ（すべてのカスタムオブジェクトと項目を含む）に強く結合（型付け）されています。このWSDLで生成されたJavaクライアントは、その特定の組織専用となり、異なるスキーマを持つ他の組織との連携には適していません。\nD. メタデータAPIは、取引先や取引先責任者などのデータレコードを操作するために使用されるものではありません。これは、カスタムオブジェクト、項目、Apexクラス、Visualforceページといった組織のメタデータ（設定やカスタマイズ）を管理（デプロイや取得）するために使用されます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 397, "q": "ある会社には、取引先の名前、Webサイト、従業員数などの取引先レコード情報を取得する必要があるWebページがあります。WebページはSalesforceレコードIDを認識しており、JavaScriptを使用して取引先情報を取得します。どの連携メソッドが最適ですか？", "choices": ["A. Apex SOAP Webサービス", "B. SOAP API", "C. Apex REST Webサービス", "D. REST API"], "answer": ["D"], "category": "ロジックとプロセスの自動化", "explanation": "A. これは、SOAPサービスを公開するためにカスタムApexコードを作成する必要があります。要件がIDを使用して標準オブジェクトのデータを取得するだけの場合、必要以上に複雑です。また、JavaScriptはSOAP/XMLよりもREST/JSONと親和性が高いです。\nB. これは標準のSalesforce APIです。しかし、これはSOAP/XMLに基づいているため、REST/JSONと比較して、クライアントサイドのJavaScriptで扱うのが一般的に複雑（冗長）です。\nC. これは、RESTサービスを公開するためにカスタムApexコードを作成する必要があります。JavaScriptに適したREST/JSONを使用しますが、標準のREST APIが既にレコードを取得できる場合、これは不要なカスタマイズです。\nD. 正解です。標準のSalesforce REST APIは、JavaScript（fetchやAJAXを使用）から簡単に呼び出してレコードデータをJSON形式で取得できるシンプルなエンドポイントを提供します。レコードIDがわかっているため、これが最も直接的で最適な方法です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 398, "q": "ある開発者は、テストの実行に必要なすべてのテストデータの初期設定のために、クラス内のすべてのテストメソッドの実行に長い時間がかかることに気づきました。テストの実行をスピードアップするために、開発者は何をすべきですか？", "choices": ["A. テストデータを作成するメソッドを定義し、@testSetupでアノテーションを付ける。", "B. テストデータを作成するメソッドを定義し、@createDataでアノテーションを付ける。", "C. すべてのテストメソッドでテストデータファクトリが適切に使用されていることを確認する。", "D. クラス内のテストメソッドの量を減らす。"], "answer": ["A"], "category": "テスト、デバッグ、リリース", "explanation": "A. 正解です。@testSetup アノテーションが付いたメソッドは、そのテストクラス内の他のテストメソッドが実行される前に一度だけ呼び出されます。ここで作成されたデータは、クラス内のすべてのテストメソッドからアクセス可能になり、各テストメソッドの実行前にデータベースがこの初期状態にロールバックされます。これにより、各テストメソッドで個別にデータをセットアップするオーバーヘッドがなくなり、テストの実行時間が大幅に短縮されます。\nB. @createData というアノテーションはApexテストフレームワークには存在しません。\nC. テストデータファクトリを使用することは、テストデータの作成を標準化し、保守性を高めるためのベストプラクティスですが、それ自体がテストの実行速度を直接的に最適化するわけではありません。@testSetup メソッド内でファクトリを呼び出すのが最も効率的です。\nD. テストメソッドを減らすことは、テストのカバレッジと品質を低下させることにつながるため、パフォーマンスの問題に対する適切な解決策ではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 399, "q": "開発者がVisualforceページを持っており、保存時に取引先の所有権を自動的にキューに割り当てます。ページは正しく所有権を割り当てているように見えますが、正しい所有権を検証するアサーションが失敗します。何がこの問題を引き起こしている可能性がありますか？", "choices": ["A. テストクラスがデータベースから更新された値を取得していない。", "B. テストクラスがテストデータの読み込みにBulk APIを使用していない。", "C. テストクラスが seeallData=true アノテーションを使用していない。", "D. テストクラスが Queueable インターフェースを実装していない。"], "answer": ["A"], "category": "テスト、デバッグ、リリース", "explanation": "A. 正解です。Visualforceページのコントローラによる保存操作と、テストメソッドの実行は異なるトランザクションコンテキストで発生する可能性があります。テストメソッド内でレコードを作成した後、コントローラの保存メソッドを呼び出しても、テストメソッドがメモリ内に保持している元のレコード変数は自動的に更新されません。アサーションを実行する前に、SOQLクエリを再度実行してデータベースから最新のレコード（所有権が変更されたレコード）を取得し直す必要があります。\nB. Bulk APIは、Salesforceの外部から大量のデータをロードするためのAPIです。Apexの単体テスト内でテストデータを作成するのには使用されず、この問題とは関係ありません。\nC. seeAllData=true は、テストが組織の既存データにアクセスできるようにするもので、ベストプラクティスでは非推奨です。キューは設定データであるためアクセス可能ですが、このアノテーションの有無が、保存操作 後 のレコードの所有権を検証できない直接的な原因ではありません。\nD. Queueableインターフェースは、非同期のApexジョブを実装するためのものです。テストクラス自体がこれを実装する必要はなく、Visualforceページの同期的な保存ロジックのテストとは無関係です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 400, "q": "ユーザから、カスタムLightning Webコンポーネント（LWC）のボタンが、入力したデータを保存しないと報告があります。ボタンはクリックされたように見えますが、LWCは何もしていないかのように、ただそこにあるだけです。エラーメッセージが適切に表示されるようにするために、開発者は何を使用すべきですか？", "choices": ["A. DMLステートメントを囲む try-catch ブロックを追加する。", "B. allOrNone を false に設定した Database メソッドを使用する。", "C. コンポーネントに apex:messages/ タグを追加する。", "D. エラーメッセージを表示するためにJavaScriptとHTMLを追加する。"], "answer": ["D"], "category": "ユーザインターフェース", "explanation": "A. これはApex（サーバサイド）でのエラー処理です。サーバサイドでエラーを捕捉することは重要ですが、それだけではLWCのUI（クライアントサイド）にエラーメッセージは表示されません。\nB. これはApex（サーバサイド）でのDML操作が、一部のレコードが失敗しても他のレコードの処理を続行できるようにするものです。LWCのUIにエラーを表示するという要件とは直接関係ありません。\nC. apex:messages/ はVisualforceのコンポーネントであり、Lightning Webコンポーネントでは使用できません。\nD. 正解です。問題は、LWCがエラーをUIに表示していないことです。解決策は、LWCのHTMLにエラーメッセージを表示するための領域を追加し、JavaScript（例えばApex呼び出しのcatchブロック）でエラーを捕捉し、そのHTML領域にメッセージを表示するロジックを実装することです。", "difficulty": 1, "helpLinks": [], "examTags": []}];
const CATS=["上級デベロッパーの基本", "ロジックとプロセスの自動化", "ユーザインターフェース", "テスト、デバッグ、リリース", "パフォーマンス"]
const CC={"上級デベロッパーの基本": "#7c3aed", "ロジックとプロセスの自動化": "#0891b2", "ユーザインターフェース": "#ea580c", "テスト、デバッグ、リリース": "#059669", "パフォーマンス": "#e11d48"}

// ===== STATE =====
// stats[qid] = { correct: N, wrong: N }  ← 新方式
let stats_rec = {}; // {qid: {correct:0, wrong:0}}
let checks = {};    // {qid: true}
let cur = 1, order = QDATAS.map(q=>q.id), idx = 0, cat = 'all';

// 表示上の統計カウント（計算ベース）
function getStats() {
  let done = 0, ok = 0, ng = 0;
  Object.values(stats_rec).forEach(r => {
    const total = r.correct + r.wrong;
    if(total > 0) { done++; ok += r.correct; ng += r.wrong; }
  });
  return {done, ok, ng};
}

// ===== STORAGE =====
function sv() {
  try { localStorage.setItem('pd_stats', JSON.stringify(stats_rec)); } catch(e) {}
  try { localStorage.setItem('pd_checks', JSON.stringify(checks)); } catch(e) {}
  try { localStorage.setItem('pd_session', JSON.stringify(sessionAnswers)); } catch(e) {}
}

function ld() {
  try {
    const s = localStorage.getItem('pd_stats');
    if(s) stats_rec = JSON.parse(s);
    // 旧形式(af_ans)がある場合マイグレーション
    const old = localStorage.getItem('pd_ans');
    if(old && Object.keys(stats_rec).length === 0) {
      const oldAns = JSON.parse(old);
      Object.entries(oldAns).forEach(([k, v]) => {
        stats_rec[k] = { correct: v.ok ? 1 : 0, wrong: v.ok ? 0 : 1 };
      });
    }
    const c = localStorage.getItem('pd_checks');
    if(c) checks = JSON.parse(c);
    const se = localStorage.getItem('pd_session');
    if(se) sessionAnswers = JSON.parse(se);
  } catch(e) {}
}

function recalc() {
  const s = getStats();
  const tc = document.getElementById('total-count'); if(tc) tc.textContent = QDATAS.length;
  const hc = document.getElementById('header-count'); if(hc) hc.textContent = '全'+QDATAS.length+'問 練習アプリ';
  document.getElementById('s-done').textContent = s.done;
  document.getElementById('s-ok').textContent = s.ok;
  document.getElementById('s-ng').textContent = s.ng;
  document.getElementById('s-pct').textContent = s.done ? Math.round(s.ok/(s.ok+s.ng)*100)+'%' : '—';
  document.getElementById('s-check').textContent = Object.keys(checks).length;
  document.getElementById('pbf').style.width = (order.length > 0 ? (idx + 1) / order.length * 100 : 0) + '%';
  const qsel = document.getElementById('qsel'); if(qsel) qsel.value = cur;
}

// ===== SELECT BOX =====
function buildSel() {
  const s = document.getElementById('qsel');
  s.innerHTML = order.map(id => {
    const r = stats_rec[id]; const total = r ? r.correct + r.wrong : 0;
    const mark = total > 0 ? (stats_rec[id].wrong > 0 ? '✗ ' : '✓ ') : '';
    return `<option value="${id}">${mark}第${id}問</option>`;
  }).join('');
  s.value = cur;
}

// ===== CATEGORIES =====
function buildCats() {
