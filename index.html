をブラウザに送信する", "B.<apex: form> が存在する場合はビューステートを作成する", "C.カスタム コンポーネントのコンストラクタと式を評価する", "D.式、アクション属性、およびメソッド呼び出しを評価する"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "Visualforce ページの GET 要求の実行順序において、コントローラーと拡張機能のコンストラクタの評価の後、次に行われるのはC.カスタム コンポーネントのコンストラクタと式の評価です。\n\nこれは、Visualforceページがロードされるときの標準の動作順序に従っています。まず、関連するコントローラと拡張機能のインスタンスが作成され、その後カスタムコンポーネントが評価されます。これにより、ページの全体的な構造や動作が正しく設定され、表示される内容が適切に評価されます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 156, "q": "@future 非同期 Apex メソッドに適しているユースケースはどれですか? 2つ答えを選択してください", "choices": ["A.開発者には、バッチで実行する必要がある大量のデータを含む長時間実行されるジョブがあります。", "B.開発者は、DML 操作を分離し、混合保存 DML エラーを回避する必要があります。", "C.開発者には実行時間の長いメソッドがあり、Apex トランザクションの遅延を防ぐ必要があります。", "D.開発者には、通常のトランザクションで許可されるよりも大きなクエリ結果を必要とするジョブがあります。"], "answer": ["B", "C"], "category": "ロジックとプロセスの自動化", "explanation": "@future アノテーションは、Apex メソッドを非同期で実行するために使用されます。非同期処理は、リアルタイムでのレスポンスが必要ではない、または処理を後で実行する必要がある場合に役立ちます。以下の2つのユースケースは、@future 非同期 Apex メソッドの典型的な使用例です。\n\nB. 開発者は、DML 操作を分離し、混合保存 DML エラーを回避する必要があります。\n\n@future メソッドを使用することで、異なる種類のオブジェクトに関するDML操作を分離し、混合保存 DML エラーを避けることができます。\n\nC. 開発者には実行時間の長いメソッドがあり、Apex トランザクションの遅延を防ぐ必要があります。\n\n長時間実行される処理を非同期にすることで、ユーザーエクスペリエンスの遅延を最小限に抑えることができます。\n\nそのため、@future 非同期メソッドは、これらの特定のユースケースに適しています。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 157, "q": "SalesforceのApexバッチ処理を実装する際、バッチサイズを指定するために使用するメソッドはどれですか？", "choices": ["A. Database.executeBatch(batchClass, batchSize)", "B. System.scheduleBatch(batchClass, batchSize)", "C. Database.execute(batchClass, batchSize)", "D. System.enqueueJob(batchClass, batchSize)"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. Database.executeBatch(batchClass, batchSize)は、Apexバッチ処理を開始するために使用するメソッドです。第2引数のbatchSizeで、一度に処理するレコードの数を指定できます。\n\nB. System.scheduleBatch(batchClass, batchSize)は、存在しないメソッドです。Apexバッチ処理をスケジュールするには、System.scheduleBatch(batchClass, cronExpression)を使用します。ただし、バッチサイズの指定はDatabase.executeBatch()で行います。\n\nC. Database.execute(batchClass, batchSize)は、存在しないメソッドです。Apexバッチ処理を開始するには、Database.executeBatch()を使用します。\n\nD. System.enqueueJob(batchClass, batchSize)は、存在しないメソッドです。Apexバッチ処理を開始するには、Database.executeBatch()を使用します。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 158, "q": "一度に数千の取引先レコードをロードする Visualforce ページ内のカスタム データ テーブルのレンダリング時間が遅いというユーザーの苦情があります。\nこのような問題を軽減するために、開発者は何ができるでしょうか?", "choices": ["A.標準の取引先 リスト コントローラーを使用し、ページネーションを実装します。", "B.JavaScript Remoting を使用して取引先をクエリします。", "C.Account レコードをクエリするときに、Apex コードで transient キーワードを使用します。", "D.サードパーティのデータ テーブル ライブラリを静的リソースとしてアップロードします。"], "answer": ["C"], "category": "パフォーマンス", "explanation": "C. Account レコードをクエリするときに、Apex コードで transient キーワードを使用します。\n\ntransientキーワードは、変数を一時的としてマークするためのApexのキーワードです。transientとマークされた変数は、ビューステートの一部として保存されません。ビューステートは、サーバとクライアント間で交換される情報のセットであり、ページのPOST要求の間にページの状態を保存するために使用されます。transientキーワードを使用すると、ビューステートのサイズを減少させ、ページのレンダリングとパフォーマンスを向上させることができます。\n\nしたがって、数千の取引先レコードをロードするときに、この変数がビューステートに保存されないようにするためにtransientキーワードを使用すると、ページのレンダリング時間を短縮できます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 159, "q": "Salesforce Lightningコンポーネントにおけるパフォーマンスの最適化について、開発者が採用すべき最良のアプローチは何ですか？以下の選択肢から3つ選んでください。", "choices": ["A. サーバー側のコールを減らすために、クライアント側でのデータ処理を増やします。", "B. サーバーからのデータ取得には、可能な限り@AuraEnabled(cacheable=true)を使用してキャッシュを活用します。", "C. Lightningコンポーネント内で大量のデータを一度にロードするのではなく、ページネーションまたは無限スクロールを実装します。", "D. 静的リソースを使用して、JavaScriptライブラリやCSSファイルをキャッシュし、ロード時間を短縮します。"], "answer": ["B", "C", "D"], "category": "パフォーマンス", "explanation": "A. これは一般的にパフォーマンス最適化の一環として有効なアプローチですが、クライアント側での過度のデータ処理はブラウザのパフォーマンスに悪影響を及ぼす可能性があります。適切なバランスが重要で、この選択肢は一概に最良とは言えません。\n\nB. 正解。このアプローチは、サーバーからのデータ取得時にキャッシュを活用し、不必要なサーバー呼び出しを減らすことでパフォーマンスを向上させる効果的な方法です。\n\nC. 正解。このアプローチにより、初期ロード時のパフォーマンスが向上し、ユーザーに応答性の高いインターフェースを提供できます。大量のデータを一度に処理する必要がなくなるため、システムへの負荷も軽減されます。\n\nD. 正解。静的リソースを利用することで、ブラウザキャッシュのメリットを活かし、同じリソースの再読み込みを防ぎます。これにより、ページのロード時間が短縮され、エンドユーザーの体験が向上します。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 160, "q": "開発者は、次の要件を満たすコードを作成するよう求められています。\n次の入力を受け取ります: Map<ld, Project_c), List<Account>\n外部の Web サービスに対して長時間実行される可能性のあるコールアウトを実行します\nプロセスが正常に実行されたことを確認する方法を提供します\nどの非同期機能を使用する必要がありますか?", "choices": ["A.スケジュール可能なインターフェース", "B.@future (callout=true)", "C.キュー可能インターフェイス", "D.Database.AllowCallouts インターフェイス"], "answer": ["C"], "category": "ユーザインターフェース", "explanation": "C. キュー可能インターフェイス(Queueable Interface)\n\nキュー可能インターフェイスは、@futureメソッドよりも進化した非同期処理を行うためのインターフェイスです。このインターフェイスを使用すると、オブジェクトを渡すことができるので、上記の要件にあるような Map<Id, Project__c> と List<Account> のような複雑なデータ型を引数として使用することが可能です。\n\nキュー可能インターフェイスは、非同期のコールアウトをサポートしています。\n\nさらに、キュー可能ジョブの状態を追跡して、プロセスが正常に完了したかどうかを確認する機能も提供しています。\n\nそのため、提供された要件を満たすためにはキュー可能インターフェイスを使用するのが最適です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 161, "q": "開発者は、トリガ、ワークフロールール、Apex クラス、およびプロセスを含む複雑なアプリケーションを作成しています。\n開発者は、アプリケーションの開発時に実行順序を慎重に検討する必要があります。\n1.トリガー前\n2.トリガー後\n3. 電子メールの送信などのポスト コミット ロジック\n4. データベースにコミットされた DML\n5. ワークフローのルール\n6. 積み上げ集計計算\n\n次の操作はどのような順序で実行されますか?", "choices": ["A.1、2、5、6、4、3", "B.1、5、6、2、4、3", "C.1、2、4、5、6、3", "D.1、6、5、2、4、3"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "Salesforceでのアクションの実行順序は以下の通りです：\n\nトリガー前\n\nトリガー後\n\nワークフロールール\n\n積み上げ集計計算\n\nデータベースにコミットされたDML\n\n電子メールの送信などのポストコミットロジック\n\nこの順序に従って、正しい答えは A.1、2、5、6、4、3 となります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 162, "q": "ビジネス ルールでは、新しい取引先を作成するときに常に取引先責任者を作成する必要があります。\n取引先責任者の作成に失敗した場合に取引先が作成されないようにするためのカスタム画面を開発するときに使用できるものは何ですか?", "choices": ["A.取引先責任者の挿入に失敗した場合は、Database.Delete メソッドを使用します。", "B.allOrNone を False に設定して Database.Insert メソッドを使用します。", "C.取引先責任者の検証ルールを無効にし、トリガーで既定値を設定します。", "D.setSavePoint() と rollback() を try/catch ブロックで使用します。"], "answer": ["D"], "category": "ロジックとプロセスの自動化", "explanation": "SalesforceのApexでのトランザクション制御には、setSavePoint() メソッドと rollback() メソッドがあります。これらは、トランザクションの特定の時点に戻るための「セーブポイント」を設定することができます。\n\nsetSavePoint()はトランザクションの特定の時点を記録するためのセーブポイントを設定し、rollback()はそのセーブポイントまでのすべてのDML操作をロールバック(取り消し)します。\n\nこの問題のシナリオでは、取引先の作成後に取引先責任者の作成に失敗した場合、取引先の作成も取り消す必要があります。このロジックを実装するために、setSavePoint()を使用して取引先を作成する前の状態を記録し、取引先責任者の作成に失敗した場合、rollback()を使用して取引先の作成を取り消すことができます。これをtry/catchブロック内で実装することで、エラーが発生した場合のロジックを制御することができます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 163, "q": "開発者は、取引先に After Update トリガーを作成しました。ワークフロー ルールと項目の更新により、トリガーによって取引先レコードが繰り返し更新されます。開発者は再帰トリガーをどのように処理する必要がありますか?", "choices": ["A.トリガーを無効にし、ロジックをプロセスまたはフローに移動します。", "B.ワークフロー ルールを無効にして、項目の更新が実行されないようにします。", "C.静的変数を使用して、トリガーが複数回実行されないようにします。", "D.グローバル変数を使用して、トリガーが複数回実行されないようにします。"], "answer": ["C"], "category": "テスト、デバッグ、リリース", "explanation": "SalesforceのApexトリガーは、特定の条件下で再帰的に実行される可能性があります。たとえば、トリガーがレコードを更新すると、その更新によって再度トリガーが実行される可能性があります。このような再帰的な実行を防ぐためには、静的変数を使用してトリガーがすでに実行されたかどうかをチェックすることができます。\n\n静的変数は、トリガー実行中のトランザクション全体でその値が保持されるため、トリガーが初めて実行されたときに静的変数を設定して、それに基づいて後続のトリガー実行を防ぐことができます。\n\nしたがって、静的変数を使用して、トリガーが1回のトランザクション中に複数回実行されないように制御することが推奨されます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 164, "q": "<apex:actionPoller> の正しい定義を選択してください。", "choices": ["A.コントローラ メソッドを Javascript から直接呼び出すことができます。<apex:form> タグでカプセル化する必要があります。actionSupport とは異なり、これらの関数 <apex:actionPoller> は Javascript コードから直接呼び出すことができます", "B.AJAX リクエスト (actionFunction/actionSupport/actionPoller) に関連付けることができ、リクエストのステータス (進行中/完了) に応じて条件付きでコンテンツを表示します。「id」項目を使用して名前を指定します。関連するコンポーネントの「ステータス」項目を使用してそれらを接続します", "C.指定した時間間隔に従って AJAX リクエストを送信します。これが再レンダリングされると、リセットされます", "D.AJAX サポートを別のコンポーネントに追加します (例: onClick、onMouseUp、onFocus など)。", "E.AJAX 要求が生成されたときにサーバーによって処理されるコンポーネントを示します"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "<apex:actionPoller>は、指定した時間間隔でAJAXリクエストをサーバに送信するVisualforceコンポーネントです。このコンポーネントを使用することで、定期的にサーバのメソッドや操作を呼び出すことができます。これは、ページ上のデータの定期的な更新や、特定の操作を定期的に実行する場面などで有用です。\n\n具体的には、interval属性を使用して時間間隔（秒）を指定し、action属性を使用して呼び出すメソッドや操作を指定します。また、再レンダリングが行われると、<apex:actionPoller>のタイマーはリセットされます", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 165, "q": "開発者は、Account でトリガーを正常にアサートするテスト クラスを作成しました。サンドボックス環境でデータを正しく起動および更新します。\nカスタム プロファイルを持つ Salesforce 管理者は、変更セットを介してこのトリガーを本番環境にデプロイしようとしますが、テスト クラスは権限不足エラーで失敗します。\n問題を解決するために開発者は何をすべきですか?", "choices": ["A.system.runAd() を最適なクラスに追加して、正しいオブジェクト権限を持つユーザーとしてトリガーを実行します。", "B.テスト、ステートメント ( ) がテスト クラスの For ループ内にないことを確認します。", "C.「すべてのテストを管理者ユーザーとして実行」を有効にするように本番環境を構成します。", "D.テスト クラスに seeAllData=true を追加して、運用環境の共有モデル内で機能するようにします。"], "answer": ["A"], "category": "ユーザインターフェース", "explanation": "テストクラス内でSystem.runAs()メソッドを使用すると、特定のユーザーとしてコードを実行することができます。この機能は、異なるユーザープロファイルや権限でコードが正常に動作するかを確認する際に非常に役立ちます。\n\nデプロイ時のエラーが権限に関連するものである場合、System.runAs()を使用してテストクラス内でトリガーを実行するユーザーをシミュレートすることで、本番環境での権限エラーを回避することができます。具体的には、適切なオブジェクト権限を持つユーザーレコードをテストクラス内で作成し、そのユーザーとしてトリガーと関連するテストロジックを実行します。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 166, "q": "会社には、Salesforce レコード ID を指定して、ページ上の JavaScript から取引先レコード情報を取得して表示する必要がある Web ページがあります。どの統合方法が最適ですか?", "choices": ["A.Apex SOAP Web サービス", "B.Apex REST Web サービス", "C.SOAP API", "D.REST API"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "Apex REST Web サービスを使用すると、独自のRESTful WebサービスをSalesforceに作成できます。この方法を使用すると、特定のSalesforceデータへの独自のURLを持つことができ、指定されたレコードIDを使用して取引先レコード情報を取得する際にJavaScriptから直接アクセスすることが容易になります。RESTfulなサービスは、Webページからの非同期呼び出しに適しており、特定の要件に合わせてカスタマイズできます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 167, "q": "許可される DML ステートメント数のトランザクション制限は?", "choices": ["A.20", "B.2000", "C.100 (同期)、200 (非同期)", "D.200 (同期)、100 (非同期)", "E.150"], "answer": ["E"], "category": "ロジックとプロセスの自動化", "explanation": "許可されるDMLステートメント数のトランザクション制限は150回です。DMLステートメントは、データベースに対しての操作（例：insert、update、deleteなど）を指します。Salesforceはこのような制限を設けることで、システム上のリソースの過度な使用を防いでいます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 168, "q": "ある会社は、特注のエンタープライズ リソース プランニング (ERP) システムを使用して注文管理を処理しています。同社は、営業担当者に注文のステータスを知らせて、顧客が出荷について問い合わせた場合に、営業担当者が注文のステータスと追跡番号 (既に出荷されている場合) について顧客に通知できるようにしたいと考えています。\nこの ERP 注文データを Salesforce で表示できる 2 つの方法はどれですか? 2つ答えを選択してください", "choices": ["A.Salesforce で cron ジョブを作成し、ERP システムをポーリングして注文の更新を確認します。", "B.SOAP API を使用して、ERP システムから Salesforce にデータをプッシュします。", "C.Salesforce Connect を使用して、ERP システムでリアルタイムの注文データを表示します。", "D.ストリーミング API を使用して、リアルタイムの注文データが Salesforce にあることを確認します。"], "answer": ["B", "C"], "category": "上級デベロッパーの基本", "explanation": "B. SOAP APIを使用して、ERPシステムからSalesforceにデータをプッシュします。\n\nSOAP APIはSalesforceの強力な統合ツールの1つで、外部システムからSalesforceにデータをプッシュするために使用されることが多いです。この方法では、ERPシステムが注文のステータスや追跡番号の更新をSalesforceに直接送信します。\n\nC. Salesforce Connectを使用して、ERPシステムでリアルタイムの注文データを表示します。\n\nSalesforce Connectは外部データソースをSalesforceと連携させるためのツールです。このツールを使用すると、Salesforce内でERPシステムのデータを直接参照および表示することができます。データはリアルタイムで参照されるため、最新の情報が常にSalesforceに表示されます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 169, "q": "ある企業には、複数の大規模なデータベース操作と Web サービスのコールアウトを行う Apex プロセスがあります。\nデータベース プロセスと Web サービスは、実行に時間がかかる場合があり、順番に実行する必要があります。\n開発者は、ガバナ制限やシステム制限に遭遇することなく、この Apex コードをどのように記述すればよいでしょうか?", "choices": ["A.Queueable Apex を使用してジョブをチェーンし、順番に実行します", "B.ガバナーの制限に達したら、 Limits クラスを使用してプロセス全体を停止します", "C.プロセスとコールアウトごとに複数の @future メソッドを使用します", "D.Apex スケジューラを使用して各プロセスをスケジュールします"], "answer": ["A"], "category": "ユーザインターフェース", "explanation": "A. Queueable Apexを使用してジョブをチェーンし、順番に実行します。\n\nQueueable Apexは非同期の実行をサポートし、1つのジョブが完了した後に別のジョブをチェーンすることができます。この方法を使用すると、大規模なデータベース操作とWebサービスのコールアウトを順番に実行し、同時にガバナ制限を回避することができます。Queueable Apexのチェーンの助けを借りて、複数のジョブを連続して安全に実行することができます。\n\nこの方法を使用することで、順番にタスクを実行し、ガバナ制限を避けながら最適なパフォーマンスを達成することができます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 170, "q": "開発者は Apex テストクラスのテストデータを必要としています。\n開発者は、テスト データをテスト メソッドに提供するために何を使用できますか? （2つ選んでください。）", "choices": ["A.Database.createTestRecords (10)", "B.List<sObject> Is = Test.loadData (Lead.sObjectType, 'myTestLeads');", "C. List<sObject> Is = Test.loadDat (Lead.sObjectType, $Resource + 'myTestLeads');", "D.myDataFactory.createTestRecords (10)"], "answer": ["B", "D"], "category": "ロジックとプロセスの自動化", "explanation": "B. List<sObject> Is = Test.loadData(Lead.sObjectType, 'myTestLeads');\n\nTest.loadDataは、静的リソースからテストデータをロードするためのApexメソッドです。指定したsObjectTypeのデータを静的リソースからロードしてList<sObject>に返します。この方法は、大量のテストデータを効率的にロードするために使用されます。\n\nD. myDataFactory.createTestRecords(10);\n\nこれはカスタムのデータファクトリーメソッドを示しています。データファクトリーは、テストメソッド内でのテストデータの作成を簡単にするためのカスタムヘルパークラスとしてよく使用されます。createTestRecordsメソッドは、指定された数のテストレコードを作成して返すことが期待されます。\n\nこれらの方法を使用すると、テストクラス内で効果的にテストデータを提供できます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 171, "q": "開発者は、テストの実行に必要なすべてのテスト データの初期設定が原因で、クラス内のすべてのテスト メソッドの実行に時間がかかることに気付きました。\nテスト実行を高速化するために開発者は何をすべきですか？", "choices": ["A.クラス内のテスト メソッドの量を減らします。", "B.テスト データを作成し、@createData でアノテーションを付けるメソッドを定義します。", "C.テスト データを作成し、@testSetup で注釈を付けるメソッドを定義します。", "D.すべてのテスト メソッドで、テスト データ ファクトリが適切に使用されていることを確認します。"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "C. テスト データを作成し、@testSetup で注釈を付けるメソッドを定義します。\n\n@testSetup 注釈は、テストクラス内のすべてのテストメソッドの実行前に一度だけ実行されるメソッドに付けられます。このメソッド内で作成されたデータは、テストクラス内のすべてのテストメソッドで利用できます。これにより、同じテストデータの初期設定を何度も行うことなく、テストの実行時間を短縮することができます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 172, "q": "Salesforceプラットフォーム上での大規模データ移行プロジェクトを実行する際、開発者が考慮すべき最も重要な要素は何ですか？以下の選択肢から最も適切なものを選んでください。", "choices": ["A. カスタムApexコードを使用して、すべてのデータを一度に移行する戦略を採用します。", "B. データ品質とクレンジングを事前に行い、移行するデータの正確性と整合性を確保します。", "C. データ移行を行う前に、すべてのユーザーをSalesforceシステムから一時的にログアウトさせます。", "D. 移行後のデータ検証プロセスを無視して、移行プロセスのスピードを最優先します。"], "answer": ["B"], "category": "ユーザインターフェース", "explanation": "A. 不正解。大規模なデータ移行では、すべてのデータを一度に移行することは、リスクが高く非効率的な場合が多いです。移行プロセスは段階的に行い、適切なテストと検証を経て進めるべきです。\n\nB. 正解。データ移行プロジェクトにおいて、データの品質と整合性は最も重要な要素の一つです。データクレンジングと品質チェックを事前に行うことで、移行後の問題を最小限に抑え、システムの信頼性を保つことができます。\n\nC. 不正解。実際のデータ移行プロジェクトでは、すべてのユーザーをログアウトさせる必要はありません。代わりに、移行作業の影響を受ける可能性のあるユーザーに対して通知し、必要に応じてシステムの使用を制限する措置を講じることが一般的です。\n\nD. 不正解。データ移行プロセスにおいてスピードも重要な要素ですが、移行後のデータ検証を無視することは推奨されません。適切なデータ検証は、移行が正確に行われたことを確認し、システムの整合性を保つために不可欠です。\n\nしたがって、大規模データ移行プロジェクトを実行する際には、データの品質とクレンジングを事前に行い、移行するデータの正確性と整合性を確保することが最も重要です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 173, "q": "開発者は、取引先責任者および Survey_Response_ _c というカスタム オブジェクト用にシステムに入力された電子メール アドレスが、ブロックされたドメインのリストに属していないことを確認する必要があります。ブロックされたドメインのリストは、ユーザーによるメンテナンスを容易にするためにカスタム オブジェクトに保存されます。Survey_Response_\n_c オブジェクトは、カスタム Visualforce ページを介して入力されます。\nこれを実装する最適な方法は何ですか?", "choices": ["A.Contact の Validation Rule と Survey_Response_ _c オブジェクトの Validation Rule にロジックを実装します。", "B.Contact の Apex トリガおよびカスタム Visualforce ページコントローラから呼び出されるヘルパークラスにロジックを実装します。", "C.Contact の Apex トリガにロジックを実装し、カスタム Visualforce ページコントローラ内にもロジックを実装します。", "D.カスタム Visualforce ページコントローラにロジックを実装し、Contact の Apex トリガからそのメソッドをコールします。"], "answer": ["B"], "category": "ユーザインターフェース", "explanation": "B. Contact の Apex トリガおよびカスタム Visualforce ページコントローラから呼び出されるヘルパークラスにロジックを実装します。\n\nこの方法を採用すると、複数の箇所から共通のロジックを再利用できます。Contact オブジェクトにデータが変更されるたびに、Apex トリガが実行され、メールアドレスのドメインをチェックするロジックが呼び出されます。また、カスタムの Visualforce ページから Survey_Response_ _c オブジェクトにデータを入力する際も、同じロジックをページコントローラから呼び出して実行します。このように、ヘルパークラスにロジックを実装することで、コードの再利用性が高まり、メンテナンスも容易になります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 174, "q": "Lightning Web コンポーネントを構築する際に、開発者がデータ取得の最高のパフォーマンスを得るために実装する必要がある 3 つのアプローチはどれですか?\n3つ答えを選択してください", "choices": ["A.getRecordUi を使用してメタデータを取得します。", "B.頻繁にアクセスされるデータには遅延ロードを使用します。", "C.Lightning データ サービスを使用します。", "D.layoutTypes : ['Full'] を使用して一連の項目を表示します。", "E.可能な限り (cacheable-true) を使用します。"], "answer": ["B", "C", "E"], "category": "ユーザインターフェース", "explanation": "B. 頻繁にアクセスされるデータには遅延ロードを使用します。\n\n遅延ロード（またはLazy Loading）は、ページが読み込まれる際にすぐに必要とされないデータのロードを遅らせるテクニックです。これにより、ページの初回ロード時間が短縮され、ユーザーエクスペリエンスが向上します。\n\nC. Lightning データ サービスを使用します。\n\nLightning データ サービスは、Apex コードを書かずに Salesforce データにアクセスするための標準サービスです。このサービスを使用すると、データの読み取り、作成、更新、削除などの操作を簡単に行うことができます。\n\nE. 可能な限り (cacheable=true) を使用します。\n\nLightning Web コンポーネントのメソッドに @AuraEnabled(cacheable=true) を設定すると、クライアントサイドのキャッシングが有効になります。このキャッシングにより、同じデータへの繰り返しのアクセスが高速化され、サーバーへの不要なリクエストが減少します。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 175, "q": "Cloud Kicks社のSalesforceシステムでは、外部システムからのデータ統合を行うために、RESTful APIを使用したカスタムのWebサービスを構築する必要があります。このWebサービスは、外部システムからのリクエストを受け取り、Salesforceのデータを操作し、適切なレスポンスを返す必要があります。\n\nこの要件を満たすために、開発者が使用すべきApexのクラスおよびアノテーションの組み合わせは何ですか？", "choices": ["A. @RestResource アノテーションと、Batchableインターフェース", "B. @RestResource アノテーションと、Queueableインターフェース", "C. @RestResource アノテーションと、Schedulableインターフェース", "D. @RestResource アノテーションと、Serializableインターフェース"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. @RestResource アノテーションは、ApexクラスをRESTful Webサービスとして公開するために使用されます。Batchableインターフェースは、バッチジョブを実装するために使用されます。この組み合わせにより、外部システムからのリクエストを受け取り、必要に応じてバッチ処理を実行するWebサービスを構築できます。\n\nB. @RestResource アノテーションは、ApexクラスをRESTful Webサービスとして公開するために使用されます。Queueableインターフェースは、非同期処理を実行するために使用されます。ただし、外部システムとのデータ統合には、同期的な処理が一般的に求められるため、この組み合わせは最適ではありません。\n\nC. @RestResource アノテーションは、ApexクラスをRESTful Webサービスとして公開するために使用されます。Schedulableインターフェースは、スケジュールされたジョブを実行するために使用されます。外部システムとのデータ統合には直接関係ありません。\n\nD. @RestResource アノテーションは、ApexクラスをRESTful Webサービスとして公開するために使用されます。Serializableインターフェースは、Apexクラスをシリアライズ可能にするために使用されます。外部システムとのデータ統合には直接関係ありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 176, "q": "Salesforceプラットフォーム上でカスタムユーザーインターフェースを開発する際、最も効果的なユーザーエクスペリエンスを提供するために開発者が採用すべきアプローチは何ですか？以下の選択肢から最も適切なものを選んでください。", "choices": ["A. Visualforceページを利用して、従来のウェブ開発技術に基づくカスタマイズを実施します。", "B. Lightning Web Components (LWC) を使用して、モダンなウェブ標準に基づいたコンポーネントを構築します。", "C. すべてのユーザー操作にApexトリガーを使用し、サーバーサイドでの処理を最大化します。", "D. 外部JavaScriptライブラリを積極的に取り入れ、Salesforceプラットフォーム外でUIの開発を行います。"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "A. VisualforceはSalesforceでの古いアプローチであり、カスタムUIを作成することができますが、Lightningエクスペリエンスの導入により、よりモダンでレスポンシブなUIを提供する新しい技術が推奨されています。\n\nB. 正解。LWCは現代のウェブ開発標準を利用して高性能なUIを構築できるため、最も効果的なユーザーエクスペリエンスを提供するために推奨されるアプローチです。\n\nC. 不正解。Apexトリガーはデータ操作に対するロジックを実行するために使用されますが、ユーザーインターフェースの開発には適していません。また、ユーザー操作に対してサーバーサイドでの処理を過度に依存することは、パフォーマンスの問題を引き起こす可能性があります。\n\nD. 不正解。外部JavaScriptライブラリを使用することは、特定の機能を実装する際に有効な場合がありますが、Salesforceプラットフォームの機能と統合するためには、LWCやAuraコンポーネントのようなSalesforce固有の技術を使用することが推奨されます。また、プラットフォーム外でUIを開発することは、統合の複雑さを増やし、メンテナンスの労力を高める可能性があります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 177, "q": "Cloud Kicks社のSalesforceシステムでは、特定の条件を満たすレコードに対して、複雑なビジネスロジックを非同期に実行する必要があります。このビジネスロジックは、レコードが更新された後に実行され、他のレコードの更新や外部システムとの統合が含まれます。\n\nこの要件を満たすために、開発者が使用すべきApexの機能は何ですか？", "choices": ["A. Future メソッド", "B. Queueable Apex", "C. Batch Apex", "D. Scheduled Apex"], "answer": ["B"], "category": "ユーザインターフェース", "explanation": "A. Future メソッドは、非同期処理を実行するために使用されます。ただし、Future メソッドは、Apexの制限事項により、複雑なビジネスロジックの実行には適していない場合があります。また、Future メソッドは、レコードの更新後に直接呼び出すことができません。\n\nB. Queueable Apexは、非同期処理を実行するために使用されます。Queueable Apexは、Future メソッドと比較して、より柔軟性が高く、複雑なビジネスロジックの実行に適しています。また、Queueable Apexは、レコードの更新後にトリガーから直接呼び出すことができます。\n\nC. Batch Apexは、大量のレコードを処理するために使用されます。この要件では、特定の条件を満たすレコードに対して個別にビジネスロジックを実行する必要があるため、Batch Apexは最適ではありません。\n\nD. Scheduled Apexは、指定された時間間隔で定期的にジョブを実行するために使用されます。この要件では、レコードの更新をトリガーとしてビジネスロジックを実行する必要があるため、Scheduled Apexは適していません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 178, "q": "開発者は、約 2,000 レコードにアクセスし、各ページに 50 レコードを表示するためのカスタム ページネーション ソリューションを作成する必要があります。Salesforce からのデータは、Apex 経由ではなく API 経由でアクセスされます。\n開発者はこれらの要件を満たすにはどうすればよいでしょうか? （2つ選んでください。）", "choices": ["A.SOQL クエリで LIMIT 50 を使用する", "B.SOQL クエリで OFFSET を使用する", "C.SOQL クエリで CURSOR 50 を使用する", "D.StandardSetController を使用する"], "answer": ["A", "B"], "category": "ロジックとプロセスの自動化", "explanation": "A. SOQL クエリで LIMIT 50 を使用する このオプションは、一度に取得するレコードの最大数を50に制限するための方法です。これにより、ページングの各ページに最大50レコードを取得することができます。\n\nB. SOQL クエリで OFFSET を使用する OFFSET は、レコードの取得を開始する位置を指定するためのSOQL句です。例えば、2ページ目のデータを取得する場合、OFFSET 50とすることで51番目のレコードからのデータを取得することができます。ページングを実装する際に、現在のページ数に基づいてOFFSETの値を計算して、次のページのデータを取得するのに役立ちます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 179, "q": "\"PageチームReference.setRedirect\" Apex 関数が False に設定されている場合、どのタイプのリクエストが行われますか?", "choices": ["A.取得リクエスト", "B.PageReference が同じコントローラーと拡張機能のサブセットを指している場合、ポストバック要求、そうでない場合は要求を取得", "C.ポストバック リクエスト"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "B. PageReference が同じコントローラーと拡張機能のサブセットを指している場合、ポストバック要求、そうでない場合は要求を取得\n\nPageReference.setRedirectメソッドに渡されるブール値がFalseの場合、リダイレクトはポストバックとして扱われますが、それは特定の条件下でのみです。具体的には、目的のPageReferenceが現在のページと同じコントローラーと拡張機能のサブセットを使用する場合に限ります。そうでない場合、通常の取得リクエストが行われます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 180, "q": "ある販売は、販売注文を入力するためのカスタム Visualforce ページを必要としています。Visualforce ページで製品が選択されると、製品の在庫があるかどうかを判断するために Web サービスが呼び出され、結果がページに表示されます。\nWeb サービスの結果を表示し、同時使用のガバナー制限を超えないようにするために、開発者はこのページをどのように作成できますか?", "choices": ["A.[送信] ボタンがクリックされたときに呼び出される継続を使用します。", "B.visualforce Remoting を使用して、Web サービスのコールアウトを処理します。", "C.Web サービス コールアウトで Salesforce メタデータ API を使用します。", "D.callout=true アノテーションで Apex トリガを使用します。"], "answer": ["A"], "category": "パフォーマンス", "explanation": "A. [送信] ボタンがクリックされたときに呼び出される継続を使用します。\n\n継続を使用することで、開発者は長時間実行されるWebサービスのコールアウトを非同期的に実行できます。これは、ガバナー制限を超えるリスクを減少させるのに役立ちます。ユーザーは[送信]ボタンをクリックすると、非同期処理が開始され、Webサービスの結果が取得されると、その結果がVisualforceページに表示されます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 181, "q": "開発者は、Case の標準コントローラーをオーバーライドする 2 つの拡張機能を含むページを持っています。\n<apex:page standardController=\"Case\" extension=\"CaseExtensionOne,CaseExtension Two\" showHeader=\"false\"> 各拡張機能には、Save というメソッドがあります。このページには、次のように定義されたコマンド ボタンがあります。 <apex:commandButton value=\"Save\" action=\"{!save}\"/> ユーザーがコマンド ボタンをクリックするとどうなりますか?", "choices": ["A.ケース標準コントローラーから保存を実行します", "B.3 つの保存方法がすべて実行されます", "C.CaseExtensionTwo からの保存が実行されます", "D.CaseExtensionOne からの保存が実行されます"], "answer": ["D"], "category": "ユーザインターフェース", "explanation": "D. CaseExtensionOne からの保存が実行されます。\n\nVisualforceページの拡張子属性で複数の拡張機能が指定されている場合、順番が重要です。拡張機能は、リスト内でのその出現順に初期化されます。そして、もし同じ名前のメソッド（この場合は\"save\"）が複数の拡張機能に存在する場合、最初にリストされた拡張機能のメソッドが実行されます。\n\nこのケースでは、\"CaseExtensionOne\"が最初にリストされているので、その\"save\"メソッドが実行されます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 182, "q": "Salesforceプラットフォーム上でのカスタムアプリケーション開発において、効果的なテスト戦略を確立するために開発者が採用すべきアプローチは何ですか？以下の選択肢から最も適切なものを2つ選んでください。", "choices": ["A. テストクラスとメソッドを最小限に保ち、主要な機能のみをカバーすることで開発時間を短縮します。", "B. 開発初期段階からテスト駆動開発（TDD）を採用し、コードの品質と維持可能性を向上させます。", "C. Apexトリガーとクラスのロジックに関係なく、すべてのテストクラスでSeeAllData=trueアノテーションを使用します。", "D. 網羅的なテストカバレッジを達成するために、ポジティブテストだけでなくネガティブテストも実装します。"], "answer": ["B", "D"], "category": "ロジックとプロセスの自動化", "explanation": "A. 不正解。テストクラスとメソッドを最小限に保つことは、短期的には開発時間を短縮するかもしれませんが、長期的にはアプリケーションの品質と維持可能性に悪影響を及ぼします。網羅的なテストカバレッジは、信頼性の高いアプリケーションを構築するために不可欠です。\n\nB. 正解。TDDは、テストケースを最初に書き、そのテストをパスするコードを実装するアプローチです。この方法は、コードの品質を向上させ、将来の変更に対して柔軟に対応できるようにします。\n\nC. 不正解。SeeAllData=trueアノテーションは、既存のデータに依存したテストを行う必要がある特定のシナリオでのみ使用すべきです。一般的には、テストデータを独立して作成し、テストの分離と再現性を保証することが推奨されます。\n\nD. 正解。網羅的なテストカバレッジには、システムが正しく動作するシナリオ（ポジティブテスト）だけでなく、エラー条件や例外的な状況（ネガティブテスト）も含まれるべきです。これにより、アプリケーションの堅牢性が向上します。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 183, "q": "Salesforceプラットフォーム上で複数の統合システム間のデータ同期を設計する際、開発者が考慮すべき最適なアプローチは何ですか？以下の選択肢から最も適切なものを選んでください。", "choices": ["A. ポーリングメカニズムを実装して、定期的に外部システムからデータを取得します。", "B. Salesforceのアウトバウンドメッセージを使用して、リアルタイムで外部システムにデータをプッシュします。", "C. Platform EventsとChange Data Captureを活用して、データの変更をリアルタイムで検知し、統合システム間で同期します。", "D. すべての外部システムに対してREST APIを使用し、データ同期のためのカスタムロジックをApexで実装します。"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "A. ポーリングは一般的なアプローチですが、リアルタイムのデータ同期には最適ではありません。データの遅延が発生する可能性があり、システムリソースを無駄に消費することになります。\n\nB. アウトバウンドメッセージはリアルタイムの通知に有用ですが、複雑なデータ同期シナリオにおいては、より柔軟性の高いアプローチが必要になる場合があります。\n\nC. 正解。Platform EventsとChange Data CaptureはSalesforceで提供される強力なツールで、リアルタイムでのデータ変更の検知と同期を可能にします。これにより、高度にスケーラブルで効率的なデータ同期が実現できます。\n\nD. カスタムロジックとREST APIの使用は柔軟性がありますが、開発とメンテナンスに多大な労力が必要になります。また、リアルタイム同期のニーズに対応するには、Platform EventsやChange Data Captureの方がより適しています。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 184, "q": "Salesforce Lightningコンポーネントに関して、以下の記述のうち正しいものを選択してください。", "choices": ["A) Lightningコンポーネントは、AuraフレームワークとLightning Web Components(LWC)のどちらも含まれますが、互換性はありません。", "B) Auraコンポーネントは、モダンWeb標準を活用できず、JavaScript ES6やHTML5を使用することはできません。", "C) Lightning Web Components(LWC)は、Web標準に基づいており、Auraコンポーネントよりも高いパフォーマンスを提供します。", "D) AuraコンポーネントとLightning Web Componentsは、同じアプリケーション内で混在して使用することは推奨されません。"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "A) 不正解: Lightningコンポーネントは、AuraフレームワークとLightning Web Components(LWC)の両方を含みますが、これらは互換性があります。Auraコンポーネント内でLWCを使用することができますが、その逆はできません。\n\nB) 不正解: AuraコンポーネントはモダンWeb標準を部分的に活用できます。JavaScript ES6の機能やHTML5を使うことが可能ですが、LWCの方がWeb標準との互換性が高いです。\n\nC) 正解: Lightning Web Components(LWC)は、より現代的なWeb標準に基づいて設計されています。カスタム要素、シャドウDOM、ES6+/ModulesなどのWeb標準を活用しており、Auraコンポーネントに比べて、パフォーマンスが高く、より効率的に開発することが可能です。\n\nD) 不正解: AuraコンポーネントとLightning Web Componentsは、同じアプリケーション内で混在して使用することが可能です。Salesforceではこのような混在使用をサポートしており、開発者が段階的にLWCへ移行できるように設計されています。この互換性により、開発者は既存のAuraコンポーネントを再利用しつつ、新しい機能をLWCで構築することができます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 185, "q": "Cloud Kicks社のSalesforceシステムでは、特定のオブジェクトに対して、データローダーを使用して大量のレコードを一括で挿入する必要があります。ただし、レコードの挿入時に、カスタムの検証ロジックを適用し、一定の条件を満たさないレコードを除外する必要があります。\n\nこの要件を満たすために、開発者が使用すべきApexの機能は何ですか？", "choices": ["A. Apex トリガー", "B. Visualforceページ", "C. Apex共有", "D. カスタム表示ラベル"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. Apex トリガーは、レコードの挿入、更新、削除などのイベントをトリガーとして、カスタムロジックを実行するために使用されます。データローダーを使用してレコードを一括挿入する際に、Apex トリガーを使用してカスタムの検証ロジックを適用し、条件を満たさないレコードを除外することができます。\n\nB. Visualforceページは、カスタムのユーザーインターフェースを作成するために使用されます。データローダーを使用したレコードの一括挿入には直接関係ありません。\n\nC. Apex共有は、Apexを使用してレコードの共有ルールを管理するために使用されます。データローダーを使用したレコードの一括挿入時の検証ロジックには直接関係ありません。\n\nD. カスタム表示ラベルは、Salesforce組織内で使用されるカスタムラベルを定義するために使用されます。データローダーを使用したレコードの一括挿入時の検証ロジックには直接関係ありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 186, "q": "SalesforceのApexトリガーに関する次の記述のうち、正しいものを選択してください。", "choices": ["A) Apexトリガーは、挿入(Insert)、更新(Update)、削除(Delete)のDML操作のみに対応しており、検索(Query)操作には対応していません。", "B) トリガーは同じオブジェクトに対して、一つのイベントタイプ(例: Insert)につき一つだけ定義できます。複数のトリガーを同じイベントタイプに対して定義することはできません。", "C) Beforeトリガーはレコードが保存される前に実行され、この段階で項目値の変更が可能ですが、DML操作は実行できません。", "D) Afterトリガーはレコードがデータベースに保存された後に実行され、この段階でレコードの項目値を変更することはできませんが、新たなDML操作をトリガー内で実行することが可能です。"], "answer": ["C"], "category": "ユーザインターフェース", "explanation": "A) 不正解: Apexトリガーは、DML操作に加えて、レコードが検索された際にも特定のロジックを実行するために使用できる「検索(Query)」イベントには直接対応していませんが、DML操作に伴うトリガー実行時にSOQLクエリを使用してデータを検索することは可能です。\n\nB) 不正解: Salesforceでは、同じオブジェクトに対して複数のトリガーを同じイベントタイプに対して定義することが可能です。ただし、複数のトリガーがある場合、その実行順序を保証するものではありません。\n\nC) 正解: Beforeトリガーは、レコードがデータベースに保存される前に実行されます。この段階で項目値の変更が可能で、主にバリデーションや計算を行うために使用されます。ただし、レコードの保存前に新たなDML操作を実行することは推奨されません。\n\nD) 不正解: Afterトリガーはレコードがデータベースに保存された後に実行されます。この時点でレコードの項目値を直接変更することはできません。ただし、トリガーから新たなDML操作を起動することは可能ですが、これは関連レコードに対する操作や、新たなレコードの挿入、更新、削除など、追加の処理を実行するために使用されます。直接トリガーされたレコードの更新を行う場合は、適切な処理を行う必要があります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 187, "q": "ある開発者は、Universal Containers から、コンテナーの修理プロセスを追跡するためのシステムを構築する任務を負っています。\nコンテナは、顧客が問題を報告した時点からコンテナが顧客に返却された時点まで、修理プロセスの進行を追跡する必要があります。\nベスト プラクティスに従いながら、これらのビジネス要件を満たすソリューションはどれですか?", "choices": ["A.Salesforce 管理者を巻き込んで、保守が容易でカスタマイズされた開発よりもコストがかからない宣言型ソリューションを構築します。", "B.問題を報告した顧客に通知しながら、コンテナーを修理プロセスに移動するための自動通知を備えた新しいシステムを開発します。", "C.Platform Events と RFID の統合を使用してモバイル アプリケーションを構築し、コンテナを適切に追跡して顧客に情報を提供します。", "D.アプリケーション イベントを使用してカスタマイズされた Lightning アプリケーションを構築し、データの整合性を確保します。"], "answer": ["B"], "category": "テスト、デバッグ、リリース", "explanation": "B. 問題を報告した顧客に通知しながら、コンテナーを修理プロセスに移動するための自動通知を備えた新しいシステムを開発します。\n\nこの選択肢は、問題を報告した顧客に通知する機能と、修理プロセスの進行に関する自動通知を備えているため、Universal Containers の要件を満たしています。顧客が問題を報告した時点からコンテナが返却されるまでのプロセスの追跡が求められているので、自動通知がこの要件を効果的にサポートします。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 188, "q": "SalesforceのLightning Experienceにおけるカスタムアプリケーション開発でパフォーマンスを最適化するために重要な考慮事項は何ですか？以下の選択肢から最も適切なものを３つ選んでください。", "choices": ["A. 大規模なデータセットに対してSOQLクエリを使用する際は、常にLIMIT句を適用して結果を制限します。", "B. Lightning コンポーネント間でのデータ共有には、グローバルイベントよりもアプリケーションイベントを使用します。", "C. クライアントサイドでのデータ処理を最大化し、サーバーサイドのApexコールを最小限に抑えます。", "D. ユーザーインターフェースのレンダリングに必要なデータのみを取得するために、@AuraEnabledメソッドには適切なフィルタリング条件を指定します。"], "answer": ["B", "C", "D"], "category": "パフォーマンス", "explanation": "A. これはパフォーマンス最適化の一般的なアプローチですが、最適化の主要な焦点ではなく、また、いつもこのアプローチが最適とは限りません。特に、適切なデータセットを取得するためには、クエリの設計に注意を払う必要があります。\n\nB. 正解。アプリケーションイベントは、同じアプリケーション内のコンポーネント間で情報を共有するための効果的な方法であり、パフォーマンス最適化に寄与します。\n\nC. 正解。クライアントサイドでの処理を増やすことで、サーバーへの不要なリクエストを減らし、アプリケーションのレスポンスタイムを改善できます。\n\nD. 正解。これにより、必要なデータのみがフェッチされ、パフォーマンスが向上し、ユーザーエクスペリエンスが改善されます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 189, "q": "Apex で Chatter を使用する機能を提供する最上位の名前空間は何ですか?", "choices": ["A.ChatterApi", "B.ConnectApi", "C.FeedApi", "D.RestApi"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "B. ConnectApi\n\nConnectApiは、Chatterを操作するためのApexクラスおよびメソッドを提供する名前空間です。これを使用することで、ApexからChatterのフィード、コメント、および他の多くの機能にアクセスおよび操作することができます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 190, "q": "会社には、商談への参照を持つカスタム オブジェクト Sales Demo Request があります。商談の確率が 50% を超える場合は、Sales Demo Request レコードを作成する必要があります。\nこれを自動化する最適な方法は何ですか?", "choices": ["A.商談に関するワークフローを作成します。", "B.商談で Apex トリガーを使用します。", "C.商談に関するプロセスを構築します。", "D.商談でフローを構築します。"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "B. 商談で Apex トリガーを使用します。\n\nApexトリガーを使用することで、商談の確率が50%を超えた場合に、Sales Demo Request レコードを自動的に作成するロジックを実装できます。この方法では、特定の条件を満たした場合の処理を詳細にカスタマイズすることができるため、このシナリオに適しています。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 191, "q": "REST は __________ を使用します。", "choices": ["A.HTTP クラス", "B.HTTPRequest クラス", "C.HTTPResponse クラス", "D.上記すべて"], "answer": ["D"], "category": "ロジックとプロセスの自動化", "explanation": "D. 上記すべて\n\nRESTfulサービスを呼び出す際には、SalesforceのApexにおいてHTTPクラスを使用します。\n\nHTTPRequestクラスを使用してリクエスト情報（URL、HTTPメソッド、ヘッダー、ボディなど）を設定します。\n\nHTTPResponseクラスは、RESTfulサービスからの応答を取得する際に使用されます。\n\nしたがって、RESTを使用する際にはこれら3つのクラスすべてが関連します。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 192, "q": "Cloud Kicks社のSalesforceシステムでは、外部システムとのデータ同期を行うために、カスタムのRESTful APIを構築する必要があります。このAPIは、外部システムからのリクエストを受け取り、Salesforce内のデータを操作し、結果を外部システムに返す必要があります。また、APIのパフォーマンスとセキュリティにも配慮する必要があります。\n\nこの要件を満たすために、開発者が使用すべきApexの機能は何ですか？", "choices": ["A. Apex Webサービス", "B. Apex REST API", "C. Apex SOAP API", "D. Apex Metadata API"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "A. Apex Webサービスは、Apexを使用してカスタムのWebサービスを作成するために使用されます。ただし、この機能はレガシーであり、RESTful APIの構築にはApex REST APIが推奨されています。\n\nB. Apex REST APIは、Apexを使用してカスタムのRESTful APIを構築するために使用されます。@RestResourceアノテーションを使用してApexクラスを定義し、HTTP動詞（GET、POST、PUT、DELETEなど）に対応するメソッドを実装することで、外部システムとのデータ同期を行うAPIを構築できます。また、Apex REST APIは、APIのパフォーマンスとセキュリティの制御も可能です。\n\nC. Apex SOAP APIは、Apexを使用してカスタムのSOAP APIを構築するために使用されます。ただし、この要件ではRESTful APIの構築が求められているため、Apex SOAP APIは適していません。\n\nD. Apex Metadata APIは、Apexを使用してSalesforceのメタデータを操作するために使用されます。外部システムとのデータ同期を行うAPIの構築には直接関係ありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 193, "q": "開発者は、カスタムアクションで Aura コンポーネントを使用したいと考えています。\nこれを行うために何を考慮する必要がありますか？", "choices": ["A.必須としてマークされた各コンポーネント属性にデフォルト値を指定する必要があります", "B.クラス「slds-modal_ _container」をコンポーネントの最上位要素に追加する必要があります", "C.コンポーネントは flexipage:availableForRecordHome インターフェイスを実装する必要があります", "D.コンポーネントの JavaScript コントローラーは、初期化時にメソッドを処理する必要があります"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "C. コンポーネントは flexipage:availableForRecordHome インターフェイスを実装する必要があります\n\nSalesforce LightningのAuraコンポーネントをレコードページのカスタムアクションとして使用する場合、そのコンポーネントは特定のインターフェイスを実装する必要があります。この場合、コンポーネントは flexipage:availableForRecordHome インターフェイスを実装する必要があります。これにより、コンポーネントがレコードホームページで利用可能になります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 194, "q": "SalesforceのApexクラス内で動的にSOQLクエリを生成する場合、どのキーワードかけてはいけないですか？", "choices": ["A. SOQL", "B. bind", "C. execute", "D. None（何も追加しない）"], "answer": ["C"], "category": "ユーザインターフェース", "explanation": "A. SOQL: 「SOQL」という言葉自体は、SOQLクエリ内で構文として使用されるわけではありません。この単語はコードのコメントやドキュメントで説明として使われることはありますが、キーワードとしては使われないため、答えには不適切です。不正解。\n\nB. bind: Apexの動的クエリでは「bind」キーワードを使用して、変数の値に基づいてクエリを動的に調整できます。これは動的クエリにおいて非常に有効な手法で、使用を避けるべきではありません。不正解。\n\nC. execute: Apexにおいて「execute」というキーワードは、SOQLクエリの実行を意味するものではなく、通常はバッチApexクラス内でバッチジョブを処理するメソッドとして使用されます。SOQLクエリを動的に生成する場合、このキーワードは使用すべきではないというのが一般的な理解で、この意味で正解です。\n\nD. None（何も追加しない）: ダイナミックSOQLを使用する際には、特別に「None」というキーワードを追加する必要はありません。しかし、特定のキーワードを避ける必要がある場合もあるため、この選択肢は具体性に欠けます。不正解。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 195, "q": "顧客は、求先住所項目が更新されたときに、関連するすべての取引先責任者レコードの住所項目が同じ更新を反映することを要求しています。\nこの要件は、最小限のカスタマイズでどのように満たすことができますか?", "choices": ["A.取引先にワークフロー ルールを作成して、関連する子取引先責任者レコードを更新します。", "B.更新時に関連する取引先責任者レコードを更新するために、取引先にアフター トリガーを作成します。", "C.取引先で Lightning プロセスを作成して、関連する子取引先責任者レコードを更新します。", "D.関連する取引先 レコードに基づいてすべての取引先責任者住所項目を更新する、スケジュールされたバッチ ジョブを作成します。"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "C. 取引先で Lightning プロセスを作成して、関連する子取引先責任者レコードを更新します。\n\nSalesforceのLightning Process Builderは、特定のアクションが発生した場合に他のオブジェクトやレコードを更新するビジネスプロセスを視覚的に定義できるツールです。このシナリオでは、取引先の請求先住所項目が更新されたときに、それに関連する子の取引先責任者レコードの住所項目も同じ更新を反映するようにLightning プロセスを使用して設定できます。これはコードを書かずに要件を満たす効率的な方法です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 196, "q": "SalesforceのApexクラスでバッチ処理を実装する際、バッチ処理の実行状況を監視するために使用できるメソッドはどれですか？", "choices": ["A. Database.executeBatch()", "B. System.scheduleBatch()", "C. AsyncApexJob.getStatus()", "D. System.abortJob()"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "A. Database.executeBatch()は、バッチ処理を開始するために使用されるメソッドです。バッチ処理の実行状況を直接監視するためのメソッドではありません。\n\nB. System.scheduleBatch()は、バッチ処理をスケジュールするために使用されるメソッドです。バッチ処理の実行状況を直接監視するためのメソッドではありません。\n\nC. AsyncApexJob.getStatus()は、バッチ処理の実行状況を取得するために使用できるメソッドです。このメソッドを使用することで、バッチ処理が完了したかどうかや、エラーが発生したかどうかを確認できます。\n\nD. System.abortJob()は、実行中のバッチ処理を中止するために使用されるメソッドです。バッチ処理の実行状況を監視するためのメソッドではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 197, "q": "テスト メソッドでグローバル 選択リスト オプションをプログラムで取得するために開発者が使用する最適な手法は何ですか?", "choices": ["A.スキーマ名前空間を使用します。", "B.静的リソースを使用します。", "C.メタデータ API へのコールアウトを実行します。", "D.SOQL クエリを実行します。"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. スキーマ名前空間を使用します。 スキーマ名前空間を使用すると、Salesforceオブジェクトのメタデータ情報にプログラムでアクセスすることができます。これにはオブジェクトの項目、関連リスト、選択リストの値などの情報が含まれます。特に、選択リストのオプションを取得する場合、スキーマ名前空間のメソッドを使用してこれを実現することができます。これはテストメソッドの中で特に役立ち、コードのハードコードされた値に依存せずに動的に選択リストの値を取得することができます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 198, "q": "開発者は、クライアントで結果をキャッシュすることにより、Apex コールの実行時のパフォーマンスを改善したいと考えています。これを実装する最良の方法は何ですか?", "choices": ["A.サーバー側メソッドを @AuraEnabled(cacheable=true) で装飾します。", "B.ページに戻ったときに使用する Cookie をブラウザーに設定します。", "C.JavaScript クライアント側コードのアクションで setStorable() メソッドを呼び出します。", "D.サーバー側メソッドを @AuraEnabled(storable=true) で装飾します。"], "answer": ["A"], "category": "ユーザインターフェース", "explanation": "A. サーバー側メソッドを @AuraEnabled(cacheable=true) で装飾します。 Lightning Web ComponentsとAura Componentsで、サーバーからのデータ取得を効率的にキャッシュするために、Apexメソッドを@AuraEnabled(cacheable=true)で装飾することが推奨されています。この属性を設定することで、同じリクエストが短期間で再度行われた場合に、サーバーではなくキャッシュからデータを取得することができます。これにより、パフォーマンスが向上し、不要なサーバーへのリクエストが削減されます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 199, "q": "「sendEmail」メソッド呼び出し回数のトランザクション制限は?", "choices": ["A.20", "B.10", "C.50", "D.100", "E.制限なし"], "answer": ["B"], "category": "上級デベロッパーの基本", "explanation": "Salesforce は、組織のパフォーマンスを保護するために、各トランザクションに制限を課しています。これらの制限は、組織のサイズ、使用状況、およびデータベースのパフォーマンスに応じて異なります。\n\nトランザクション制限は、次の方法で適用されます。\n\n1 トランザクション内に実行されるすべての API 呼び出しの数\n\n1 トランザクション内に実行されるすべての SOQL クエリの数\n\n1 トランザクション内に書き込まれるレコードの数\n\nトランザクション制限を超えると、Salesforce はエラーを返します。\n\nsendEmail メソッド呼び出し回数のトランザクション制限\n\nsendEmail メソッドは、1 トランザクションにつき 10 回まで呼び出すことができます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 200, "q": "QueryLocator を使用したレコード数のトランザクション制限は?", "choices": ["A.50000", "B.50000000", "C.100000", "D.5000000", "E.制限なし"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "正解はB、50000000です。\n解説は、Salesforceドキュメントの「API 制限」の「トランザクション制限」の項に記載されています。\n1 トランザクション制限\nSalesforce は、組織のパフォーマンスを保護するために、各トランザクションに制限を課しています。これらの制限は、組織のサイズ、使用状況、およびデータベースのパフォーマンスに応じて異なります。\nトランザクション制限は、次の方法で適用されます。\n\n1 トランザクション内に実行されるすべての API 呼び出しの数\n\n1 トランザクション内に実行されるすべての SOQL クエリの数\n\n1 トランザクション内に書き込まれるレコードの数\n\nトランザクション制限を超えると、Salesforce はエラーを返します。\nQueryLocator を使用したレコード数のトランザクション制限\nQueryLocator を使用してレコードを取得する場合、1 トランザクションにつき 50000000 件まで取得できます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 201, "q": "Universal Containers（UC）はトランスレーションワークベンチを有効にし、選択リストの値を翻訳しました。UCは、取引先オブジェクトにカスタムの複数選択選択リスト項目「Product__c」を持っており、営業担当はこれを使用して取引先が既にどのUC製品を所有しているかを指定できます。開発者は、Product_c項目を含む取引先レコードを取得するApexメソッドを作成するよう任されました。Products__cの値が現在のユーザの言語で表示されるようにするために、開発者は何をすべきですか？", "choices": ["A. SOQLクエリの項目リストで tolabel(Products__c) を使用する。", "B. SOQLの結果リストの各レコードにロケールを設定する。", "C. SOQLの結果リストの各レコードで translate メソッドを呼び出す。", "D. SOQLクエリで Locale 句を使用する。"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. 正解です。tolabel() 関数は、SOQLクエリ内で選択リスト項目（単数選択、複数選択の両方）の翻訳された表示ラベルを、クエリを実行している現在のユーザの言語設定に基づいて取得するために使用されます。\nB. SOQLクエリによって返されたsObjectレコードのリストに対して、取得後にロケールを個別に設定して値を翻訳するような標準的なメカニズムはありません。\nC. sObjectレコードやその項目値に対して、選択リストのAPI名を翻訳済みラベルに直接変換する translate という名前の標準Apexメソッドは存在しません。\nD. SOQLには、翻訳を指定するために使用できる Locale 句という構文は存在しません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 202, "q": "開発者は、どのプロファイルおよびユーザがどのシークレットにアクセスできるかを指定する機能と共に、シークレットデータを保存する方法を見つけるよう求められています。このデータを保存するために何を使用すべきですか？", "choices": ["A. カスタムメタデータ", "B. system.Cookie クラス", "C. 静的リソース", "D. カスタム設定"], "answer": ["A"], "category": "テスト、デバッグ、リリース", "explanation": "A. 正解です。カスタムメタデータ型を使用すると、データをレコードとして保存できます。これらのメタデータレコードへのアクセス（参照可否）は、プロファイルや権限セットに基づいて制御することが可能です。これにより、どのプロファイルやユーザがどのシークレット（メタデータレコードとして保存されたデータ）にアクセスできるかを指定するという要件を満たせます。\nB. system.Cookie クラスは、ユーザのブラウザ側でデータを保存（クッキーを設定）するために使用されます。Salesforceサーバ側で機密データを永続的に保存し、組織内のアクセス制御を行うためのものではありません。\nC. 静的リソースは、画像、スタイルシート、JavaScriptファイルなどの静的なコンテンツを保存するための機能です。シークレットデータをレコードのように保存し、それらへのアクセスをプロファイルやユーザごとに制御する用途には適していません。\nD. カスタム設定（特に階層型）は、プロファイルやユーザごとに異なる値を持つことができますが、これは主に設定値の オーバーライド のためです。設定データ自体への 参照可否 をプロファイルレベルで細かく制御する機能は、カスタムメタデータの方が適しています。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 203, "q": "開発者は、バックアップ目的で取引先レコードを外部システムに送信する必要があります。このプロセスは、取引先が保存されるときにスナップショットを取得し、その後RESTful Webサービスへのコールアウトを行う必要があります。Webサービスは、コールごとに最大1レコードしか受信できません。これらの要件を実装するために、開発者は何をすべきですか？", "choices": ["A. futureメソッドを作成する。", "B. ApexクラスをWebサービスとして公開する。", "C. Queueableインターフェースを実装する。", "D. プラットフォームイベントを実装する。"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "A. futureメソッドは、トリガなどの同期処理から非同期にコールアウトを実行するために使用されます。しかし、1つのトランザクションで呼び出せるfutureメソッドは50回までという制限があります。もし100件の取引先が一括更新され、100回のコールアウトが必要になった場合、この制限に抵触するため不適切です。\nB. これは、Salesforceが外部システムからのリクエストを 受信（インバウンド）するための機能です。問題文は、Salesforceから外部へデータを 送信（アウトバウンド）する必要があるため、要件を満たしません。\nC. 正解です。トリガ（保存時）からQueueableジョブを1つ起動できます。Queueableの実行メソッド内では、1トランザクションあたり最大100回のコールアウトが許可されています。もし100件を超えるレコード（例: 200件）が一度に保存された場合でも、Queueableはジョブチェーン（処理が完了したら自身を再度キューに入れる）を利用して、残りのレコードを次のトランザクションで処理できます。\nD. プラットフォームイベントを使用してイベントを発行し、非同期のサブスクライバがコールアウトを実行することも可能です。しかし、結局そのサブスクライバ内でQueueableやfutureのような非同期Apexを呼び出す必要があり、Cの選択肢と比べて間接的な実装になります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 204, "q": "Lightning Webコンポーネントを開発する際、携帯電話などの小型デバイスではlightninglayout-itemを1列で表示し、タブレットサイズおよびデスクトップサイズの画面では2列で表示する設定はどれですか？", "choices": ["A. size=\"12\" tablet-device-size=\"6\" を設定する", "B. size=\"12\" medium-device-size=\"6\" を設定する", "C. size=\"6\" mobile-device-size=\"12\" を設定する", "D. size=\"6\" small-device-size=\"12\" を設定する"], "answer": ["B"], "category": "ユーザインターフェース", "explanation": "A. lightning-layout-item のレスポンシブ属性に tablet-device-size という名前の属性はありません。タブレットサイズには medium-device-size を使用します。\nB. 正解です。size=\"12\" は、デフォルトの画面サイズ（モバイルなどの小型デバイス）でアイテムが12列すべてを占有すること（つまり1列表示）を指定します。medium-device-size=\"6\" は、中サイズ（タブレット）以上の画面でアイテムが6列分（つまり2列表示）を占有することを指定します。\nC. size=\"6\" は、モバイル画面で6列分（つまり2列表示）を指定することになるため、要件（モバイルで1列）を満たしません。\nD. size=\"6\" は、モバイル画面で2列表示となるため、要件を満たしません。また、小型デバイスのサイズは通常 size 属性で指定します。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 205, "q": "開発者は、標準のケース作成画面を、ケースを作成する前にユーザをウィザードで誘導するカスタム画面に置き換えるよう求められました。組織にはLightning Experienceを使用しているユーザしかいません。要件を満たすために、開発者はケースの「新規」アクションを何で上書きすべきですか？", "choices": ["A. Lightningページ", "B. Lightningレコードページ", "C. Lightningコンポーネント", "D. Lightningフロー"], "answer": ["D"], "category": "ユーザインターフェース", "explanation": "A. Lightningページ（アプリケーションページやホームページ）は、特定のオブジェクトの標準の「新規」ボタンのアクションを上書きする機能として直接使用されるものではありません。\nB. Lightningレコードページは、主に既存のレコードの参照ページや編集ページをカスタマイズするために使用されます。「新規」アクション（レコード作成画面）をウィザード形式で上書きするのには適していません。\nC. Lightningコンポーネント（AuraまたはLWC）を使用して「新規」アクションを上書きし、カスタムUIを構築することは技術的に可能です。しかし、ウィザード形式（複数画面のステップ）を構築するには、フローの方が宣言的に（コードを最小限にして）実装できるため、より推奨されます。\nD. 正解です。画面フローは、ユーザを複数の画面ステップ（ウィザード）でガイドし、情報を収集した上でレコードを作成する機能を提供します。標準の「新規」アクションは、この画面フローを起動するように上書きすることができます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 206, "q": "Universal Containers（UC）は、顧客がコンテナに関する問題を記録するのを助けるために、カスタマーコミュニティを開発したいと考えています。このコミュニティは、ドイツ語とスペイン語を話す顧客にも機能する必要があります。UCはSalesforceを使えば国際的なコミュニティを簡単に作成できると聞き、サイトを構築するために開発者を雇いました。サイトが多言語対応であることを保証するために、開発者は何を使用すべきですか？", "choices": ["A. カスタムラベルを使用して、カスタムメッセージが適切に翻訳されるようにする。", "B. カスタム設定を使用して、カスタムメッセージが適切に翻訳されるようにする。", "C. カスタムオブジェクトを使用して、カスタム選択リストの値を翻訳する。", "D. カスタムメタデータを使用して、カスタム選択リストの値を翻訳する。"], "answer": ["A"], "category": "ユーザインターフェース", "explanation": "A. 正解です。カスタムラベルは、Apex、Lightningコンポーネント、Visualforceページなどで使用されるカスタムテキスト（エラーメッセージ、ヘルプテキスト、ボタンのラベルなど）を一元管理し、翻訳するための標準機能です。トランスレーションワークベンチと連携し、ユーザの言語設定に応じて自動的に適切な翻訳を表示します。\nB. カスタム設定は、アプリケーションの設定値や組織固有のデータを保存するために使用されます。多言語のテキストメッセージを管理し、ユーザの言語に応じて自動的に切り替えるための機能としては設計されていません。\nC. カスタムオブジェクトはデータレコードを保存するためのものです。選択リストの値の翻訳は、トランスレーションワークベンチを使用して行うのが標準的な方法であり、カスタムオブジェクトを使用するのは不適切です。\nD. カスタムメタデータは、設定データ（カスタム設定に似ていますが、より高機能）を管理するために使用されます。選択リストの値の翻訳は、トランスレーションワークベンチで行います。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 207, "q": "あるページが取引先責任者に対して 'Attempt to dereference a null object'（nullオブジェクトの参照解除の試行）エラーをスローします。コントローラのどの変更がこのエラーを修正しますか？", "choices": ["A. コントローラの先頭で静的（static）かつfinalな取引先責任者を宣言する。", "B. ゲッター（getter）内で条件を使用し、もしnullであれば新しい取引先責任者を返すようにする。", "C. セッター（setter）のシグネチャ（定義）が取引先責任者を返すように変更する。", "D. ゲッター（getter）のシグネチャ（定義）が静的な（static）取引先責任者になるように変更する。"], "answer": ["B"], "category": "ユーザインターフェース", "explanation": "A. static finalとして宣言するだけでは、null参照の問題は解決しません。変数がインスタンス化（初期化）されることが重要であり、staticにすることは通常、Visualforceページのインスタンス変数としては不適切です。\nB. 正解です。このエラーは、ページがコントローラ内の取引先責任者変数を参照しようとした際に、その変数が初期化されておらずnullであるために発生します。ゲッターメソッド内で変数がnullかどうかを確認し、nullの場合に新しいインスタンス（new Contact()）を生成して返すようにすることで、ページがnullを参照するのを防ぐことができます。\nC. セッターメソッドは通常、ページから値を受け取るために使用され、戻り値はvoidです。セッターが値を返すように変更しても、ゲッターがnullを返す問題は解決しません。\nD. ゲッターをstaticに変更すると、その変数はインスタンス変数ではなくクラス変数となり、Visualforceページからの標準的なデータバインディング（例: {!contact.Name}）と互換性がなくなる可能性があり、null参照エラーの解決策にはなりません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 208, "q": "あるカスタムLightningコンポーネントの一部に、組織内にある数百万件にのぼる商談の総数を表示します。このLightningコンポーネントは、必要なデータを取得するためにApexメソッドを使用します。開発者がLightningコンポーネントのために商談の総数を取得する最適な方法は何ですか？", "choices": ["A. 商談レコードの数をカウントするSOQL forループ", "B. 商談オブジェクトに対する COUNT() SOQL集計クエリ", "C. 商談レコードの数をカウントするApexバッチジョブ", "D. 商談オブジェクトに対する SUM() SOQL集計クエリ"], "answer": ["C"], "category": "ユーザインターフェース", "explanation": "A. この方法は、SOQLクエリで取得できるレコードの上限（50,000件）というガバナ制限にすぐに達するため、数百万件のレコードをカウントするには適していません。\nB. COUNT() はレコード数を集計する正しいSOQL関数です。しかし、数百万件のレコードに対してLightningコンポーネント（同期的）からApexメソッド経由で直接実行すると、クエリがタイムアウト（例: Apex CPU時間制限）する可能性が高く、ユーザ体験が著しく低下するため「最適」とは言えません。\nC. 正解です。数百万件規模のデータを扱う場合、リアルタイムの集計は非現実的です。最適なパターンは、バッチApexを使用して夜間などに非同期で全レコードをカウントし、その結果（総数）をカスタム設定、カスタムメタデータ、または専用のカスタムオブジェクトレコードに保存しておく方法です。Lightningコンポーネントは、計算（COUNT()）を実行するのではなく、この 保存された結果 を照会するだけなので、瞬時に総数を表示できます。\nD. SUM() 集計クエリは、レコードの 数 ではなく、特定の数値項目（例: 金額）の 合計値 を計算するために使用します。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 209, "q": "新しいリリースの直前に、開発者サンドボックスで新しい注文フルフィルメントプロセス機能を設定したSalesforce管理者が突然退職しました。UATサイクルの一環として、ユーザはサンドボックスですべての変更を完全にテストし、承認を済ませていました。これにより、注文フルフィルメント機能は本番環境でのリリース準備が整っていました。残念ながら、変更セットは開始されていましたが、元の管理者によって完了されていませんでした。開発者がデプロイを完了させるために呼ばれました。本番環境に移行する必要がある設定変更を特定するために、開発者は何をすべきですか？", "choices": ["A. Salesforce設定で、すべてのオブジェクトの最終更新日を見て、どれを変更セットに追加すべきかを判断する。", "B. メタデータAPIとサポートされている開発IDEを使用して、変更が失われないように、サンドボックスから本番環境にすべての設定をプッシュする。", "C. 設定変更履歴を利用して、退職した管理者によって行われた変更を確認し、どの変更を変更セットに追加すべきかを特定する。", "D. CI（継続的インテグレーション）とGitリポジトリを設定し、サンドボックスのメタデータと本番のメタデータを自動的にマージする。"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "A. この方法は非効率的であり、不正確です。変更はオブジェクト（項目など）だけでなく、フロー、権限セット、ページレイアウトなど多岐にわたる可能性があり、オブジェクトの最終更新日だけでは関連するすべてのコンポーネントを特定できません。\nB. サンドボックスから すべて の設定を本番環境にデプロイするのは非常に危険です。UATで承認されていない他の未完成の変更や、本番環境の既存の設定を意図せず上書きしてしまうリスクがあります。\nC. 正解です。設定変更履歴は、過去180日間に「誰が」「いつ」「どのような設定変更」を行ったかを追跡します。これにより、開発者は退職した管理者が行った変更を特定し、注文フルフィルメント機能に関連するコンポーネント（例: 作成されたフロー、変更された項目）を識別して、変更セットに正確に追加できます。\nD. CI/Gitの導入はDevOpsのベストプラクティスですが、この差し迫ったデプロイの問題を解決する手段ではありません。これらのツールを設定するには時間がかかり、今 不足しているコンポーネントを特定する役には立ちません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 210, "q": "Universal Containersは、いくつかの外部システムと統合する必要があります。このプロセスは、Salesforceでレコードが作成されたときに開始されます。リモートシステムは、Salesforceが処理を続行する前に応答を待つ必要がありません。これを達成するための推奨される最善のソリューションは何ですか？", "choices": ["A. PushTopicイベント", "B. アウトバウンドメッセージ", "C. HTTPコールアウトを伴うトリガ", "D. プラットフォームイベント"], "answer": ["D"], "category": "テスト、デバッグ、リリース", "explanation": "A. PushTopicイベントはストリーミングAPIの一部であり、主にSalesforceのデータ変更を（サブスクライブしている）外部クライアントに通知するために使用されます。Salesforceから能動的に統合を開始する用途としては、プラットフォームイベントほど柔軟ではありません。\nB. アウトバウンドメッセージは、ワークフローや承認プロセスからSOAPメッセージを送信する宣言的な方法で、非同期であり応答を待ちません。要件を満たすことはできますが、SOAPプロトコルに限定され、送信できるデータも限られるため、柔軟性に欠けます。\nC. トリガから直接HTTPコールアウト（外部システム呼び出し）を行うことは、ガバナ制限により許可されていません。コールアウトは非同期Apex（futureメソッドやQueueableなど）で行う必要があります。\nD. 正解です。レコード作成トリガからプラットフォームイベントを発行するのが最も推奨される方法です。これにより、レコードの保存トランザクションと外部への通知が完全に分離（デカップリング）されます。外部システムは非同期でこのイベントをサブスクライブ（受信）でき、応答を待つ必要がないため、要件に最適です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 211, "q": "見積および注文プロセスの一環として、ある企業はOAuth 2.0をサポートするドキュメントストレージシステムのRESTエンドポイントにPDFを送信する必要があります。PDFを送信するには、各Salesforceユーザが個別にドキュメントストレージシステムで認証される必要があります。開発者がRESTエンドポイントへの認証を実装するための最適な方法は何ですか？", "choices": ["A. OAuth認証プロバイダを使用した指定ログイン情報", "B. パスワード認証を使用した指定ログイン情報", "C. OAuthトークンカスタム項目を持つ階層カスタム設定", "D. 2つのパスワードカスタム項目を持つ階層カスタム設定"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. 正解です。指定ログイン情報は、外部エンドポイントへのコールアウトと認証を一元管理するSalesforceの標準機能です。認証プロバイダと組み合わせ、「ユーザごと」の認証設定を使用することで、要件である「各Salesforceユーザが個別に認証される」OAuth 2.0フローを安全かつ最適に実装できます。\nB. 指定ログイン情報の使用は正しいアプローチですが、認証タイプが異なります。「パスワード認証」は、基本的なユーザ名とパスワードを使用する認証方式です。要件はOAuth 2.0であるため、この選択肢は適していません。\nC. カスタム設定を使用して認証トークン（特にユーザごとのトークン）を保存することは、古い方法であり推奨されません。トークンが暗号化されず、トークンの更新（リフレッシュ）管理が複雑になるため、セキュリティ上も運用上も問題があります。\nD. この方法は、認証方式がOAuth 2.0であるという要件と一致しません。また、Cと同様に、カスタム設定に認証情報（パスワード）を保存することは安全ではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 212, "q": "非同期プロセスを伴うトリガが正常に実行されたことを、開発者はどのようにアサート（検証）すべきですか？", "choices": ["A. テストクラスですべてのテストデータを作成し、system. runs {} を使用してトリガを起動し、その後アサーションを実行する。", "B. Salesforceにレコードを挿入し、seeAllData=true を使用し、その後アサーションを実行する。", "C. すべてのテストデータを作成し、テストクラスで future を使用し、その後アサーションを実行する。", "D. テストクラスですべてのテストデータを作成し、Test.startTest{} と Test.stopTest {} を呼び出し、その後アサーションを実行する。"], "answer": ["D"], "category": "上級デベロッパーの基本", "explanation": "A. system.runs{} という構文はApexに存在しません。System.runAs{} のことかもしれませんが、これはテストを実行するユーザコンテキストを指定するものであり、非同期処理の実行を制御するものではありません。\nB. seeAllData=true の使用は、テストが組織の既存データにアクセスできるようにするものですが、テストデータの分離の原則に反するため非推奨です。また、非同期プロセスの完了を保証するものではありません。\nC. テストクラスが future メソッドを使用しても、トリガによって起動された別の future メソッドの完了を待機させることはできません。\nD. 正解です。Test.startTest() でテストのガバナ制限をリセットした後、トリガを起動するDML（挿入や更新）を実行します。その後 Test.stopTest() を呼び出すと、startTest() 以降にキューに入れられたすべての非同期プロセス（@futureメソッドやQueueableジョブなど）が即座に実行（完了）されます。これにより、stopTest() の後の行で非同期処理の結果を検証（アサート）できます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 213, "q": "Universal Containersは、階層カスタム設定 User_Prefs_c に、チェックボックス項目 Show_Help_c を持って、ユーザのプリファレンスを保存しています。会社レベルのデフォルト（初期値）は組織レベルで保存されていますが、ユーザレベルで上書き（オーバーライド）されるかもしれません。もしユーザがプリファレンスを上書きしていない場合、デフォルトが使用されるべきです。現在のユーザの Show_Help_c プリファレンスは、どのように取得すべきですか？", "choices": ["A. Boolean show = User_Prefs__c.getValues(UserInfo.getUserId()).Show_Help__c;", "B. Boolean show = User_Prefs__c.getInstance().Show_Help__c;", "C. Boolean show = User_Prefs__c.Show_Help__c;", "D. Boolean show = User_Prefs__c.getValues().Show_Help__c;"], "answer": ["B"], "category": "上級デベロッパーの基本", "explanation": "A. getValues(Id) メソッドは、指定されたID（この場合はユーザID）に完全一致する設定レコードのみを取得しようとします。ユーザレベルの上書きが存在しない場合、組織レベルのデフォルト値は自動的に返されません。\nB. 正解です。getInstance() メソッドは、階層カスタム設定の値を取得するための標準的な方法です。現在のユーザの設定が存在すればそれを返し、存在しなければ自動的にプロファイルレベル（もしあれば）、最終的には組織レベルのデフォルト値を返します。\nC. この構文は、Apexでカスタム設定のインスタンスの値を取得する方法として正しくありません。\nD. getValues() という引数なしのメソッドは、階層カスタム設定の値を取得する標準的な方法ではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 214, "q": "開発者が、モックコールアウトを行う前にテストデータを作成するテストクラスを持っていますが、「未コミットの作業が保留中です。コールアウトの前にコミットまたはロールバックしてください」というエラーを受け取るようになりました。このエラーを解決するために、どのステップを実行すべきですか？", "choices": ["A. 挿入とモックコールアウトの両方が Test.stopTest() の後に行われるようにする。", "B. レコードが Test.startTest() ステートメントの前に挿入され、モックコールアウトが @testSetup でアノテーションされたメソッド内で発生するようにする。", "C. 挿入とモックコールアウトの両方が Test.startTest() の後に行われるようにする。", "D. レコードが Test.startTest() ステートメントの前に挿入され、モックコールアウトが Test.startTest() の後に行われるようにする。"], "answer": ["D"], "category": "ロジックとプロセスの自動化", "explanation": "A. Test.stopTest() は、Test.startTest() 以降にキューに入れられた非同期処理を実行するために使用されます。その後に主要なテストロジック（DMLやコールアウト）を配置するのは適切ではありません。\nB. @testSetup メソッドは、テストメソッド実行前に共通のテストデータを作成するためのものであり、このメソッド内でコールアウトを実行することはできません。\nC. これがエラーの直接の原因です。Test.startTest() の後にDML操作（挿入）とコールアウトを同じトランザクションで実行しようとすると、DMLがコミットされていないためエラーが発生します。\nD. 正解です。DML操作（レコード挿入）を Test.startTest() の前に実行してトランザクションをコミットさせます。その後 Test.startTest() で新しいトランザクションコンテキストを開始し、その中でコールアウトを実行すれば、保留中のDMLが存在しないためエラーを回避できます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 215, "q": "あるSalesforce開発者が多国籍企業に雇われ、従業員の福利厚生と獲得したコミッションを経時的に表示するカスタムLightningアプリケーションを構築しています。このアプリケーションは、日付、時刻、数値、通貨、および通貨記号に関して、ユーザのロケールコンテキストを認識し、尊重しなければなりません。Auraコンポーネントを使用する場合、Lightningアプリケーションがユーザのロケールに準拠することを保証するために、開発者はどのアプローチを実装すべきですか？", "choices": ["A. $User グローバル変数を使用して、ユーザのプリファレンスを取得する。", "B. $Label グローバル値プロバイダを使用する。", "C. $Locale 値プロバイダを使用して、ユーザのプリファレンスを取得する。", "D. ユーザのプリファレンスを保存するために、階層カスタム設定を作成する。"], "answer": ["C"], "category": "ユーザインターフェース", "explanation": "A. $User グローバル変数は、現在ログインしているユーザの情報（ID、名前、メールなど）へのアクセスを提供しますが、日付や通貨の フォーマット といったロケール固有の形式設定を直接提供するものではありません。\nB. $Label は、カスタムラベルに保存された テキスト文字列 を翻訳（多言語化）するために使用されます。日付、数値、通貨の フォーマット（例: 1,000.00 vs 1.000,00）を処理するものではありません。\nC. 正解です。Auraの $Locale グローバル値プロバイダは、現在のユーザのロケール設定（日付の形式、数値の区切り文字、通貨記号など）へのアクセスを許可します。これを使用することで、要件通りにロケールを尊重した表示が可能になります。\nD. ユーザのロケール設定は、Salesforceのユーザレコードに既に保存されています。これらの標準設定を$Localeで読み取るのが正しい方法であり、カスタム設定で重複して管理する必要はありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 216, "q": "ある企業が、特定の地域に対するデフォルト情報と削除時の動作を表す複数のカスタムメタデータレコードに、参照データを保存しています。取引先責任者が挿入されるとき、その取引先責任者の住所情報に基づいて、カスタムメタデータレコードからデフォルト情報が取引先責任者に設定されるべきです。さらに、もしユーザがフラグ付けされた地域に属する取引先責任者を削除しようとした場合、ユーザはエラーメッセージを受け取らなければなりません。企業の人的リソースに応じて、これを自動化する2つの方法は何ですか？2つ選択してください", "choices": ["A. リモートアクション", "B. フロービルダー", "C. Apexトリガ", "D. Apex呼び出し可能メソッド"], "answer": ["B", "C"], "category": "ユーザインターフェース", "explanation": "A. リモートアクション（@RemoteAction）は、主にVisualforceページからApexコントローラメソッドを非同期で呼び出すために使用されます。レコードが挿入または削除される際のサーバサイドの自動化ロジックを実行するトリガとしては機能しません。\nB. 正解です。レコードトリガフロー（特に「保存前」フロー）を使用して、取引先責任者が挿入される際に住所情報を評価し、カスタムメタデータを参照してデフォルト項目を更新できます。また、「削除前」フローを使用して、削除しようとしている取引先責任者がフラグ付き地域に属しているかを確認し、カスタムエラー要素を使用して削除をブロックしエラーを表示することが可能です。\nC. 正解です。before insert トリガを使用して、住所に基づきカスタムメタデータを照会し、新しい取引先責任者レコードの項目を設定できます。また、before delete トリガを使用して、削除対象の取引先責任者がフラグ付き地域に属しているかを確認し、もしそうであれば .addError() メソッドを呼び出してDML操作を中止させ、エラーメッセージを表示できます。\nD. Apex呼び出し可能メソッド（@InvocableMethod）は、それ自体が自動化のトリガではありません。これらは、フローやプロセスビルダー、REST APIなど、他のプロセスから呼び出される再利用可能なApexロジックのブロックです。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 217, "q": "ある企業には、多くのLightningコンポーネントを持つLightningページがあり、その中には参照データをキャッシュするものもあります。このページに、常に最新の参照データが表示されるとは限らないと報告されています。開発者は、Lightningページの問題を分析および診断するために何を使用できますか？", "choices": ["A. Salesforce Lightning InspectorのTransactionsタブ", "B. Salesforce Lightning InspectorのActionsタブ", "C. Salesforce Lightning InspectorのEvent Logタブ", "D. Salesforce Lightning InspectorのStorageタブ"], "answer": ["D"], "category": "テスト、デバッグ、リリース", "explanation": "A. Transactionsタブは、サーバへのリクエストやコンポーネントのライフサイクルイベントにかかった時間を分析するために使用されます。キャッシュされたデータの内容を直接検査するものではありません。\nB. Actionsタブは、実行されたAuraコントローラのアクションとその詳細を追跡するために使用されます。キャッシュストレージの診断には適していません。\nC. Event Logタブは、ページ上で発行および処理されたイベント（AuraおよびLWCのイベント）を監視するために使用されます。\nD. 正解です。Salesforce Lightning Inspector（ブラウザ拡張機能）のStorageタブは、コンポーネントが使用しているクライアントサイドストレージ（Auraコンポーネントのキャッシュなど）の内容を検査するために設計されています。開発者はこのタブを使って、キャッシュに保存されている参照データが古いかどうかを確認できます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 218, "q": "開発者は、任意の2つのオブジェクトレコード間でSalesforceのName項目を比較する汎用的なApexメソッドを作成したいと考えています。例えば、取引先と商談のName項目、または取引先と取引先責任者のName項目を比較する場合などです。Name項目が存在すると仮定して、開発者はこれをどのように行うべきですか？", "choices": ["A. 各オブジェクトをsObjectにキャストし、sObject.getを使用してName項目を比較する。", "B. describe() 関数を使用して、各Name項目の値を比較する。", "C. Salesforce メタデータAPIを使用して、各オブジェクトの値を抽出し、Name項目を比較する。", "D. string.Replace() メソッドを使用して、各Name項目の内容を解析し、その結果を比較する。"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. 正解です。Apexでは、取引先や商談など、すべてのSalesforceレコードは汎用的な sObject 型として扱うことができます。sObject 型の変数に対して .get('FieldName') メソッドを使用すると、実行時に項目名を文字列で指定して、その項目の値（この場合は 'Name'）を動的に取得できます。これにより、異なるオブジェクトタイプ間でも汎用的に値を比較できます。\nB. スキーマのdescribeメソッド（sObjectType.getDescribe()など）は、オブジェクトの定義や項目のプロパティ（型、ラベル、存在確認など）といった メタデータ を調べるために使用されます。レコードの 実際のデータ値 （例: 'ABC商事'）を取得するために使用するものではありません。\nC. Salesforce メタデータAPIを使用して、各Name項目の値を比較する。 - メタデータAPIは、オブジェクトの定義、ページレイアウト、Apexクラスといった 設定（メタデータ） を読み書きするためのAPIです。個々のレコード（データ）の値を取得・比較する用途には使用しません。\nD. string.Replace() は文字列を置換するためのメソッドです。Name項目の値を取得した 後 に使用することはできますが、そもそも異なるオブジェクトからName項目の値を 取得する という問題の核心を解決するものではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 219, "q": "Salesforce Platformデベロッパーが、新しいアプリケーションを本番環境にデプロイする任務を負ったチームを率いています。チームはソース駆動開発（source-driven development）を使用しており、アプリケーションが正常にデプロイされたことを確認したいと考えています。デプロイが成功したことを検証するために、どのツールまたはメカニズムを使用すべきですか？", "choices": ["A. Force.com 移行ツール", "B. Salesforce DX CLI", "C. Apexテスト実行", "D. Salesforce Inspector"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "A. Force.com 移行ツール（Ant移行ツール）は、メタデータをデプロイするために使用されるツールの一つです。デプロイを 実行 することはできますが、ソース駆動開発の文脈において、デプロイ状況を 検証 するための最新のメカニズムとしてはSalesforce DX CLIが推奨されます。\nB. 正解です。Salesforce DX CLI（コマンドラインインターフェース）は、ソース駆動開発におけるデプロイプロセス全体を管理するための中核的なツールです。force:source:deploy コマンドでデプロイを実行し、force:source:deploy:report コマンド（または --wait パラメータ）を使用して、デプロイのステータス（成功、失敗、保留中）をプログラムで確認（検証）できます。\nC. Apexテスト実行は、デプロイプロセスの一部として、コードの品質やカバレッジを保証するために実行されます。デプロイによってメタデータ自体が本番環境に正常に移行されたかどうかを 検証 するツールではありません。\nD. Salesforce Inspectorは、主にデータやメタデータ、デバッグログをリアルタイムで 検査 するために開発者が使用するブラウザ拡張機能です。自動化されたデプロイプロセスの成功を検証するためのツールではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 220, "q": "開発者は、組織内のすべてのカスタムオブジェクトのドロップダウンリストを表示するLightning Webコンポーネントを作成しており、ユーザはそこから選択します。Apexメソッドがデータを準備し、コンポーネントに返します。開発者は、レスポンスに含めるオブジェクトを決定するために何をすべきですか？", "choices": ["A. sObjectのdescribe結果で isCustom() の値を確認する。", "B. @salesforce/schema からすべてのカスタムオブジェクトのリストをインポートする。", "C. sObjectのdescribe結果で getObjectType() の値が 'Custom' か 'Standard' かを確認する。", "D. Schemaクラスの getCustomObjects() メソッドを使用する。"], "answer": ["A"], "category": "ユーザインターフェース", "explanation": "A. 正解です。Schema.getGlobalDescribe() を使用して組織内の全オブジェクトのマップを取得した後、各オブジェクトの DescribeSObjectResult（describe結果）を調べます。この結果に含まれる isCustom() メソッドは、そのオブジェクトがカスタムオブジェクトである場合に true を返すため、要件を満たす正しい方法です。\nB. @salesforce/schema は、Apexではなく、LWCのJavaScript側で使用されるものです。また、これは すべて のオブジェクトを動的に取得するためではなく、特定 のオブジェクトや項目スキーマを静的にインポートするために使用されます。\nC. DescribeSObjectResult クラスには、getObjectType() というメソッドは存在しません。getSObjectType() というメソッドはありますが、これは 'Custom' のような文字列ではなく、オブジェクトの Schema.SObjectType トークンを返します。\nD. Apexの Schema クラスには、getCustomObjects() という名前の便利なメソッドは存在しません。開発者は Schema.getGlobalDescribe() を使用して すべて のオブジェクトを取得し、Aで説明したように isCustom() メソッドで絞り込む必要があります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 221, "q": "ユーザが、カスタムLightning Webコンポーネント（LWC）のボタンが入力したデータを保存していないと報告しています。ボタンはクリックされているように見えますが、LWCは単にそこにあるだけで、何もしていないように見えます。開発者は、エラーメッセージが適切に表示されるようにするために何を使用すべきですか？", "choices": ["A. DMLステートメントを囲む try-catch ブロックを追加する。", "B. allOrNone を false に設定して Database メソッドを使用する。", "C. apex:messages/ タグをコンポーネントに追加する。", "D. エラーメッセージを表示するために JavaScript と HTML を追加する。"], "answer": ["D"], "category": "ロジックとプロセスの自動化", "explanation": "A. これはApexコントローラ（サーバサイド）で行われるべきエラーの キャッチ 処理です。しかし、Apexでエラーをキャッチするだけでは、LWC（クライアントサイド）のユーザインターフェースに自動的にエラーは表示されません。\nB. これはApex側でDML例外を発生させずに部分的な保存を許可する方法です。エラーを Database.SaveResult オブジェクトで取得できますが、これもLWCにエラーを 表示する 解決策には直接なりません。\nC. <apex:messages/> はVisualforceページで使用されるタグです。Lightning Webコンポーネント（LWC）では使用できません。\nD. 正解です。LWCでApexメソッドを呼び出した際にエラーが発生した場合（例: catch(error) ブロック）、LWCのJavaScriptがそのエラーを受け取る必要があります。その後、開発者はJavaScriptを使用してエラーメッセージを変数に格納し、HTMLテンプレート（例: 条件付きで表示されるテキストブロック）を使用してその変数をユーザに表示する必要があります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 222, "q": "ビジネスルールにより、新しい取引先が作成される際には、常に対応する取引先責任者も作成される必要があります。カスタム画面を開発する際に、もし取引先責任者の作成が失敗した場合に、取引先も作成されないように保証するためには何が使用できますか？", "choices": ["A. try-catchブロックと共に setSavepoint() と rollback() を使用する。", "B. allOrNone を true に設定して Database.insert メソッドを使用する。", "C. 取引先責任者の挿入が失敗した場合に Database.delete メソッドを使用する。", "D. 取引先責任者の入力規則を無効化し、トリガでデフォルト値を設定する。"], "answer": ["A"], "category": "上級デベロッパーの基本", "explanation": "A. 正解です。Apexで複数のDML操作（例: 1. 取引先の挿入、2. 取引先責任者の挿入）を1つの論理トランザクションとして扱いたい場合に使用します。setSavepoint() で取引先挿入後にセーブポイントを設定し、try-catch ブロック内で取引先責任者の挿入を試みます。もし取引先責任者の挿入が失敗（catch）した場合、Database.rollback() を呼び出すことで、トランザクションをセーブポイントまで（つまり取引先が挿入される前まで）戻すことができます。\nB. Database.insert(records, allOrNone) メソッドの allOrNone パラメータは、単一のDML操作（つまり1つのリスト）内のレコード群に適用されます。この問題のように、取引先の挿入（DML 1）と取引先責任者の挿入（DML 2）という 2つの異なるDML操作 をまたいでトランザクションを制御することはできません。\nC. これは、エラーが発生した後に手動でデータを元に戻そうとする（補正する）アプローチです。しかし、もし取引先の削除が（例えば他の自動化によって）失敗した場合、データが不整合な状態（取引先だけが存在する）で残ってしまいます。rollback() を使用する方がはるかに安全でトランザクションの原子性を保証できます。\nD. これは、取引先責任者の作成が失敗する 原因（入力規則違反）を取り除こうとするものですが、トランザクションの制御という要件（失敗した場合に取引先も作成しない）を満たしません。また、入力規則以外（例: 必須項目の欠落）で失敗する可能性は残ります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 223, "q": "ある開発者が、取引先のトリガを正常にアサートするテストクラスを作成しました。これはサンドボックス環境では正しく起動し、データを更新します。カスタムプロファイルを持つSalesforce管理者が、このトリガを変更セット経由で本番環境にデプロイしようとしましたが、テストクラスが「権限が不十分です」エラーで失敗しました。この問題を修正するために、開発者は何をすべきですか？", "choices": ["A. 本番環境で「すべてのテストを管理者ユーザとして実行」を有効にするよう設定する。", "B. System.runAs() をテストクラスに追加し、正しいオブジェクト権限を持つユーザとしてトリガを実行する。", "C. seeallData=true をテストクラスに追加し、本番環境の共有モデル内で動作するようにする。", "D. Test.startTest() がテストクラスの For ループ内にないことを確認する。"], "answer": ["B"], "category": "テスト、デバッグ、リリース", "explanation": "A. この設定は、SalesforceのUIから手動でテストを実行する際の動作に影響しますが、デプロイ時に実行されるテストの権限コンテキストを修正するものではありません。\nB. 正解です。デプロイを実行するユーザ（この場合はカスタムプロファイルの管理者）が、トリガ内で実行される操作（特定の項目へのアクセスなど）に必要な権限を持っていないためにエラーが発生しています。System.runAs() を使用して、テスト内で適切な権限を持つユーザを作成し、そのユーザとしてDML操作（トリガの起動）を実行することで、権限不足エラーを回避できます。\nC. seeAllData=true の使用は、テストが組織の既存データに依存することになるため非推奨です。また、この問題はオブジェクトや項目の権限（プロファイル）が原因であり、レコードの共有設定が原因ではありません。\nD. Test.startTest() をループ内で呼び出すことはガバナ制限違反になりますが、「権限が不十分です」というエラーとは関係ありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 224, "q": "Universal Containersは、Salesforceを使用して order__c オブジェクトで注文を追跡しています。order__c オブジェクトの組織の共有設定は非公開です。order__c オブジェクトには、Quality_Controller__c というカスタム項目があり、これはユーザへの参照項目で、指定されたユーザがその注文の品質管理を実行していることを示すために使用されます。Quality_Controller 項目に設定されたユーザに自動的に参照のみアクセス権を付与するには、何を使用すべきですか？", "choices": ["A. レコードの所有権", "B. 条件に基づく共有", "C. Apexによる管理共有", "D. ユーザによる管理共有"], "answer": ["C"], "category": "ユーザインターフェース", "explanation": "A. レコードの所有権は、通常、参照、編集、削除を含むフルアクセスを提供します。要件は「参照のみ」のアクセス権であり、所有者とは別のユーザに付与する必要があるため、不適切です。\nB. 条件に基づく共有ルールは、レコードの条件に基づいて ロール や 公開グループ にアクセス権を付与します。項目で指定された 特定のユーザ に対して動的にアクセス権を付与することはできません。\nC. 正解です。組織の共有設定が非公開の場合、Quality_Controller__c 項目に設定された特定のユーザにアクセス権を自動的に付与するには、プログラムによる共有（共有レコードの作成）が必要です。Apex（通常はトリガ）を使用して Order__Share レコードを作成し、アクセスレベルを「参照のみ」に設定することで、この要件を満たせます。\nD. これは「手動共有」とも呼ばれ、ユーザがUIの「共有」ボタンを使って手動でアクセス権を付与するものです。要件である「自動的に」付与するというプロセスには当てはまりません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 225, "q": "開発者は、ユーザが選択した製品のケースをカスタムLightningページから直接作成できるLightning Webコンポーネントを作成するよう任されました。ユーザが項目の意味をよりよく理解できるように、コンポーネントの入力項目は、製品の画像の上に非線形で表示されます。Lightning Webコンポーネントからのケース作成を実装するために、開発者はどの2つのコンポーネントを使用すべきですか？ 2つ選択してください", "choices": ["A. lightning-record-edit-form", "B. lightning-input-field", "C. lightning-input", "D. lightning-record-form"], "answer": ["C", "D"], "category": "ロジックとプロセスの自動化", "explanation": "A. このコンポーネントは、lightning-input-field (B) と組み合わせて使用され、ある程度のカスタムレイアウトを許可します。しかし、「画像の上に非線形」というピクセル単位での自由な配置要件を満たすには、Cの lightning-input ほどの完全な制御はできません。\nB. このコンポーネントは、lightning-record-edit-form (A) のコンテナ内部で使用されることが前提であり、単体では機能しません。\nC. 正解です。「非線形」で「画像の上に配置する」という要件は、CSS（例: 絶対配置など）による完全なレイアウト制御を意味します。lightning-input は、自動レイアウトに縛られない基本的な入力要素であるため、CSSで自由にスタイリングしてこのカスタムUIを実現するために必要です。\nD. 正解です。lightning-input (C) を使用してカスタムUIを構築した場合、入力されたデータを保存するロジックが必要です。Apexクラスを別途作成する代わりに、lightning-record-form コンポーネントを（例えば非表示で）ページに配置し、object-api-name を指定します。そして、JavaScript側で lightning-input から収集した値を fields オブジェクトとして構築し、this.template.querySelector('lightning-record-form').submit(fields) のように submit メソッドを呼び出すことで、標準のレコード作成機能を利用できます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 226, "q": "Universal Containers（UC）に関する以下の情報を前提とします:\n\nUCはSalesforceで顧客を取引先として表しています。\n\nすべての顧客は、UCのすべてのシステムで一意となるユニークな Customer__Number_c を持っています。\n\nUCはまた、外部システムから送信される請求書を表すために、取引先への参照を持つカスタムの Invoice__c オブジェクトを持っています。\n\nUCは、営業担当が顧客が請求書を期限内に支払ったかどうかを確認できるように、請求書データをSalesforceに統合したいと考えています。\nこれを実装するための最適な方法は何ですか？", "choices": ["A. カスタム請求システムに各顧客のSalesforce取引先IDを持つ相互参照テーブルを作成し、請求書データを毎晩挿入する。", "B. Customer_Number__c が外部IDであり、かつカスタム項目 Invoice_Number__c が外部IDであることを確認し、請求書データを毎晩Upsert（アップサート）する。", "C. Salesforce Connectと外部データオブジェクトを使用して、カスタムコードなしで請求書データをSalesforceにシームレスにインポートする。", "D. 請求書データを挿入するたびに取引先オブジェクトにクエリを発行し、請求書上の顧客番号に対応するSalesforce IDを取得する。"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "A. このアプローチは、外部システム側にSalesforce IDを保持する改修を必要とします。これはシステム間の結合度を高め、外部IDを使用する方法（B）に比べて柔軟性が低くなります。\nB. 正解です。Customer_Number__c を外部IDにすることで、Upsert 操作時にSalesforce IDの代わりにこの既知の番号を使用して、Invoice__c レコードが属する取引先を自動的に紐付けることができます。また、Invoice_Number__c も外部IDにすることで、Upsert が可能になり、夜間バッチ処理の冪等性（べきとうせい、何度実行しても同じ結果になること）が保証され、重複レコードの作成を防げます。\nC. Salesforce Connectは、外部データをSalesforce内に インポート（コピー） するのではなく、仮想的に表示（参照） するための機能です。要件はデータをSalesforce内の Invoice__c オブジェクトに統合することであるため、適していません。\nD. この方法は、特に夜間バッチで大量のデータをロードする場合、非常に非効率です。データローダやAPIが Upsert 操作（B）で外部ID参照を使用すれば、この「IDを取得するためのクエリ」をSalesforceプラットフォームが裏側で効率的に処理してくれます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 227, "q": "ある組織が、配送先住所の項目を持つカスタムオブジェクト order__c に顧客の注文情報を記録しています。開発者は、配送先住所の地域に関連付けられた固定のパーセンテージ（率）に基づいて、注文の配送料を計算するコードを追加するよう任されました。計算が機能するために、変更が本番環境にデプロイされた際に追加のステップを必要としないように、開発者は地域ごとのレートを保存するために何を使用すべきですか？", "choices": ["A. カスタム階層設定", "B. カスタムメタデータ型", "C. カスタムリスト設定", "D. カスタムオブジェクト"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "A. カスタム階層設定は、組織、プロファイル、ユーザのレベルで設定を上書きするために使用されます。地域ごとのレートのリスト（例: 地域A = 5%、地域B = 7%）を保存する用途には適していません。\nB. 正解です。カスタムメタデータ型は、設定データ（この場合は地域別レート）をレコードとして保存できます。これらのレコードはメタデータとして扱われるため、変更セットやデプロイパッケージに含めて本番環境に直接移行できます。これにより、デプロイ後にデータを手動で投入する必要がなく、「追加のステップが不要」という要件を満たします。\nC. カスタムリスト設定は、地域ごとのレートのようなデータを保存するのに適しています。しかし、カスタム設定の データ（レコード）はメタデータとは見なされず、デプロイパッケージに自動的に含まれません。デプロイ後に手動またはデータローダでデータを移行する必要があるため、要件を満たしません。\nD. カスタムオブジェクトは主にビジネスデータを保存するために使用されます。設定データを保存するために使用することもできますが、データは別途移行する必要があり、カスタムメタデータ型を使用する利便性に欠けます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 228, "q": "Universal Containersは、バッチApexプロセスのfinishメソッドから直接サポート担当者にEメールを送信するのを待つ代わりに、未処理の例外が発生した場合に外部システムに通知したいと考えています。この要件を満たすための適切なパブリッシュ/サブスクライブ（公開/購読）ロジックは何ですか？", "choices": ["A. Eventbus.publish() メソッドを使用してエラーイベントを公開する。", "B. 公開は必要ありません。外部システムに BatchApexErrorEvent をサブスクライブ（購読）させる。", "C. addError メソッドを使用してエラーイベントを公開する。", "D. フローを使用してエラーイベントを公開する。"], "answer": ["B"], "category": "ユーザインターフェース", "explanation": "A. このメソッドは、カスタムプラットフォームイベントを公開するために使用されます。バッチApex内で例外をキャッチし、手動でカスタムイベントを公開することも理論上は可能ですが、「未処理の例外」を自動的に通知する標準的な仕組みではありません。\nB. 正解です。バッチクラスが Database.RaisesPlatformEvents インターフェースを実装している場合、そのバッチジョブで未処理の例外が発生すると、Salesforceプラットフォームが自動的に標準の BatchApexErrorEvent を発行します。開発者が手動で公開ロジックを実装する必要はなく、外部システムはこのイベントをサブスクライブするだけで通知を受け取れます。\nC. addError() メソッドは、トリガやApexコントローラなどでDML操作を失敗させ、ユーザインターフェースにエラーメッセージを表示するために使用されます。プラットフォームイベントを発行する機能はありません。\nD. フローは、Apexの未処理の例外を自動的にキャッチして公開する機能は持っていません。フローは、BatchApexErrorEvent のようなイベントを サブスクライブ して、それに応じたアクション（例: 別のコールアウト）を実行するために使用することはできます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 229, "q": "カスタムインターフェースの一環として、開発チームが複数の新しいLightning Webコンポーネントを作成しました。各コンポーネントは、エラー処理にトーストメッセージを使用しています。開発完了後、すべてのコンポーネントが同じLightningページに追加されました。受け入れテスト中、コンポーネントの読み込み時にエラーが発生すると、トーストメッセージが連鎖して（次々と）表示されることについて、ユーザから不満が出ています。ユーザエクスペリエンスを向上させるために、開発者が実装すべき2つのテクニックはどれですか？ 2つ選択してください", "choices": ["A. Lightning Webコンポーネントを使用して、すべてのエラーを集約して表示する。", "B. window.alert() メソッドを使用してエラーメッセージを表示する。", "C. <template> タグを使用して、インプレース（その場）のエラーメッセージを表示する。", "D. 各コンポーネントの公開プロパティを使用して、エラーメッセージを表示する。"], "answer": ["A", "D"], "category": "ロジックとプロセスの自動化", "explanation": "A. 正解です。これは「エラーパネル」と呼ばれる一般的なUXパターンです。各コンポーネントが個別にトーストを出す代わりに、ページ上の単一のコンポーネントが、発生したすべてのエラーを集約して一箇所に表示します。これにより、トーストの連鎖が解消されます。\nB. window.alert() は、ユーザの操作をブロックするブラウザのダイアログです。これは通常、トーストメッセージよりもUX（ユーザエクスペリエンス）が悪いと見なされます。トーストの連鎖をアラートの連鎖に置き換えるだけで、問題は解決しません。\nC. これは、エラーが発生したコンポーネントの 内部 に <template if:true={error}> などを使ってエラーを表示するパターンです。これもトーストの連鎖を解決する有効なアプローチですが、(A)と(D)の組み合わせは、エラーを 集約する という特定の実装メカニズムを説明しています。\nD. 正解です。これは(A)の集約コンポーネントを機能させるためのメカニズムを指します。(A)の集約コンポーネント（エラーパネル）に公開プロパティ（例: @api errors）を定義します。親ページは、子コンポーネントから（通常はカスタムイベント経由で）エラーをキャッチし、そのエラーリストを(A)のコンポーネントの公開プロパティ(D)に渡すことで、エラーパネルに表示させることができます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 230, "q": "ある企業が、ネイティブiOSの注文アプリを持っており、Salesforceに接続して、多くの異なるオブジェクトから集約された情報をJSON形式で取得する必要があります。Salesforceでこれを実装するための最適な方法は何ですか？", "choices": ["A. Apex REST Webサービス", "B. Apex SOAP Webサービス", "C. Apex SOAPコールアウト", "D. Apex RESTコールアウト"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. 正解です。これは、外部システム（この場合はiOSアプリ）がSalesforceに接続し、データを要求する（インバウンド）ための機能です。Apex RESTサービスは、リクエストを受け取り、Apexでロジックを実行して（例: 複数のオブジェクトから情報を集約し）、結果をJSON形式で返すことができるため、要件に最適です。\nB. これもインバウンドのWebサービスですが、主にXMLベースのSOAPプロトコルを使用します。要件は「JSON形式」と明記されているため、JSONネイティブであるRESTがSOAPよりも適しています。\nC. コールアウトは、Salesforceが 外部 のシステムを呼び出す（アウトバウンド）ために使用されます。このシナリオでは、iOSアプリがSalesforceを呼び出す（インバウンド）必要があるため、逆です。\nD. これもアウトバウンドの通信（Salesforceから外部へ）です。Cと同様に、インバウンドである要件を満たしません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 231, "q": "非同期Apexを使用することによってのみ実行可能なユースケースはどれですか？", "choices": ["A. 数万件のレコードをクエリする", "B. 将来完了するようにバッチプロセスをスケジュールする呼び出しを行う", "C. ApexトリガからWebサービスを呼び出す", "D. 挿入の完了後にレコードを更新する"], "answer": ["C"], "category": "テスト、デバッグ、リリース", "explanation": "A. 同期Apexでも、ガバナ制限（SOQLクエリで取得できる合計レコード数は50,000件）の範囲内であれば、数万件のレコードをクエリすることは可能です。したがって、非同期Apex のみ が必要というわけではありません。\nB. System.scheduleBatch メソッドなどを使用してバッチプロセスをスケジュールする行為自体は、同期的に実行されます。スケジュールされたジョブが非同期に実行されるだけで、スケジューリングの呼び出し自体は同期的です。\nC. 正解です。Salesforceのガバナ制限により、トリガなどの同期トランザクション内から直接Webサービス（コールアウト）を呼び出すことは禁止されています。これを実行する唯一の方法は、トリガから非同期Apex（例: @future メソッドやQueueable Apex）を呼び出し、その非同期プロセス内からコールアウトを行うことです。\nD. これは、after insert トリガを使用すれば、同期的に（同じトランザクション内で）実行できます。非同期で行うこともできますが、非同期が唯一の方法ではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 232, "q": "Salesforceユーザが取引先を保存する際に、「トリガの最大深度を超えました」というエラーが継続して発生します。開発者はこのエラーをどのように修正できますか？", "choices": ["A. トリガのロジックを2つの別々のトリガに分割する。", "B. トリガを @future アノテーションを使用するように変換し、その後の取引先オブジェクトへのトリガ呼び出しを連鎖させる。", "C. トリガが @isMultiThread=true アノテーションを使用するように修正する。", "D. ヘルパークラスを使用して、トリガが初回に起動されたときにBoolean（ブール値）を TRUE に設定し、その後、そのBooleanが FALSE の場合にのみトリガが起動するように修正する。"], "answer": ["D"], "category": "ユーザインターフェース", "explanation": "A. トリガロジックを分割しても、トリガが実行する更新によって同じトリガが再度呼び出される（再帰）という根本的な問題が解決されない限り、エラーは解消されません。\nB. トリガ自体を @future（非同期）にすることはできません。トリガから @future メソッドを呼び出すことは可能ですが、これは再帰を制御するための適切な方法ではなく、トランザクションの整合性の問題や非同期ガバナ制限の問題を引き起こす可能性があります。\nC. @isMultiThread=true というアノテーションはApexに存在しません。\nD. 正解です。これは、トリガの再帰を防ぐための標準的なデザインパターンです。静的（static）なBoolean変数を使用して、現在のトランザクションでトリガが既に実行されたかを追跡します。2回目以降の呼び出しでは、Booleanが TRUE になっているためロジックが実行されず、無限ループを防ぐことができます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 233, "q": "開発者が、ユーザのチェックボックス選択に基づいて子コンポーネントを条件付きで表示するLightning WebコンポーネントのJestテストを作成しています。各シナリオで正しいコンポーネントが表示され、非表示になることを適切にテストするために、開発者は何をすべきですか？", "choices": ["A. テストごとに新しい describe ブロックを作成する。", "B. 各テストの後に afterEach() メソッドでDOMをリセットする。", "C. 各テストの後にティアダウンブロックを追加してDOMをリセットする。", "D. テストごとに新しい jsdom インスタンスを作成する。"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "A. describe ブロックは、関連するテストケースをグループ化するために使用されます。テスト（it ブロック）ごとにDOMの状態をリセットする必要があるため、describe ブロックを追加しても問題は解決しません。\nB. 正解です。Jestのテスト（特にLWCのテスト）では、各テストケース（it ブロック）が互いに独立している必要があります。afterEach() フックは各テストの直後に実行されるため、これを使用してDOMの状態をクリーンアップ（リセット）することで、前のテストによる変更が次のテストに影響を与えるのを防ぎます。\nC. 「ティアダウンブロック」はJestの特定の用語ではありません。afterEach() が、各テスト後のクリーンアップ処理を行うための正しいフックです。\nD. jsdom（DOMのシミュレーション環境）は、通常Jestによってテストファイル単位で管理されます。テストケース（it）ごとに新しいインスタンスを手動で作成するのは標準的なプラクティスではなく、afterEach() でDOMをリセットする方が適切です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 234, "q": "Universal Containers（UC）の採用責任者は、新しい採用アプリ経由で、すべての内部ユーザに役割、部門、場所で募集中のポジションを検索する機能を提供したいと考えています。検索に加えて、アプリのユーザは友人を推薦したり、ポジションに応募したり、現在の応募状況を確認したりできる必要があります。このアプリは、Salesforceが提供する標準のモバイルアプリ経由で、UCの既存のiOSおよびAndroidユーザに表示されます。カスタムユーザインターフェースデザインを持ち、オフラインアクセスは必要ありません。これらの要件を考慮して、アプリを開発するための推奨アプローチは何ですか？", "choices": ["A. Lightning Experience Builder", "B. Lightning Webコンポーネント", "C. Visualforce", "D. Salesforce SDK"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "A. Lightning Experience Builder（またはLightningアプリケーションビルダー）は、主にコンポーネントをLightningページ上にドラッグアンドドロップで配置・構成するために使用される宣言的なツールです。「カスタムユーザインターフェースデザイン」を持つコンポーネント自体を 開発する ための技術ではなく、ページを組み立てるためのツールです。\nB. 正解です。Lightning Webコンポーネント（LWC）は、Lightning ExperienceおよびSalesforce標準モバイルアプリ内で動作する、パフォーマンスの高いカスタムUIを構築するための最新の推奨フレームワークです。要件である「カスタムユーザインターフェースデザイン」と「標準モバイルアプリでの表示」の両方を満たします。\nC. VisualforceはSalesforceのレガシー（旧）UIフレームワークです。Salesforceモバイルアプリ内で表示させることは可能ですが、現在ではLWCが推奨されており、モバイルでのユーザエクスペリエンスもLWCの方が優れています。\nD. Salesforce SDK（Mobile SDK）は、Salesforceに接続する スタンドアロンのカスタムネイティブアプリ をiOSやAndroid向けにゼロから構築するために使用されます。今回の要件は「Salesforceが提供する標準のモバイルアプリ」内で機能を表示することであるため、SDKを使用して別のアプリを構築するのは適切ではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 235, "q": "Universal Containersは、顧客がSalesforceコミュニティにログインし、カスタムVisualforceページ経由で注文を更新することを許可しています。Universal Containersの営業担当も、同じVisualforceページで注文を編集できます。Apexテストクラス内で、レコード共有がVisualforceページで強制されていることをテストするために、開発者は何を使用すべきですか？", "choices": ["A. 営業担当とコミュニティユーザとしてテストするために System. profiles=() を使用する。", "B. 管理者とコミュニティユーザとしてテストするために System. profiles() を使用する。", "C. 営業担当とコミュニティユーザとしてテストするために System. profiles1h=() を使用する。", "D. 管理者とコミュニティユーザとしてテストするために System.runsAs() を使用する。"], "answer": ["D"], "category": "上級デベロッパーの基本", "explanation": "A. System.profiles=() という構文はApexに存在しません。\nB. System.profiles() という名前のメソッドはApexに存在しません。\nC. System.profiles1h=() という構文はApexに存在しません。\nD. 正解です。System.runAs(User u) メソッドは、テスト実行中にコードブロックを特定のユーザのコンテキストで実行するために使用されます。レコード共有が適用されていることを確認するには、アクセス権が異なるユーザ（例: 共有ルールが適用されるコミュニティユーザ）としてテストを実行し、期待通りにデータアクセスが制限されるかを検証する必要があります。他の選択肢は有効なApexメソッドではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 236, "q": "開発者が、Leads（リード）に関する情報を収集するために lightning-record-edit-form を使用するLightning Webコンポーネントを作成しました。ユーザは、Lead（リード）レコードを保存しようとすると、入力に関するエラーメッセージが一度に1つしか表示されないと不満を述べています。複数の項目でバリデーションを実行し、最小限のJavaScript介入で複数のエラーメッセージを同時に表示するための推奨されるアプローチは何ですか？", "choices": ["A. Try/catch/finally ブロック", "B. 外部JavaScriptライブラリ", "C. 入力規則", "D. Apexトリガ"], "answer": ["B"], "category": "ユーザインターフェース", "explanation": "A. これは、JavaScriptコード実行時の例外（エラー）を処理するための構文です。フォームの入力値を検証（バリデーション）するロジックを定義したり、複数のエラーメッセージをUIに表示したりする機能ではありません。\nB. 正解です。lightning-record-edit-form の標準のクライアントサイドバリデーション（必須項目チェックなど）は、ユーザの操作（フォーカス移動など）に応じて逐次的に（一度に一つ）エラーを表示することがあります。外部のバリデーションライブラリ（例: yup や zod）を使用すると、onsubmit イベントで、定義したすべてのルールに基づいて全項目を一括で検証し、すべてのエラーをまとめて取得できます。その後、取得したエラーをループ処理し、各項目にカスタムエラーとして設定することで、「複数のエラーを同時に表示する」という要件を満たすことができます。\nC. 入力規則は、主にサーバサイドで実行され、複数のエラーを返すことができます。しかし、フォームの保存が実行される前に、標準のクライアントサイドバリデーション（例: 必須項目が空）が先に検知され、一度に一つのエラーしか表示されないというユーザの不満を解決できない可能性があります。\nD. Apexトリガも入力規則と同様にサーバサイドの検証です。フォームが送信される前のクライアントサイドでの逐次的なエラー表示の問題を解決するものではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 237, "q": "あるApexトリガは、商談レコードが「成約」としてマークされるたびに、Contract（契約）レコードを作成します。このトリガはうまく機能していますが、最近の買収により、過去の商談レコードをSalesforceインスタンスにロードする必要があります。レコードのテストバッチがロードされると、Apexトリガは契約レコードを作成してしまいます。開発者は、商談の一括ロード時には契約レコードが作成されないようにし、かつ、日常のユーザには引き続き契約レコードが作成されるようにするよう任されました。この目的を達成するためにApexトリガを更新する最も拡張性の高い方法は何ですか？", "choices": ["A. データをロードするユーザのプロファイルIDをトリガに追加し、このユーザに対してはトリガが起動しないようにする。", "B. データをロードするユーザによる契約の作成を防ぐために、契約オブジェクトに入力規則を追加する。", "C. データをロードするユーザについてはトリガ内のロジックの実行をスキップするために、階層カスタム設定を使用する。", "D. データをロードするユーザに対してトリガを無効化するために、リストカスタム設定を使用する。"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "A. これは、プロファイルIDをApexコード内にハードコーディングすることを意味します。もし将来、別のユーザやプロファイルがデータロードを行う必要が出た場合、コードの変更と再デプロイが必要になるため、拡張性が低く推奨されません。\nB. これにより契約の作成はブロックされますが、トリガ自体は実行されてしまい、DML操作の失敗エラーがロード処理中に発生する可能性があります。ロジックをクリーンに「スキップ」する方法ではありません。\nC. 正解です。階層カスタム設定を使用して（例: 「トリガを無効化」というチェックボックスを作成）、トリガロジックの実行をユーザまたはプロファイルレベルで制御できます。管理者は、データをロードするユーザのカスタム設定でこのチェックをオンにするだけで、コードを変更せずにロジックをバイパスできます。これが最も拡張性が高く柔軟な方法です。\nD. リストカスタム設定は、ユーザやプロファイルに基づいて自動的に設定を上書きする階層機能を持っていません。階層カスタム設定の getInstance() メソッドを使う方が、現在の実行ユーザの設定を効率的に取得できるため、このユースケースには階層カスタム設定の方が適しています。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 238, "q": "テストクラスでVisualforceページを初期化するためのベストプラクティスは何ですか？", "choices": ["A. Test.setCurrentPage(Page.MyTestPage); を使用する。", "B. Test.currentPage.getParameters().put(MyTestPage); を使用する。", "C. controller.currentPage.setPage(MyTestPage); を使用する。", "D. Test.setCurrentPage MyTestPage; を使用する。"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. 正解です。これは、テストメソッドの実行コンテキストにおいて、どのVisualforceページが現在処理中であるかを設定するための標準的な静的メソッドです。これにより、コントローラ内で ApexPages.currentPage() を呼び出した際に、指定したページ（Page.MyTestPage）の参照が正しく返されるようになります。\nB. Test.currentPage は現在のページ参照を取得するプロパティですが、getParameters().put() はURLクエリパラメータを設定するためのものです。ページ自体を初期化（設定）する目的では使用されません。\nC. PageReference クラス（通常 currentPage が指す型）には setPage というメソッドは存在しません。これはページコンテキストを設定する正しい方法ではありません。\nD. これは有効なApex構文ではありません。Test.setCurrentPage はメソッドであるため、引数を括弧 () で囲んで呼び出す必要があります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 239, "q": "Lightning Webコンポーネントが読み込まれたときに、カスタムロジックを実行できる手法はどれですか？", "choices": ["A. aura:handler init イベントを使用して関数を呼び出す。", "B. renderedCallback() { } メソッドを使用する。", "C. $A.enqueueAction を呼び出し、呼び出すメソッドを渡す。", "D. connectedCallback() { } メソッドを使用する。"], "answer": ["D"], "category": "ロジックとプロセスの自動化", "explanation": "A. これは、Lightning Webコンポーネント（LWC）ではなく、Auraコンポーネントの初期化ロジックで使用される構文です。\nB. renderedCallback() は、コンポーネントがDOMに 描画された後 に呼び出されるLWCのライフサイクルフックです。これは再レンダリングのたびに複数回呼び出される可能性があり、コンポーネントが 読み込まれた ときの（一度だけの）初期化には connectedCallback() の方が適しています。\nC. $A.enqueueAction は、AuraコンポーネントがサーバサイドのApexメソッドを呼び出すために使用するメカニズムです。LWCでは使用されません。\nD. 正解です。connectedCallback() は、LWCがDOMに挿入されたときに一度だけ呼び出される標準のライフサイクルフックです。これは、コンポーネントの読み込み時に初期化ロジック（データの取得など）を実行するための正しい場所です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 240, "q": "ある企業が、CatalogとCatalog Itemという名前のカスタムオブジェクトで製品オファリングに関する情報を管理しています。Catalog ItemはCatalogへの主従関係項目を持っており、各Catalogは最大100,000件のCatalog Itemを持つことがあります。両方のカスタムオブジェクトには、使用すべき通貨コードを含むCurrencylsoCodeテキスト項目があります。もしCatalogのCurrencylsoCodeが変更された場合、そのすべての子であるCatalog ItemのCurrencylsoCodeも同様に変更されるべきです。CatalogのCurrencylsoCodeが変更されたときにCatalog ItemのCurrencylsoCodeを更新するために、開発者は何を使用すべきですか？", "choices": ["A. Catalog Itemオブジェクトにクエリを発行し、もしCatalogのCurrencylSoCodeが異なればCatalog Itemを更新する Database.Schedulable および Database.Batchable クラス", "B. もしCatalogのCurrencylsoCodeが異なればCatalog Itemを更新する、Catalogのafter insertトリガ", "C. もしCatalogのCurrencylsoCodeが異なればCatalog Itemを更新する、Catalog Itemのafter insertトリガ", "D. Catalogオブジェクトにクエリを発行し、もしCatalogのCurrencylSoCodeが異なればCatalog Itemを更新する Database.Schedulable および Database.Batchable クラス"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. 正解です。100,000件という大量の子レコードを更新する必要があるため、同期処理（トリガなど）ではガバナ制限（DML行数制限）に必ず抵触します。Database.Batchable（バッチApex）は、このような大規模なデータ処理を非同期で行うために設計されています。Database.Schedulable（スケジュール可能）クラスを使用してこのバッチを定期的に実行し、親とコードが一致しない Catalog Item レコードを検索して更新するのが最も安全でスケーラブルな方法です。\nB. このアプローチには2つの問題があります。第一に、after insert（挿入後）は要件（変更時）と異なる間違ったイベントです。第二に、トリガは同期的に実行されるため、100,000件のレコードを一度に更新しようとするとガバナ制限で失敗します。\nC. これは、ロジックの起点となるオブジェクト（親であるCatalogの変更）とイベント（挿入ではなく更新）の両方が間違っています。\nD. この選択肢は非同期（Batchable）という点では正しいですが、実装のアプローチが非効率的です。もしバッチがCatalog（親）オブジェクトをクエリ対象とした場合、execute メソッドの1回の実行（1トランザクション）で、100,000件の子レコードを更新しようとしてガバナ制限で失敗します。バッチのクエリ対象は、処理単位となるCatalog Item（子）であるべきです。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 241, "q": "Universal Containersは、経費精算のための新しい承認プロセスを実装しています。このプロセスでは、経費の金額、従業員の役割、プロジェクトタイプなどの要因に基づいて、適切な承認者を決定するための複雑なロジックが必要です。このソリューションは、承認ルールの将来的な変更や柔軟性に対応できる必要があります。このロジックを実装するために、どのアプローチが最も適していますか？", "choices": ["A. 指定された条件に基づいて適切な承認者を決定するメソッドを持つ、カスタムApexクラスを作成する。", "B. 承認ロジックを処理するカスタムLightningコンポーネントを開発し、それを経費精算レコードページに統合する。", "C. 指定された条件に基づいて適切な承認者を計算・決定するために、カスタム数式項目を実装する。", "D. Salesforceの承認プロセス機能を使用し、エントリ条件と承認の割り当てを持つ複数の承認ステップを定義する。"], "answer": ["A"], "category": "テスト、デバッグ、リリース", "explanation": "A. 正解です。「複雑なロジック」と「柔軟性および将来の変更への対応」が要件であるため、Apexクラスが最も適しています。Apexは、標準の承認プロセスでは実現が難しい、動的で複雑な承認者決定ロジックを実装できる最大限の柔軟性を提供します。このApexは、標準の承認プロセスから「承認者」として呼び出される形で使用されます。\nB. Lightningコンポーネントは、ユーザインターフェース（UI）を構築するためのものです。承認ロジックのようなバックエンドのビジネスプロセスは、UIレイヤではなくサーバサイド（Apexなど）で処理されるべきです。\nC. 数式項目は、レコードの値に基づいて別の値を計算・表示するためのものです。承認プロセスにおいて承認者を動的に「決定」し、そのユーザにレコードを申請するロジックを実行することはできません。\nD. 標準の承認プロセスは基本的な承認フローに適しています。しかし、問題文が「複雑なロジック」と「将来の変更への柔軟性」を特に強調している点を考慮すると、宣言的なステップの組み合わせだけでは限界があります。Apex(A)は、その複雑なロジック自体を実装する上で最も柔軟な手段です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 242, "q": "ある組織には、取引先責任者と取引先の住所が保存されるたびに、Apexコードによって会社の標準形式に正規化されるべきという要件があります。これを実装する最適な方法は何ですか？", "choices": ["A. 住所を正規化するヘルパークラスを呼び出す、取引先責任者と取引先のApexトリガ", "B. 住所を正規化するために取引先責任者のトリガを呼び出す、取引先のApexトリガ", "C. 住所を正規化する、取引先責任者と取引先のApexトリガ", "D. 住所を正規化するために取引先のトリガを呼び出す、取引先責任者のApexトリガ"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. 正解です。これはApexトリガのベストプラクティスです。住所の正規化という共通のビジネスロジックを単一のヘルパークラス（またはメソッド）に分離し、取引先トリガと取引先責任者トリガの両方がそのヘルパーを呼び出します。これにより、コードの重複を避け、保守性を最大化できます。\nB. トリガから別のトリガをプログラムで直接呼び出すことはできません。このアプローチは実現不可能であり、ロジックを共有する正しい方法でもありません。\nC. このアプローチでは、同じ正規化ロジックを取引先トリガと取引先責任者トリガの 両方 にコピー＆ペースト（複製）することになります。これはコードの重複を生み出し、将来正規化ルールを変更する際に2箇所を修正する必要があるため、保守性が低く最適ではありません。\nD. Bと同様に、トリガから別のトリガを直接呼び出すことはできません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 243, "q": "開発者は、様々なデバイスでレスポンシブに動作するLightning Webコンポーネントを作成するよう任されました。この目標を達成するのに役立つ2つのコンポーネントはどれですか？ 2つ選択してください", "choices": ["A. lightning-navigation", "B. lightning-input-location", "C. lightning-layout", "D. lightning-layout-item"], "answer": ["C", "D"], "category": "ロジックとプロセスの自動化", "explanation": "A. このコンポーネントは、Lightning ExperienceやSalesforceモバイルアプリ内でのページナビゲーション（移動）を管理するために使用されます。画面のレイアウト（配置）を制御するものではありません。\nB. このコンポーネントは、緯度と経度を入力するための専用の入力項目を提供します。レスポンシブなレイアウト構築には使用されません。\nC. 正解です。これは、lightning-layout-item コンポーネントを内包するコンテナ（親）として機能します。CSS Flexboxをベースにしており、レスポンシブなグリッドシステムを構築するための基礎となります。\nD. 正解です。これは lightning-layout コンテナ（親）の中で使用される個々の列（子）を表します。size や small-device-size などの属性を使用して、異なる画面サイズ（デバイス）に応じた列の幅や動作を指定でき、レスポンシブデザインを実現します。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 244, "q": "複数通貨が有効になっている組織で、開発者は、ログインユーザが最近アクセスした商談の上位10件を表示するLightningコンポーネントを構築するよう任されました。開発者は、Amount（金額）とLastModifiedDate（最終更新日）の項目値がユーザのロケ
