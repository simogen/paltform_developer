<title>Salesforce 問題集</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap');
:root{--bg:#f4f2ee;--surface:#fff;--blue:#0176d3;--blue-d:#014486;--blue-l:#e8f4fd;--green:#2e844a;--green-l:#eaf5ea;--red:#c23934;--red-l:#fdf0ef;--amber:#dd7a01;--amber-l:#fef6e4;--text:#0a0e1a;--text2:#4a5568;--text3:#8fa0b3;--border:#e2e8f0;--r:12px;--rl:20px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6}
.hdr{background:var(--text);color:#fff;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;letter-spacing:-.5px}
.logo span{color:#60a5fa;font-size:12px;display:block;font-weight:400;font-family:'DM Sans',sans-serif;margin-top:-2px}
.hdr-btns{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:7px 14px;border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;border:1px solid transparent;display:inline-flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-g{background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.2)}.btn-g:hover{background:rgba(255,255,255,.2)}
.btn-b{background:var(--blue);color:#fff}.btn-b:hover{background:var(--blue-d)}
.btn-o{background:var(--surface);color:var(--text);border-color:var(--border)}.btn-o:hover{background:var(--bg)}
.btn-d{background:var(--red-l);color:var(--red);border-color:#f5c6c4}
.btn-sm{padding:5px 10px;font-size:12px}
.main{max-width:820px;margin:0 auto;padding:1.5rem 1rem 4rem}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.sv{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;line-height:1;color:var(--blue)}
.sl{font-size:11px;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:1.25rem}
.tab{padding:9px 18px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;border:none;background:transparent;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab:hover{color:var(--text)}.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem}
.cat{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s}
.cat:hover{border-color:var(--blue);color:var(--blue)}.cat.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.qnav{display:flex;gap:8px;align-items:center;margin-bottom:1rem;flex-wrap:wrap}
.qsel{font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;cursor:pointer;max-width:140px}
.pb{background:var(--border);height:3px;border-radius:3px;overflow:hidden;margin-bottom:1.25rem}
.pbf{height:3px;background:var(--blue);border-radius:3px;transition:width .4s ease}
.qcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:1.75rem;margin-bottom:1rem;animation:fu .2s ease}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.qmeta{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.bdg{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.bn{background:var(--blue-l);color:var(--blue);font-family:'Syne',sans-serif}
.bc{background:var(--bg);color:var(--text3);border:1px solid var(--border)}
.bok{background:var(--green-l);color:var(--green)}
.bng{background:var(--red-l);color:var(--red)}
.qt{font-size:15px;line-height:1.8;color:var(--text);margin-bottom:1.25rem}
.qt pre{background:#1e1e2e;color:#cdd6f4;border-radius:8px;padding:14px 16px;font-family:'Fira Code','Cascadia Code','Consolas',monospace;font-size:13px;line-height:1.6;overflow-x:auto;margin:10px 0;white-space:pre;border:1px solid rgba(255,255,255,.08);box-shadow:0 2px 8px rgba(0,0,0,.15)}
.chs{display:flex;flex-direction:column;gap:8px}
.ch{padding:12px 16px;border:1px solid var(--border);border-radius:var(--r);cursor:pointer;font-size:14px;color:var(--text);line-height:1.5;display:flex;gap:10px;align-items:flex-start;transition:all .15s}
.chl{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;color:var(--text3);min-width:18px;padding-top:1px}
.ch:hover:not(.dis){border-color:var(--blue);background:var(--blue-l)}
.ch.ok{border-color:var(--green);background:var(--green-l)}.ch.ok .chl{color:var(--green)}
.ch.ng{border-color:var(--red);background:var(--red-l)}.ch.ng .chl{color:var(--red)}
.ch.dis{cursor:default}
.ch.sel-pending{border-color:var(--blue);background:var(--blue-l);}
.exp{background:var(--bg);border-left:3px solid var(--blue);border-radius:0 8px 8px 0;padding:14px 16px;font-size:13px;color:var(--text2);line-height:1.7;white-space:pre-wrap;margin-top:1rem}
.hl{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.hl a{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--blue);text-decoration:none;border:1px solid #b3d4f0;border-radius:6px;padding:4px 10px;background:var(--blue-l);transition:all .15s}
.hl a:hover{background:#d0e8f8}
.navr{display:flex;justify-content:space-between;align-items:center;margin-top:1rem}
.li{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;margin-bottom:8px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:10px}
.li:hover{border-color:var(--blue);background:var(--blue-l)}
.liq{font-size:13px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.sw{position:relative;margin-bottom:1rem}
.si{width:100%;padding:10px 14px 10px 36px;border:1px solid var(--border);border-radius:var(--r);font-size:14px;font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text)}
.sic{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.empty{text-align:center;padding:4rem 1rem;color:var(--text3)}
.ei{font-size:48px;display:block;margin-bottom:1rem}
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.on{opacity:1}
@media(max-width:560px){.stats{grid-template-columns:repeat(2,1fr)}.hdr{flex-direction:column;align-items:flex-start}}

/* ===== 試験カテゴリタグ ===== */



/* ===== 難易度バッジ ===== */
.diff-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;border:1.5px solid}
.diff-1{background:#f0fdf4;color:#166534;border-color:#4ade80} /* 標準 */
.diff-2{background:#fff7ed;color:#9a3412;border-color:#fb923c} /* やや難 */
.diff-3{background:#fff1f2;color:#9f1239;border-color:#f43f5e} /* 難問 */

/* ===== 試験フィルターバー ===== */


/* ===== カテゴリ別難問サマリー ===== */
.cat-diff-summary{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.cat-diff-card{flex:1;min-width:160px;border:1px solid var(--border);border-radius:8px;padding:10px 12px;background:var(--bg)}
.cat-diff-name{font-size:10px;font-weight:700;margin-bottom:6px;color:var(--text2)}
.cat-diff-bars{display:flex;flex-direction:column;gap:3px}
.cat-diff-bar-row{display:flex;align-items:center;gap:6px;font-size:10px}
.cat-diff-bar-label{width:36px;color:var(--text3);text-align:right;flex-shrink:0}
.cat-diff-bar-track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.cat-diff-bar-fill{height:100%;border-radius:3px;transition:width .4s}
.bar-hard{background:#f43f5e}
.bar-mid{background:#fb923c}
.bar-easy{background:#4ade80}
.cat-diff-count{width:24px;font-weight:700;color:var(--text2);flex-shrink:0}

/* ===== iOS / iPad モバイル最適化 ===== */
* { -webkit-tap-highlight-color: transparent; }
body { -webkit-text-size-adjust: 100%; }

/* タップターゲットを大きく（最低44px） */
@media (max-width: 768px) {
  .main { padding: 1rem 0.75rem 5rem; }

  /* ヘッダー */
  .hdr { padding: 10px 14px; gap: 8px; }
  .hdr-btns { gap: 6px; }
  .btn { padding: 8px 14px; font-size: 13px; min-height: 40px; }
  .btn-sm { padding: 7px 12px; font-size: 12px; min-height: 38px; }

  /* 統計カード: 2列 */
  .stats { grid-template-columns: repeat(2,1fr); gap: 8px; margin-bottom: 1rem; }
  .sv { font-size: 22px; }
  .sl { font-size: 11px; }

  /* タブ */
  .tabs { gap: 4px; margin-bottom: 1rem; }
  .tab { padding: 8px 12px; font-size: 13px; min-height: 40px; }

  /* 内部カテゴリフィルター */
  .cats { gap: 5px; margin-bottom: 1rem; }
  .cat { padding: 6px 12px; font-size: 12px; min-height: 34px; border-radius: 20px; }

  /* 問題ナビ */
  .qnav { gap: 6px; }
  .qnav select { font-size: 14px; padding: 8px 10px; min-height: 42px; border-radius: 8px; }
  .qnav .btn { min-height: 42px; padding: 8px 16px; font-size: 14px; }

  /* 問題カード */
  .qcard { padding: 16px 14px; border-radius: 12px; }
  .qmeta { gap: 6px; margin-bottom: 0.75rem; flex-wrap: wrap; }
  .diff-badge { font-size: 11px; padding: 3px 8px; }
  
  /* 問題文 */
  .qt { font-size: 16px !important; line-height: 1.7; margin-bottom: 1.2rem; }

  /* 選択肢: タップしやすく */
  .ch { padding: 14px 14px; font-size: 15px; border-radius: 10px; min-height: 52px; display: flex; align-items: center; gap: 10px; }
  .ch-l { font-size: 14px; font-weight: 700; width: 24px; flex-shrink: 0; }

  /* 解説エリア */
  .expl { font-size: 14px; line-height: 1.7; padding: 14px; border-radius: 10px; }
  
  /* ヘルプリンク */
  .hl { gap: 6px; margin-top: 10px; }
  .hl a { font-size: 12px; padding: 8px 12px; min-height: 36px; border-radius: 8px; }

  /* 前へ次へナビ */
  .navr { gap: 8px; margin-top: 1rem; }
  .navr .btn { flex: 1; justify-content: center; min-height: 46px; font-size: 15px; }

  /* 試験タグ */


  /* 一覧タブ */
  .sw input { font-size: 16px; padding: 12px 14px; min-height: 44px; border-radius: 10px; }
  .li { padding: 12px 14px; font-size: 13px; }

  /* 難易度サマリー */
  .cat-diff-card { min-width: 100%; }
  .cat-diff-summary { gap: 6px; }
}

/* iPad (768px〜1024px) */
@media (min-width: 769px) and (max-width: 1024px) {
  .main { padding: 1.25rem 1.5rem 4rem; max-width: 100%; }
  .ch { padding: 13px 16px; font-size: 15px; }
  .qt { font-size: 17px !important; }
}

/* iPhone SE など小さい画面 */
@media (max-width: 390px) {
  .qt { font-size: 15px !important; }
  .ch { font-size: 14px; padding: 12px 12px; }
  .stats { gap: 6px; }
  .sv { font-size: 20px; }
}

/* iOSのsafe area対応（ホームバーで隠れない） */
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  .main { padding-bottom: calc(4rem + env(safe-area-inset-bottom)); }
}

/* カテゴリ問題数バッジ */
.cat-cnt {
  display: inline-block;
  background: rgba(0,0,0,0.08);
  border-radius: 10px;
  font-size: 10px;
  font-weight: 700;
  padding: 1px 6px;
  margin-left: 4px;
  vertical-align: middle;
  line-height: 1.4;
}
.cat.on .cat-cnt {
  background: rgba(255,255,255,0.25);
}


/* ===== チェック機能 ===== */
.check-btn{background:transparent;border:1.5px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;color:var(--text3);transition:all .15s;font-family:'DM Sans',sans-serif}
.check-btn.checked{background:#fef3c7;border-color:#f59e0b;color:#92400e}
.check-btn:hover:not(.checked){border-color:var(--blue);color:var(--blue)}

/* ===== 間違えた問題モード ===== */
.wrong-nav{display:flex;gap:8px;align-items:center;margin-bottom:1rem;flex-wrap:wrap;background:var(--red-l);border:1px solid #f5c6c4;border-radius:var(--r);padding:10px 14px}
.wrong-nav-label{font-size:13px;color:var(--red);font-weight:600;flex:1}
.wrong-progress{font-size:12px;color:var(--text3)}

/* ===== リセットドロップダウン ===== */
.reset-wrap{position:relative;display:inline-block}
.reset-menu{position:absolute;top:calc(100% + 4px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:0 4px 20px rgba(0,0,0,.12);z-index:200;min-width:200px;overflow:hidden;display:none}
.reset-menu.open{display:block}
.reset-item{display:block;width:100%;padding:10px 14px;font-size:13px;font-family:'DM Sans',sans-serif;text-align:left;background:transparent;border:none;cursor:pointer;color:var(--text);transition:background .1s}
.reset-item:hover{background:var(--bg)}
.reset-item.danger{color:var(--red)}.reset-item.danger:hover{background:var(--red-l)}
.reset-divider{height:1px;background:var(--border);margin:2px 0}


/* ===== 解説折りたたみ ===== */
.exp-wrap{margin-top:12px}.exp-toggle{display:flex;align-items:center;width:100%;padding:8px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;color:var(--text2);transition:background .15s;text-align:left;gap:6px}.exp-toggle:hover{background:var(--bg)}.exp-toggle-icon{margin-left:auto;transition:transform .25s;display:inline-block}.exp-body{overflow:hidden;max-height:0;transition:max-height .4s ease}.exp-wrap.open .exp-toggle{background:var(--bg);border-bottom-left-radius:0;border-bottom-right-radius:0}.exp-wrap.open .exp-body{max-height:3000px}.exp-wrap.open .exp-toggle-icon{transform:rotate(180deg)}
/* ===== 統計 ===== */
.stat-ok .sv{color:var(--green)}
.stat-ng .sv{color:var(--red)}

/* ===== 間違え問題練習タブ内ナビ ===== */
.wrong-practice-nav{display:flex;gap:8px;align-items:center;margin-bottom:1rem;background:var(--red-l);border:1px solid #f5c6c4;border-radius:var(--r);padding:10px 14px}
.wrong-practice-label{font-size:13px;color:var(--red);font-weight:600;flex:1}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">Platform Developer 上級<span id="header-count">全0問 練習アプリ</span></div>
  <div class="hdr-btns">
    <button class="btn btn-g btn-sm" onclick="expJSON()">⬇ JSON</button>
    <button class="btn btn-g btn-sm" onclick="expCSV()">⬇ CSV</button>
    <div class="reset-wrap" id="reset-wrap">
      <button class="btn btn-d btn-sm" onclick="toggleResetMenu(event)">🗑 リセット ▾</button>
      <div class="reset-menu" id="reset-menu">
        <button class="reset-item danger" onclick="clrAnswers()">📊 回答記録をリセット<br><small style="color:var(--text3);font-weight:400">正解数・不正解数を初期化</small></button>
        <div class="reset-divider"></div>
        <button class="reset-item danger" onclick="clrChecks()">☑ チェックをすべて解除<br><small style="color:var(--text3);font-weight:400">付けたチェックを全て削除</small></button>
        <div class="reset-divider"></div>
        <button class="reset-item danger" onclick="clrSession()">🔄 選択肢の表示をリセット<br><small style="color:var(--text3);font-weight:400">前回選んだ選択肢の色を消す</small></button>
        <div class="reset-divider"></div>
        <button class="reset-item" onclick="closeResetMenu()">キャンセル</button>
      </div>
    </div>
  </div>
</div>
<div class="main">
  <div class="stats">
    <div class="stat"><div class="sv" id="total-count">0</div><div class="sl">総問題数</div></div>
    <div class="stat"><div class="sv" id="s-done">0</div><div class="sl">回答済み</div></div>
    <div class="stat stat-ok"><div class="sv" id="s-ok">0</div><div class="sl">正解数</div></div>
    <div class="stat stat-ng"><div class="sv" id="s-ng">0</div><div class="sl">不正解数</div></div>
    <div class="stat"><div class="sv" id="s-pct">—</div><div class="sl">正答率</div></div>
    <div class="stat"><div class="sv" id="s-check">0</div><div class="sl">チェック済み</div></div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="setTab('quiz')" id="tab-quiz">🎯 クイズ</button>
    <button class="tab" onclick="setTab('list')" id="tab-list">📋 一覧</button>
    <button class="tab" onclick="setTab('wrong')" id="tab-wrong">❌ 間違えた問題</button>
    <button class="tab" onclick="setTab('checked')" id="tab-checked">☑ チェック済み</button>
  </div>
  <div id="pane-quiz">
    <div class="cats" id="cats"></div>
    <div class="qnav">
      <select class="qsel" id="qsel" onchange="jumpTo(+this.value)"></select>
      <button class="btn btn-o btn-sm" onclick="prevQ()">← 前</button>
      <button class="btn btn-o btn-sm" onclick="nextQ()">次 →</button>
      <button class="btn btn-b btn-sm" onclick="rndQ()">🎲 ランダム</button>
    </div>
    <div class="pb"><div class="pbf" id="pbf" style="width:0%"></div></div>
    <div id="qa"></div>
  </div>
  <div id="pane-list" style="display:none">
    <div class="sw"><span class="sic">🔍</span><input class="si" type="text" placeholder="問題文を検索..." oninput="renderList(this.value)"></div>
    <div id="la"></div>
  </div>
  <div id="pane-wrong" style="display:none">
    <div id="wa-list"></div>
    <div id="wa-practice" style="display:none">
      <div class="wrong-practice-nav">
        <span class="wrong-practice-label" id="wrong-practice-label">間違えた問題を練習中</span>
        <span class="wrong-progress" id="wrong-progress"></span>
        <button class="btn btn-o btn-sm" onclick="exitWrongPractice()">← 一覧に戻る</button>
      </div>
      <div id="wa-q"></div>
    </div>
  </div>
  <div id="pane-checked" style="display:none">
    <div id="checked-list-area"></div>
    <div id="checked-practice-area" style="display:none">
      <div class="wrong-practice-nav" style="background:#fffbeb;border-color:#fde68a">
        <span class="wrong-practice-label" style="color:#92400e" id="checked-practice-label">チェック済み問題を練習中</span>
        <span class="wrong-progress" id="checked-progress"></span>
        <button class="btn btn-o btn-sm" onclick="exitCheckedPractice()">← 一覧に戻る</button>
      </div>
      <div id="checked-q"></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>

const QDATAS = [{"id": 1, "q": "取引先レコードが更新された際、関連する商談の特定の項目も更新する必要がある。この要件を満たすためにApexトリガーとプロセスビルダーの両方が設定されている。トリガーは商談の「説明」項目を更新し、プロセスビルダーは商談の「次のステップ」項目を更新するように設定されている。取引先レコードが更新された場合、これらの自動化はどのような順序で実行されるか？", "choices": ["A. Apexトリガーとプロセスビルダーは並行して実行される。", "B. まずApexトリガーが実行され、次にプロセスビルダーが実行される。", "C. まずプロセスビルダーが実行され、次にApexトリガーが実行される。", "D. Apexトリガーのみが実行され、プロセスビルダーは実行されない。"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "A. Salesforceのレコード保存の実行順序では、自動化プロセスは定義された順序に従って逐次的に実行されます。並行して実行されることはありません。\nB. 正解です。Salesforceのレコード保存における実行順序では、Apexトリガー（beforeおよびafter）が実行された後に、プロセスビルダーやフローなどの宣言的な自動化ツールが起動されます。したがって、このシナリオではApexトリガーが先に実行されます。\nC. レコード保存の実行順序では、Apexトリガーはプロセスビルダーよりも先に実行されるため、この選択肢は正しくありません。\nD. 取引先の更新イベントによって両方の自動化が起動される条件を満たしている場合、設定された実行順序に従って両方が実行されます。片方だけが実行されるとは限りません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 2, "q": "ある開発チームは、アプリケーション全体で使用される国別の税率情報を管理する必要がある。この税率情報は、Apexコードや入力規則、フローなど、複数の場所から参照される。また、税率情報は頻繁に変更される可能性があるため、変更時にコードのデプロイを必要としない方法が望ましい。これらの要件を満たすために最も適した機能はどれか？", "choices": ["A. カスタム設定（リスト型）", "B. カスタムオブジェクト", "C. カスタムメタデータ型", "D. 静的リソース"], "answer": ["C"], "category": "上級デベロッパーの基本", "explanation": "A. リスト型のカスタム設定は組織全体の設定データを格納できますが、数式項目での直接参照が制限されるなど、カスタムメタデータ型と比較していくつかの制約があります。設定データの管理には利用可能ですが、デプロイメントの観点ではカスタムメタデータ型がより柔軟です。\nB. カスタムオブジェクトは、取引先や商談のようなビジネスデータを格納することが主目的です。アプリケーションの設定情報を管理するためにカスタムオブジェクトを使用することも可能ですが、メタデータとして扱われず、デプロイ後に別途データを移行または作成する必要があります。\nC. 正解です。カスタムメタデータ型は、アプリケーションの設定値やマッピング情報など、コードや他のメタデータから参照される構成情報を格納するために設計されています。カスタムメタデータ型のレコードはメタデータとして扱われるため、パッケージ化や変更セット、Salesforce DXを通じてデプロイでき、Apex、入力規則、フローなどから直接参照可能です。頻繁な更新が必要で、デプロイメントを容易にしたい場合に最適です。\nD. 静的リソースは、画像ファイル、スタイルシート、JavaScriptコード、またはZIPファイルなどの静的なコンテンツをアップロードして管理する機能です。構造化された設定データを格納し、動的に参照する用途には通常適していません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 3, "q": "ある開発者は、取引先責任者レコードが挿入されたときに、関連する取引先のカスタム項目「最終取引先責任者更新日時」を現在の日時に更新するApexトリガーを作成した。このトリガーに対するApexテストクラスを作成する際、テストデータの準備として推奨される方法はどれか？", "choices": ["A. @TestSetup アノテーションが付与されたメソッド内でテスト用の取引先および取引先責任者レコードを作成する。", "B. 各テストメソッド内で必要な取引先および取引先責任者レコードを都度作成する。", "C. 静的リソースにCSVファイルを配置し、テスト実行時にそれを読み込んでテストデータを作成する。", "D. 組織の既存の取引先および取引先責任者レコードをテストデータとして直接利用する（SeeAllData=trueを使用）。"], "answer": ["A"], "category": "テスト、デバッグ、リリース", "explanation": "A. 正解です。@TestSetup メソッドは、テストクラス内のすべてのテストメソッドが実行される前に一度だけ呼び出され、共通のテストレコードを作成します。これにより、各テストメソッドで繰り返しデータを作成する手間が省け、テストの実行効率が向上します。\nB. この方法は機能しますが、テストメソッドごとに同じようなデータ作成コードを記述する必要があり、冗長になる可能性があります。また、テストクラス全体の実行時間も長くなる傾向があります。\nC. 大量のテストデータや複雑なデータ構造を扱う場合には有効なアプローチですが、今回のシナリオのように比較的少数のレコードを作成する場合には、Apexコード内で直接作成する方がシンプルで管理しやすいことが多いです。\nD. テストで組織の既存データへのアクセスを許可する (SeeAllData=true) の使用は、テストの独立性を損ない、他のテストや組織データの影響を受ける可能性があるため、特別な理由がない限り避けるべきベストプラクティスに反します。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 4, "q": "ある開発者は、取引先レコードが作成された後に、外部システムのAPIを呼び出して取引先情報を連携する処理を実装する必要がある。このAPI呼び出しは時間がかかる可能性があり、ユーザーがレコード保存操作を完了するのを待たせたくない。この要件を満たすために最も適切なApexの機能はどれか？", "choices": ["A. Apexトリガー内で直接API呼び出しを実行する。", "B. スケジュール済みApexを使用する。", "C. バッチApexを使用する。", "D. @future アノテーションが付与されたメソッドを使用する。"], "answer": ["D"], "category": "ロジックとプロセスの自動化", "explanation": "A. トリガー内で直接時間のかかるAPI呼び出しを行うと、レコード保存処理がその呼び出しの完了を待機するため、ユーザーエクスペリエンスが低下し、タイムアウトやガバナ制限に抵触する可能性があります。\nB. スケジュール済みApexは、日次や週次など、あらかじめ定義されたスケジュールに基づいてジョブを実行するためのものです。レコード作成のようなイベント駆動型の即時非同期処理には適していません。\nC. バッチApexは、大量のレコードセットを効率的に処理するために設計されています。単一のレコード作成イベントに対応する非同期処理には、通常、より軽量な非同期オプションが適しています。\nD. 正解です。@future メソッドは、現在のトランザクションとは独立して、バックグラウンドで非同期に実行されます。これにより、時間のかかる可能性のある外部API呼び出しをトリガーから分離し、ユーザーの待ち時間をなくすことができます。これは、コールアウトを非同期で行うための一般的な方法です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 5, "q": "以下のApexコードスニペットは、contactIds リストに含まれるIDを持つ取引先責任者レコードの Description 項目を更新しようとしています。データ連携処理などで、一部のレコードに更新エラー（例：入力規則違反）が発生する可能性がある状況を想定しています。エラーが発生した場合でも、エラーにならなかったレコードの更新は成功させ（部分的な成功を許容）、エラーが発生したレコードについては後で調査できるようにしたいと考えています。\n[[PRE]]\nList<Id> contactIds = // ... 取引先責任者IDのリストが設定されていると仮定\nList<Contact> contactsToUpdate = [SELECT Id, Description FROM Contact WHERE Id IN :contactIds];\n\nfor (Contact con : contactsToUpdate) {\n    con.Description = 'Processed on ' + System.today();\n}\n\nDatabase.SaveResult[] saveResults; // 結果を格納する変数を宣言\n\n// ここにDML操作を記述して saveResults に結果を代入する\n\n// 結果をループしてエラーを確認\nfor (Database.SaveResult sr : saveResults) {\n    if (!sr.isSuccess()) {\n        // エラー処理: IDとエラーメッセージをログに出力\n        for(Database.Error err : sr.getErrors()) {\n            System.debug('Error updating contact ' + sr.getId() + ': ' + err.getStatusCode() + ' - ' + err.getMessage());\n        }\n    }\n}[[/PRE]]\n上記のコードの // ここにDML操作を記述して saveResults に結果を代入する 部分に挿入すべきコードとして、部分的な成功を許容し、かつ結果を saveResults 変数で受け取るためにはどれが最も適切でしょうか？", "choices": ["A. try { update contactsToUpdate; } catch (DmlException e) { /* 例外処理 */ }", "B. saveResults = Database.update(contactsToUpdate, true);", "C. saveResults = Database.update(contactsToUpdate, false);", "D. update contactsToUpdate; saveResults = Trigger.new; // Trigger.new はここでは使えない"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "A. try { update contactsToUpdate; } catch (DmlException e) { ... } - 標準の update ステートメントを使用すると、リスト内の一つのレコードでもエラーが発生した場合、DmlException がスローされ、トランザクション全体がロールバックされます。これは部分的な成功を許容しないため、要件を満たしません。また、このコードでは saveResults 変数に結果が代入されません。\nB. Database.update メソッドの第二引数 allOrNone を true に設定した場合も、標準の update ステートメントと同様に動作します。つまり、一部でもエラーがあれば全体がロールバックされ、DmlException がスローされます（saveResults には代入されません）。部分的な成功は許容されません。\nC. 正解です。Database.update メソッドの第二引数 allOrNone を false に設定すると、部分的な成功が許容されます。エラーが発生したレコードがあっても、成功したレコードはデータベースにコミットされます。このメソッドは DmlException をスローせず、代わりに Database.SaveResult オブジェクトの配列を返します。この戻り値を saveResults 変数に代入し、後続のループで各レコードの成功/失敗とその詳細を確認できます。これは要件に完全に合致しています。\nD. update contactsToUpdate; saveResults = Trigger.new; - update ステートメントは Database.SaveResult を返しません。また、Trigger.new はトリガーコンテキストでのみ利用可能な変数であり、このコードスニペットのような一般的なApexコードのコンテキストでは使用できません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 6, "q": "Apexコード内で、一度に複数の関連レコード（親子関係にあるレコードなど）をデータベースに挿入する処理を実装しています。一部のレコードで入力規則違反や必須項目の欠落などが発生し、DML操作が失敗する可能性があります。要件として、一部のレコードでエラーが発生した場合でも、エラーが発生しなかったレコードの挿入処理は成功させ、データベースにコミットする必要があります。また、どのレコードが成功し、どのレコードが失敗したかを後続処理で把握できるようにしたいです。この要件を満たすために利用できるApexの機能やアプローチはどれですか？（２つ選択）", "choices": ["A. 各DML操作の前に Database.setSavepoint() を呼び出し、エラー発生時に Database.rollback() を使用する。", "B. DatabaseクラスのDMLメソッド（例: Database.insert()）を使用し、allOrNone パラメータに false を指定する。", "C. DML操作の結果として返される Database.SaveResult オブジェクトのリストを処理する。", "D. Futureメソッド内で各レコードのDML操作を個別に実行する。"], "answer": ["B", "C"], "category": "ロジックとプロセスの自動化", "explanation": "A. 不正解です。Savepointとrollbackは、トランザクション全体を特定の保存点まで戻すための機能です。一部のレコードの成功を保持しつつ、失敗したレコードのみを処理する、という要件には適合しません。ロールバックすると、エラーが発生しなかったレコードの変更も元に戻ってしまいます。\nB. 正解です。このアプローチにより、DML操作のリスト内で一部のレコードにエラーが発生しても、トランザクション全体がロールバックされるのを防ぎます。エラーが発生しなかったレコードは正常にデータベースにコミットされます。これは部分的な成功を許容する要件に合致しています。\nC. 正解です。DatabaseクラスのDMLメソッド（特に allOrNone を false に設定した場合）は、Database.SaveResult オブジェクトのリストを返します。このリストを反復処理し、各 SaveResult の isSuccess() メソッドや getErrors() メソッドを確認することで、個々のレコードの操作結果（成功または失敗とその理由）を把握し、ログ記録などの後続処理を行うことができます。\nD. 不正解です。Futureメソッドは非同期処理を実行するためのものですが、各レコードを個別のFutureメソッドで処理することは、ガバナ制限（非同期Apex実行回数など）に抵触しやすく、トランザクションの原子性を保証することも難しくなります。また、DML操作の部分的な成功/失敗を制御する直接的なメカニズムではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 7, "q": "開発者は、夜間に数百万件の取引先責任者レコードを更新し、各レコードについて外部システムへのコールアウトを行う必要があるバッチ処理を実装する必要があります。この処理はガバナ制限に抵触するリスクを最小限に抑え、プラットフォームのリソースを効率的に使用する必要があります。この要件を満たすために最も適切な非同期Apexの機能はどれですか？", "choices": ["A. Scheduled Apexを使用して、指定した時間に単一のApexメソッドを実行する。", "B. @futureアノテーションを使用して、各取引先責任者レコードの更新とコールアウトを個別の非同期トランザクションで処理する。", "C. Queueable Apexを使用して、処理を連鎖的なジョブに分割し、各ジョブで少数の取引先責任者レコードを処理する。", "D. Batch Apexを使用して、取引先責任者レコードを管理可能なチャンクに分割し、各チャンクを個別のトランザクションで処理する。"], "answer": ["D"], "category": "ロジックとプロセスの自動化", "explanation": "A. Scheduled Apexは、Apexクラスの実行を特定の時間にスケジュールするための機能です。大量のレコード処理ロジック自体を提供するものではなく、通常、Batch Apexなどの他の非同期処理を開始するために使用されます。単一のメソッドでは、数百万件のレコードを処理する際にガバナ制限に抵触する可能性が高いです。\nB. @futureメソッドは、比較的単純な非同期処理に適していますが、処理できるコールアウトの数やCPU時間には制限があります。数百万件のレコードそれぞれに対して@futureメソッドを呼び出すことは、ガバナ制限（特に非同期Apex実行の制限）に抵触する可能性が非常に高く、効率的ではありません。\nC. Queueable Apexは、@futureメソッドよりも高度な非同期処理（ジョブチェーンなど）を可能にしますが、主に特定の順序で実行する必要がある処理や、より複雑なデータ型を渡す必要がある場合に適しています。数百万件規模のデータ処理には、Batch Apexの方がよりスケーラブルで管理しやすい設計になっています。\nD. Batch Apexは、大量のレコードセットを処理するために特別に設計された機能です。正解です。レコードを指定されたサイズのバッチ（チャンク）に分割し、各バッチを独立したトランザクションで処理します。これにより、ヒープサイズ、CPU時間、SOQLクエリ数などのガバナ制限に体系的に対処できます。各バッチ内で外部システムへのコールアウトも実行できるため、今回の要件に最も適しています。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 8, "q": "開発チームは、バージョン管理システムから取得したSalesforce DXプロジェクトのソースコード一式を、新しく作成したスクラッチ組織に反映させる必要があります。この目的のために最も一般的に使用されるSalesforce CLIコマンドはどれですか？", "choices": ["A. force:source:retrieve", "B. force:mdapi:deploy", "C. force:source:push", "D. force:source:deploy"], "answer": ["C"], "category": "テスト、デバッグ、リリース", "explanation": "A. 不正解です。このコマンドは、Salesforce組織（スクラッチ組織やSandboxなど）からメタデータを取得し、ローカルのSalesforce DXプロジェクトに取り込むために使用されます。ソースコードを組織に反映させる操作とは逆の方向です。\nB. 不正解です。このコマンドは、メタデータAPI形式（通常はzipファイルや特定のディレクトリ構造）でパッケージ化されたメタデータをデプロイするために使用されます。Salesforce DXプロジェクトのソース形式のファイルを直接スクラッチ組織に反映させるための主要なコマンドではありません。\nC. 正解です。このコマンドは、ローカルのSalesforce DXプロジェクト内のソースコードの変更を、デフォルトまたは指定されたスクラッチ組織にプッシュ（同期）するために設計されています。バージョン管理から取得したプロジェクトソースを新しいスクラッチ組織に反映させる際の標準的な方法です。\nD. 不正解です。このコマンドもソースコードを組織にデプロイするために使用できますが、主に特定のソースファイルやディレクトリを指定してデプロイする場合や、Sandboxや本番組織など、ソース追跡が行われない組織に対して使用されることが多いです。スクラッチ組織へのプロジェクト全体の初期反映には force:source:push がより一般的です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 9, "q": "以下のApexコードは、年間売上が1,000,000以上のすべての取引先を取得し、それぞれの取引先名をデバッグログに出力することを目的としています。コード中のコメント部分 /* ここにコードを記述 */ に挿入するべき最も適切な拡張forループの宣言はどれでしょうか？\n[[PRE]]\nList<Account> highRevenueAccounts = [SELECT Name FROM Account WHERE AnnualRevenue >= 1000000];\n\nfor (/* ここにコードを記述 */ : highRevenueAccounts) {\n    System.debug(acc.Name); // ループ変数名を acc と仮定\n}[[/PRE]]", "choices": ["A. Account acc", "B. sObject acc", "C. List<Account> acc", "D. Object acc"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. 正解です。拡張forループを使用して List<Account> 型のコレクション highRevenueAccounts を反復処理する場合、ループ変数はリストの要素の型、すなわち Account 型で宣言する必要があります。変数名 acc を使用して、ループ内で現在の Account オブジェクトにアクセスし、acc.Name のように項目を参照できます。これは最もタイプセーフで直接的な方法です。\nB. この宣言も構文的には有効です。Account は sObject の一種であるため、List<Account> を List<sObject> として扱うことができます。しかし、ループ内で acc.Name のように項目にアクセスしようとすると、sObject 型には Name 項目が直接定義されていないため、コンパイルエラーにはなりませんが、動的なアクセスとなり、IDEの補完などが効きにくくなります。より具体的な Account 型を使用する方が通常は推奨されます。\nC. この宣言は拡張forループの構文として正しくありません。ループ変数はコレクションの個々の要素を表す必要があり、コレクション自体の型（List<Account>）を指定することはできません。\nD. sObject と同様に、Account は Object の一種であるため、構文的には可能です。しかし、ループ内で Account の項目（Name など）にアクセスするには、((Account)acc).Name のように明示的なキャストが必要となり、コードが冗長になります。また、タイプセーフでもありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 10, "q": "あるApexトリガーハンドラークラスに、取引先責任者(Contact)が作成されたときに、その取引先責任者の MailingPostalCode（郵便番号）に基づいて、対応する地域の営業担当者をカスタム参照項目 Sales_Rep__c に設定するロジックが含まれています。以下のテストメソッドは、特定の郵便番号を持つ取引先責任者が作成された後、期待される営業担当者（特定のUserレコード）が Sales_Rep__c に正しく設定されているかを検証しようとしています。\n[[PRE]]\n@isTest\nprivate class ContactTriggerHandlerTest {\n    @isTest\n    static void testSalesRepAssignment() {\n        // 1. Test Data Setup\n        // 期待される営業担当者ユーザーを作成\n        User salesRepUser = new User(\n            // ... 必要な項目を設定 ...\n            Username = 'testrep' + System.currentTimeMillis() + '@testorg.com',\n            LastName = 'TestRep',\n            Email = 'testrep@testorg.com',\n            Alias = 'trep', EmailEncodingKey='UTF-8', LanguageLocaleKey='en_US',\n            LocaleSidKey='en_US', ProfileId = [SELECT Id FROM Profile WHERE Name='Standard User'].Id, // 適切なプロファイルIDを指定\n            TimeZoneSidKey='America/Los_Angeles'\n        );\n        insert salesRepUser;\n\n        // テスト対象の取引先責任者データ（トリガーハンドラーがこのデータで起動される想定）\n        Contact newContact = new Contact(\n            LastName = 'TestContact',\n            MailingPostalCode = '94105' // この郵便番号に対応する営業担当者が salesRepUser であると仮定\n        );\n\n        // 2. Execute - トリガーを起動させるために DML 操作を実行\n        Test.startTest();\n        insert newContact;\n        Test.stopTest(); // トリガー内の非同期処理も完了させる（もしあれば）\n\n        // 3. Verification (Assertion)\n        // DML操作後の最新データを取得\n        Contact insertedContact = [SELECT Sales_Rep__c FROM Contact WHERE Id = :newContact.Id];\n\n        // ★ ここに適切なアサーションを記述\n    }\n}[[/PRE]]\n上記のテストメソッドの「★ ここに適切なアサーションを記述」の部分で、insertedContact.Sales_Rep__c の値が期待される営業担当者のID (salesRepUser.Id) と一致することを検証するために、最も適切で推奨されるApexコードはどれでしょうか？", "choices": ["A. System.assert(insertedContact.Sales_Rep__c == salesRepUser.Id, 'Sales Rep ID does not match.');", "B. System.assertEquals(salesRepUser.Id, insertedContact.Sales_Rep__c, 'Sales Rep should be assigned based on postal code.');", "C. System.assertNotEquals(null, insertedContact.Sales_Rep__c, 'Sales Rep should not be null.');", "D. Boolean isMatch = (insertedContact.Sales_Rep__c == salesRepUser.Id); System.assertEquals(true, isMatch);"], "answer": ["B"], "category": "テスト、デバッグ、リリース", "explanation": "A. System.assert(condition, message); - この形式は条件がtrueであることを表明します。insertedContact.Sales_Rep__c == salesRepUser.Id という条件式は正しいですが、テストが失敗した場合、assertEquals の方が期待値と実際の値の両方を出力するため、デバッグが容易になることがあります。メッセージも指定できますが、assertEquals がより一般的です。\nB. System.assertEquals(expected, actual, message); - 正解です。このメソッドは、第一引数に期待される値（salesRepUser.Id）、第二引数に実際の値（insertedContact.Sales_Rep__c）を指定し、両者が等しいことを表明します。第三引数には、テストが失敗した場合に表示されるカスタムメッセージを指定でき、テストの意図や失敗原因を明確にするのに役立ちます。これはApexテストにおけるアサーションのベストプラクティスとして最も推奨される形式です。\nC. System.assertNotEquals(unexpected, actual, message); - このメソッドは、実際の値が予期しない値と等しくないことを表明します。ここでは Sales_Rep__c が null でないことを確認していますが、期待される特定の営業担当者IDと一致するかどうかを直接検証していません。要件を満たすには不十分です。\nD. Boolean isMatch = (...); System.assertEquals(true, isMatch); - boolean変数に比較結果を代入し、その変数が true であることを assertEquals で検証する方法です。機能的には正しいですが、ステップが一つ多く冗長です。assertEquals を使って期待値と実際の値を直接比較する方が、コードがより簡潔で直感的です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 11, "q": "取引先オブジェクトにafter updateトリガーが設定されています。また、取引先の特定の項目が更新された際に起動するワークフロールールがあり、このルールは関連するカスタムオブジェクトのレコードを更新します。トリガーのロジックでは、このワークフロールールによって更新されたはずのカスタムオブジェクトの値を参照して処理を行いますが、期待した値が取得できません。この現象の最も可能性の高い原因は何でしょうか？", "choices": ["A. ワークフロールールの評価条件が意図せず満たされていない。", "B. before updateトリガーを使用する実装が適切であった。", "C. トリガー内で実行されているSOQLクエリが、更新対象のレコードをロックしている。", "D. after updateトリガーの実行コンテキストでは、ワークフロールールによる関連レコードの更新が完了していない。"], "answer": ["D"], "category": "ロジックとプロセスの自動化", "explanation": "A. ワークフロールール自体が実行されていない場合は、この可能性も考えられますが、問題文ではワークフロールールによる更新を期待している状況であり、トリガー内で値が古いという現象に焦点を当てています。実行順序の問題である可能性の方が高いです。\nB. before updateトリガーはレコードがデータベースに保存される前に実行されます。関連レコードの更新結果を参照するロジックの場合、beforeトリガーではさらに不整合が生じる可能性があり、この問題の直接的な解決策や原因特定にはなりにくいです。\nC. SOQLクエリによるロックは、同時実行される別のトランザクションからの更新を防ぐものであり、同一トランザクション内の実行順序による値の不整合を引き起こす直接的な原因ではありません。\nD. 正解です。Salesforceのレコード保存の実行順序では、afterトリガーが実行された後、ワークフロールールやプロセスビルダーによる項目の自動更新が行われます。そのため、afterトリガーの実行時点では、ワークフロールールによる関連レコードの更新はまだデータベースにコミットされておらず、トリガー内から参照すると更新前の値が見えることになります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 12, "q": "外部のERPシステムから日次で取引先責任者のデータを受け取り、Salesforce内の対応する取引先責任者レコードを更新、または存在しない場合は新規作成する必要があります。ERPシステム内の取引先責任者には一意の従業員番号が付与されており、この番号をSalesforceとの連携キーとして使用したいと考えています。この要件を満たすために、Salesforceの取引先責任者オブジェクトで設定すべき項目属性はどれでしょうか？", "choices": ["A. 主従関係項目", "B. 数式項目", "C. レコードタイプ", "D. 外部ID属性を持つ項目"], "answer": ["D"], "category": "上級デベロッパーの基本", "explanation": "A. 主従関係は、2つのオブジェクト間の強固な親子関係を定義します。データの整合性やカスケード削除などの機能を提供しますが、外部システムとの連携キーとしてレコードを特定・更新/挿入（Upsert）する直接的な機能はありません。\nB. 数式項目は、他の項目の値に基づいて値を計算・表示するための読み取り専用項目です。外部システムから連携キーとして利用して、レコードの更新や挿入を行う目的には使用できません。\nC. レコードタイプは、異なるビジネスプロセス、選択リスト値、ページレイアウトを特定のレコードに割り当てるために使用されます。データの分類や表示を制御しますが、外部システムとの連携キーとして機能するものではありません。\nD. 正解です。テキスト、数値、メールなどの項目に「外部ID」属性を設定すると、その項目を外部システムの一意な識別子として扱うことができます。これにより、Data LoaderやAPIを使用したUpsert操作（更新または挿入）の際に、Salesforce IDの代わりにこの外部ID項目を使用して対象レコードを特定できます。今回の要件に最も適した機能です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 13, "q": "商談レコードが保存される際に、以下の自動化が設定されている状況を考えます。\n\nbefore insert/update トリガー: 特定の条件で商談の「割引率(%)」項目を計算し設定します。\nワークフロールール（レコード更新）: 商談のフェーズが「交渉/レビュー」に変更された場合、「最終承認日」項目を今日の日付に更新します。\nafter insert/update トリガー: 商談の「割引率(%)」と「最終承認日」を参照して、関連するカスタムオブジェクト「承認依頼」レコードを作成します。\n\n開発者がデバッグ中に、フェーズが「交渉/レビュー」に変更され、かつ割引率が計算されるべき条件を満たす商談を保存したところ、「承認依頼」レコードは作成されたものの、「割引率(%)」項目がbeforeトリガーで計算された値ではなく、更新前の古い値で記録されていることに気づきました。\nこの予期しない動作の最も可能性の高い原因はどれでしょうか？", "choices": ["A. beforeトリガーの計算ロジックに誤りがあり、「割引率(%)」が期待通りに設定されていない。", "B. ワークフロールールによるレコード更新がafterトリガーの前に実行され、レコードの再評価を引き起こし、afterトリガーが更新前の「割引率(%)」を参照している。", "C. ワークフロールールの評価条件が正しくなく、「最終承認日」が更新されていないため、afterトリガーの処理が不完全になっている。", "D. afterトリガーがワークフロールールのレコード更新よりも先に実行されるため、「最終承認日」がまだ設定されていない状態で処理が進んでいる。"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "A. 不正解です。beforeトリガーで割引率が計算・設定されたとしても、後続のプロセス、特にワークフロールールによるレコード更新が発生すると、トリガーのコンテキストが変わり、afterトリガーが参照する値に影響を与える可能性があります。問題は計算ロジックそのものではなく、実行順序とその影響にある可能性が高いです。\nB. 正解です。Salesforceの保存の実行順序では、beforeトリガーの後、ワークフロールールが評価・実行され、その後afterトリガーが実行されます。ワークフロールールによってレコード更新が行われると、システムはレコードを再度保存するプロセスを経るため、before/afterトリガーが再度（または初めて）実行される可能性があります。この再評価プロセスにより、afterトリガーが参照するTrigger.oldやTrigger.newのコンテキストが、最初のbeforeトリガー実行時とは異なる状態（ワークフロー更新前の状態に近い状態）を参照してしまうことがあります。\nC. 不正解です。問題文では「承認依頼」レコードは作成されているが、「割引率(%)」の値が古い、という点が問題となっています。「最終承認日」が更新されていない可能性も考えられますが、それが「割引率(%)」が古くなる直接的な原因とは断定できません。\nD. 不正解です。Salesforceの標準的な保存の実行順序では、ワークフロールールの評価と（該当する場合の）レコード更新アクションは、afterトリガーの実行前に行われます。したがって、afterトリガーがワークフロー更新より先に実行されることは通常ありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 14, "q": "開発者がApexトリガーのテストクラスを作成しています。このトリガーは、特定の条件を満たす取引先レコードが挿入された際に、関連する取引先責任者レコードを自動作成するものです。テストクラスでは、複数のテストメソッドで共通の取引先レコードのテストデータを使用する必要があります。テストデータの準備を効率化し、かつ各テストメソッドが独立して実行されることを保証するために、推奨されるアプローチはどれですか？", "choices": ["A. 各テストメソッド内で、必要な取引先レコードと取引先責任者レコードを個別に作成する。", "B. @testSetup アノテーションが付与されたメソッド内で共通の取引先レコードを作成する。", "C. ユーティリティクラスを作成し、静的メソッドで取引先レコードを生成し、各テストメソッドから呼び出す。", "D. 組織に存在する実際の取引先レコードIDをテストクラス内でハードコードして利用する。"], "answer": ["B"], "category": "テスト、デバッグ、リリース", "explanation": "A. 不正解です。この方法は各テストメソッドの独立性を保証しますが、共通のデータセットを複数のメソッドで使用する場合、コードの重複が発生し、テストデータの準備が非効率になります。\nB. 正解です。@testSetup メソッドは、テストクラス内のテストメソッドが実行される前に一度だけ実行され、共通のテストデータを作成します。各テストメソッドの実行前には、データベースの状態が @testSetup 完了直後の状態にロールバックされるため、テストメソッド間の独立性を保ちつつ、効率的にテストデータを準備できます。\nC. 不正解です。ユーティリティクラスを使用するとデータ作成ロジックを再利用できますが、各テストメソッドで呼び出す必要があります。@testSetup のように、テスト実行フレームワークによる自動的なロールバックや一度だけの実行といった効率化のメリットは直接的には得られません。\nD. 不正解です。テストクラスは組織の既存データに依存するべきではありません。既存データは変更される可能性があり、テストの再現性や信頼性を損ないます。また、このようなテストは異なる環境（例: Sandbox、本番）で正しく動作しない可能性が高いです。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 15, "q": "取引先責任者レコードが更新されたときに起動するApexトリガーがあります。このトリガーは、更新された各取引先責任者に対応する取引先の情報を取得し、取引先の特定の項目に基づいて取引先責任者の項目を更新する必要があります。開発者は当初、Trigger.new をループ処理し、ループ内で各取引先責任者のAccountId を使って取引先を取得するSOQLクエリを実行するコードを作成しました。しかし、一度に多数の取引先責任者が更新されると、SOQLクエリのガバナ制限（1トランザクションあたり100回）に抵触する可能性があることが判明しました。このガバナ制限を回避し、コードの効率を向上させるための最も適切なアプローチはどれですか？", "choices": ["A. ループ処理を開始する前に、Trigger.new 内の取引先責任者から AccountId の Set を収集し、その Set を使用して関連する取引先を単一のSOQLクエリで取得後、結果を Map に格納してループ内で参照する。", "B. トリガー内の処理ロジックをFutureメソッドに移行し、更新された取引先責任者ごとに個別のFutureメソッド呼び出しを行うことで、処理を非同期に分散させる。", "C. SOQL FORループ (for (Account acc : [SELECT Id, Name FROM Account WHERE Id IN :accountIds])) を使用して取引先情報を反復処理し、各取引先に対応する取引先責任者を更新する。", "D. Database.queryLocator を使用してトリガーコンテキスト内の取引先IDに基づいて取引先レコードを取得し、返されたイテレータを処理する。"], "answer": ["A"], "category": "パフォーマンス", "explanation": "A. 正解です。これはApexのBulkification（一括処理）のベストプラクティスです。ループ内でSOQLクエリを実行する代わりに、ループ外で一度に必要なデータをまとめて取得し、効率的にアクセスできるデータ構造（Mapなど）に格納することで、SOQLクエリの実行回数を最小限に抑え、ガバナ制限に準拠しやすくなります。\nB. 不正解です。各レコードに対してFutureメソッドを呼び出すと、非同期Apex実行のガバナ制限（例: 1トランザクションあたりのFuture呼び出し回数）にすぐに達する可能性があります。また、SOQLクエリの非効率な実行パターン自体を解決するものではありません。\nC. 不正解です。SOQL FORループは大量のデータを処理する際のヒープサイズ制限対策には有効ですが、このシナリオのようにトリガー内で関連データを取得する場合、ループ処理全体を1回のSOQLクエリとしてカウントするわけではありません。依然としてループ内でクエリが実行される形になる場合があり、根本的なガバナ制限回避策としては不十分です。Bulkificationパターン（選択肢A）の方が適切です。\nD. 不正解です。Database.queryLocator は主にBatch Apexで使用され、最大5,000万件のレコードを処理できますが、返り値は Database.QueryLocator オブジェクトであり、直接レコードリストを取得するわけではありません。トリガーのような同期コンテキストで、関連レコードを効率的に取得するための一般的な方法ではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 16, "q": "ユーザーインターフェースから指定されたオブジェクト名(objectApiName)、検索対象の項目名(fieldApiName)、および検索文字列(searchText)を使用して、動的にSOQLクエリを構築し、該当するレコードを検索するApexメソッドを実装しています。searchTextにはユーザーが自由に入力した値が含まれる可能性があり、SOQLインジェクションのリスクを考慮する必要があります。\n\n以下のコードスニペットの「★ ここに動的SOQLクエリ文字列を構築するコードを記述」の部分に入るコードとして、セキュリティ的に安全で、かつ意図した検索（指定項目が検索文字列を含むレコードを検索）を実行する可能性が最も高いものはどれでしょうか？\n[[PRE]]\npublic static List<sObject> searchRecords(String objectApiName, String fieldApiName, String searchText) {\n    String queryString;\n\n    // ★ ここに動的SOQLクエリ文字列を構築するコードを記述\n\n    System.debug('Executing Query: ' + queryString);\n    return Database.query(queryString);\n}\n\n// 使用例:\n// List<sObject> results = searchRecords('Contact', 'Email', 'test@example.com');[[/PRE]]", "choices": ["A. queryString = 'SELECT Id FROM ' + objectApiName + ' WHERE ' + fieldApiName + ' LIKE \\'%' + String.escapeSingleQuotes(searchText) + '%\\'';", "B. String searchQuery = '%' + searchText + '%'; queryString = 'SELECT Id FROM ' + objectApiName + ' WHERE ' + fieldApiName + ' LIKE :searchQuery';", "C. queryString = 'SELECT Id FROM ' + objectApiName + ' WHERE ' + fieldApiName + ' LIKE \\'%' + searchText + '%\\'';", "D. queryString = String.format('SELECT Id FROM {0} WHERE {1} LIKE \\'\\'{2}\\'\\'' , new List<String>{objectApiName, fieldApiName, '%' + searchText + '%'});"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. 正解です。このコードは、動的SOQLクエリを文字列結合で構築しています。objectApiName と fieldApiName はメソッドの引数から取得していますが、これらが信頼できるソース（例：固定リストからの選択）から来ていると仮定した場合、問題は searchText です。ユーザー入力が含まれる可能性がある searchText を LIKE 句の値として使用する際に、String.escapeSingleQuotes() メソッドでエスケープ処理を行っています。これは、searchText にシングルクォートが含まれていた場合にSOQLインジェクションが発生するのを防ぐための基本的なセキュリティ対策です。\nB. String searchQuery = ...; queryString = '... LIKE :searchQuery'; - このコードは、動的SOQLクエリ文字列内でApexのバインド変数（:プレフィックス）を使用しようとしています。しかし、Database.query() で実行される動的SOQLクエリ文字列内では、このように直接バインド変数を使用することはできません。バインド変数は静的SOQLでのみ有効です。そのため、このコードは実行時エラーになります。\nC. このコードは searchText をエスケープせずに直接クエリ文字列に結合しています。もし searchText にシングルクォートが含まれている場合（例: O'Reilly）、生成されるSOQLクエリが不正になり、SOQLインジェクション攻撃に対して脆弱になります。これは非常に危険な実装です。\nD. queryString = String.format(...); - String.format() は文字列を整形するためのメソッドであり、SOQLインジェクションに対する自動的なエスケープ機能は提供しません。{2} のプレースホルダーに searchText を含む文字列を挿入していますが、searchText のエスケープが行われていないため、選択肢Cと同様にSOQLインジェクションのリスクがあります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 17, "q": "カスタムオブジェクト「プロジェクト」があり、その「状況」項目が「完了」に変更されたとき、関連するすべての「プロジェクトToDo」（主従関係の子オブジェクト）の「状況」項目も「完了」に更新する処理を実装する必要があります。ただし、プロジェクトToDoの数が非常に多い場合があり、ガバナ制限に抵触する可能性があります。この処理を最も効率的かつ安全に実装する方法はどれでしょうか？", "choices": ["A. プロジェクトオブジェクトのトリガー内で、関連するすべてのプロジェクトToDoをSOQLで取得し、forループ内で直接DML更新を行う。", "B. プロジェクトオブジェクトのトリガーからQueueable Apexジョブを起動し、そのジョブ内で関連するプロジェクトToDoを更新する。", "C. プロジェクトオブジェクトのトリガーからBatch Apexジョブを起動し、関連するプロジェクトToDoを一括で更新する。", "D. プロセスビルダーを使用して、プロジェクトの状況が「完了」になったときに、関連するプロジェクトToDoを更新するフローを起動する。"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "A. プロジェクトToDoの数が多い場合、単一トランザクション内のSOQLクエリ行数制限やDML行数制限などのガバナ制限に抵触する可能性があります。同期処理であるため、大量データ処理には適していません。\nB. Queueable Apexは非同期処理であり、同期トリガーよりも多くのガバナ制限を利用できますが、1つのジョブ実行で処理できるレコード数には依然として制限があります。プロジェクトToDoが非常に多い場合、1つのQueueableジョブでは完了しない可能性があります。\nC. 正解です。Batch Apexは大量のレコードを小さなバッチに分割して非同期で処理するために設計されています。各バッチは独自のガバナ制限を持つため、非常に大量の関連ToDoレコードが存在する場合でも、ガバナ制限に抵触することなく安全かつ効率的に更新処理を実行できます。トリガーからDatabase.executeBatchを呼び出すことで実装します。\nD. プロセスビルダーやフローも自動化に利用できますが、関連レコードが非常に多い場合のバルク処理においては、Apex Batchほどの効率性と堅牢性は期待できません。特に大量の子レコードの更新は、フローのガバナ制限に抵触するリスクが高まります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 18, "q": "グローバル展開している企業がSalesforceを利用しており、様々な言語を話すユーザーがシステムを使用しています。Apexコード内で、実行ユーザーの言語設定に基づいて適切な翻訳ラベルを表示し、またユーザーのデフォルト通貨に基づいて金額をフォーマットする必要があります。これらの要件を満たすために、開発者が利用すべき標準的なApex機能やベストプラクティスはどれですか？", "choices": ["A. UserInfoクラスのメソッドを使用してユーザーの言語やロケール情報を取得し、カスタム表示ラベルを利用して多言語対応のテキストを取得する。format()メソッドを使用してユーザーのロケールに基づいた通貨フォーマットを行う。", "B. カスタムメタデータ型に言語ごとの翻訳テキストと通貨フォーマット文字列を保存し、Apexコードから動的にクエリして利用する。", "C. 各ユーザーのユーザーレコードにカスタム項目を作成し、言語コードと希望する通貨フォーマットを保存しておき、Apex内でそのユーザーレコードをクエリして参照する。", "D. Apexコード内に言語ごとの Map<String, String> をハードコーディングし、実行ユーザーの言語に応じて適切なMapからテキストを取得する。通貨フォーマットは Decimal.format() メソッドのみを利用する。"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. 正解です。UserInfo.getLanguage()やUserInfo.getLocale()でユーザー設定を取得し、カスタム表示ラベル (System.Label.YourLabelName) を使用すると、ユーザーの言語に応じたテキストが自動的に返されます。Decimal型のformat()メソッドもユーザーのロケールを考慮するため、これらを組み合わせるのが標準的で推奨される実装方法です。\nB. 不正解です。カスタムメタデータ型は設定管理に有用ですが、UIテキストの翻訳管理には、翻訳ワークベンチと連携できるカスタム表示ラベルの方が適しています。通貨フォーマットも標準機能で対応可能です。\nC. 不正解です。ユーザーの言語、ロケール、デフォルト通貨設定は標準でUserInfoクラスからアクセス可能です。カスタム項目でこれらの情報を管理するのは冗長であり、標準機能を利用するべきです。\nD. 不正解です。テキストラベルをコード内にハードコーディングすると、翻訳の追加や変更が困難になり、保守性が低下します。カスタム表示ラベルを使用するのがベストプラクティスです。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 19, "q": "標準オブジェクトである取引先レコードに対して、手動共有や共有ルールではなく、Apexを使用して特定のユーザーグループにプログラム的に参照アクセス権を付与する必要があります。この要件を実装するために、開発者が直接操作（レコードの作成）を行う必要がある主要な共有オブジェクトはどれですか？", "choices": ["A. GroupMember", "B. UserRecordAccess", "C. AccountShare", "D. Profile"], "answer": ["C"], "category": "上級デベロッパーの基本", "explanation": "A. 不正解です。GroupMemberオブジェクトは、公開グループやキューなどのグループとそのメンバー（ユーザーや他のグループなど）の関連付けを管理します。共有ルールの適用対象を指定するために間接的に関わりますが、レコードアクセス権を直接付与するためのレコードを作成するオブジェクトではありません。\nB. 不正解です。UserRecordAccessオブジェクトは、特定のユーザーまたはグループが特定のレコードに対して持つアクセスレベル（参照、編集など）とそのアクセス権の理由（所有者、共有ルール、手動共有など）を照会するために使用されます。アクセス権を付与するためにこのオブジェクトにレコードを作成することはありません。\nC. 正解です。これは取引先オブジェクトの共有エントリを保持するオブジェクトです。Apexによる共有（Apex managed sharing）を実装する場合、開発者はこのAccountShareオブジェクトに新しいレコードを作成し、共有したいレコードのID（ParentId）、共有先のユーザーまたはグループのID（UserOrGroupId）、アクセスレベル（AccessLevel、例: 'Read'）を指定します。\nD. 不正解です。プロファイルは、ユーザーがアクセスできるオブジェクト、項目、アプリケーションなどを定義します。オブジェクトレベルの基本的なアクセス権限（作成、参照、編集、削除）を設定しますが、個々のレコードに対するアクセス権をプログラム的に制御するためのものではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 20, "q": "Apexクラス内で、特定の条件を満たす複数の取引先IDを取得した後、それらの取引先に関連する全ての商談レコードを取得し、取引先ごとに商談の合計金額を計算する必要があります。取得した商談データを効率的に処理し、各取引先IDに対応する商談リストへ迅速にアクセスするために、取得した商談レコードを格納するのに最も適したApexの複合データ型はどれですか？", "choices": ["A. List<Opportunity>", "B. Set<Opportunity>", "C. Map<Id, Opportunity>", "D. Map<Id, List<Opportunity>>"], "answer": ["D"], "category": "ロジックとプロセスの自動化", "explanation": "A. 不正解です。商談のリストは取得したデータを保持しますが、特定の取引先に関連する商談を見つけるためには、リスト全体を繰り返し検索する必要があり、取引先数や商談数が増えると非効率になります。\nB. 不正解です。Setは重複しない要素のコレクションであり、商談の重複排除には役立ちますが、取引先ごとに商談をグループ化してアクセスする構造は提供しません。\nC. 不正解です。このMapは、キー（通常は商談ID）を使って個々の商談レコードに素早くアクセスするのに適しています。しかし、取引先IDをキーとして、その取引先に属する複数の商談をまとめて扱うのには適していません。\nD. 正解です。このデータ構造では、キーとして取引先IDを使用し、値としてその取引先に関連する商談のList<Opportunity>を格納できます。これにより、各取引先IDに対して関連する商談リストを効率的に取得し、合計金額の計算などの後続処理を行うことができます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 21, "q": "特定のレコードタイプを持つ成約済みの商談レコードについて、それらの合計金額をApexコード内で計算する必要があります。対象となる商談レコードが大量に存在する可能性がある場合、ガバナ制限（特に取得SOQL行数）を考慮した上で、最も効率的に合計金額を取得するアプローチはどれですか？", "choices": ["A. 該当する商談レコードをSOQLで取得し、取得したリストをApexループ内で反復処理して金額を加算する。", "B. Batch Apexジョブを作成し、対象の商談をチャンクに分けて処理し、各チャンクの合計を最終的に集計する。", "C. SOQLクエリでSUM()集計関数を使用し、返されるAggregateResultから合計金額を取得する。", "D. Futureメソッドを作成し、そのメソッド内でSOQLクエリを実行して合計金額を計算する処理を非同期で行う。"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "A. 不正解です。大量の商談レコードをすべてメモリにロードして処理するため、SOQLクエリで取得する行数のガバナ制限や、ヒープサイズ制限に抵触する可能性が高く、非効率です。\nB. 不正解です。Batch Apexは大量レコードの処理に適していますが、単一の合計金額を取得するだけであれば、よりシンプルなSOQL集計関数の方が効率的であり、実装も容易です。\nC. 正解です。SOQLの集計関数（SUM(), COUNT(), AVG()など）は、データベース側で計算を実行し、結果のみを返します。これにより、Apex側で大量のレコードを処理する必要がなくなり、SOQL行数制限やヒープサイズ制限を回避しつつ、効率的に集計値を取得できます。\nD. 不正解です。処理を非同期にしても、SOQLクエリ自体の効率が改善されるわけではありません。合計値の取得には同期処理で十分な場合が多く、非同期化はこの問題の直接的な解決策ではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 22, "q": "開発チームは、Full Sandbox環境で新しいApexクラスとトリガーの開発および単体テストを完了しました。これらのコンポーネントを含む変更セットを作成し、本番環境へのデプロイを準備しています。本番環境へ正常にデプロイするために、この変更セットに関して満たす必要があるテスト関連の要件はどれですか？", "choices": ["A. Sandbox環境でテストが成功していれば、本番環境での追加のテスト実行は要求されない。", "B. 変更セットに含まれるApexコードに対して、本番組織のApexコード全体の75%以上をカバーするテストを実行する。", "C. 変更セットに含まれるApexトリガーに対してのみ、少なくとも1行がテストで実行されることを保証する。", "D. 変更セットに含まれるApexクラスとトリガーについて、それらを対象とするローカルテストを実行し、コードカバー率が75%以上であることを確認する。"], "answer": ["D"], "category": "テスト、デバッグ、リリース", "explanation": "A. Sandbox環境でのテスト成功は前提ですが、本番環境へのデプロイ時には、本番環境のコンテキストでテストが実行され、特定の要件を満たす必要があります。\nB. 本番デプロイ時に要求されるコードカバー率は、デプロイされるApexコードに対するものであり、組織全体のコードカバー率ではありません。\nC. Apexトリガーだけでなく、Apexクラスもテストの対象となります。また、「少なくとも1行」という要件ではなく、より高いコードカバー率が要求されます。\nD. 正解です。本番環境へのApexコードのデプロイ（変更セット、メタデータAPI経由など）では、デプロイに含まれるApexクラスとトリガーに対してテストを実行し、それらのコードの合計で75%以上のコードカバー率を達成する必要があります。さらに、各トリガーについては少なくとも1行はカバーされている必要もありますが、主要な要件は全体のカバー率です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 23, "q": "Apexで複数のステップからなる複雑なビジネスプロセスを実装しています。プロセスのあるステップ（例: 外部システムへのコールアウト）が失敗した場合、そのステップより前のデータベース更新（例: レコードの作成や更新）はコミットされた状態を維持しつつ、失敗したステップ以降の処理は実行せず、かつ失敗したステップ自身のデータベース変更は取り消したいと考えています。このようなトランザクション制御を実現するために最も適したApexの機能はどれですか？", "choices": ["A. ネストされたtry-catchブロックを使用して、各ステップのエラーを個別に捕捉し処理する。", "B. 各主要ステップの前に Database.setSavepoint() を設定し、エラー発生時に適切な保存点まで Database.rollback() を実行する。", "C. プロセスの各ステップを個別のFutureメソッドとして実装し、非同期に実行させることで影響範囲を限定する。", "D. DatabaseクラスのDMLメソッドで allOrNone パラメータを false に設定し、部分的なデータベース更新を許可する。"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "A. 不正解です。try-catchブロックは例外を捕捉し、エラー処理ロジックを実行するために不可欠ですが、それ自体ではデータベーストランザクションの状態を特定のポイントに戻す機能はありません。捕捉後に明示的なロールバック処理を組み合わせる必要があります。\nB. 正解です。Database.setSavepoint() はトランザクション内の特定の状態をマークする保存点を作成します。後続の処理でエラーが発生した場合、Database.rollback() メソッドを使用して、指定した保存点以降に行われたデータベースの変更を取り消すことができます。これにより、エラー発生前の成功したステップの結果を保持しつつ、失敗したステップ以降の影響を排除することが可能です。\nC. 不正解です。処理を非同期化すると、各ステップが独立したトランザクションで実行されるため、あるステップの失敗が他のステップに直接影響しなくなります。しかし、これは同期的な単一トランザクション内で部分的な成功とロールバックを実現する要件とは異なります。\nD. 不正解です。このオプションはDML操作に特有で、複数のレコードを一度に操作する際に、一部のレコードでエラーが発生しても他の成功したレコードの操作はコミットされるようにします。しかし、これはDML操作以外の処理ステップ（例: コールアウト）や、失敗したステップ以前の複数のDML操作全体を制御するものではなく、保存点とロールバックほど柔軟なトランザクション制御は提供しません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 24, "q": "ある企業では、大量のIoTデバイスから送られてくる非構造化データをリアルタイムで処理し、分析結果をSalesforce内の取引先レコードに関連付けて表示するカスタムアプリケーションを構築したいと考えています。このアプリケーションは、Node.jsと特殊なデータ処理ライブラリを使用して開発する必要があります。この要件に最も適したSalesforce開発プラットフォームはどれですか？", "choices": ["A. Lightning Platform上でApexとフローを使用し、Salesforce内部でデータ処理ロジックを構築する。", "B. Herokuプラットフォーム上にNode.jsアプリケーションをデプロイし、Heroku Connectを使用してSalesforceとデータを同期する。", "C. Marketing Cloud (旧称 Fuel) のJourney BuilderやAutomation Studioを利用してデータ処理フローを構築する。", "D. Lightning Platformから外部サービスとして構築したNode.jsアプリケーションをCanvas経由で統合する。"], "answer": ["B"], "category": "上級デベロッパーの基本", "explanation": "A. 不正解です。Lightning PlatformはSalesforceコア機能との連携に優れていますが、ApexやフローはNode.jsや特殊なライブラリの使用、および大量の非構造化データのリアルタイム処理には最適化されていません。ガバナ制限などの制約も考慮する必要があります。\nB. 正解です。HerokuはNode.jsを含む多様な言語とライブラリをサポートしており、スケーラブルなアプリケーションの構築と実行に適しています。大量のデータ処理や外部システムとの連携に強く、Heroku Connectを利用することでSalesforceとのデータ同期も容易に行えるため、この要件に最も適しています。\nC. 不正解です。Marketing Cloudは顧客エンゲージメントやマーケティング自動化に特化したプラットフォームであり、IoTデータのリアルタイム処理や分析といった汎用的なアプリケーション開発の基盤としては主な用途ではありません。\nD. 不正解です。Canvasによる統合は、外部アプリケーションをSalesforce UI内に埋め込むための一つの方法ですが、データ処理の実行基盤そのものを指すものではありません。アプリケーションの実行環境としてはHerokuがより直接的で適切な選択肢となります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 25, "q": "開発者が、開発中のApexクラスの特定の行で変数の値が期待通りに変化しているかを確認したいと考えています。ステップ実行やブレークポイントの設定により、コードの実行を一時停止し、その時点での変数の状態を詳細に調査したい場合、このデバッグ要件を満たすために最も適したSalesforce開発者ツールはどれですか？", "choices": ["A. Developer Console (チェックポイント機能)", "B. Visual Studio Code の Salesforce Extension Pack (Apex リプレイデバッガー)", "C. Salesforce CLI (sfdx force:apex:log:get とログ分析)", "D. Developer Console (Apex対話実行)"], "answer": ["B"], "category": "テスト、デバッグ、リリース", "explanation": "A. チェックポイント機能は、コード内の特定ポイントにおけるヒープダンプ情報（変数の状態など）を後で確認するために使用されます。しかし、ステップごとに実行を追跡したり、実行を一時停止して変数をインタラクティブに検査したりする機能は提供しません。\nB. 正解です。Apex リプレイデバッガーは、取得したデバッグログを基にコードの実行フローを再現します。これにより、開発者はブレークポイントを設定し、コードをステップ実行（ステップイン、ステップオーバー、ステップアウト）し、各ステップでの変数の値を詳細に検査することが可能です。これは要件に最も合致する機能です。\nC. Salesforce CLIを使用してデバッグログを取得し、それを分析することは可能ですが、これは実行後の静的な分析になります。コードの実行を一時停止したり、ステップ実行したりするリアルタイムまたはインタラクティブなデバッグ機能は提供しません。\nD. Apex対話実行（Execute Anonymous）は、短いApexコードスニペットを即座に実行して結果を確認するための機能です。既存のクラスやトリガーの実行フローを追跡し、ステップ実行やブレークポイントを用いてデバッグする用途には適していません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 26, "q": "以下の ProcessLeadsQueueable クラスは、リード(Lead)レコードのリストを受け取り、各リードに対して複雑なデータ処理（例: 関連情報の検索、スコアリング計算、場合によっては外部システム連携）を行う非同期処理を実装しています。処理中に、個々のリードに対して予期せぬデータ不整合やビジネスロジック上のエラーが発生する可能性があります。\n[[PRE]]\npublic class ProcessLeadsQueueable implements Queueable {\n\n    private List<Id> leadIds;\n\n    public ProcessLeadsQueueable(List<Id> ids) {\n        this.leadIds = ids;\n    }\n\n    public void execute(QueueableContext context) {\n        List<Lead> leads = [SELECT Id, Name, Status, Custom_Score__c FROM Lead WHERE Id IN :leadIds];\n        List<Lead> leadsToUpdate = new List<Lead>();\n        List<Log__c> errorLogs = new List<Log__c>(); // エラーログ用カスタムオブジェクト\n\n        for (Lead ld : leads) {\n            try {\n                // 複雑な処理を実行 (スコアリング、データ検証など)\n                Decimal score = calculateScore(ld); // 架空のメソッド\n                if (score < 0) {\n                    throw new InvalidScoreException('Calculated score is negative for Lead ID: ' + ld.Id);\n                }\n                ld.Custom_Score__c = score;\n                ld.Status = 'Processed'; // 処理済みステータスに更新\n                leadsToUpdate.add(ld);\n\n            } catch (Exception e) {\n                System.debug('Error processing Lead ID: ' + ld.Id + ' - ' + e.getMessage());\n                // ★ ここでエラー発生時の対応を記述\n            }\n        }\n\n        // 成功したリードのみを更新 (部分的な成功)\n        if (!leadsToUpdate.isEmpty()) {\n            Database.update(leadsToUpdate, false); // 部分成功を許容して更新\n        }\n        // エラーログを挿入\n        if (!errorLogs.isEmpty()) {\n            insert errorLogs;\n        }\n    }\n\n    private static Decimal calculateScore(Lead ld) {\n        // ... 複雑なスコアリングロジック ...\n        // 例外が発生する可能性のある処理を含む\n        return 10; // 仮の戻り値\n    }\n    public class InvalidScoreException extends Exception {} // カスタム例外\n}[[/PRE]]\n上記の execute メソッド内の catch ブロック（コメント「★ ここでエラー発生時の対応を記述」の部分）において、特定のリードの処理中に例外が発生した場合に、ジョブ全体を停止させることなく、他のリードの処理を継続し、かつエラーが発生した事実（どのリードでどのようなエラーが発生したか）を記録するための最も適切なコードはどれでしょうか？", "choices": ["A. throw e; // 捕捉した例外を再スローする", "B. continue; // 現在のループ反復をスキップして次のリードへ進む", "C. errorLogs.add(new Log__c(RecordId__c = ld.Id, ErrorMessage__c = e.getMessage(), ObjectType__c = 'Lead'));", "D. Database.rollback(Database.setSavepoint()); break; // ロールバックしてループを抜ける"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "A. throw e; - 捕捉した例外を再スローすると、execute メソッドの実行がそこで中断され、Queueableジョブが失敗ステータスになる可能性があります。これにより、まだ処理されていない他のリードの処理も行われなくなるため、要件（他のリードの処理を継続する）に反します。\nB. continue; - continue ステートメントは現在のループの反復を中断し、次の反復（次のリードの処理）に進みます。これにより、他のリードの処理は継続されますが、エラーが発生したという事実やその内容が記録されません。エラーの追跡ができなくなるため、不適切です。\nC. errorLogs.add(new Log__c(...)); - 正解です。このコードは、エラーが発生したリードのIDやエラーメッセージなどの情報を、エラーログを格納するためのカスタムオブジェクト Log__c の新しいレコードとしてリスト errorLogs に追加しています。catch ブロックはこの処理の後に正常に終了し、for ループは次のリードの処理に進みます。ループが完了した後、収集されたエラーログが一括で挿入されます。これにより、ジョブ全体は停止せず、他のリードの処理は継続され、かつエラー情報が永続的に記録されるため、要件を完全に満たします。\nD. Database.rollback(...); break; - Database.rollback はDML操作を取り消すためのものですが、この catch ブロック時点ではまだリードの更新（Database.update）は行われていません。break ステートメントはループ全体を終了させてしまうため、まだ処理されていない他のリードの処理が行われなくなり、要件に反します。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 27, "q": "取引先レコードが更新された際に、関連するすべての未完了の商談の「最終活動日」項目を今日の日付で更新し、さらに各商談に対してフォローアップを促すToDoを作成する必要があります。この要件を実装するにあたり、レコード保存の実行順序と処理の効率性を考慮した場合、どの自動化アプローチが最も適切でしょうか？", "choices": ["A. 取引先オブジェクトに対するレコードトリガーフローと、そのフロー内で商談レコードの更新およびToDoレコードの作成を行う。", "B. 取引先オブジェクトに対するApexトリガーを使用し、トリガーハンドラークラス内で関連する商談の更新ロジックとToDoの作成ロジックを実装する。", "C. 取引先オブジェクトに対するProcess Builderを設定し、関連する商談を更新するアクションと、ToDoを作成する別のアクションを定義する。", "D. 取引先オブジェクトに対するワークフロールールを作成して項目自動更新で商談を更新し、ToDo作成のためにProcess Builderを別途起動する。"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "A. フローは強力な自動化ツールですが、大量の関連レコード（商談とToDo）を処理する場合、特にループ内でDML操作を行うとガバナ制限に達しやすくなる可能性があります。Apexトリガーと比較して、複雑な関連レコード処理の効率性において劣る場合があります。\nB. 正解です。Apexトリガーはレコード保存の実行順序の早い段階で実行され、SOQLクエリやDML操作を効率的に一括処理（Bulkification）するコーディングが可能です。これにより、関連する多数の商談レコード更新とToDo作成をガバナ制限に抵触することなく、効率的に実行できます。トリガーハンドラーパターンを用いることで、コードの保守性も向上します。\nC. Process Builderはレコード保存の実行順序においてApexトリガーの後に実行されます。また、関連レコードの更新や新規レコード作成のアクションは、レコードごとにトランザクションが分割される可能性があり、Apexトリガーに比べてパフォーマンスが劣る場合があります。\nD. ワークフロールールはクロスオブジェクトの項目更新が限定的であり、関連するすべての商談を更新する要件には適していません。また、複数の自動化ツール（ワークフローとProcess Builder）を組み合わせることは、実行順序の管理を複雑にし、デバッグを困難にする可能性があります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 28, "q": "取引先責任者レコードが更新された際に、関連する取引先の特定の項目も更新するApexトリガーと、同じ取引先責任者の更新をトリガーとするフローが存在します。両方とも取引先の同じ項目を更新しようとしますが、異なる値で更新します。このシナリオにおいて、最終的に取引先に保存される値に影響を与える可能性のある要因はどれですか？（2つ選択）", "choices": ["A. フロー内で実行されるDML操作の種類", "B. Apexトリガーがbeforeトリガーかafterトリガーか", "C. フローがレコードトリガーフローとして設定されているか、画面フローとして設定されているか", "D. トリガーを実行するユーザーのプロファイル"], "answer": ["A", "B"], "category": "ロジックとプロセスの自動化", "explanation": "A. 正解です。フローが即時実行されるアクションでDML操作を行うか、非同期パスでDML操作を行うかによって、トリガーとの実行順序やトランザクションのコミットタイミングが変わる可能性があります。これにより、最終的に保存される値に影響が出ることがあります。\nB. 正解です。レコード保存の実行順序において、beforeトリガーはレコードがデータベースに保存される前に実行され、afterトリガーは保存後に実行されます。フローの実行タイミング（多くはafterトリガーの後）との兼ね合いで、どちらの自動化が最後に項目を更新するかが変わり、最終的な値に影響を与えます。\nC. レコードトリガーフローはレコードの変更によって自動起動しますが、画面フローはユーザー操作によって起動します。今回のシナリオはレコード更新を起点としているため、画面フローはこの競合に直接関与しません。レコードトリガーフローの種類（更新前/更新後）は影響しますが、画面フローであるかどうかは直接的な要因ではありません。\nD. ユーザーのプロファイルは、そのユーザーがトリガーやフローを実行する権限を持っているかどうかに影響しますが、同じ権限を持つユーザーであれば、プロファイル自体が自動化プロセスの実行順序や競合の結果（どの値が最終的に保存されるか）に直接影響を与えることは通常ありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 29, "q": "あるカスタムオブジェクトのレコードが作成または更新された際に、特定の条件に基づいて別のカスタムオブジェクトの関連レコードを自動的に更新するApexトリガーを実装する必要があります。このトリガーを実装する際に考慮すべき最も重要な点は何ですか？", "choices": ["A. トリガーは、SOQLクエリを使用して関連レコードを取得する前に、そのレコードが存在することを確認する必要がある。", "B. トリガーは、同じカスタムオブジェクトの別のトリガーによって発生する可能性のある再帰的な実行を回避するように設計する必要がある。", "C. トリガーは、実行コンテキストに関係なく、常にすべてのカスタムオブジェクトレコードに対して実行されるようにする必要がある。", "D. トリガーは、トリガーの実行が完了した後でのみ、外部システムとの統合を呼び出す必要がある。"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "A. トリガーは、SOQLクエリを実行する前にレコードの存在を確認することは良いプラクティスですが、最も重要な考慮事項ではありません。レコードが存在しない場合の処理は必要ですが、トリガーの根本的な設計上の懸念ではありません。\nB. 正解です。トリガーが同じオブジェクトの別のトリガーやワークフロールールなどによって再度トリガーされる可能性があり、無限ループや予期しない動作を引き起こす可能性があります。この再帰的な実行を適切に管理することは、トリガーの安定性とパフォーマンスにとって非常に重要です。\nC. トリガーは、特定のイベント（レコードの作成、更新、削除など）が発生したときにのみ実行されます。すべてのレコードに対して常に実行されるわけではありません。また、実行コンテキストを無視することは、トリガーの設計において不適切です。\nD. トリガーの実行直後に外部システムとの統合を呼び出すことが適切な場合もありますが、最も重要な考慮事項ではありません。トランザクションの整合性やガバナ制限などを考慮して、適切なタイミングで統合を呼び出す必要があります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 30, "q": "大量の取引先レコードに対して、外部APIから取得した最新の業界情報を非同期で更新する処理を実装する必要があります。各取引先の更新後には、その結果（成功または失敗）をカスタムオブジェクト ApiUpdateLog__c に記録する必要があります。処理中にガバナ制限（特にDML行数やCPU時間）に抵触するリスクを最小限に抑えつつ、各レコードの処理結果を確実に記録するための最も適切な非同期処理パターンはどれですか？\n\n以下のApexコードの断片は、処理の起点となる部分を示しています。\n[[PRE]]\n// このメソッドが呼び出され、大量の取引先IDが渡される\npublic static void startIndustryUpdateProcess(List<Id> accountIds) {\n    // ここで非同期処理を開始するロジックを実装する\n    // 例: System.enqueueJob(...); や Database.executeBatch(...); など\n}\n\n// 各取引先の更新とログ記録を行うロジック（非同期処理の一部として実行される想定）\npublic void processAccount(Account acc) {\n    try {\n        // 外部APIコールを実行して業界情報を取得 (疑似コード)\n        String latestIndustry = ExternalApiService.getIndustry(acc.TickerSymbol);\n        acc.Industry = latestIndustry;\n        update acc;\n        // 成功ログを記録\n        insert new ApiUpdateLog__c(Account__c = acc.Id, Status__c = 'Success');\n    } catch (Exception e) {\n        // 失敗ログを記録\n        insert new ApiUpdateLog__c(Account__c = acc.Id, Status__c = 'Error', ErrorMessage__c = e.getMessage());\n        // エラーを上位にスローするか、ここで処理を続行するかは要件による\n    }\n}[[/PRE]]", "choices": ["A. startIndustryUpdateProcess メソッド内で accountIds リストを繰り返し処理し、各IDに対して個別のFutureメソッド（@future アノテーションが付与されたメソッド）を呼び出します。Futureメソッド内で processAccount ロジックを実行します。", "B. Database.Batchable<SObject> インターフェースを実装したバッチクラスを作成します。start メソッドで対象の取引先を取得するクエリを返し、execute メソッド内で processAccount ロジックを呼び出して取引先の更新とログの作成を行います。finish メソッドで管理者に通知メールを送信します。", "C. Queueable インターフェースを実装したクラスを作成します。execute メソッド内で accountIds リスト全体を処理し、ループ内で processAccount ロジックを実行します。外部APIへのコールアウトが必要なため、Database.AllowsCallouts も実装します。", "D. Schedulable インターフェースを実装したクラスを作成し、毎日深夜に実行されるようにスケジュールします。execute メソッド内で、前回の実行以降に変更された取引先を取得し、processAccount ロジックを実行します。"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "A. Futureメソッドは大量の非同期呼び出しには適していません。ガバナ制限により、1トランザクションから呼び出せるFutureメソッドの数には上限があります。大量の accountIds に対して個別にFutureメソッドを呼び出すと、この制限に容易に抵触します。また、Futureメソッドは処理の順序を保証せず、状態の管理も困難です。\nB. 正解です。Database.Batchable は、大量のレコードを小さなチャンク（バッチ）に分割して処理するために設計された非同期パターンです。各チャンクは独自のガバナ制限セット内で実行されるため、DML行数やCPU時間などの制限に抵触するリスクを大幅に低減できます。execute メソッド内で各取引先の処理とログ記録を行うことで、要件を満たすことができます。start, execute, finish メソッドにより、処理全体のライフサイクル管理も容易になります。\nC. Queueable Apexも非同期処理の一形態ですが、1つの execute メソッド内で大量のレコードをループ処理する場合、そのトランザクション内でガバナ制限（特にDML行数やCPU時間）に達する可能性があります。バッチ処理のように自動でチャンク分割されるわけではないため、自己管理で分割・連鎖させる必要があり、バッチ処理ほど大量レコード処理に最適化されていません。\nD. Schedulable Apexは定期的なバッチ処理の起動などに使われますが、この問題のように特定の accountIds リストに対してオンデマンドで処理を開始するシナリオには直接適合しません。また、Schedulableの execute メソッド自体もガバナ制限を受けるため、その中で大量のレコードを直接処理するのはバッチ処理に比べてリスクが高くなります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 31, "q": "夜間に実行されるバッチ処理で、大量の取引先レコードを更新する必要があります。更新処理後、各取引先に関連する外部システムのデータを更新するためのコールアウトを実行し、さらにその結果に基づいて別の関連レコードを更新するという一連の処理が必要です。これらの処理はガバナ制限を考慮し、かつ処理の連鎖を確実に行う必要があります。この要件を満たすために推奨される非同期Apexの機能はどれですか？（２つ選択）", "choices": ["A. Futureメソッドを使用して、取引先更新と外部コールアウトを個別に実行する。", "B. Batch Apexを利用して、大量の取引先レコードの更新処理を実装する。", "C. Schedule Apexを使用して、一連の処理を指定した時間に起動する。", "D. Queueable Apexを利用して、外部システムへのコールアウトと後続のレコード更新処理をチェーニングする。"], "answer": ["B", "D"], "category": "ロジックとプロセスの自動化", "explanation": "A. Futureはジョブチェーニングが直接的にできず、複雑なプリミティブ以外のデータ型も渡せないため今回の要件には不向き。\nB. 正解。Batch Apexは大量の取引先レコード更新に最適で、チャンク分割でガバナ制限リスクを低減します。\nC. Schedulableは処理の「起動スケジュール」用で、処理ロジック自体を提供しません。\nD. 正解。Queueable ApexはfromBatch finishから呼び出し可能で、コールアウトとその後の処理を連鎖させるジョブチェーニングが可能です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 32, "q": "アプリケーションの設定値を管理するために、「App_Config__mdt」というカスタムメタデータ型が定義されています。この型には、設定項目名を識別するための DeveloperName と、設定値を格納する Value__c (テキスト型) 項目があります。Apexコード内で、特定の設定項目名 (configName) に対応する設定値 (Value__c) を取得する必要があります。\n[[PRE]]\nString configName = 'Default_Timeout_Seconds'; // 取得したい設定項目のDeveloperName\nString configValue;\n\n// ★ ここに configName に対応する App_Config__mdt レコードの Value__c を取得するコードを記述\n\nif (configValue != null) {\n    System.debug('Configuration value for ' + configName + ': ' + configValue);\n    // 後続の処理で configValue を使用\n} else {\n    System.debug('Configuration value not found for ' + configName);\n}[[/PRE]]\n上記のコードの「★ ここに適切なコードを記述」の部分として、指定された configName (DeveloperName) に一致するカスタムメタデータレコードの Value__c 値を取得するための、最も効率的で推奨される方法はどれでしょうか？", "choices": ["A. Map<String, App_Config__mdt> allConfigs = App_Config__mdt.getAll(); if (allConfigs.containsKey(configName)) { configValue = allConfigs.get(configName).Value__c; }", "B. List<App_Config__mdt> configs = [SELECT Value__c FROM App_Config__mdt WHERE DeveloperName = :configName LIMIT 1]; if (!configs.isEmpty()) { configValue = configs[0].Value__c; }", "C. App_Config__mdt configRecord = App_Config__mdt.getInstance(configName); if (configRecord != null) { configValue = configRecord.Value__c; }", "D. for (App_Config__mdt config : App_Config__mdt.getAll().values()) { if (config.DeveloperName == configName) { configValue = config.Value__c; break; } }"], "answer": ["C"], "category": "上級デベロッパーの基本", "explanation": "A. getAll()は全レコードをメモリにロードするため、特定の1件取得には非効率な場合がある。\nB. SOQLクエリで取得する方法も有効で効率的。カスタムメタデータのSOQLはガバナ制限を消費しないため有効な選択肢。\nC. 正解。getInstance(developerName)は最も効率的で推奨される方法。内部キャッシュを利用し高速で、コードもシンプル。\nD. getAll()で全レコード取得後ループで検索する最も非効率な方法。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 33, "q": "取引先レコードが更新され、特定の条件を満たした場合に、Apexトリガー（after update）とワークフロールール（項目自動更新）の両方が起動するように設定されています。Apexトリガーは関連する商談の「説明」項目を更新し、ワークフロールールは同じ商談の「次のステップ」項目を更新します。これらの自動化が同じトランザクション内で実行される場合、Salesforceの保存実行順序に基づいて、どちらの自動化が先に完了すると考えられますか？", "choices": ["A. ワークフロールールによる項目自動更新が先に完了する。", "B. どちらが先に完了するかは、設定された実行コンテキストに依存する。", "C. Apexトリガー（after update）による更新が先に完了する。", "D. Apexトリガーとワークフロールールは並行して実行されるため、完了順序は不定である。"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "A. ワークフロールールはafterトリガーの後に実行されるため、先に完了することはありません。\nB. Salesforceの実行順序は定義されており、コンテキストに依存しません。\nC. 正解。標準の実行順序ではafterトリガーはワークフロールールよりも前に実行されます。\nD. 自動化は定義された順序で逐次的に実行され、並行実行ではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 34, "q": "あるApex開発者は、特定の取引先に関連するすべての取引先責任者レコードを取得する必要があります。開発者は、効率的なSOQLクエリを使用して関連レコードを取得することを考えています。次のうち、取引先名が「Acme Corporation」である取引先に関連付けられた取引先責任者レコードのリストを正しく取得するコードはどれですか？", "choices": ["A. List<Contact> relatedContacts; for (Account acc : [SELECT Contacts FROM Account WHERE Name = 'Acme Corporation']) { relatedContacts.addAll(acc.Contacts); }", "B. List<List<Contact>> relatedContactLists = [SELECT Contacts FROM Account WHERE Name = 'Acme Corporation'];", "C. List<Contact> relatedContacts = [SELECT Contact FROM Account WHERE Name = 'Acme Corporation'].Contact;", "D. List<Contact> relatedContacts = [SELECT Contacts FROM Account WHERE Name = 'Acme Corporation'];"], "answer": ["D"], "category": "ロジックとプロセスの自動化", "explanation": "A. 機能するが非効率。また relatedContacts の初期化がループ外でないためコンパイルエラーの可能性あり。\nB. List<List<Contact>>型ではなくList<Account>が返るため型不一致。\nC. 存在しない項目を指定しており文法的に誤り。\nD. 正解（最も意図に近い）。Contactsサブクエリを含む正しいSOQLリレーションシップクエリの形式。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 35, "q": "ある開発者は、取引先オブジェクトの更新時に起動するApexトリガーのテストクラスを作成する必要があります。トリガーのロジックを網羅的にテストするための、推奨されるベストプラクティスとして最も適切なものはどれですか？", "choices": ["A. テストクラスの名前をトリガークラスと完全に一致させることで、自動的にテストが実行されるようにする。", "B. テストメソッド内でテストデータを挿入し、テスト環境を分離してトリガーの動作を検証する。", "C. テストメソッドの開始と終了時に必ずTest.startTest()とTest.stopTest()を使用し、ガバナ制限のリセットを保証する。", "D. テストメソッドからトリガーハンドラークラスのメソッドを直接呼び出し、トリガーロジックを個別に実行する。"], "answer": ["B"], "category": "テスト、デバッグ、リリース", "explanation": "A. テストの自動実行はクラス名の一致ではなく、@isTestアノテーションと設定によります。\nB. 正解。テストメソッド内でテストデータを作成し、既存データから独立した環境でトリガーの動作を検証することがベストプラクティスです。\nC. Test.startTest/stopTestは重要ですが「必ず」ではなく、非同期処理のテスト等で特に重要。\nD. トリガーは実際のDML操作を通じて起動させてテストすべきです。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 36, "q": "取引先オブジェクトの更新時に、Before Update Apexトリガーと項目自動更新ワークフロールールが設定されています。Before Updateトリガーは取引先名を大文字に変換し、項目自動更新ワークフロールールは取引先名に特定の接尾辞を追加します。これらの自動化が同じトランザクション内で実行される場合、Salesforceの保存実行順序において、どちらの自動化が「最初」に実行されると考えられますか？", "choices": ["A. 項目自動更新ワークフロールール", "B. どちらが最初に実行されるかは保証されない", "C. Before Update Apexトリガー", "D. 実行順序はユーザのプロファイルによって異なる"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "A. ワークフロールールはBeforeトリガーよりも後に実行されます。\nB. Salesforceの実行順序は定義されており保証されています。\nC. 正解。Before Update Apexトリガーはワークフロールールよりも先の段階で実行されます。\nD. 実行順序はユーザプロファイルに依存しません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 37, "q": "商談(Opportunity)レコードを処理するApexクラスがあります。まず、Trigger.new（または他のソースから得た商談IDのリスト）に含まれる各商談について、その関連する取引先(Account)の業種(Industry)項目を取得する必要があります。取得した業種情報は、後続のロジックで各商談IDに対応する業種を迅速に参照するために使用されます。\n\n以下のコードスニペットは、関連する取引先のIDと業種を取得するSOQLクエリを示しています。\n[[PRE]]\nSet<Id> accountIds = new Set<Id>();\n// opportunityList は処理対象の商談リスト (例: Trigger.new)\nfor (Opportunity opp : opportunityList) {\n    if (opp.AccountId != null) {\n        accountIds.add(opp.AccountId);\n    }\n}\n\n// ★ ここで取引先の情報を効率的に格納するためのコレクションを宣言・初期化する\n\nList<Account> relatedAccounts = [SELECT Id, Industry FROM Account WHERE Id IN :accountIds];\n\n// SOQLの結果をループして★で宣言したコレクションに格納する\nfor (Account acc : relatedAccounts) {\n    // ★への格納処理 ...\n}\n\n// 後続のロジックでの利用例:\n// for (Opportunity opp : opportunityList) {\n//     String industry = // ★から opp.AccountId をキーに対応する業種を取得する処理\n//     // ... 業種に応じた処理 ...\n// }[[/PRE]]\n後続のロジックで商談のAccountIdをキーとして対応する取引先のIndustryを効率的に参照するために、上記のコードの「★」部分で宣言・初期化し、データを格納するのに最も適したApexコレクションの型はどれでしょうか？", "choices": ["A. List<String> industryList = new List<String>();", "B. Set<String> industrySet = new Set<String>();", "C. Map<Id, String> accountIdToIndustryMap = new Map<Id, String>();", "D. Map<String, Id> industryToAccountIdMap = new Map<String, Id>();"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "A. リストは取引先IDとの関連付けが失われ、AccountIdキーでの検索不可。\nB. Setは重複排除用で、IDキーでの業種取得には不向き。\nC. 正解。Map<Id, String>でキー（取引先ID）に対して業種（String）を格納。map.get(someAccountId)で効率的にアクセス可能です。\nD. キーと値が逆。業種キーで取引先IDを取得する構造は要件と逆です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 38, "q": "ある開発者は、ローカルのSalesforce DXプロジェクトで開発した変更を、開発者Sandbox環境に反映させる必要があります。Salesforce CLIを使用してソースをSandboxにプッシュする際に、最も適切なコマンドとその目的の組み合わせはどれですか？", "choices": ["A. force:mdapi:deploy - メタデータAPIを使用して、package.xmlファイルに基づいてメタデータをデプロイする。", "B. force:source:push - ローカルのソース形式の変更を、デフォルトのSandbox組織にプッシュして同期する。", "C. force:source:deploy - ソース形式のメタデータを指定された組織にデプロイするが、Sandboxへの直接プッシュには適さない。", "D. force:org:create - 新しいスクラッチ組織を作成し、そこにソースを同期させる。"], "answer": ["B"], "category": "テスト、デバッグ、リリース", "explanation": "A. force:mdapi:deployはメタデータAPI形式のパッケージデプロイ用。\nB. 正解。force:source:pushはローカルのDXプロジェクトの変更をデフォルトのSandbox組織にプッシュして同期するコマンドです。\nC. force:source:deployは特定ファイル指定のデプロイ。\nD. force:org:createは新しいスクラッチ組織作成用です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 39, "q": "ある企業では、商談が特定のフェーズに移行する際に、複数のオブジェクト（商談、取引先、商品）にわたる複雑なデータ検証を行う必要があります。さらに、外部システムから取得したデータも検証ルールに含める必要があります。この検証ロジックを実装する最適なアプローチとして、最も適切なものはどれでしょうか？", "choices": ["A. 入力規則と数式項目を最大限活用し、宣言的に検証ロジックを実装する。ただし、外部システム連携は考慮せず、基本的なデータ検証に限定する。", "B. フローを主要なツールとして採用し、外部システムとの連携や高度な条件分岐にはApexアクションを補完的に使用する。", "C. Apexトリガーを主軸とし、すべての検証ロジックと外部システム連携を実装する。宣言型ツールは利用しない。", "D. プロセスビルダーを中心に据え、外部システム連携はAppExchangeパッケージを検討する。"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "A. 入力規則と数式項目は基本検証には有効ですが、外部システム連携や複数オブジェクトにまたがる複雑な検証には限界があります。\nB. 正解。フローで複数オブジェクトにまたがる複雑な条件分岐を宣言的に構築し、外部システム連携が必要な部分はApexアクションで補完。保守性と柔軟性のバランスが最適。\nC. 全てApexにするとコスト・複雑性が増し、ビジネスロジック変更への柔軟性が低下します。\nD. PBはフローに比べて機能が限定的で、AppExchangeへの依存はコスト・制約リスクがある。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 40, "q": "ある企業が、顧客向けのWebアプリケーションを構築する必要があります。このアプリケーションは、大量のトランザクション処理、高度なカスタマイズ性、Salesforce外部の多様なシステムとの連携が求められます。開発チームは、Salesforceのスキルセットを最大限に活用しつつ、これらの要件を満たすプラットフォームを選択したいと考えています。このシナリオにおいて、最も適切なSalesforce開発プラットフォームはどれでしょうか？", "choices": ["A. Lightning Platform", "B. Heroku", "C. Fuel", "D. Salesforce Functions"], "answer": ["B"], "category": "上級デベロッパーの基本", "explanation": "A. Lightning PlatformはSalesforceコア機能との連携に優れますが、外部ライブラリの使用や大量データのリアルタイム処理には最適化されていません。\nB. 正解。HerokuはNode.jsを含む多様な言語・ライブラリをサポートし、スケーラブルなアプリ構築と実行に適しています。Heroku Connectでデータ同期も容易。\nC. FuelはMarketing Cloudの一部で、汎用Webアプリ開発基盤ではありません。\nD. Salesforce Functionsはサーバーレス処理に特化しており、包括的なアプリプラットフォームではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 41, "q": "大量のデータ処理を伴うバッチジョブを開発しています。このバッチジョブでは、各レコードの処理中にエラーが発生した場合でも、ジョブ全体を中断させずに、エラーが発生したレコードのみを特定し、後で再処理できるようにする必要があります。この要件を満たすためのBatch Apexの設計として、最も適切なものはどれでしょうか？", "choices": ["A. executeメソッド内で try-catch ブロックを使用し、エラーが発生したレコードのIDをカスタムオブジェクトに保存する。finishメソッドでQueueable Apexジョブを起動する。", "B. Database.Statefulインターフェースを実装し、executeメソッド内でエラーが発生したレコードをリストに蓄積する。finishメソッドで、エラーレコードをCSVファイルとして保存し、後でシステム管理者が手動で再処理できるようにする。", "C. executeメソッド内でエラーが発生した場合、Database.rollback() を呼び出してトランザクションをロールバックし、エラーレコードの処理をスキップする。", "D. startメソッドでFutureメソッドを呼び出し、各レコードの処理を非同期的に行う。"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "A. Queueableで再処理するアプローチも可能ですが、Batch Apex内でエラーを処理しきる設計の方が一般的に好ましい。\nB. 正解。Database.Statefulで状態を維持しエラーレコードを蓄積、finishでCSV出力して管理者が後で対処できる。実用的なエラー分離と手動再処理を可能にする設計。\nC. executeでのrollbackはそのバッチ全体を取り消し、バッチジョブが中断する可能性があります。\nD. startメソッドでFutureを呼ぶのはBatch Apexの基本アーキテクチャと矛盾します。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 42, "q": "取引先レコードが更新された際に、外部のレガシーシステムに取引先情報を同期する必要があります。この同期処理は時間がかかる可能性があり、トリガー内で直接実行するとガバナ制限に抵触するリスクがあります。また、同期処理が失敗した場合でも、再試行メカニズムを実装したいと考えています。この要件を満たすために、最も適切な非同期Apexの機能はどれでしょうか？", "choices": ["A. Futureメソッドを使用して、外部システムへのコールアウトを実行する。再試行ロジックは別途実装する必要がある。", "B. Queueable Apexを使用して、外部システムへのコールアウトと再試行ロジックを実装する。ジョブのチェーン化も可能である。", "C. Batch Apexを使用して、夜間にすべての取引先レコードをバッチ処理し、外部システムへの同期を行う。リアルタイム同期には不向きである。", "D. Platform EventsとQueueable Apexを組み合わせる。Platform Eventを発行し、Queueable Apexでイベントを処理することで、柔軟な再試行メカニズムと処理の分離を実現する。"], "answer": ["D"], "category": "ロジックとプロセスの自動化", "explanation": "A. Futureはジョブチェーニングが直接的でなく、再試行ロジックの実装が複雑。\nB. Queueable Apexは有効な選択肢ですが、再試行メカニズム自体は開発者が実装する必要があります。\nC. Batch Apexはリアルタイムに近い同期には不向きです。\nD. 正解。Platform EventsでトリガーとQueueableを分離し、イベント駆動のアーキテクチャで柔軟な再試行メカニズムを実現できます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 43, "q": "開発チームは、開発Sandbox環境からテスト環境へメタデータを移行する必要があります。Salesforce CLIを使用して、メタデータAPI形式でエクスポートされたパッケージをテスト環境にデプロイする際に、最も適切なコマンドはどれですか？", "choices": ["A. force:source:deploy", "B. force:mdapi:deploy", "C. force:source:push", "D. force:org:create"], "answer": ["B"], "category": "テスト、デバッグ、リリース", "explanation": "A. force:source:deployはソース形式のメタデータ用で、メタデータAPI形式には不適切。\nB. 正解。force:mdapi:deployはメタデータAPI形式（zipファイル）のパッケージを組織にデプロイするコマンドです。\nC. force:source:pushはスクラッチ組織へのプッシュ用。\nD. force:org:createは新しいスクラッチ組織作成用です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 44, "q": "ある企業は、Salesforceと外部の注文管理システムを連携させています。注文管理システムでは、すべての製品に一意の製品コードが割り当てられています。Salesforceで製品情報を管理し、注文管理システムの製品コードをSalesforceの製品レコードと紐付ける必要があります。この連携を効率的に実現するために、Salesforceの製品オブジェクトで活用すべき項目タイプは何ですか？", "choices": ["A. カスタム表示ラベル", "B. 外部ID項目", "C. 数式項目（HYPERLINK関数）", "D. 名前項目 (自動採番)"], "answer": ["B"], "category": "上級デベロッパーの基本", "explanation": "A. カスタム表示ラベルはUIテキストの翻訳管理用で、外部IDとして使用不可。\nB. 正解。外部ID項目は外部システムのIDをSalesforceレコードと紐付けるために設計され、Upsert操作の照合キーとして使用できます。\nC. HYPERLINK関数はURLリンク生成用で、外部ID連携のデータベース的な機能はありません。\nD. 自動採番はSalesforce内部の識別用IDで、外部IDの代替として使用できません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 45, "q": "ある企業では、リードの割り当てプロセスを自動化したいと考えています。リードは、担当者のテリトリー、製品への関心、およびキャパシティに基づいて、営業担当者に自動的に割り当てる必要があります。割り当てルールは柔軟性があり、コード変更なしで管理者によって容易にメンテナンスできることが求められます。この要件を満たすために、最も推奨されるアプローチはどれでしょうか？", "choices": ["A. プロセスビルダーを使用して、リードの割り当てルールを宣言的に設定する。", "B. Apexトリガーを使用して、複雑な割り当てロジックをプログラム的に実装する。", "C. フローを使用して、複雑な条件分岐を含むリードの割り当てプロセスを構築する。", "D. 割り当てルールを使用して、基本的な条件に基づいてリードを割り当てる。"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "A. PBは複雑な条件分岐やロジックの管理にフローより機能が限定的。\nB. Apexトリガーは開発・保守コストが高く、管理者によるメンテナンス性が劣ります。\nC. 正解。フローは宣言的でありながら複雑な条件分岐・ループ・データ操作を視覚的に設計でき、管理者によるメンテナンスも容易です。\nD. 割り当てルールは基本的な条件のみで、複数要因を組み合わせた複雑な割り当てには機能不足。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 46, "q": "あるカスタムオブジェクト Project__c には、関連する Project_Task__c レコード（Project__c への主従関係）が多数存在する可能性があります。Project__c レコードが削除されたときに、関連するすべての Project_Task__c レコードに対して、削除される直前にカスタム項目の更新や外部システムへの通知などの追加処理を実行する必要が生じました。標準の主従関係によるカスケード削除の動作に加えて、このカスタムロジックを実行するための最も適切な実装方法はどれですか？\n[[PRE]]\n// Project__c のトリガーコンテキストを想定\n\n// 不完全なトリガー例:\n/*\ntrigger ProjectTrigger on Project__c (before delete) {\n    for (Project__c proj : Trigger.old) {\n        // ここで関連タスクに対する処理が必要\n        // 例: List<Project_Task__c> tasks = [SELECT Id, Status__c FROM Project_Task__c WHERE Project__c = :proj.Id];\n        //     for(Project_Task__c task : tasks) { ... }\n        // 上記のような実装は before delete では不適切、または不完全\n    }\n}\n*/[[/PRE]]", "choices": ["A. Project__c オブジェクトに before delete トリガーを作成します。トリガー内で関連する Project_Task__c レコードをSOQLで取得し、必要な更新処理を行い、update DML操作を実行します。", "B. Project_Task__c オブジェクトに before delete トリガーを作成します。このトリガーは、親である Project__c が削除されることによってカスケード削除が試みられた際に起動します。トリガー内で Trigger.old を使用して必要なカスタムロジックを実行します。", "C. Project__c オブジェクトに after delete トリガーを作成します。after delete コンテキストでは非同期処理（Queueable Apex）を起動し、その非同期処理内で関連タスクの情報を処理します。", "D. Project_Task__c オブジェクトに積み上げ集計項目を作成し、Project__c 側でその項目を参照する入力規則を設定します。"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "A. 主従関係では親削除時に子も削除プロセスに入るため、このタイミングでの子レコード更新は正しく機能しないか、エラーを引き起こす可能性があります。\nB. 正解。カスケード削除も通常の削除イベントとして扱われ、子オブジェクト(Project_Task__c)のbefore deleteトリガーが起動します。このタイミングでTrigger.oldを使用してカスタムロジックを実行するのが最適です。\nC. after deleteでは削除済みのため通常の操作が行えず、非同期処理との連携も複雑。\nD. 削除をブロックするアプローチで、削除直前の処理実行という要件を満たしません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 47, "q": "取引先オブジェクトのafter updateトリガーで、各取引先に関連するすべての取引先責任者の「部署」項目を取引先の「業種」項目と同じ値で更新します。ただし、組織内に取引先責任者が多数存在する場合があり、効率的なコードでガバナ制限に抵触しないように実装する必要があります。次のうち、最も推奨される実装方法はどれですか？", "choices": ["A. トリガー内で各取引先責任者をループ処理し、都度更新する。", "B. トリガー起動前に、取引先責任者をSOQLクエリで一括取得し、Mapに格納する。トリガー内でこのMapを参照して、取引先責任者を一括更新する。", "C. トリガー内でFutureメソッドを呼び出し、各取引先責任者の更新処理を非同期で行う。", "D. トリガー内でDatabase.update()メソッドを使用し、リスト形式で更新対象の取引先責任者を渡す。SOQLクエリはトリガーごとに実行する。"], "answer": ["B"], "category": "パフォーマンス", "explanation": "A. ループ内でDML更新を行うとDMLステートメント制限に抵触します。\nB. 正解。ループ前にSOQLで一括取得してMapに格納し、ループ後にDatabase.update(list)で一括更新するBulkificationパターンがベストプラクティスです。\nC. 各取引先責任者にFutureを呼ぶと非同期Apex実行制限に抵触し、SOQLの非効率も解決しません。\nD. トリガーごとにSOQLを実行するとSOQLクエリ制限に抵触する可能性があります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 48, "q": "カスタムオブジェクト「契約」レコードが作成された際に、以下の自動化が設定されています。\n\n項目自動更新ワークフロールール (ルールA): 「契約フェーズ」項目を特定の条件に基づいて「交渉中」に設定\n\nプロセスビルダー (プロセスB): 「契約金額」項目が特定の金額を超えた場合、承認プロセスを起動し、「契約承認状況」項目を更新\n\nこれらの自動化が同じトランザクション内で実行される場合、Salesforceのレコード保存実行順序において、どちらの自動化による項目の更新が「より早く」データベースに反映されると考えられますか？", "choices": ["A. プロセスB による「契約承認状況」項目の更新", "B. どちらの自動化が早く反映されるかは、設定内容によって変動する可能性がある。", "C. ルールA による「契約フェーズ」項目の更新", "D. ルールA とプロセスB による更新はほぼ同時にデータベースに反映される。"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "A. プロセスビルダーはワークフロールールよりも後に実行されるため、先に反映されることはありません。\nB. Salesforceの実行順序はシステムで定義されており変動しません。\nC. 正解。ワークフロールールはプロセスビルダーよりも前に実行されます。ルールAによる更新がより早く反映されます。\nD. 両者は明確に異なるタイミングで実行されます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 49, "q": "TechCorpの開発チームは、大量のデータインポート時に発生する競合を効果的に処理したいと考えています。この要件を満たすために、どの手法を実装すべきでしょうか？", "choices": ["A. 非同期待機操作", "B. 外部IDの使用", "C. ワークフロールール", "D. 一括API"], "answer": ["D"], "category": "ロジックとプロセスの自動化", "explanation": "A. 非同期処理は即時応答不要の操作に有効ですが、競合処理には直接関連しません。\nB. 外部IDはデータの一意性保持に有用ですが、大量データの競合処理とは直接関係ありません。\nC. ワークフロールールはToDoや行動の自動作成用で、データインポート時の競合には直接対応していません。\nD. 正解。一括API（Bulk API）は大量データ操作を効率的に処理する専用APIで、大量データインポート時の競合に最適化されています。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 50, "q": "Lightning Web Components (LWC)内で、親コンポーネントから子コンポーネントにデータを渡すための推奨されるメカニズムは何ですか？", "choices": ["A. グローバル変数", "B. カスタムイベント", "C. パブリックプロパティ", "D. windowオブジェクト"], "answer": ["C"], "category": "ユーザインターフェース", "explanation": "A. グローバル変数はLWCのスコープ外で、変数衝突や副作用を引き起こす可能性があります。\nB. カスタムイベントは子→親へのデータ伝達（逆方向）の推奨メカニズムです。\nC. 正解。パブリックプロパティ（@apiデコレータ）は親→子へデータを渡すための推奨方法です。\nD. windowオブジェクトはブラウザのグローバルスコープで、LWCのコンポーネントスコープとは異なり、使用は非推奨。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 51, "q": "Apexトリガー内で、同じオブジェクトの複数のレコードが更新された場合に、トリガーが効率的に処理するために考慮すべき最も重要なプラクティスは何ですか？", "choices": ["A. SOQLクエリをトリガーの各実行に対して個別に実行する。", "B. 変更された各レコードに対して個別のDML操作を実行する。", "C. 処理するレコードのIDのセットを作成し、バルクSOQLクエリとDML操作を使用する。", "D. トリガーが処理するレコード数を制限する。"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "A. ループ内でSOQLを実行するとSOQLクエリ数の制限に達します。\nB. 個別のDML操作はDMLステートメント数の制限に達します。\nC. 正解。これがBulkificationのベストプラクティスです。IDのSetを収集し、一括SOQLクエリと一括DML操作を使用することでガバナ制限内で効率的に処理できます。\nD. レコード数制限は根本的な解決策ではなく、バルク処理を実装することが適切です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 52, "q": "VisualforceページからApexコントローラのアクションを呼び出す際に、HTTP GETリクエストではなくHTTP POSTリクエストを使用する主な利点は何ですか？", "choices": ["A. HTTP POSTリクエストは、URLにパラメータを表示するため、デバッグが容易になる。", "B. HTTP POSTリクエストは、より長いURLパラメータをサポートするため、より多くのデータを送信できる。", "C. HTTP POSTリクエストは、ブラウザの履歴に記録されないため、機密性の高いデータを送信するのに適している。", "D. HTTP POSTリクエストは、一般的にブラウザによってキャッシュされるため、パフォーマンスが向上する。"], "answer": ["C"], "category": "ユーザインターフェース", "explanation": "A. URLにパラメータを表示するのはGETリクエストの特性です。\nB. URLの長さに制限があるのはGETで、POSTはリクエストボディを使用するためより多くのデータ送信が可能ですが、これが主な利点ではありません。\nC. 正解。POSTはリクエストボディにデータを含め、URLに機密情報が表示されずブラウザ履歴にも記録されません。\nD. POSTは通常ブラウザにキャッシュされません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 53, "q": "カスタムApex REST Webサービスを開発する際、受信したJSONリクエストボディのデータをApexメソッドで利用できるようにするために使用するアノテーションは何ですか？", "choices": ["A. @HttpGet", "B. @HttpPost", "C. @RestResource", "D. @RequestBody"], "answer": ["D"], "category": "ロジックとプロセスの自動化", "explanation": "A. @HttpGetはHTTP GETメソッドを処理するApexメソッドに付与するアノテーション。\nB. @HttpPostはHTTP POSTメソッドを処理するApexメソッドに付与するアノテーション。\nC. @RestResourceはApexクラスをRESTful Webサービスとして公開するためのアノテーション。\nD. 正解。@RequestBodyアノテーションはHTTPリクエストのボディに含まれるJSONまたはXMLデータを、Apexメソッドの引数として自動的にデシリアライズするために使用します。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 54, "q": "組織で宣言型開発ツールとカスタムApexコードの両方を使用する場合、特定のビジネスロジックを実装するための推奨される順序は何ですか？", "choices": ["A. 常に最初にApexコードを使用して複雑なロジックを実装し、宣言型ツールは単純なタスクにのみ使用する。", "B. 可能な限り宣言型ツールを使用してロジックを実装し、宣言型ツールで実現できない場合にのみApexコードを使用する。", "C. 宣言型ツールとApexコードを任意の順序で組み合わせて使用する。", "D. 常に最初にApexコードを使用してデータ検証とワークフローを実装し、宣言型ツールはUIのカスタマイズにのみ使用する。"], "answer": ["B"], "category": "上級デベロッパーの基本", "explanation": "A. Apexを先に使うアプローチは開発コストが高く、宣言型ツールで実現できる場合は非効率。\nB. 正解。宣言型ツール（フロー、入力規則等）で可能な限り実装し、それで実現できない場合にのみApexコードを使用するのがベストプラクティスです。\nC. 順序を考慮しないと予期しない動作や保守困難なシステムになります。\nD. データ検証やワークフローも宣言型ツールで効果的に実装できます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 55, "q": "Experience Cloudサイトで、認証されたユーザーがSalesforce組織内の特定のレコードデータにアクセスするための最もセキュアで制御された方法は何ですか？", "choices": ["A. 共有設定を「公開/参照・更新」に設定する。", "B. ゲストユーザープロファイルに必要なオブジェクト権限を付与する。", "C. Apexで「without sharing」キーワードを使用してカスタムコントローラを作成する。", "D. Apexで「with sharing」キーワードを使用し、ユーザーコンテキストに基づいてレコードアクセスを制御するカスタムコントローラを作成する。"], "answer": ["D"], "category": "上級デベロッパーの基本", "explanation": "A. 「公開/参照・更新」は最も緩い共有設定で、過剰なデータアクセスリスクがあります。\nB. ゲストユーザープロファイルは未認証ユーザー用で、認証済みユーザーへの適用は誤りです。\nC. without sharingはユーザーの権限・共有ルールを無視して実行されるため危険です。\nD. 正解。with sharingを使用するとApexコードは実行ユーザーの権限と共有ルールを尊重します。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 56, "q": "大量の取引先データを外部システムからSalesforceに一括で移行する際に、SOQLクエリによるガバナ制限の影響を最小限に抑えるための最も効果的なアプローチは何ですか？", "choices": ["A. 移行処理を複数の小さなバッチに分割し、各バッチ内で必要なデータのみをSOQLクエリで取得する。", "B. 移行前にすべての取引先項目をインデックス化するようにSalesforceサポートに依頼する。", "C. 可能な限り多くの取引先項目を移行元の外部システム内で結合し、Salesforceへの挿入時に必要なSOQLクエリの数を減らす。", "D. Apexの一括APIを使用してデータを挿入し、SOQLクエリの実行を完全に回避する。"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. 正解。処理をバッチに分割し各バッチ内で必要データのみを効率的なSOQLで取得することが、ガバナ制限を超えないための最も効果的なアプローチです。\nB. インデックス化はクエリパフォーマン
