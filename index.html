ールに従って表示されるようにする必要があります。表示される値がユーザのロケール設定を尊重することを保証するための最も効果的なアプローチは何ですか？", "choices": ["A. SOQL経由で取得した値をフォーマットするためにREGEX（正規表現）式を使用する。", "B. SOQL経由で取得した値をフォーマットするためにラッパークラスを使用する。", "C. SOQLクエリで FOR VIEW 句を使用する。", "D. SOQLクエリで FORMAT() 関数を使用する。"], "answer": ["D"], "category": "ユーザインターフェース", "explanation": "A. Apex側で正規表現を使用して、日付、時刻、通貨のロケール固有のフォーマット（例: $1,000.00 vs 1.000,00 €）を正確に処理するのは、非常に複雑で信頼性が低いため、適切なアプローチではありません。\nB. SOQLで生のデータを取得した後、Apex側で Decimal.format() や Datetime.format() メソッドを使用して値をフォーマットし、それをラッパークラスに格納することは可能です。しかし、SOQLクエリ自体でフォーマットできるDの選択肢と比べると、Apex側での追加の処理が必要になります。\nC. FOR VIEW 句は、クエリされたレコードの LastViewedDate（最終参照日）項目を更新するために使用されます。データの表示フォーマット（書式設定）とは関係ありません。\nD. 正解です。FORMAT() 関数はSOQLクエリ内で使用でき、数値、通貨、日付、時刻の項目を、クエリを実行しているユーザのロケールに基づいたフォーマット済みの文字列として返します。これにより、ApexやJavaScript側で追加のフォーマット処理を行う必要がなくなり、最も効果的です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 245, "q": "ある企業が最近、組織内の商談に関する情報のデータグリッドを持つカスタムコントローラを使用したVisualforceページをデプロイしました。ユーザは、特定の条件下で「ビューステートの最大サイズ制限」エラーメッセージが表示されると報告しています。Visualforceのベストプラクティスによれば、ビューステートを削減するために開発者が取るべき3つのアクションはどれですか？ 3つ選択してください", "choices": ["A. コントローラ内の変数に private キーワードを使用する。", "B. ページに関連するデータのみを返すように、SOQLクエリを絞り込む。", "C. データの量を減らすために、フィルタとページネーションを使用する。", "D. 変更されない変数については、コントローラで final キーワードを使用する。", "E. 状態を維持する必要がない変数については、Apexコントローラで transient キーワードを使用する。"], "answer": ["B", "C", "E"], "category": "パフォーマンス", "explanation": "A. private キーワードは、変数のスコープ（可視性）をクラス内に制限するものであり、ビューステートにシリアライズされるかどうかには影響しません。\nB. 正解です。ビューステートには、コントローラで保持される変数のデータ（SOQLの結果など）が含まれます。クエリで取得する項目やレコードを、ページ表示に必要な最小限に絞り込むことで、ビューステートのサイズを直接削減できます。\nC. 正解です。一度に数千件のレコードをリストとして保持する代わりに、ページネーション（例: 20件ずつ表示）を実装すれば、コントローラが一度に保持するデータ量が減り、ビューステートが大幅に削減されます。\nD. final キーワードは、変数が一度割り当てられた後に再割り当てできないことを保証しますが、その変数がビューステートに含まれること自体は防げません。\nE. 正解です。transient キーワードは、その変数をビューステートのシリアライズ対象から除外するよう指定します。ポストバック（サーバへの再送信）間で値を保持する必要がない変数（計算用の一時変数など）に指定することで、ビューステートを削減できます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 246, "q": "Universal Containers（UC）は、顧客情報を保存するERPシステムを持っています。Salesforceで取引先が作成される際、新規顧客を作成するためのERPシステムのRESTエンドポイントが、取引先情報と共に自動的に呼び出されなければなりません。もしERPシステムへのコールが失敗した場合でも、取引先は作成されるべきです。UC組織の取引先は、UCの顧客オンボーディング部門のユーザによって、一度に1件ずつしか作成されません。ERPシステムのRESTエンドポイントへのコールアウトを実行するために、開発者は何を実装すべきですか？", "choices": ["A. JavaScriptからのRESTコール", "B. ヘッドレスクイックアクション", "C. トリガからQueueableを呼び出す", "D. Apex Continuation"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "A. これはクライアントサイドの実装であり、UIに依存します。もし取引先がUI以外（例: APIやデータローダ）で作成された場合、コールアウトが実行されないため、要件を満たしません。\nB. これもLightningコンポーネントを使用したクライアントサイドのアクションです。Aと同様に、レコードがデータベースに保存されるすべてのシナリオ（例: API経由）をカバーできません。\nC. 正解です。これは、トリガからコールアウトを行うための標準的なデザインパターンです。トリガ（after insert）がQueueableジョブをキューに入れ、そのジョブが非同期（別のトランザクション）でRESTコールアウトを実行します。非同期であるため、コールアウトが失敗しても元の取引先作成トランザクションはロールバックされず、「コールが失敗した場合でも、取引先は作成されるべき」という要件を満たします。\nD. Continuationは、主にVisualforceページやAuraコンポーネントからコールアウトを行い、応答を待つ間のサーバのリソースを解放するためのUIパターンです。サーバサイドのレコード作成イベント（トリガ）から呼び出すものではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 247, "q": "開発者が、カスタム画面のためにVisualforceコンポーネントとLightningコンポーネントのどちらを作成するかを決定しようとしています。最終的な決定に影響を与える機能上の考慮事項はどれですか？", "choices": ["A. 画面がLightning Experience UIからアクセス可能である必要があるか？", "B. 画面がサードパーティアプリケーションを使用せずにPDFとしてレンダリングされる必要があるか？", "C. 画面がJavaScriptフレームワークを利用するか？", "D. 画面がモバイルアプリ経由でアクセスされるか？"], "answer": ["B"], "category": "上級デベロッパーの基本", "explanation": "A. LightningコンポーネントもVisualforceページも、どちらもLightning Experience UI内で表示させることが可能です。したがって、これは決定的な要因にはなりません。\nB. 正解です。Visualforceには、renderAs=\"pdf\" 属性を使用してページをサーバサイドでPDFとしてネイティブに生成する独自の機能があります。Lightningコンポーネントにはこのネイティブ機能がないため、「サードパーティ製品なしでPDFを生成する」必要がある場合、Visualforceを選択する決定的な理由となります。\nC. Lightningコンポーネント自体がモダンなJavaScriptフレームワークに基づいています。Visualforceページ内でも外部のJavaScriptフレームワーク（jQueryなど）を利用することは可能です。したがって、これは決定的な要因にはなりません。\nD. LightningコンポーネントもVisualforceページも、どちらもSalesforceモバイルアプリからアクセス可能です（ただし、モバイルでの最適なエクスペリエンスは通常Lightningコンポーネントで実現されます）。しかし、両方ともアクセス可能であるため、これは決定的な要因ではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 248, "q": "ある組織には、商談が編集されて商談の Amount（金額）が変更されたときに、カスタム項目 CommissionBaseAmount__c（手数料基準額）を設定するプロセス（プロセスビルダーで構築）が既存で存在します。最近、開発者が商談の before update トリガをデプロイしました。このトリガは、商談のフェーズが「成約」に変更されたときに、CommissionBaseAmount__c と複雑なロジックを使用して、カスタム項目 CommissionAmount__c（手数料額）の値を計算するものです。ユーザから、商談を「成約」に変更し、かつ 同じ保存（セーブ）操作で Amount（金額）も変更すると、CommissionAmount__c が不正になるという報告がありました。この問題を修正するために、開発者はどのアクションを実行すべきですか？", "choices": ["A. プロセスを「項目をすばやく更新」のレコードトリガフローに置き換える。", "B. プロセスからトリガを呼び出す。", "C. トリガからプロセスを呼び出す。"], "answer": ["A"], "category": "テスト、デバッグ、リリース", "explanation": "A. 正解です。これは「実行順序」の問題が原因です。before update トリガ（CommissionAmount__c を計算）は、プロセスビルダー（CommissionBaseAmount__c を設定）よりも 前に 実行されます。そのため、トリガは 古い CommissionBaseAmount__c に基づいて計算してしまい、その直後にプロセスビルダーが CommissionBaseAmount__c を更新するため、計算が不正になります。「項目をすばやく更新」フロー（保存前フロー）は、before トリガと同じ、レコードが保存される 前 のフェーズで実行されます。プロセスをこのタイプのフローに置き換えることで、CommissionBaseAmount__c の更新が、CommissionAmount__c の計算トリガと同じフェーズで（またはそれより先に）実行されるようになり、トリガが正しい基準額にアクセスできるようになります。\nB. プロセスビルダーからApexトリガを直接呼び出すことはできません。Apexメソッド（呼び出し可能なアクション）を呼び出すことはできますが、トリガの実行順序の問題は解決しません。\nC. Apexトリガからプロセスビルダーを直接呼び出すことはできません。このアプローチは実現不可能です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 249, "q": "ユーザーがカスタムLightningコンポーネントを操作中に、一般的な「内部サーバーエラーが発生しました」を受け取ります。開発者は、より意味のあるメッセージを保証するために何をすべきですか？", "choices": ["A. tag に onerror イベントハンドラを追加する。", "B. マークアップに error-view コンポーネントを追加する。", "C. エラーを処理するためにプラットフォームイベントを使用する。", "D. try-catch ブロックで AuraHandledexception を使用する。"], "answer": ["D"], "category": "ユーザインターフェース", "explanation": "A. onerror イベントハンドラは、特定のUIコンポーネント（例: lightning-record-edit-form）で発生したエラーをキャッチするために使用されますが、「内部サーバーエラー」は通常、Apexコントローラ（サーバサイド）から発生する例外を指します。\nB. これはエラーを表示する 方法（UI）の一つかもしれませんが、エラーを キャッチ し、一般的なサーバエラーを「より意味のあるメッセージ」に変換するロジック（D）の代わりにはなりません。\nC. プラットフォームイベントは、Salesforce内外のシステム間で非同期に通信するためのものです。Lightningコンポーネントの同期的なApex呼び出しで発生したエラーを処理し、ユーザに直接フィードバックする用途には適していません。\nD. 正解です。このエラーは、Apexコントローラで未処理の例外が発生した場合に表示されます。Apex側の try-catch ブロックで例外をキャッチし、AuraHandledException を（より意味のあるメッセージを付けて）スローすることで、そのカスタムメッセージがクライアントサイド（Lightningコンポーネント）に安全に伝達され、ユーザに表示できます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 250, "q": "Visualforceページのコントローラで transient キーワードを使用することは、どの一般的なパフォーマンス問題に役立ちますか？", "choices": ["A. ロード時間を短縮する", "B. ページ転送を改善する", "C. ビューステートを削減する", "D. クエリのパフォーマンスを改善する"], "answer": ["C"], "category": "パフォーマンス", "explanation": "A. transient キーワードはビューステートのサイズを削減することに直接貢献します。ビューステートが小さくなると、サーバとの送受信データ量が減るため、結果としてロード時間が短縮される可能性はありますが、最も直接的な効果はビューステートの削減です。\nB. Aと同様に、ビューステートを削減した結果としてページ転送が改善（高速化）することはありますが、transient キーワードが解決する主要な問題はビューステートのサイズそのものです。\nC. 正解です。transient キーワードで宣言された変数は、Visualforceページがサーバにポストバック（再送信）される際に、その値を保持する必要がないことを示します。そのため、これらの変数はビューステートにシリアライズ（保存）されなくなり、ビューステート全体のサイズを削減できます。\nD. transient キーワードは、変数がビューステートに保存されるかどうかを制御するものであり、SOQLクエリの実行効率やパフォーマンスには影響を与えません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 251, "q": "ある企業が、カスタムの取引先テリトリー割り当てを管理するために外部システムを使用しています。四半期ごとに、外部システムでテリトリー割り当てが完了すると、Salesforce内の何百万もの取引先が新しい所有者で更新される可能性があります。外部システムから取引先を更新するための最適な方法は何ですか？", "choices": ["A. コンポジットREST API", "B. SOAP API", "C. Bulk API", "D. Apex REST Webサービス"], "answer": ["C"], "category": "ユーザインターフェース", "explanation": "A. コンポジットREST APIは、関連する複数のレコードを1回のコールで処理（例: 取引先と取引先責任者を同時に作成）するのに適しています。しかし、トランザクションベースであり、ガバナ制限があるため、「何百万」という規模のデータ更新には最適化されていません。\nB. SOAP APIは、標準的なサーバ間のインテグレーションに使用されます。しかし、これもトランザクションベースであり、一度に処理できるレコード数も限られているため、「何百万」件という大規模なデータロードには適していません。\nC. 正解です。Bulk APIは、Salesforceが提供する「何百万」件ものレコードを非同期で効率的にロード（挿入、更新、削除）するために特別に設計された、RESTベースのAPIです。大量のデータを一括で処理するのに最適です。\nD. これは、外部システムがSalesforceのカスタムApexロジックを呼び出すためのインバウンドAPIを作成する機能です。この方法でデータを受け取ることは可能ですが、Apexの実行には厳格なガバナ制限（CPU時間、DML行数など）があるため、「何百万」件のレコードを処理するのには全く適しておらず、最適とは言えません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 252, "q": "ある企業のサポートプロセスでは、ケースが「修正できず」の状況でクローズされるたびに、Engineering Reviewカスタムオブジェクトレコードが作成され、そのケース、取引先責任者、およびケースに関連するすべての製品からの情報が入力される必要があります。Apexトリガを使用してこれを自動化する正しい方法は何ですか？", "choices": ["A. Engineering Reviewレコードを作成して挿入する、ケースの after update トリガ", "B. Engineering Reviewレコードを作成して挿入する、ケースの after upset トリガ", "C. Engineering Reviewレコードを作成して挿入する、ケースの before update トリガ", "D. Engineering Reviewレコードを作成して挿入する、ケースの before upset トリガ"], "answer": ["A"], "category": "ユーザインターフェース", "explanation": "A. 正解です。after トリガは、トリガを起動したレコード（ケース）がデータベースに正常に保存された 後 で実行されます。関連する新しいレコード（Engineering Review）を作成（DML挿入）する操作は、親レコードの保存が確定したこのタイミングで行うのがベストプラクティスです。\nB. \"after upsert\"（または原文の\"upset\"）は、有効なトリガイベントではありません。upsert DML操作は、レコードが存在するかどうかに応じて after insert または after update のいずれかのトリガを起動します。\nC. before トリガは、レコードがデータベースに保存される 前 に実行されます。このコンテキストは、保存されるレコード自体の値を検証したり変更したりするためのものです。before トリガ内で関連レコードを挿入（DML操作）すると、もしその後のケースの保存が（入力規則などで）失敗した場合に、データが不整合な状態になる可能性があるため推奨されません。\nD. \"before upsert\"（または原文の\"upset\"）は有効なトリガイベントではありません。また、Cと同様に、before コンテキストは関連レコードのDML操作には不適切です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 253, "q": "ある企業が、7年後に機密情報を自動的に削除する必要があります。これにより、毎日100万件近くのレコードが削除される可能性があります。どうすればこれを達成できますか？", "choices": ["A. 7年より古いレコードをクエリする @future プロセスをスケジュールし、それらを削除するために1,000レコードのバッチで自身を再帰的に呼び出す。", "B. 7年より古いレコードをクエリするために集計関数を使用し、その後 aggregateResults オブジェクトを削除する。", "C. 7年より古いレコードをクエリして削除するバッチApexプロセスを、毎日実行するようにスケジュールする。", "D. 7年より古いレコードを見つけるためにSOSLステートメントを実行し、その後、結果セット全体を削除する。"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "A. @future メソッドは非同期処理ですが、「毎日100万件」という大規模なデータセットの処理には最適化されていません。再帰呼び出しはガバナ制限（1トランザクションあたりのfuture呼び出し回数）にすぐに達する可能性があり、バッチApexに比べて堅牢ではありません。\nB. 集計関数（COUNT、SUMなど）は、レコードのグループ化や集計値の計算に使用されます。レコード自体を取得するものではないため、aggregateResults オブジェクトを削除しても、元のレコードは削除されません。\nC. 正解です。バッチApex（Database.Batchable インターフェース）は、まさにこのような「100万件」といった大規模なデータセットを非同期でチャンク（塊）に分けて処理するために設計されています。Schedulable インターフェースと組み合わせることで、このプロセスを毎日自動実行できます。\nD. SOSLは、複数のオブジェクトにまたがるテキストベースの 検索 に使用されます。日付（7年より古い）のような構造化された条件で大量のレコードを取得・削除するにはSOQLを使用すべきです。また、100万件のレコードを一度に削除しようとするとガバナ制限に抵触します。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 254, "q": "開発者は、取引先責任者を検索するLightning Webコンポーネントを構築しています。このコンポーネントは、検索が完了したときに、異なるDOMツリーにある、関連のない他のLightning Webコンポーネントに検索結果を伝える必要があります。この通信を実装するために、開発者は何をすべきですか？", "choices": ["A. アプリケーションイベントを発行する。", "B. イベントチャネルでイベントを公開する。", "C. カスタムコンポーネントイベントを発行する。", "D. メッセージチャネルでメッセージを公開する。"], "answer": ["D"], "category": "ロジックとプロセスの自動化", "explanation": "A. アプリケーションイベントは、主にAuraコンポーネントフレームワークで使用されるものであり、Lightning Webコンポーネント（LWC）間の通信で推奨される現代的な方法ではありません。\nB. 「イベントチャネル」は、Salesforceの標準的なLWC通信メカニズム（LMSやDOMイベント）の正確な用語ではありません。\nC. カスタムコンポーネントイベントは、DOMツリーを上って（子から親へ）通信するために使用されます。「異なるDOMツリーにある」「関連のない」コンポーネント間の通信という要件は満たせません。\nD. 正解です。Lightning Message Service（LMS）は、定義された「メッセージチャネル」を使用してメッセージを公開（Publish）します。これにより、コンポーネント階層やDOMツリーに関係なく、サブスクライブ（購読）している他のLWCやAuraコンポーネントと通信できます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 255, "q": "営業チームが個々の顧客レコードを表示するとき、その顧客の最近のインタラクションを確認する必要があります。これらのインタラクションには、販売注文、電話、またはケースがあります。最近のインタラクションの日付範囲は、顧客レコードタイプごとに異なります。これはどのように達成できますか？", "choices": ["A. 顧客の表示画面が読み込まれたときに、バッチApexを使用して最新のインタラクションをクエリする。", "B. Lightning Flowを使用して顧客のレコードタイプを読み取り、その後、最近のインタラクションを動的にクエリして表示ページに表示する。", "C. Lightningコンポーネントを使用して、Lightningページから design:attribute を使用して渡されたレコードタイプに基づき、インタラクションをクエリして表示する。", "D. 顧客レコードページの動的フォームを使用して、最近のインタラクションを表示する。"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "A. バッチApexは、大規模なデータセットに対する非同期（バックグラウンド）処理用です。レコードページの読み込みのような、リアルタイムの同期的なデータ取得には適していません。\nB. 画面フローはレコードページに配置できますが、複数の異なるオブジェクト（販売注文、電話、ケース）のデータを集約し、レコードタイプごとに異なる日付ロジックを適用して表示するような複雑なクエリと表示は、フローの標準機能では困難または不可能です。\nC. 正解です。Lightningコンポーネント（AuraまたはLWC）は、Apexコントローラを呼び出すことができます。Apex側では、現在のレコードのレコードタイプに基づいた複雑なビジネスロジック（レコードタイプごとに異なる日付範囲の決定）や、複数のオブジェクト（販売注文、電話、ケース）からのデータ集約を実行できます。\nD. 動的フォーム（Dynamic Forms）は、Lightningレコードページ上の 項目 や 項目セクション の表示/非表示を条件付きで制御する機能です。関連する複数のオブジェクトからデータを集約して表示するカスタムコンポーネントの代わりにはなりません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 256, "q": "開発者が新しいAppExchangeアプリケーションを開発するよう依頼されました。プログラムの機能として、ケースが特定のフェーズに達し、かつ特定のレコードタイプである場合に、Surveyレコードを作成するものがあります。異なるSalesforceインスタンスでは異なるタイミングでSurveyが必要とされるため、この機能は設定可能である必要があります。さらに、標準装備のAppExchangeアプリには、ほとんどの顧客に適用できるベストプラクティスの設定セットが付属している必要があります。アプリのカスタム設定情報を保存し、パッケージ化するために、開発者は何を使用すべきですか？", "choices": ["A. カスタムオブジェクト", "B. カスタム設定", "C. カスタムメタデータ", "D. カスタムラベル"], "answer": ["C"], "category": "ユーザインターフェース", "explanation": "A. カスタムオブジェクトは、主にビジネスデータ（取引先や商談など）を保存するために使用されます。設定情報を保存することもできますが、その データ（レコード） はパッケージに自動的に含まれないため、デプロイ後に手動でデータをロードする必要があり、「設定セットが付属」という要件を満たすには最適ではありません。\nB. カスタム設定も設定情報を保存するために使用されます。しかし、カスタムオブジェクトと同様に、カスタム設定の データ（レコード） はメタデータとして扱われず、パッケージに含めてデプロイすることができません。\nC. 正解です。カスタムメタデータ型は、設定情報をレコードとして保存できます。最大の特徴は、これらの設定レコード自体がメタデータとして扱われるため、AppExchangeパッケージに含めて顧客の組織に一緒にデプロイできる点です。これにより、「ベストプラクティスの設定セットが付属」という要件を満たせます。\nD. カスタムラベルは、アプリケーション内のテキスト（例: ボタンのラベルやエラーメッセージ）を多言語化したり、カスタマイズ可能にしたりするために使用されます。ケースのフェーズやレコードタイプといった複雑な設定ルールを保存するのには適していません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 257, "q": "開発者が「トリガの最大深度を超えました」というエラーを受け取りました。このエラーメッセージが表示される理由として考えられるものは何ですか？", "choices": ["A. トリガが16回を超えて再帰的に呼び出されている。", "B. SOQLガバナ制限に達している。", "C. トリガロジック内に多数のDML操作がある。", "D. フロートリガが何度も含まれている。"], "answer": ["A"], "category": "テスト、デバッグ、リリース", "explanation": "A. 正解です。Salesforceでは、トリガが同じトランザクション内で無限にループ（再帰）するのを防ぐため、スタックの深さに16回という制限を設けています。例えば、取引先トリガが取引先を更新し、それによって再び取引先トリガが起動する、という連鎖が16回を超えるとこのエラーが発生します。\nB. SOQLガバナ制限（例: 1トランザクションあたりのSOQL発行回数）に達した場合、「Too many SOQL queries」といった別の種類のエラーメッセージが表示されます。\nC. DML操作の回数制限に達した場合は、「Too many DML statements」といったエラーメッセージが表示されます。これは「深度」の問題とは異なります。\nD. 「フロートリガ」という用語は一般的ではありませんが、フローがトリガの実行と相互に作用して再帰を引き起こすことはあります。しかし、エラーメッセージが直接示す原因は、Aで説明されているプラットフォームの16回の再帰深度制限に達したことです。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 258, "q": "Lightningレコードページのボタンをクリックすることでモーダルダイアログに表示されるようにするために、Auraコンポーネントによって実装される必要があるインターフェースはどれですか？", "choices": ["A. farce:lightningEditRAation", "B. lightning:editiction", "C. force:lightningQuickhction", "D. lightning:quickAction"], "answer": ["C"], "category": "上級デベロッパーの基本", "explanation": "A. この名前のインターフェースはSalesforceの標準機能には存在しません。\nB. この名前のインターフェースはSalesforceの標準機能には存在しません。\nC. 正解です。（これは一般的に force:lightningQuickAction と認識されます）。AuraコンポーネントをLightningクイックアクションとして（例: レコードページのボタンから）モーダルダイアログで起動できるようにするには、force:lightningQuickAction インターフェースを実装する必要があります。\nD. このインターフェースは、Auraコンポーネントではなく、Lightning Webコンポーネント（LWC）を（通常ヘッダーやフッターのない）クイックアクションとして公開するために使用されます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 259, "q": "開発者がカレンダーを表示するLightning Webコンポーネントを作成しています。このコンポーネントは複数の国で使用されます。ロケールによっては、週の最初の日が月曜日、土曜日、または日曜日になります。すべてのロケールのユーザに対してカレンダーが正確に表示されるようにするために、開発者は何をすべきですか？", "choices": ["A. 現在のユーザのロケールから FirstDayofweek 項目をクエリする。", "B. @salesforce/i18n モジュールをインポートし、firstdayofweek 国際化プロパティを使用する。", "C. キー/値のペアを保存するためにカスタムメタデータ型を使用する。", "D. コンポーネントで UserInfo.getLocale() を使用する。"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "A. Locale（ロケール）情報をSObjectのようにクエリして FirstDayofweek という項目を取得する標準的な方法はありません。\nB. 正解です。@salesforce/i18n モジュールは、Lightning Webコンポーネントがクライアントサイドでユーザのロケール情報（通貨、日付、数値の形式、そして週の開始日など）にアクセスするために提供されています。\nC. カスタムメタデータは、組織固有の設定を保存・管理するためのものです。Salesforceのユーザ設定に既に存在するロケール情報を、重複して手動で管理するのは非効率であり、正しいアプローチではありません。\nD. UserInfo.getLocale() は、Lightning WebコンポーネントのJavaScriptファイル内ではなく、Apex（サーバサイド）で使用されるメソッドです。サーバを呼び出す必要があり、クライアントサイドで完結するBの選択肢に比べて効率的ではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 260, "q": "コンプライアンス目的で、ある企業は組織内の長期的な製品使用状況を追跡する必要があります。ログに記録する必要がある情報は、複数のオブジェクトから収集され、時間が経つにつれて、何億ものレコードになると予測されています。開発者はこれを実装するために何を使用すべきですか？", "choices": ["A. 設定変更履歴", "B. 項目監査履歴", "C. Big Object", "D. 項目履歴管理"], "answer": ["C"], "category": "ユーザインターフェース", "explanation": "A. 設定変更履歴は、Salesforceの設定（プロファイルの変更、項目の作成など）に加えられた変更を追跡します。これは、製品の使用状況のようなデータレコードを保存するためのものではありません。\nB. 項目監査履歴は、項目履歴管理（D）の拡張機能であり、特定の項目に対する変更履歴を長期間（最大10年）保存します。これは既存のレコードの「変更履歴」を追跡するものであり、複数のオブジェクトから収集した新しいログレコード（使用状況）を保存するものではありません。\nC. 正解です。Big Objectは、Salesforceプラットフォーム上で「何億」ものレコード（数億〜数十億規模）を保存・管理するために特別に設計されたスケーラブルなストレージソリューションです。パフォーマンスへの影響を最小限に抑えながら、コンプライアンスに必要な長期的な大量データを保持するのに最適です。\nD. 項目履歴管理は、標準オブジェクトまたはカスタムオブジェクトの特定の項目に加えられた変更を追跡します。これはB（項目監査履歴）と同様に「変更履歴」であり、新しい使用状況ログを保存するものではありません。また、何億ものレコードを処理するスケーラビリティもありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 261, "q": "開発者は、時折変更される設定データを保存するためにカスタム設定を使用しました。しかし、最近更新（リフレッシュ）された一部のサンドボックスで、テストが失敗するようになりました。今後この問題を解消するために、何をすべきですか？", "choices": ["A. カスタム設定の設定タイプを「リスト」に設定する。", "B. カスタム設定を静的リソースに置き換える。", "C. カスタム設定の設定タイプを「階層」に設定する。", "D. カスタム設定をカスタムメタデータに置き換える。"], "answer": ["D"], "category": "ロジックとプロセスの自動化", "explanation": "A. カスタム設定のタイプ（リストか階層か）は、この問題の根本原因とは関係ありません。どちらのタイプでも、カスタム設定の レコード は「データ」として扱われ、サンドボックスの更新時に失われるため、テストの失敗は解決しません。\nB. 静的リソースはメタデータであり、デプロイ可能ですが、主にファイル（CSS、画像、JavaScriptなど）を保存するためのものです。設定データを保存するために使用するのは非効率であり、コードから参照・利用するのも複雑になります。\nC. Aと同様に、カスタム設定のタイプを変更しても、「データ」であることには変わりません。サンドボックスの更新時にデータが失われる問題は解決しません。\nD. 正解です。カスタムメタデータの レコード は「メタデータ」として扱われます。これにより、デプロイ（変更セットやパッケージ）に含めることができ、サンドボックスの更新後もデータが保持されます。テストが依存する設定データが常に存在するため、テストの失敗を防ぐことができます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 262, "q": "Universal Containersは、Customer Community Plusライセンスを持つカスタマーコミュニティを使用して、顧客がレンタルしているコンテナの数と返却期限を追跡できるようにしたいと考えています。Universal Containersは、外部ユーザに対して非公開の共有モデルを使用しています。顧客の多くは、複雑な取引先階層を持つ多国籍企業です。階層上の各取引先は、同じビジネス内の部門を表します。要件の1つは、取引先責任者を（部門を表す）さまざまな取引先レコードに関連付けるカスタム連結オブジェクトに基づき、同じ取引先階層内の一部のコミュニティユーザが、複数の部門のコンテナを参照できるようにすることです。どのソリューションがこれらの要件を解決しますか？", "choices": ["A. レコードを公開するために [without sharing] を指定したカスタムコントローラを使用するVisualforceページ", "B. 連結オブジェクトのリレーションシップに基づいてApexによる管理共有レコードを作成するApexトリガ", "C. Lightningデータサービスを使用する、コミュニティホームページ上のLightning Webコンポーネント", "D. 所有者に基づいて適切なレコードを表示するフィルタを備えた、連結オブジェクトのカスタムリストビュー"], "answer": ["B"], "category": "ユーザインターフェース", "explanation": "A. without sharing を使用すると、コントローラは共有設定を無視してデータを表示できますが、これはレコードへのアクセス権自体を付与するものではありません。特定のコンポーネント内でのみデータが見えるだけであり、Salesforce全体での共有要件を解決する適切な方法ではありません。\nB. 正解です。組織の共有設定が「非公開」の場合、特定のレコード（この場合はコンテナや部門の取引先）へのアクセス権を動的に付与する唯一の方法は、プログラムによる共有（Apexによる管理共有）です。Customer Community Plusライセンスユーザはロールを持たないため、この方法で、連結オブジェクトのロジックに基づき特定のユーザにアクセス権を付与する必要があります。\nC. Lightningデータサービス（LDS）は、ユーザの既存のアクセス権（共有設定）を尊重してデータを取得・表示します。LDS自体が、ユーザにアクセス権を 付与 する機能を持っているわけではありません。\nD. リストビューは、ユーザが 既にアクセス権を持っている レコードをフィルタリングして表示する機能です。レコードへのアクセス権自体を 付与 するものではないため、非公開モデルの共有の問題は解決しません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 263, "q": "ある企業が、一部のオブジェクトは異なり、一部のオブジェクトは共通である、多くの異なるSalesforce組織を持っています。そして、それらすべての異なる組織で共通オブジェクトのレコードを作成、取得、更新できる単一のJavaアプリケーションを構築したいと考えています。このアプリケーションはどの統合メソッドを使用すべきですか？", "choices": ["A. SOAP API と パートナーWSDL", "B. Apex REST Webサービス", "C. SOAP API と エンタープライズWSDL", "D. メタデータAPI"], "answer": ["A"], "category": "テスト、デバッグ、リリース", "explanation": "A. 正解です。パートナーWSDLは、特定の組織のスキーマに依存しない（緩やかに型付けされた）WSDLです。これにより、単一のJavaアプリケーションが、それぞれ異なるカスタムオブジェクトや項目を持つ可能性のある 複数 のSalesforce組織に接続し、共通のsObject（例: 取引先やカスタムオブジェクト）を動的に操作することが可能になります。\nB. これは、Salesforceが外部からのリクエストを受け取る（インバウンド）ために、各組織にカスタムApexコードをデプロイする必要がある方法です。単一のJavaアプリケーションからすべての組織を操作するという要件には適していません。\nC. エンタープライズWSDLは、単一 のSalesforce組織の特定のスキーマ（すべてのカスタム項目など）に強く結びついています（強く型付けされています）。このWSDLで構築されたアプリケーションは、その特定の組織専用となり、異なる設定を持つ他の組織には接続できません。\nD. メタデータAPIは、オブジェクト、項目、ページレイアウトといった 設定（メタデータ） を管理するために使用されます。取引先レコードのような データ を作成、取得、更新する目的には使用されません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 264, "q": "Visualforce Remote Objectsに対するJavaScript Remotingの利点は何ですか？", "choices": ["A. JavaScriptコードを必要としない", "B. 複雑なサーバサイドのアプリケーションロジックをサポートする", "C. Apexコードを必要としない", "D. 指定された再レンダリングの対象を許可する"], "answer": ["B"], "category": "ロジックとプロセスの自動化", "explanation": "A. JavaScript RemotingもVisualforce Remote Objectsも、Apexメソッドを呼び出したりデータを操作したりするためにJavaScriptを必要とします。\nB. 正解です。JavaScript Remotingは、@RemoteAction アノテーションが付いたカスタムApexメソッドを呼び出します。これにより、開発者はそのメソッド内で、単純なDML操作だけでなく、複雑なクエリ、計算、他のサービスへのコールアウトなど、任意のビジネスロジックを実行できます。\nC. JavaScript Remotingは、@RemoteAction メソッドを持つApexコントローラクラスを明示的に必要とします。\nD. これは、Visualforceの標準コンポーネント（例: <apex:commandButton>）の reRender 属性の機能です。JavaScript Remotingはデータを返すだけで、ページのどの部分を更新するかはJavaScriptのコールバック関数内で開発者が手動で制御する必要があります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 265, "q": "あるビジネス要件で、すべての親レコードは子レコードを必ず持つ必要があります。開発者は、親レコードと子レコードを挿入するために2つのDMLステートメントを持つApexメソッドを作成しました。入力規則が子レコードの作成をブロックします。メソッドはDML例外を処理するためにtry/catchブロックを使用しています。親が常に子レコードを持つことを保証するために、開発者は何をすべきですか？", "choices": ["A. Database.insert() を使用し、allOrNone パラメータを true に設定する。", "B. 子レコードのDML操作でエラーが発生した場合、catchステートメントで親レコードを削除する。", "C. データベースのセーブポイントを設定し、エラーが発生した場合にロールバックする。", "D. 子レコードでエラーが発生した場合、親レコードで addError() を使用する。"], "answer": ["C"], "category": "テスト、デバッグ、リリース", "explanation": "A. allOrNone パラメータは、1回のDML操作（例: 1つのリストの挿入）内のレコード群に適用されます。このシナリオは、親の挿入と子の挿入という2つの異なるDML操作にまたがっているため、allOrNone ではトランザクションを制御できません。\nB. これは手動でのロールバックの試みであり、安全ではありません。もし親レコードを削除するDML操作が（別のトリガなどによって）失敗した場合、データが不整合な状態（取引先だけが存在する）で残ってしまいます。\nC. 正解です。これは、複数のDML操作を1つの論理トランザクションとして扱うための正しい方法です。親レコードを挿入した後に Database.setSavepoint() を設定し、子の挿入が失敗した catch ブロック内で Database.rollback() を呼び出すことで、親の挿入操作を安全に取り消すことができます。\nD. addError() はDML操作を失敗させるために使用されますが、この catch ブロックが実行される時点では、親レコードの挿入は既に完了しています。catch ブロック内で addError() を使用しても、既にコミットされた親レコードの挿入を取り消すことはできません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 266, "q": "あるソフトウェア会社が、ソフトウェアのバグを追跡するためにカスタムオブジェクト Defect__c を使用しています。Defect__c の組織の共有設定は非公開に設定されています。各 Defect__c には Reviewer__c レコードの関連リストがあり、それぞれに User への参照項目があります。これは、そのユーザが Defect__c をレビューすることを示すために使用されます。Reviewer__c レコード上のユーザに、その Reviewer__c レコード（が関連する） Defect__c レコードへの参照のみアクセス権を付与するには、何を使用すべきですか？", "choices": ["A. Apexによる管理共有", "B. 条件に基づく共有", "C. Lightning Webコンポーネント", "D. Defect__c に対する「すべて表示」"], "answer": ["A"], "category": "ユーザインターフェース", "explanation": "A. 正解です。組織の共有設定（OWD）が非公開の場合、レコードへのアクセス権は制限されます。Reviewer__c レコードの参照項目で指定された特定のユーザに、親である Defect__c レコードへのアクセス権を動的に付与するには、Apex（通常はトリガ）を使用して共有レコード（Defect__Share）をプログラムで作成するのが唯一の柔軟な方法です。\nB. 条件に基づく共有ルールは、レコードの項目値に基づいて、公開グループ や ロール に対してアクセス権を付与します。参照項目で指定された 特定のユーザ に対して直接共有することはできません。\nC. Lightning Webコンポーネントはユーザインターフェースを構築するための技術であり、レコードの共有やアクセス権を管理するバックエンドのセキュリティ機能ではありません。\nD. この権限をユーザ（のプロファイルや権限セット）に付与すると、そのユーザは すべて の Defect__c レコードを参照できてしまいます。要件は、レビュー担当として割り当てられた 特定 のレコードのみを参照できるようにすることです。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 267, "q": "Visualforceページ内のカスタムデータテーブルの描画時間が遅いというユーザからの苦情があります。このテーブルは一度に数千件の取引先レコードを読み込んでいます。開発者はこれらの問題を軽減するために何をすべきですか？", "choices": ["A. JavaScript Remotingを使用して取引先をクエリする。", "B. 取引先レコードをクエリする際にApexコードで transient キーワードを使用する。", "C. サードパーティのデータテーブルライブラリを静的リソースとしてアップロードする。", "D. 標準の取引先リストコントローラを使用し、ページネーションを実装する。"], "answer": ["D"], "category": "パフォーマンス", "explanation": "A. JavaScript Remotingは、ビューステートを使用せずにサーバから非同期でデータを取得する方法です。ページの初期ロードは速くなるかもしれませんが、一度に数千件のデータを取得してクライアント側でテーブルを描画する根本的なパフォーマンスの問題は解決しません。\nB. transient キーワードは、変数をビューステートに保存しないようにするために使用されます。これはビューステートのサイズを削減するのに役立ちますが、数千件のレコードをクエリしてページに描画することによる初期ロードの遅延を直接解決するものではありません。\nC. ライブラリをアップロードするだけでは、パフォーマンスの問題は解決しません。どのようなライブラリかにもよりますが、根本的な原因は一度にロードするデータ量が多すぎることです。\nD. 正解です。一度に数千件のレコードをすべて読み込むのではなく、ページネーション（例: 1ページあたり50件ずつ表示）を実装することが、この問題に対するベストプラクティスです。標準リストコントローラには、ページネーション機能が組み込まれており、これを活用することで、一度に処理するデータ量を大幅に削減し、描画時間を劇的に改善できます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 268, "q": "開発者がアプリケーションイベントを作成したところ、無限ループを引き起こしました。何がこの問題を引き起こした可能性がありますか？", "choices": ["A. イベントがカスタムレンダラから発行された。", "B. イベントがプロジェクト内で複数のハンドラを登録している。", "C. イベントハンドラがトリガを呼び出す。", "D. イベントが 'ontouchend' で発行され、未処理である。"], "answer": ["B"], "category": "ユーザインターフェース", "explanation": "A. カスタムレンダラ（Auraコンポーネントのライフサイクルの一部）からイベントを発行すること自体は、無限ループの直接的な原因ではありません。\nB. 正解です。これはAuraコンポーネントのアプリケーションイベントで発生しうる問題です。無限ループは、イベントを処理（ハンドル）するロジックが、その結果として（直接または間接的に）再度同じイベントを発行してしまう場合に発生します。複数のハンドラが存在すると、コンポーネント間が相互にイベントを発行しあい、このような循環的なロジック（ループ）が発生する可能性が高まります。\nC. イベントハンドラ（クライアントサイド）がサーバサイドのApex（トリガ）を呼び出すことは、クライアントサイドのイベントループとは直接関係ありません。\nD. ontouchend はタッチイベントに関連するもので、無限ループとは無関係です。また、イベントが「未処理（unhandled）」であれば、何も実行されないためループは発生しません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 269, "q": "開発者は、商談のフェーズが変更された回数を追跡する既存の機能に取り組んでいます。商談のフェーズが変更されると、ワークフロールールが起動して項目の値を1増やします。開発者は、項目が4から5に変更されたときに子レコードを作成するafterトリガを作成しました。あるユーザが商談のフェーズを変更し、手動でカウント項目を4に設定しました。カウント項目は5に更新されますが、子レコードは作成されません。これはなぜですか？", "choices": ["A. Trigger.old には、カウント項目の更新された値が含まれていません。", "B. afterトリガはワークフロールールより先に起動します。", "C. Trigger.new は項目更新の後では変更されません。", "D. afterトリガは項目更新の後では起動されません。"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. 正解です。これは実行順序の問題です。ユーザが保存した時点（カウント=4）でトリガの1回目の実行（Pass 1）が起動します。この時、Trigger.old はユーザが変更する 前 の値（例: 3）を保持しています。開発者のロジック（4から5への変更を検知）は、Trigger.old が4であることを期待していますが、そうではないため失敗します。\nB. この記述は正しく、問題の根本的な原因です。トリガ（Pass 1）がワークフロールール（項目を5に更新する）の 前 に実行されるため、トリガは期待するデータ（4から5への変更）を検知できません。\nC. これは間違いです。ワークフローによる項目更新（4から5へ）は、2回目のトリガ実行（Pass 2）を引き起こし、その際 Trigger.new は更新後の値（5）を保持します。\nD. これも間違いです。ワークフロールールによる項目更新は、afterトリガを再度（Pass 2として）起動させます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 270, "q": "開発者は、商談が成約されるたびに、商談の取引先にあるカスタムの最終販売日項目を更新する商談トリガーを作成しました。このトリガーのテストクラスで、最終販売日項目を検証するアサーションが失敗します。アサーションが失敗する原因として何が考えられますか？", "choices": ["A. テストクラスが、テストデータ挿入時に取引先の所有者を定義していない。", "B. テストクラスが、テストメソッドで seealldata=true を実装していない。", "C. テストクラスが、商談の更新後に取引先レコードを再クエリ（再取得）していない。", "D. テストクラスが、Salesforce管理者としてテストを実行するために System.runAs() を使用していない。"], "answer": ["C"], "category": "ユーザインターフェース", "explanation": "A. 取引先の所有者が未定義であっても、トリガーの実行自体には通常影響しません。テストデータ（取引先）の挿入が成功していれば、これがアサーション失敗の直接的な原因である可能性は低いです。\nB. テストメソッドはデフォルトで組織の既存データにアクセスせず、テスト内で作成されたデータのみを使用します。seealldata=true の有無は、トリガーによって更新された値がテストメソッドの変数に反映されるかどうかとは無関係です。\nC. 正解です。トリガーはデータベース上の取引先レコードを更新しますが、テストメソッドがDML操作（商談の更新）の前にメモリ上に保持していた取引先変数の情報は古いままです。トリガーによる変更を確認するためには、DML操作の後に再度SOQLクエリを実行し、データベースから最新の取引先レコードを取得してアサーションを行う必要があります。\nD. System.runAs() は、特定のユーザー（管理者や特定のプロファイルを持つユーザーなど）のコンテキストでコードの実行をテストするために使用されます。テストはデフォルトでシステムモード（全データアクセス可能）で実行されるため、このアサーション失敗の原因ではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 271, "q": "ある企業には、複数の大規模なデータベース操作とWebサービスコールアウトを行うApexプロセスがあります。データベース処理とWebサービスは実行に時間がかかり、かつ順次実行する必要があります。開発者がガバナ制限とシステム制限に抵触せずにこのApexコードを記述するには、どうすればよいですか？", "choices": ["A. Queueable Apexを使用して、ジョブを順次実行するようにチェーン（連結）します。", "B. Apexスケジューラを使用して各プロセスをスケジュールします。", "C. 各プロセスとコールアウトに複数の @future メソッドを使用します。", "D. Limitsクラスを使用して、ガバナ制限に達したらプロセス全体を停止します。"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. 正解です。Queueable Apexは非同期処理であり、1つのジョブのexecuteメソッド内から次のQueueableジョブをSystem.enqueueJobで呼び出すことができます。これにより、各処理が独立したガバナ制限のセット内で実行され、大規模な処理を順次連結（チェーン）する要件を満たせます。\nB. Apexスケジューラは、特定の時刻（例：毎日午前3時）にジョブを実行するために使用されます。前のジョブが完了した直後に次のジョブを開始する、という動的な順次実行の制御には適していません。\nC. @future メソッドは非同期処理やコールアウトに役立ちますが、@future メソッドから別の @future メソッドを呼び出すことはできないため、複数のプロセスを順次実行するチェーンには適していません。\nD. Limitsクラスは、現在のトランザクションで消費されているガバナ制限（発行されたSOQLクエリの数など）を確認するために使用されます。ガバナ制限に達するのを回避するためのアーキテクチャではなく、また、制限に達したときにプロセスを停止する機能も持ちません（制限を超えるとシステムが例外をスローします）。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 272, "q": "ある開発者が、フロントデスクのキオスクでゲストが到着時に自己登録するためのAuraコンポーネントを作成しました。次に、開発者は、ゲストがフロントデスクに到着するたびにユーザーに警告（アラート）するためのコンポーネントをユーティリティトレイに作成する必要があります。何を使用すべきでしょうか？", "choices": ["A. DML操作", "B. 変更ログ", "C. アプリケーションイベント", "D. コンポーネントイベント"], "answer": ["C"], "category": "テスト、デバッグ、リリース", "explanation": "A. DML操作は、データベース内のレコードを挿入、更新、削除、または復元するための操作です。コンポーネント間の通信メカニズムではありません。\nB. 変更ログは、通常、システムやデータの変更履歴を記録するものであり、Auraコンポーネント間のリアルタイムな通信には使用されません。\nC. 正解です。アプリケーションイベントは、パブリッシュ/サブスクライブモデル（発行/購読モデル）に従います。イベントを発行すると、そのイベントを処理するように登録されているすべてのコンポーネントにブロードキャストされます。今回のケースのように、直接の親子関係にない（または階層的に離れている）コンポーネント間（キオスクのコンポーネントとユーティリティトレイのコンポーネント）で通信する場合に適しています。\nD. コンポーネントイベントは、コンポーネント階層を上方向（親コンポーネント）に伝播（バブル）します。主に子コンポーネントから親コンポーネントへの通信に使用されます。今回のシナリオでは、2つのコンポーネントが直接の親子関係にあるとは限らないため、アプリケーションイベントの方が適切です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 273, "q": "Universal Containersは、外部のJavaScriptとC55ファイルを含める必要があるVisualforceページを開発しています。彼らはページの効率的な読み込みとキャッシュを確実にしたいと考えています。この目標を達成するために、どの機能を利用すべきでしょうか？", "choices": ["A. ActionFunction", "B. PageBlockTable", "C. 静的リソース", "D. RemoteAction"], "answer": ["C"], "category": "ユーザインターフェース", "explanation": "A. ActionFunctionは、JavaScriptからコントローラのApexメソッドをAJAXリクエストで呼び出すために使用されるVisualforceコンポーネントです。ファイルのインクルードや効率的な読み込み・キャッシュには関係ありません。\nB. PageBlockTableは、データのリスト（レコードのリストなど）を表形式で表示するために使用されるVisualforceコンポーネントです。ファイルのインクルードには使用されません。\nC. 正解です。静的リソースは、JavaScriptファイル、CSSファイル、画像などのコンテンツをSalesforceにアップロードし、Visualforceページから参照するための機能です。静的リソースはSalesforceプラットフォームによって最適化され、ブラウザでのキャッシュが促進されるため、効率的な読み込みが実現します。\nD. RemoteAction (通常 @RemoteAction アノテーションを指します) は、VisualforceページのJavaScriptからApexメソッドを直接呼び出す（JavaScript Remoting）ために使用されます。ファイルのインクルードやキャッシュ管理には使用されません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 274, "q": "ある開発者は、関連する商談が高額とみなされた場合に取引先の評価を更新する商談トリガを作成しました。現在、商談が高額とみなされる基準は、金額が$1,000,000以上であることです。しかし、この基準値は時間とともに変更される可能性があります。高額な商談をLightning Webコンポーネントにも表示するという新しい要件があります。開発者がこれらのビジネス要件を満たし、さらに高額な商談を取得するビジネスロジックが複数の場所で繰り返されるのを防ぐためには、どの2つのアクションを実行すべきでしょうか？ 2つの答えを選んでください。", "choices": ["A. Lightning Webコンポーネントからトリガを呼び出す。", "B. 高額な商談を取得するヘルパークラスを作成する。", "C. 効率化のため、ビジネスロジックのコードをトリガ内に残す。", "D. カスタムメタデータを使用して高額な金額を保持する。"], "answer": ["B", "D"], "category": "ユーザインターフェース", "explanation": "A. Lightning Webコンポーネントから直接Apexトリガを呼び出すことはできません。トリガはデータベースのDML操作（挿入、更新など）によって自動的に起動されます。コンポーネントはデータを取得するために、@AuraEnabledアノテーションが付いたApexメソッドを呼び出す必要があります。\nB. 正解です。ビジネスロジック（高額な商談を特定する条件など）をトリガ本体から分離し、独立したヘルパークラスに配置することはApexのベストプラクティスです。これにより、トリガとLightning Webコンポーネントの両方からこの共通ロジックを呼び出して再利用でき、コードの重複を防ぎ、保守性を高めることができます。\nC. このアプローチでは、Lightning Webコンポーネントが同じロジックを再利用できません。コンポーネント側で同じ基準（高額な商談の定義）を再度実装する必要があり、結果としてコードが重複し、将来の変更が困難になります。\nD. 正解です。高額商談の基準値（$1,000,000）は変更される可能性があるため、この値をApexコード内に直接書き込む（ハードコーディングする）べきではありません。カスタムメタデータ型を使用してこの値を保存することで、管理者がコードを変更せずに基準値を更新でき、Apexクラス（ヘルパークラス）からこの値を動的に参照できるため、柔軟性と保守性が大幅に向上します。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 275, "q": "開発者が動作するビジネスロジックコードを持っていますが、テストクラスで次のエラーが表示されます: 「未コミットの作業が保留中です。コールアウトを実行する前にコミットまたはロールバックしてください。」 解決策として考えられるものは何ですか？", "choices": ["A. 外部コードのエラーである可能性が高いため、対象のエンドポイントについてサポートに問い合わせる。", "B. コールアウトの前に mast. T=RunningTes={} を使用して、テスト実行時にそれをバイパスする。", "C. 実際にはコードが失敗しないため、テストクラスの先頭で seeAllData を true に設定する。", "D. @TestVisible をコールアウトに設定して、ビジネスロジックとテストクラスを書き直す。"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "A. このエラーは外部システムの問題ではなく、「未コミットの作業」（DML操作）と同じトランザクション内で外部コールアウトを実行しようとしたときに発生する、Salesforceプラットフォーム内部のトランザクション制御エラーです。\nB. 選択肢の構文は不明瞭ですが、Test.isRunningTest() を使ってコールアウトをバイパスすることを意図している可能性があります。しかし、コールアウトをバイパスすることは、そのロジックをテストしないことであり、エラーの根本的な解決策ではありません。\nC. 正解です。このエラーは、テストデータを準備するためのDML操作（INSERTなど）の後にコールアウトが実行されるために発生します。@isTest(seeAllData=true) を設定すると、テストクラスは組織の既存データにアクセスできます。これにより、テストデータを DML で作成する必要がなくなり、「未コミットの作業」が発生しなくなるため、エラーを回避できる可能性があります。ただし、これはベストプラクティスとは見なされていません。\nD. @TestVisible アノテーションは、privateなクラスメンバー（メソッドや変数）をテストコードからアクセス可能にするために使用されます。コールアウトのトランザクションエラーとは全く関係ありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 276, "q": "Universal Containers（UC）は、外部REST APIとの頻繁なやり取りを必要とするSalesforceアプリケーションを開発しています。コードの重複を避け、保守性を向上させるために、コードを再利用するためのAPI連携をどのように実装すべきですか？", "choices": ["A. APIエンドポイントごとに別々のApexクラスを使用して、連携ロジックをカプセル化する。", "B. それを必要とする各ApexクラスにAPI連携コードを直接含める。", "C. API連携のための再利用可能なApexクラスを作成し、関連するApexクラスからそれを呼び出す。", "D. API連携コードを静的リソースとして保存し、各Apexクラスでそれを参照する。"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "A. エンドポイントごとにクラスを分けることはロジックをカプセル化しますが、複数のエンドポイントで共通のロジック（認証、エラー処理など）が必要な場合、コードの重複が発生する可能性があり、再利用性としては最適ではありません。\nB. このアプローチは、問題文で避けたいとされている「コードの重複」をまさに引き起こします。保守性が著しく低下し、APIの仕様変更があった場合に多くのクラスを修正する必要があります。\nC. 正解です。これはApexのベストプラクティスであり、サービスレイヤー設計の一環です。共通のAPIコールアウトロジック（認証、リクエスト構築、レスポンス処理、エラーハンドリングなど）を単一のクラスに集約し、他のクラスがそのクラスのメソッドを呼び出すことで、コードの再利用性を最大化し、保守性を劇的に向上させます。\nD. 静的リソースは、Apexコードではなく、JavaScriptファイル、画像、CSSなどの静的ファイルを保存するためのものです。Apexコードを静的リソースに保存して実行することは、標準的な開発方法ではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 277, "q": "開発者は、取引先責任者および Survey Response c というカスタムオブジェクトにシステム入力されるメールアドレスが、ブロック対象ドメインのリストに属していないことを保証するタスクを負っています。ブロック対象ドメインのリストは、ユーザーによるメンテナンスを容易にするためにカスタムオブジェクトに保存されています。Survey Response c オブジェクトは、カスタムVisualforceページを介して入力されます。これを実装するための最適な方法は何ですか？", "choices": ["A. 取引先責任者オブジェクトと Survey Response_c オブジェクトの入力規則でロジックを実装する。", "B. 取引先責任者に関するApexトリガとカスタムVisualforceページコントローラから呼び出されるヘルパークラスにロジックを実装する。", "C. 取引先責任者に関するApexトリガでロジックを実装し、さらにカスタムVisualforceページコントローラ内にもロジックを実装する。", "D. カスタムVisualforceページコントローラにロジックを実装し、取引先責任者に関するApexトリガからそのメソッドを呼び出す。"], "answer": ["B"], "category": "上級デベロッパーの基本", "explanation": "A. 入力規則は、他のオブジェクト（この場合はブロック対象ドメインのカスタムオブジェクト）のレコードをクエリして検証ロジックを実行することができません。そのため、この要件は入力規則では実現不可能です。\nB. 正解です。ドメイン検証ロジック（カスタムオブジェクトへのクエリを含む）を単一のヘルパークラスに集約するのが最適です。このヘルパークラスのメソッドを、取引先責任者トリガ（DML操作を捕捉）とVisualforceページコントローラ（UIからの保存操作を捕捉）の両方から呼び出します。これにより、ロジックが中央集権化され、コードの重複が避けられ、保守性が向上します。\nC. このアプローチは、同じ検証ロジックを2つの異なる場所（トリガとコントローラ）に重複して記述することを意味します。これは保守性を著しく低下させ、将来ロジックの変更が必要になった場合にエラーを引き起こす可能性があるため、最適ではありません。\nD. Apexトリガ（サーバサイドのデータベースイベント）が、Visualforceページコントローラ（通常UIセッションに関連付けられる）のメソッドを直接呼び出すのは、標準的な設計パターンではありません。ロジックは、両方から呼び出し可能な独立したヘルパークラスに配置すべきです。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 278, "q": "このコードを最適化するために、開発者が実装すべき2つのベストプラクティスはどれですか？ 2つの答えを選んでください。", "choices": ["A. トリガのコンテキストを after update, after insert に変更する。", "B. DMLステートメントを削除する。", "C. DMLステートメントにコレクション（リスト）を使用する。", "D. ループの外で Driving-Structure_C レコードをクエリする。"], "answer": ["C", "D"], "category": "テスト、デバッグ、リリース", "explanation": "この問題は、提示されたコードがApexのガバナ制限に違反する非効率なパターンを含んでいることを前提としています。正解の選択肢から、そのコードにはループ内にSOQLクエリとDMLステートメントが含まれていると推測されます。\nA. トリガの実行コンテキスト（beforeまたはafter）の変更は、コードの実行タイミングに関わるものであり、ループ処理に関する最適化（一括処理）とは別の問題です。ループ内の非効率な操作の問題は解決しません。\nB. DML操作（データの挿入、更新、削除）がビジネスロジックの要件である場合、それを削除することは解決策になりません。問題はDML操作の存在そのものではなく、それがループ内で非効率に実行されていることです。\nC. 正解です。これは、元のコードがループ内でDML操作（例：update record;）を1件ずつ実行していることを示唆しています。ベストプラクティスは、処理対象のレコードをループ内でリスト（コレクション）に追加し、ループが終了した後にそのリストに対して1回だけDML操作を実行することです。これにより、DMLステートメントの上限（通常150回）に達するのを防ぎます。\nD. 正解です。これは、元のコードがループ内でSOQLクエリを1件ずつ実行している（SOQL in Loop）ことを示唆しています。これはSOQLクエリの上限（通常100回）にすぐに達してしまうため、最も避けるべきパターンの一つです。ベストプラクティスは、ループの前に1回のSOQLクエリで必要なデータをすべて取得し、Mapなどを使ってループ内で効率的にアクセスすることです。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 279, "q": "開発者は、Lightning Webコンポーネントのスタイルと動作を制御するための変数を保存する必要があります。変数が本番環境とすべてのSandboxの両方でテスト可能であることを保証するために、どの機能を使用できますか？", "choices": ["A. カスタム設定", "B. カスタムオブジェクト", "C. カスタム変数", "D. カスタムメタデータ"], "answer": ["D"], "category": "ユーザインターフェース", "explanation": "A. カスタム設定はアプリケーションの構成データを保存するために使用できますが、これらは「データ」として扱われます。そのため、デプロイメント（移行）は可能ですが、カスタムメタデータほどシームレスではなく、主に階層設定やリスト設定として組織のキャッシュデータに利用されます。\nB. カスタムオブジェクトは、取引先や商談のようなビジネスデータを保存するためのものであり、アプリケーションの動作を制御する設定変数を保存する目的には適していません。デプロイも「データ」の移行として扱う必要があります。\nC. 「カスタム変数」は、Salesforceにおいて設定を環境間で移行するための特定の機能ではありません。これはApexやJavaScriptコード内で定義される一般的なプログラミング用語です。\nD. 正解です。カスタムメタデータ型は「メタデータ」として扱われます。これは、ApexクラスやLightningコンポーネント自体と同様に、変更セットやメタデータAPIを通じて、Sandboxから本番環境へシームレスにデプロイ（移行）できることを意味します。これにより、すべての環境で一貫した設定値が利用可能であることが保証され、テストが容易になります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 280, "q": "Salesforce組織でプラットフォームイベントが定義された後、どのメカニズムを介してイベントを公開（パブリッシュ）できますか？", "choices": ["A. 外部アプリケーションはAPIを使用してイベントメッセージを公開する。", "B. 内部アプリケーションはエンタイトルメントプロセスを使用できる。", "C. 外部アプリケーションは標準のストリーミングAPIを必要とする。", "D. 内部アプリケーションはアウトバウンドメッセージを使用できる。"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. 正解です。外部アプリケーションは、SalesforceのAPI（REST API、SOAP API、Pub/Sub APIなど）を利用して、Salesforce組織に対してプラットフォームイベントメッセージを公開（作成）することが可能です。\nB. エンタイトルメントプロセスは、主にケース管理においてサービスレベル契約（SLA）を追跡・適用するための機能であり、プラットフォームイベントを公開するメカニズムではありません。\nC. ストリーミングAPIは、プラットフォームイベントや変更データキャプチャなどのイベントを 購読（受信）するために主に使用されます。イベントの 公開（送信）には、標準のデータ操作API（REST/SOAP）やPub/Sub APIが使われます。\nD. アウトバウンドメッセージは、Salesforceから外部システムへSOAPメッセージを送信するための宣言的な機能です。Salesforce内部のプラットフォームイベントを公開するためには使用されません。内部的な公開はApex、Flow、またはProcess Builderを介して行われます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 281, "q": "アウトバウンドメッセージの代わりに、開発者がApexコールアウトを使用する必要があるシナリオはどれですか？", "choices": ["A. 対象システムがREST APIを使用している。", "B. 対象システムがSOAP APIを使用している。", "C. コールアウトが非同期である必要がある。", "D. コールアウトがフローから呼び出される必要がある。"], "answer": ["A"], "category": "上級デベロッパーの基本", "explanation": "A. 正解です。アウトバウンドメッセージは、SOAP API（XMLベース）のメッセージのみをサポートしています。対象システムがREST API（JSONベース）のような異なる形式を必要とする場合、カスタムリクエストを構築して送信するためにApexコールアウトが必要になります。\nB. アウトバウンドメッセージは、まさにSOAP APIと連携するように設計されています。対象システムがSOAPを使用する場合、アウトバウンドメッセージは宣言的な（コード不要な）選択肢として利用可能です。\nC. アウトバウンドメッセージは本質的に非同期です。メッセージをキューに入れ、エンドポイントが利用できない場合は再試行します。Apexコールアウトも非同期（@futureメソッドやQueueable Apexの使用など）にできますが、非同期性自体はアウトバウンドメッセージの特徴でもあります。\nD. アウトバウンドメッセージ（フローのアクションとして）とApexコールアウト（Apexアクション経由）は、両方ともフローから呼び出すことができます。この要件は、アウトバウンドメッセージではなくApexコールアウトの使用を強制するものではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 282, "q": "開発者が開発SandboxでVisualforceページを作成しテストしましたが、本番環境で使用するとユーザがビューステートエラーに遭遇するという報告を現在受けています。これらのエラーを修正するために、開発者は何を確実に行うべきですか？", "choices": ["A. クエリがガバナ制限を超えないようにする。", "B. プロパティが private としてマークされていることを確認する。", "C. 変数が transient としてマークされていることを確認する。", "D. プロファイルがVisualforceページにアクセスできることを確認する。"], "answer": ["C"], "category": "パフォーマンス", "explanation": "A. SOQLクエリがガバナ制限を超えた場合、ビューステートエラーではなく、通常 LimitException がスローされます。これは問題の原因とは異なります。\nB. private キーワードは、変数のアクセス可視性をクラス内に制限するものですが、その変数がビューステートに保存されるかどうかには影響しません。\nC. 正解です。ビューステートエラーは、ページのビューステート（コントローラの変数など）のサイズがSalesforceの上限（170KB）を超えたときに発生します。transient キーワードを変数に付与すると、その変数はビューステートの一部として保存されなくなるため、ビューステートのサイズを削減できます。本番環境のデータ量がSandboxより多いために、このエラーが発生することがよくあります。\nD. ユーザがページへのアクセス権を持っていない場合、「権限がありません」というエラーが表示されます。これは、ページの利用中に発生するビューステートエラーとは異なります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 283, "q": "部分的なページ更新を実行するためにAjaxの動作を開始するのに使用できるVisualforceコンポーネントはどれですか？ 3つの答えを選んでください。", "choices": ["A. apex:commandLink", "B. apex:commandButton", "C. apex:form", "D. apex:actionsStatus", "E. apex:actionSupport"], "answer": ["A", "B", "E"], "category": "ユーザインターフェース", "explanation": "A. 正解です。このコンポーネントはHTMLのリンクを生成します。reRender 属性を設定することで、クリック時にページ全体の更新ではなく、Ajaxリクエスト（部分的なページ更新）を開始するように設定できます。\nB. 正解です。このコンポーネントはHTMLのボタンを生成します。apex:commandLink と同様に、reRender 属性を設定することで、クリック時にAjaxリクエストを開始できます。\nC. apex:form は、入力項目やコマンドコンポーネントを囲むコンテナです。フォーム送信の範囲を定義しますが、それ自体がAjaxの動作を「開始」するわけではありません。フォーム内のボタンやリンクがアクションを開始します。\nD. このコンポーネントは、Ajaxリクエストの状態（例：「読み込み中...」）を 表示 するために使用されます。リクエストを開始する機能はなく、リクエスト中の視覚的なフィードバックを提供します。\nE. 正解です。このコンポーネントは、標準ではAjax機能を持たない他のVisualforceコンポーネント（例：apex:inputText）にAjaxサポートを 追加 するために特別に設計されています。特定のイベント（例：onchange）でAjaxリクエストをトリガするように設定できます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 284, "q": "開発者が、外部システムに対して複数のコールアウトを行うApexクラスを作成しました。これらのコールアウトで使用されるURLが頻繁に変更される場合、Apexクラスへの変更を最小限に抑えるために、開発者はどの機能を使用すべきですか？", "choices": ["A. セッションID", "B. 接続アプリケーション", "C. 指定ログイン情報", "D. リモートサイトの設定"], "answer": ["C"], "category": "ユーザインターフェース", "explanation": "A. セッションIDは、Salesforceへのログインセッションを識別するためのものです。外部システムのコールアウトURLを管理する機能ではありません。\nB. 接続アプリケーションは、主に外部アプリケーションがSalesforceに接続する際の認証（インバウンド）や、Salesforceからの認証（アウトバウンド）を管理するために使用されます。エンドポイントURLを動的に管理する目的には適していません。\nC. 正解です。指定ログイン情報は、コールアウトのエンドポイントURLと認証情報を一元管理できる機能です。Apexコード内では、ハードコードされたURLの代わりに指定ログイン情報の名前を参照します。URLが頻繁に変更されても、Apexコードを修正することなく、指定ログイン情報の設定を変更するだけで対応できるため、保守性が大幅に向上します。\nD. リモートサイトの設定は、Apexが外部ドメインへコールアウトすることを許可するために必要なセキュリティ設定です。しかし、これ自体はURLをコードから分離する機能は持っておらず、コード内のURLを変更する必要性は残ります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 285, "q": "開発者がAuraコンポーネントに複数のJavaScriptライブラリを効率的に組み込むにはどうすればよいですか？", "choices": ["A. JavaScript Remotingとscriptタグを使用する。", "B. script属性を持つCDNを使用する。", "C. ライブラリを別々のヘルパーファイルに実装する。", "D. 静的リソースから複数のアセットを結合する。"], "answer": ["D"], "category": "ユーザインターフェース", "explanation": "A. JavaScript Remotingは主にVisualforceでApexコントローラメソッドを非同期に呼び出すための機能であり、Auraコンポーネントへのライブラリ組み込み方法ではありません。\nB. <ltng:require> タグを使用してCDNからライブラリを読み込むことは可能ですが、複数のライブラリがある場合、リクエストが分散します。静的リソースにまとめる方が、Salesforceプラットフォーム上でのパフォーマンスと管理の観点から効率的とされています。\nC. ヘルパー（helper.js）は、コンポーネント固有のビジネスロジックやイベントハンドラを記述する場所です。外部の汎用JavaScriptライブラリのコードを直接コピー＆ペーストする場所ではなく、保守性が著しく低下します。\nD. 正解です。複数のJavaScriptライブラリを1つのZIPファイルにまとめ、それを静的リソースとしてアップロードします。Auraコンポーネントでは <ltng:require> タグを使用して、この静的リソース内の特定のファイル（または結合された単一のファイル）を読み込むことができます。これにより、サーバへのリクエスト回数を最小限に抑え、読み込みパフォーマンスを効率化できます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 286, "q": "ある会社のサポートプロセスでは、ケースが「修正不可」のステータスでクローズされるたびに、Engineering Reviewカスタムオブジェクトレコードを作成し、そのケース、取引先責任者、およびケースに関連する製品の情報を入力する必要があると定められています。Apexトリガを使用してこれを自動化する正しい方法は何ですか？", "choices": ["A. Engineering Reviewレコードを作成して挿入する、ケースの after update トリガ。", "B. Engineering Reviewレコードを作成して挿入する、ケースの after upsert トリガ。", "C. Engineering Reviewレコードを作成して挿入する、ケースの before update トリガ。", "D. Engineering Reviewレコードを作成して挿入する、ケースの before upsert トリガ。"], "answer": ["A"], "category": "テスト、デバッグ、リリース", "explanation": "A. 正解です。ケースのステータス変更（update）がデータベースに正常に保存された 後 に、別のオブジェクト（Engineering Review）のレコードを作成（insert）するのがこの要件の正しい実装です。after コンテキストにより、ケースの更新が成功したことが保証されます。\nB. after upsert は、レコードが挿入された場合と更新された場合の両方で実行されます。この要件は特にケースが 更新 されてクローズされる場合を対象としているため、after update の方がより正確で適切なコンテキストです。\nC. before update トリガは、トリガ対象のレコード（ケース）がデータベースに保存される 前 に実行されます。このコンテキストで別のオブジェクト（Engineering Review）に対してDML操作（insert）を実行することは、一般的にベストプラクティスではなく、トランザクションの問題を引き起こす可能性があります。\nD. before コンテキストは、Cの解説と同様の理由で不適切です。関連レコードのDML操作は、トリガ対象のレコードが正常に保存された after コンテキストで実行するのが最適です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 287, "q": "ある組織には、1つの取引先には常に1人かつ唯一の取引先責任者をプライマリとしてリストするという要件があります。そのため、1人の取引先責任者を選択すると、他の取引先責任者は選択解除されます。クライアントは、この機能を制御するために、取引先責任者にある 'Is Primary' (プライマリ) というチェックボックスを望んでいます。クライアントはまた、すべての取引先責任者の姓が完全に大文字で保存されることも望んでいます。これらの要件を実装するための最適な方法は何ですか？", "choices": ["A. 「Is Primary」ロジックのために取引先責任者に入力規則を書き、姓のロジックのために取引先責任者に before update トリガを書く。", "B. 「Is Primary」ロジックのために取引先責任者に after update トリガを書き、姓のロジックのために取引先責任者に別の before update トリガを書く。", "C. after update と before update の両方のために取引先責任者に単一のトリガを書き、各ロジックセットを処理するためにヘルパークラスを呼び出す。", "D. 「Is Primary」ロジックのために取引先に after update トリガを書き、姓のロジックのために取引先責任者に before update トリガを書く。"], "answer": ["C"], "category": "ユーザインターフェース", "explanation": "A. 入力規則はアクション（他のチェックボックスの選択を解除するなど）を実行できません。保存を停止させることしかできません。要件は他の関連レコードを自動的に更新することであり、入力規則では不可能です。\nB. この方法は機能しますが、取引先責任者オブジェクトに対して2つの異なるトリガ（after update用とbefore update用）を作成することになり、「1オブジェクトにつき1トリガ」というSalesforceのベストプラクティスに違反します。これは最適とは言えません。\nC. 正解です。これは「1オブジェクトにつき1トリガ」のベストプラクティスに従っています。単一のトリガがすべてのコンテキスト（姓のロジックのための before update、プライマリロジックのための after update）を処理し、そのロジックをヘルパークラスに委任することで、クリーンで保守性の高いコードを実現できます。\nD. 「Is Primary」ロジックは、取引先責任者オブジェクトのチェックボックスが変更されることによって発生するため、トリガは取引先オブジェクトではなく取引先責任者オブジェクトに配置する必要があります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 288, "q": "Universal Containers (UC) はトランスレーションワークベンチを有効にし、選択リストの値を翻訳しました。UCは取引先オブジェクトに Product__c というカスタム複数選択の選択リスト項目を持っており、営業担当は取引先がどのUC製品を既に持っているかを指定できます。開発者は、Product__c 項目を含む取引先レコードを取得するApexメソッドを作成するよう任されました。開発者が Products__c の値が現在のユーザの言語であることを保証するためには、何をすべきですか？", "choices": ["A. SOQLクエリの項目リストで toLabel(Products__c) を使用する。", "B. SOQL結果リストの各レコードにロケールを設定する。", "C. SOQL結果リストの各レコードで translate メソッドを呼び出す。", "D. SOQLクエリで Locale 句を使用する。"], "answer": ["A"], "category": "ユーザインターフェース", "explanation": "A. 正解です。toLabel() はSOQL関数であり、トランスレーションワークベンチで翻訳が設定されている選択リスト（複数選択を含む）の項目をクエリする際に使用します。これにより、保存されているAPI名ではなく、Apexを実行している現在のユーザの言語に基づいた翻訳済みの表示ラベルが返されます。\nB. このような操作は標準のApexでは提供されていません。SOQLクエリの結果は、クエリの実行方法に基づいてデータを返し、個々のレコードにロケールを設定して翻訳を制御する仕組みはありません。\nC. ApexのsObjectレコードに、SOQLで取得した選択リスト値を翻訳するための translate という標準メソッドは存在しません。\nD. SOQLクエリ構文には、選択リストの翻訳を制御するための Locale 句というものは存在しません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 289, "q": "開発者は、カスタム画面用にVisualforceコンポーネントまたはLightningコンポーネントを作成するかを決定しようとしています。どの機能に関する考慮事項が、最終決定に影響を与えますか？", "choices": ["A. 画面はLightning Experience UIからアクセスできる必要がありますか？", "B. 画面はサードパーティのアプリケーションを使用せずにPDFとしてレンダリングされる必要がありますか？", "C. 画面はJavaScriptフレームワークを利用しますか？", "D. 画面はモバイルアプリケーション経由でアクセスされますか？"], "answer": ["B"], "category": "テスト、デバッグ、リリース", "explanation": "A. VisualforceページとLightningコンポーネントは、どちらもLightning Experience UIに表示することが可能です。Visualforceはタブやコンポーネントラッパーを介して、Lightningはネイティブに表示されます。したがって、これは決定的な要因にはなりません。\nB. 正解です。Visualforceは、ページの renderAs=\"pdf\" 属性を使用することで、サードパーティのツールなしに、サーバサイドでコンテンツをPDFとしてネイティブにレンダリングする独自の機能を備えています。Lightningコンポーネントにはこのネイティブ機能がないため、PDFを生成するにはクライアントサイドのJavaScriptライブラリ（サードパーティ）を使用するか、バックグラウンドでVisualforceページを利用するApexを呼び出す必要があります。\nC. Lightningコンポーネント（特にLWC）は、それ自体が最新のJavaScriptフレームワークに基づいています。Visualforceページも、静的リソースを介して外部のJavaScriptフレームワークをインポートして使用することが可能です。\nD. Visualforceページ（モバイル有効化が必要）とLightningコンポーネントは、どちらもSalesforceモバイルアプリケーションからアクセスできます。Lightningの方がモバイル体験には最適化されていますが、アクセス自体は両方とも可能です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 290, "q": "開発者は、機密データを保存し、どのプロファイルやユーザがどの機密データにアクセスできるかを指定できる機能を持つ方法を見つけるよう求められています。このデータを保存するために何を使用すべきですか？", "choices": ["A. system.Cookieクラス", "B. カスタム設定", "C. 静的リソース", "D. カスタムメタデータ"], "answer": ["D"], "category": "テスト、デバッグ、リリース", "explanation": "A. system.Cookieクラスは、Visualforceページでブラウザのクッキーを管理するためのものです。これはクライアントサイドのストレージであり、サーバサイドの機密データを安全に保存し、プロファイルベースでアクセスを制御する目的には適していません。\nB. カスタム設定はアプリケーションの構成データを保存するために使用されます。階層カスタム設定はプロファイルやユーザごとに異なる値を提供できますが、これは主に設定の上書きのためであり、機密データへのアクセスを厳密に制限（誰が読み取れるかを制御）するためのものではありません。\nC. 静的リソースは、JavaScript、CSS、画像、ZIPファイルなどの静的ファイルを保存するためのものです。機密性の高い個別のデータ（APIキーなど）を保存し、プロファイルやユーザレベルでアクセスを細かく制御する目的には適していません。\nD. 正解です。カスタムメタデータ型は、アプリケーションの構成データを保存する最新の方法です。特に、管理パッケージ内でカスタムメタデータ型を「保護（Protected）」としてマークすると、そのレコードに保存された機密データは、そのパッケージのネームスペース内のApexコードからのみアクセス可能となり、他のユーザやコードから隠蔽されます。これにより、機密データを安全に保存し、アクセスを制御できます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 291, "q": "あるApexトリガは、営業担当者が商談を成立させるたびに、注文レコードを作成します。最近、このトリガが2つの注文を作成しています。開発者がこれをトラブルシューティングするための最適な手法は何ですか？", "choices": ["A. すべてのフローを無効にし、一度に1つずつ再度有効にして、どれがエラーを引き起こしているかを確認する。", "B. ApexトリガのApexテストクラスを実行し、コードがまだ十分なコードカバレッジを持っていることを確認する。", "C. すべての営業担当者に対してデバッグログを設定し、ログを監視してエラーや例外がないか確認する。", "D. コードに system.debug() ステートメントを追加し、開発者コンソールのログを使用してコードをトレースする。"], "answer": ["D"], "category": "ロジックとプロセスの自動化", "explanation": "A. フローが原因である可能性もありますが、本番環境でいきなり全てのフローを無効化するのは影響が大きすぎます。まずは、何が起きているかをログで調査するのが最適な最初のステップです。\nB. コードカバレッジは、コードがテストされている範囲を示すものであり、ランタイムで発生している「レコードが2つ作成される」というロジックの問題をデバッグするのには役立ちません。\nC. デバッグログを設定することは正しいアプローチですが、この問題は「エラーや例外」ではなく、意図しない動作（2件作成）です。そのため、ログを監視するだけでなく、実行のトレースが必要です。\nD. 正解です。トリガが2回呼び出されているのか、またはトリガ内のロジックが2件の注文を作成しているのかを特定するために、system.debug() ステートメントをコードに追加して実行フローを追跡するのが、最も直接的で最適なトラブルシューティング手法です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 292, "q": "ユーザがカスタムLightningコンポーネントを操作しているときに、一般的な「内部サーバエラーが発生しました」というエラーを受け取ります。より意味のあるメッセージを保証するために、開発者は何をすべきですか？", "choices": ["A. tag に onerror イベントハンドラを追加する。", "B. マークアップに error-view コンポーネントを追加する。", "C. エラーを処理するためにプラットフォームイベントを使用する。", "D. try-catchブロックで AuraHandledException を使用する。"], "answer": ["D"], "category": "ユーザインターフェース", "explanation": "A. どのタグかが不明確ですが、これは通常、クライアントサイドのJavaScriptエラーやリソースの読み込みエラーを処理するもので、「内部サーバエラー」（通常はApexサーバサイドエラー）を捕捉して意味のあるメッセージに置き換えるためのものではありません。\nB. error-view という標準のLightningコンポーネントは存在しません。エラーを表示するカスタムコンポーネントを作成することは可能ですが、そのためにはまずサーバから意味のあるエラーメッセージを取得する必要があります。\nC. プラットフォームイベントは非同期のイベント通知メカニズムであり、ユーザの同期操作に対する直接的なエラーレスポンスを処理するのには適していません。\nD. 正解です。Auraコンポーネントから呼び出されるApexメソッド（@AuraEnabled）内でエラーが発生した場合、それを try-catch ブロックで捕捉し、AuraHandledException としてカスタムメッセージを付けてスローすることで、クライアントサイドのコンポーネントは一般的な「内部サーバエラー」ではなく、その特定のメッセージを受け取ることができます。これにより、ユーザに分かりやすいエラー表示が可能になります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 293, "q": "ある会社が最近、組織内の商談に関する情報データグリッドを持つカスタムコントローラを使用したVisualforceページをデプロイしました。ユーザは、特定の条件下で「最大ビューステートサイズ制限」エラーメッセージを受け取ると報告しています。Visualforceのベストプラクティスによると、ビューステートを削減するために開発者が実行すべき3つのアクションはどれですか？ 3つの答えを選んでください。", "choices": ["A. フィルタとページネーションを使用してデータ量を減らす。", "B. 状態を維持する必要のない変数について、Apexコントローラで transient キーワードを使用する。", "C. コントローラ内の変数に private キーワードを使用する。", "D. 変更されない変数について、コントローラで final キーワードを使用する。", "E. ページに関連するデータのみを返すようにSOQLクエリを絞り込む。"], "answer": ["A", "B", "E"], "category": "パフォーマンス", "explanation": "A. 正解です。一度にページに表示（およびコントローラに保持）するレコード数を制限することで、ビューステートに保存されるデータ量が直接的に減少し、エラーを回避できます。\nB. 正解です。transient キーワードを使用すると、その変数はビューステートに保存されなくなります。ポストバック間で値を維持する必要のない一時的な変数や計算結果などに使用することで、ビューステートのサイズを大幅に削減できます。\nC. private キーワードは変数のアクセス可視性を制御するものですが、ビューステートへの保存を防ぐものではありません。private変数もビューステートに含まれます。\nD. final キーワードは変数を定数（再代入不可）にするものですが、ビューステートへの保存には影響しません。\nE. 正解です。ビューステートには、コントローラクラスのメンバ変数が保持するデータが含まれます。SOQLクエリを最適化し、本当に必要な項目やレコードのみを取得するようにすれば、コントローラが保持するデータ量が減り、結果としてビューステートのサイズも削減されます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 294, "q": "開発者は、標準のケース作成画面を、ケースを作成する前にウィザードをユーザーに案内するカスタム画面に置き換えるよう依頼されました。この組織には、Lightning Experienceを実行しているユーザーしかいません。要件を満たすために、開発者はケースの「新規」アクションを何で上書きすべきですか？", "choices": ["A. Lightningページ", "B. Lightningレコードページ", "C. Lightningコンポーネント", "D. Lightning Flow"], "answer": ["D"], "category": "ロジックとプロセスの自動化", "explanation": "A. Lightningページ（アプリケーションページやホームページなど）は、コンポーネントを配置するためのコンテナであり、アクションの上書き対象としてウィザードロジックを直接提供するものではありません。\nB. Lightningレコードページは、既存のレコード（ケースの詳細ページなど）のレイアウトを定義するためのものであり、「新規」アクションのプロセス（ウィザード）を定義するものではありません。\nC. Lightningコンポーネント（AuraまたはLWC）で「新規」アクションを上書きし、カスタムウィザードをコーディングすることは可能ですが、要件である「ウィザード」を実装するための最も効率的なソリューションではありません。\nD. 正解です。Lightning Flow（特にスクリーンフロー）は、複数の画面を遷移する「ウィザード」形式のユーザインターフェースを宣言的に（コードを最小限にして）作成するために設計された最適なツールです。標準の「新規」アクションは、作成したスクリーンフローを起動するように簡単上書きできます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 295, "q": "ある企業には多くの異なるSalesforce組織があり、一部のオブジェクトは異なり、一部のオブジェクトは共通しています。そして、すべての異なる組織にある共通オブジェクトのレコードを作成、取得、更新できる単一のJavaアプリケーションを構築したいと考えています。このアプリケーションはどの連携メソッドを使用すべきですか？", "choices": ["A. パートナーWSDLを使用したSOAP API", "B. Apex REST Webサービス", "C. エンタープライズWSDLを使用したSOAP API", "D. メタデータAPI"], "answer": ["A"], "category": "ユーザインターフェース", "explanation": "A. 正解です。パートナーWSDLは、特定のSalesforce組織のスキーマ（データモデル）に依存しない（型が緩い）ように設計されています。これにより、単一のWSDLから生成されたJavaアプリケーションが、それぞれ異なるカスタムオブジェクトや項目を持つ可能性のある複数のSalesforce組織に接続し、共通のオブジェクトを操作することが可能になります。\nB. Apex REST Webサービスは、外部システムが呼び出すことができるカスタムAPIをSalesforce内に作成する方法です。このシナリオは、外部のJavaアプリケーションがSalesforceを呼び出す側であるため、Salesforceが標準で提供するAPIを利用するのが適切です。\nC. エンタープライズWSDLは、単一の Salesforce組織の特定のスキーマ（すべてのカスタムオブジェクトと項目を含む）に強く結合（型付け）されています。このWSDLで生成されたJavaクライアントは、その特定の組織専用となり、異なるスキーマを持つ他の組織との連携には適していません。\nD. メタデータAPIは、取引先や取引先責任者などのデータレコードを操作するために使用されるものではありません。これは、カスタムオブジェクト、項目、Apexクラス、Visualforceページといった組織のメタデータ（設定やカスタマイズ）を管理（デプロイや取得）するために使用されます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 296, "q": "ある会社には、取引先の名前、Webサイト、従業員数などの取引先レコード情報を取得する必要があるWebページがあります。WebページはSalesforceレコードIDを認識しており、JavaScriptを使用して取引先情報を取得します。どの連携メソッドが最適ですか？", "choices": ["A. Apex SOAP Webサービス", "B. SOAP API", "C. Apex REST Webサービス", "D. REST API"], "answer": ["D"], "category": "テスト、デバッグ、リリース", "explanation": "A. これは、SOAPサービスを公開するためにカスタムApexコードを作成する必要があります。要件がIDを使用して標準オブジェクトのデータを取得するだけの場合、必要以上に複雑です。また、JavaScriptはSOAP/XMLよりもREST/JSONと親和性が高いです。\nB. これは標準のSalesforce APIです。しかし、これはSOAP/XMLに基づいているため、REST/JSONと比較して、クライアントサイドのJavaScriptで扱うのが一般的に複雑（冗長）です。\nC. これは、RESTサービスを公開するためにカスタムApexコードを作成する必要があります。JavaScriptに適したREST/JSONを使用しますが、標準のREST APIが既にレコードを取得できる場合、これは不要なカスタマイズです。\nD. 正解です。標準のSalesforce REST APIは、JavaScript（fetchやAJAXを使用）から簡単に呼び出してレコードデータをJSON形式で取得できるシンプルなエンドポイントを提供します。レコードIDがわかっているため、これが最も直接的で最適な方法です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 297, "q": "ある開発者は、テストの実行に必要なすべてのテストデータの初期設定のために、クラス内のすべてのテストメソッドの実行に長い時間がかかることに気づきました。テストの実行をスピードアップするために、開発者は何をすべきですか？", "choices": ["A. テストデータを作成するメソッドを定義し、@testSetupでアノテーションを付ける。", "B. テストデータを作成するメソッドを定義し、@createDataでアノテーションを付ける。", "C. すべてのテストメソッドでテストデータファクトリが適切に使用されていることを確認する。", "D. クラス内のテストメソッドの量を減らす。"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. 正解です。@testSetup アノテーションが付いたメソッドは、そのテストクラス内の他のテストメソッドが実行される前に一度だけ呼び出されます。ここで作成されたデータは、クラス内のすべてのテストメソッドからアクセス可能になり、各テストメソッドの実行前にデータベースがこの初期状態にロールバックされます。これにより、各テストメソッドで個別にデータをセットアップするオーバーヘッドがなくなり、テストの実行時間が大幅に短縮されます。\nB. @createData というアノテーションはApexテストフレームワークには存在しません。\nC. テストデータファクトリを使用することは、テストデータの作成を標準化し、保守性を高めるためのベストプラクティスですが、それ自体がテストの実行速度を直接的に最適化するわけではありません。@testSetup メソッド内でファクトリを呼び出すのが最も効率的です。\nD. テストメソッドを減らすことは、テストのカバレッジと品質を低下させることにつながるため、パフォーマンスの問題に対する適切な解決策ではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 298, "q": "開発者がVisualforceページを持っており、保存時に取引先の所有権を自動的にキューに割り当てます。ページは正しく所有権を割り当てているように見えますが、正しい所有権を検証するアサーションが失敗します。何がこの問題を引き起こしている可能性がありますか？", "choices": ["A. テストクラスがデータベースから更新された値を取得していない。", "B. テストクラスがテストデータの読み込みにBulk APIを使用していない。", "C. テストクラスが seeallData=true アノテーションを使用していない。", "D. テストクラスが Queueable インターフェースを実装していない。"], "answer": ["A"], "category": "テスト、デバッグ、リリース", "explanation": "A. 正解です。Visualforceページのコントローラによる保存操作と、テストメソッドの実行は異なるトランザクションコンテキストで発生する可能性があります。テストメソッド内でレコードを作成した後、コントローラの保存メソッドを呼び出しても、テストメソッドがメモリ内に保持している元のレコード変数は自動的に更新されません。アサーションを実行する前に、SOQLクエリを再度実行してデータベースから最新のレコード（所有権が変更されたレコード）を取得し直す必要があります。\nB. Bulk APIは、Salesforceの外部から大量のデータをロードするためのAPIです。Apexの単体テスト内でテストデータを作成するのには使用されず、この問題とは関係ありません。\nC. seeAllData=true は、テストが組織の既存データにアクセスできるようにするもので、ベストプラクティスでは非推奨です。キューは設定データであるためアクセス可能ですが、このアノテーションの有無が、保存操作 後 のレコードの所有権を検証できない直接的な原因ではありません。\nD. Queueableインターフェースは、非同期のApexジョブを実装するためのものです。テストクラス自体がこれを実装する必要はなく、Visualforceページの同期的な保存ロジックのテストとは無関係です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 299, "q": "Universal Containersは、顧客サポートのケースを管理するためにカスタムSalesforceアプリケーションを使用しています。サポートチームは、特定のケースを解決するために外部パートナーと協力する必要があります。しかし、彼らは外部パートナーと共有されるケースの表示可能性とアクセスを制御したいと考えています。この要件を達成するのに役立つSalesforceの機能はどれですか？", "choices": ["A. ロール階層", "B. 条件に基づく共有ルール", "C. Apexによる管理共有", "D. 共有セット"], "answer": ["C"], "category": "テスト、デバッグ、リリース", "explanation": "A. ロール階層は、主に組織内部のユーザ（例: マネージャが部下のレコードを見る）間のアクセス権を制御します。外部パートナーは通常、この内部階層の外にいるため、この機能では要件を満たせません。\nB. このルールは、レコードの項目値（例: ケースの種別）に基づいて、公開グループやロールにレコードを共有します。外部パートナーを公開グループに入れることはできますが、これは静的なルールであり、「特定のケース」を「特定の外部パートナー」に動的に割り当てるような、きめ細かな制御には適していない場合があります。\nC. 正解です。Apex（通常はトリガ）を使用して共有レコード（この場合は CaseShare）をプログラムで作成することにより、アクセスをきめ細かく制御できます。これにより、「特定のケース」を「特定の外部パートナーユーザ」に（例えば参照のみで）共有し、そのアクセスを必要に応じて追加・削除するという要件を最も柔軟に満たすことができます。\nD. 共有セットは、コミュニティ（Experience Cloud）ユーザ向けの機能です。外部ユーザが属する取引先に関連するレコード（例: ケース）へのアクセスを自動的に付与するために使用されます。要件は「特定のケース」へのアクセスを「制御」することであり、共有セットの仕組みとは異なります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 300, "q": "ユーザから、カスタムLightning Webコンポーネント（LWC）のボタンが、入力したデータを保存しないと報告があります。ボタンはクリックされたように見えますが、LWCは何もしていないかのように、ただそこにあるだけです。エラーメッセージが適切に表示されるようにするために、開発者は何を使用すべきですか？", "choices": ["A. DMLステートメントを囲む try-catch ブロックを追加する。", "B. allOrNone を false に設定した Database メソッドを使用する。", "C. コンポーネントに apex:messages/ タグを追加する。", "D. エラーメッセージを表示するためにJavaScriptとHTMLを追加する。"], "answer": ["D"], "category": "ユーザインターフェース", "explanation": "A. これはApex（サーバサイド）でのエラー処理です。サーバサイドでエラーを捕捉することは重要ですが、それだけではLWCのUI（クライアントサイド）にエラーメッセージは表示されません。\nB. これはApex（サーバサイド）でのDML操作が、一部のレコードが失敗しても他のレコードの処理を続行できるようにするものです。LWCのUIにエラーを表示するという要件とは直接関係ありません。\nC. apex:messages/ はVisualforceのコンポーネントであり、Lightning Webコンポーネントでは使用できません。\nD. 正解です。問題は、LWCがエラーをUIに表示していないことです。解決策は、LWCのHTMLにエラーメッセージを表示するための領域を追加し、JavaScript（例えばApex呼び出しのcatchブロック）でエラーを捕捉し、そのHTML領域にメッセージを表示するロジックを実装することです。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 301, "q": "Universal Containers（UC）はトランスレーションワークベンチを有効にし、選択リストの値を翻訳しました。UCは、取引先オブジェクトにカスタムの複数選択選択リスト項目「Product__c」を持っており、営業担当はこれを使用して取引先が既にどのUC製品を所有しているかを指定できます。開発者は、Product_c項目を含む取引先レコードを取得するApexメソッドを作成するよう任されました。Products__cの値が現在のユーザの言語で表示されるようにするために、開発者は何をすべきですか？", "choices": ["A. SOQLクエリの項目リストで tolabel(Products__c) を使用する。", "B. SOQLの結果リストの各レコードにロケールを設定する。", "C. SOQLの結果リストの各レコードで translate メソッドを呼び出す。", "D. SOQLクエリで Locale 句を使用する。"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. 正解です。tolabel() 関数は、SOQLクエリ内で選択リスト項目（単数選択、複数選択の両方）の翻訳された表示ラベルを、クエリを実行している現在のユーザの言語設定に基づいて取得するために使用されます。\nB. SOQLクエリによって返されたsObjectレコードのリストに対して、取得後にロケールを個別に設定して値を翻訳するような標準的なメカニズムはありません。\nC. sObjectレコードやその項目値に対して、選択リストのAPI名を翻訳済みラベルに直接変換する translate という名前の標準Apexメソッドは存在しません。\nD. SOQLには、翻訳を指定するために使用できる Locale 句という構文は存在しません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 302, "q": "開発者は、どのプロファイルおよびユーザがどのシークレットにアクセスできるかを指定する機能と共に、シークレットデータを保存する方法を見つけるよう求められています。このデータを保存するために何を使用すべきですか？", "choices": ["A. カスタムメタデータ", "B. system.Cookie クラス", "C. 静的リソース", "D. カスタム設定"], "answer": ["A"], "category": "上級デベロッパーの基本", "explanation": "A. 正解です。カスタムメタデータ型を使用すると、データをレコードとして保存できます。これらのメタデータレコードへのアクセス（参照可否）は、プロファイルや権限セットに基づいて制御することが可能です。これにより、どのプロファイルやユーザがどのシークレット（メタデータレコードとして保存されたデータ）にアクセスできるかを指定するという要件を満たせます。\nB. system.Cookie クラスは、ユーザのブラウザ側でデータを保存（クッキーを設定）するために使用されます。Salesforceサーバ側で機密データを永続的に保存し、組織内のアクセス制御を行うためのものではありません。\nC. 静的リソースは、画像、スタイルシート、JavaScriptファイルなどの静的なコンテンツを保存するための機能です。シークレットデータをレコードのように保存し、それらへのアクセスをプロファイルやユーザごとに制御する用途には適していません。\nD. カスタム設定（特に階層型）は、プロファイルやユーザごとに異なる値を持つことができますが、これは主に設定値の オーバーライド のためです。設定データ自体への 参照可否 をプロファイルレベルで細かく制御する機能は、カスタムメタデータの方が適しています。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 303, "q": "開発者は、バックアップ目的で取引先レコードを外部システムに送信する必要があります。このプロセスは、取引先が保存されるときにスナップショットを取得し、その後RESTful Webサービスへのコールアウトを行う必要があります。Webサービスは、コールごとに最大1レコードしか受信できません。これらの要件を実装するために、開発者は何をすべきですか？", "choices": ["A. futureメソッドを作成する。", "B. ApexクラスをWebサービスとして公開する。", "C. Queueableインターフェースを実装する。", "D. プラットフォームイベントを実装する。"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "A. futureメソッドは、トリガなどの同期処理から非同期にコールアウトを実行するために使用されます。しかし、1つのトランザクションで呼び出せるfutureメソッドは50回までという制限があります。もし100件の取引先が一括更新され、100回のコールアウトが必要になった場合、この制限に抵触するため不適切です。\nB. これは、Salesforceが外部システムからのリクエストを 受信（インバウンド）するための機能です。問題文は、Salesforceから外部へデータを 送信（アウトバウンド）する必要があるため、要件を満たしません。\nC. 正解です。トリガ（保存時）からQueueableジョブを1つ起動できます。Queueableの実行メソッド内では、1トランザクションあたり最大100回のコールアウトが許可されています。もし100件を超えるレコード（例: 200件）が一度に保存された場合でも、Queueableはジョブチェーン（処理が完了したら自身を再度キューに入れる）を利用して、残りのレコードを次のトランザクションで処理できます。\nD. プラットフォームイベントを使用してイベントを発行し、非同期のサブスクライバがコールアウトを実行することも可能です。しかし、結局そのサブスクライバ内でQueueableやfutureのような非同期Apexを呼び出す必要があり、Cの選択肢と比べて間接的な実装になります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 304, "q": "Lightning Webコンポーネントを開発する際、携帯電話などの小型デバイスではlightninglayout-itemを1列で表示し、タブレットサイズおよびデスクトップサイズの画面では2列で表示する設定はどれですか？", "choices": ["A. size=\"12\" tablet-device-size=\"6\" を設定する", "B. size=\"12\" medium-device-size=\"6\" を設定する", "C. size=\"6\" mobile-device-size=\"12\" を設定する", "D. size=\"6\" small-device-size=\"12\" を設定する"], "answer": ["B"], "category": "ユーザインターフェース", "explanation": "A. lightning-layout-item のレスポンシブ属性に tablet-device-size という名前の属性はありません。タブレットサイズには medium-device-size を使用します。\nB. 正解です。size=\"12\" は、デフォルトの画面サイズ（モバイルなどの小型デバイス）でアイテムが12列すべてを占有すること（つまり1列表示）を指定します。medium-device-size=\"6\" は、中サイズ（タブレット）以上の画面でアイテムが6列分（つまり2列表示）を占有することを指定します。\nC. size=\"6\" は、モバイル画面で6列分（つまり2列表示）を指定することになるため、要件（モバイルで1列）を満たしません。\nD. size=\"6\" は、モバイル画面で2列表示となるため、要件を満たしません。また、小型デバイスのサイズは通常 size 属性で指定します。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 305, "q": "開発者は、標準のケース作成画面を、ケースを作成する前にユーザをウィザードで誘導するカスタム画面に置き換えるよう求められました。組織にはLightning Experienceを使用しているユーザしかいません。要件を満たすために、開発者はケースの「新規」アクションを何で上書きすべきですか？", "choices": ["A. Lightningページ", "B. Lightningレコードページ", "C. Lightningコンポーネント", "D. Lightningフロー"], "answer": ["D"], "category": "ロジックとプロセスの自動化", "explanation": "A. Lightningページ（アプリケーションページやホームページ）は、特定のオブジェクトの標準の「新規」ボタンのアクションを上書きする機能として直接使用されるものではありません。\nB. Lightningレコードページは、主に既存のレコードの参照ページや編集ページをカスタマイズするために使用されます。「新規」アクション（レコード作成画面）をウィザード形式で上書きするのには適していません。\nC. Lightningコンポーネント（AuraまたはLWC）を使用して「新規」アクションを上書きし、カスタムUIを構築することは技術的に可能です。しかし、ウィザード形式（複数画面のステップ）を構築するには、フローの方が宣言的に（コードを最小限にして）実装できるため、より推奨されます。\nD. 正解です。画面フローは、ユーザを複数の画面ステップ（ウィザード）でガイドし、情報を収集した上でレコードを作成する機能を提供します。標準の「新規」アクションは、この画面フローを起動するように上書きすることができます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 306, "q": "Universal Containers（UC）は、顧客がコンテナに関する問題を記録するのを助けるために、カスタマーコミュニティを開発したいと考えています。このコミュニティは、ドイツ語とスペイン語を話す顧客にも機能する必要があります。UCはSalesforceを使えば国際的なコミュニティを簡単に作成できると聞き、サイトを構築するために開発者を雇いました。サイトが多言語対応であることを保証するために、開発者は何を使用すべきですか？", "choices": ["A. カスタムラベルを使用して、カスタムメッセージが適切に翻訳されるようにする。", "B. カスタム設定を使用して、カスタムメッセージが適切に翻訳されるようにする。", "C. カスタムオブジェクトを使用して、カスタム選択リストの値を翻訳する。", "D. カスタムメタデータを使用して、カスタム選択リストの値を翻訳する。"], "answer": ["A"], "category": "上級デベロッパーの基本", "explanation": "A. 正解です。カスタムラベルは、Apex、Lightningコンポーネント、Visualforceページなどで使用されるカスタムテキスト（エラーメッセージ、ヘルプテキスト、ボタンのラベルなど）を一元管理し、翻訳するための標準機能です。トランスレーションワークベンチと連携し、ユーザの言語設定に応じて自動的に適切な翻訳を表示します。\nB. カスタム設定は、アプリケーションの設定値や組織固有のデータを保存するために使用されます。多言語のテキストメッセージを管理し、ユーザの言語に応じて自動的に切り替えるための機能としては設計されていません。\nC. カスタムオブジェクトはデータレコードを保存するためのものです。選択リストの値の翻訳は、トランスレーションワークベンチを使用して行うのが標準的な方法であり、カスタムオブジェクトを使用するのは不適切です。\nD. カスタムメタデータは、設定データ（カスタム設定に似ていますが、より高機能）を管理するために使用されます。選択リストの値の翻訳は、トランスレーションワークベンチで行います。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 307, "q": "あるページが取引先責任者に対して 'Attempt to dereference a null object'（nullオブジェクトの参照解除の試行）エラーをスローします。コントローラのどの変更がこのエラーを修正しますか？", "choices": ["A. コントローラの先頭で静的（static）かつfinalな取引先責任者を宣言する。", "B. ゲッター（getter）内で条件を使用し、もしnullであれば新しい取引先責任者を返すようにする。", "C. セッター（setter）のシグネチャ（定義）が取引先責任者を返すように変更する。", "D. ゲッター（getter）のシグネチャ（定義）が静的な（static）取引先責任者になるように変更する。"], "answer": ["B"], "category": "ユーザインターフェース", "explanation": "A. static finalとして宣言するだけでは、null参照の問題は解決しません。変数がインスタンス化（初期化）されることが重要であり、staticにすることは通常、Visualforceページのインスタンス変数としては不適切です。\nB. 正解です。このエラーは、ページがコントローラ内の取引先責任者変数を参照しようとした際に、その変数が初期化されておらずnullであるために発生します。ゲッターメソッド内で変数がnullかどうかを確認し、nullの場合に新しいインスタンス（new Contact()）を生成して返すようにすることで、ページがnullを参照するのを防ぐことができます。\nC. セッターメソッドは通常、ページから値を受け取るために使用され、戻り値はvoidです。セッターが値を返すように変更しても、ゲッターがnullを返す問題は解決しません。\nD. ゲッターをstaticに変更すると、その変数はインスタンス変数ではなくクラス変数となり、Visualforceページからの標準的なデータバインディング（例: {!contact.Name}）と互換性がなくなる可能性があり、null参照エラーの解決策にはなりません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 308, "q": "あるカスタムLightningコンポーネントの一部に、組織内にある数百万件にのぼる商談の総数を表示します。このLightningコンポーネントは、必要なデータを取得するためにApexメソッドを使用します。開発者がLightningコンポーネントのために商談の総数を取得する最適な方法は何ですか？", "choices": ["A. 商談レコードの数をカウントするSOQL forループ", "B. 商談オブジェクトに対する COUNT() SOQL集計クエリ", "C. 商談レコードの数をカウントするApexバッチジョブ", "D. 商談オブジェクトに対する SUM() SOQL集計クエリ"], "answer": ["C"], "category": "ロジックとプロセスの自動化", "explanation": "A. この方法は、SOQLクエリで取得できるレコードの上限（50,000件）というガバナ制限にすぐに達するため、数百万件のレコードをカウントするには適していません。\nB. COUNT() はレコード数を集計する正しいSOQL関数です。しかし、数百万件のレコードに対してLightningコンポーネント（同期的）からApexメソッド経由で直接実行すると、クエリがタイムアウト（例: Apex CPU時間制限）する可能性が高く、ユーザ体験が著しく低下するため「最適」とは言えません。\nC. 正解です。数百万件規模のデータを扱う場合、リアルタイムの集計は非現実的です。最適なパターンは、バッチApexを使用して夜間などに非同期で全レコードをカウントし、その結果（総数）をカスタム設定、カスタムメタデータ、または専用のカスタムオブジェクトレコードに保存しておく方法です。Lightningコンポーネントは、計算（COUNT()）を実行するのではなく、この 保存された結果 を照会するだけなので、瞬時に総数を表示できます。\nD. SUM() 集計クエリは、レコードの 数 ではなく、特定の数値項目（例: 金額）の 合計値 を計算するために使用します。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 309, "q": "新しいリリースの直前に、開発者サンドボックスで新しい注文フルフィルメントプロセス機能を設定したSalesforce管理者が突然退職しました。UATサイクルの一環として、ユーザはサンドボックスですべての変更を完全にテストし、承認を済ませていました。これにより、注文フルフィルメント機能は本番環境でのリリース準備が整っていました。残念ながら、変更セットは開始されていましたが、元の管理者によって完了されていませんでした。開発者がデプロイを完了させるために呼ばれました。本番環境に移行する必要がある設定変更を特定するために、開発者は何をすべきですか？", "choices": ["A. Salesforce設定で、すべてのオブジェクトの最終更新日を見て、どれを変更セットに追加すべきかを判断する。", "B. メタデータAPIとサポートされている開発IDEを使用して、変更が失われないように、サンドボックスから本番環境にすべての設定をプッシュする。", "C. 設定変更履歴を利用して、退職した管理者によって行われた変更を確認し、どの変更を変更セットに追加すべきかを特定する。", "D. CI（継続的インテグレーション）とGitリポジトリを設定し、サンドボックスのメタデータと本番のメタデータを自動的にマージする。"], "answer": ["C"], "category": "テスト、デバッグ、リリース", "explanation": "A. この方法は非効率的であり、不正確です。変更はオブジェクト（項目など）だけでなく、フロー、権限セット、ページレイアウトなど多岐にわたる可能性があり、オブジェクトの最終更新日だけでは関連するすべてのコンポーネントを特定できません。\nB. サンドボックスから すべて の設定を本番環境にデプロイするのは非常に危険です。UATで承認されていない他の未完成の変更や、本番環境の既存の設定を意図せず上書きしてしまうリスクがあります。\nC. 正解です。設定変更履歴は、過去180日間に「誰が」「いつ」「どのような設定変更」を行ったかを追跡します。これにより、開発者は退職した管理者が行った変更を特定し、注文フルフィルメント機能に関連するコンポーネント（例: 作成されたフロー、変更された項目）を識別して、変更セットに正確に追加できます。\nD. CI/Gitの導入はDevOpsのベストプラクティスですが、この差し迫ったデプロイの問題を解決する手段ではありません。これらのツールを設定するには時間がかかり、今 不足しているコンポーネントを特定する役には立ちません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 310, "q": "Universal Containersは、いくつかの外部システムと統合する必要があります。このプロセスは、Salesforceでレコードが作成されたときに開始されます。リモートシステムは、Salesforceが処理を続行する前に応答を待つ必要がありません。これを達成するための推奨される最善のソリューションは何ですか？", "choices": ["A. PushTopicイベント", "B. アウトバウンドメッセージ", "C. HTTPコールアウトを伴うトリガ", "D. プラットフォームイベント"], "answer": ["D"], "category": "ロジックとプロセスの自動化", "explanation": "A. PushTopicイベントはストリーミングAPIの一部であり、主にSalesforceのデータ変更を（サブスクライブしている）外部クライアントに通知するために使用されます。Salesforceから能動的に統合を開始する用途としては、プラットフォームイベントほど柔軟ではありません。\nB. アウトバウンドメッセージは、ワークフローや承認プロセスからSOAPメッセージを送信する宣言的な方法で、非同期であり応答を待ちません。要件を満たすことはできますが、SOAPプロトコルに限定され、送信できるデータも限られるため、柔軟性に欠けます。\nC. トリガから直接HTTPコールアウト（外部システム呼び出し）を行うことは、ガバナ制限により許可されていません。コールアウトは非同期Apex（futureメソッドやQueueableなど）で行う必要があります。\nD. 正解です。レコード作成トリガからプラットフォームイベントを発行するのが最も推奨される方法です。これにより、レコードの保存トランザクションと外部への通知が完全に分離（デカップリング）されます。外部システムは非同期でこのイベントをサブスクライブ（受信）でき、応答を待つ必要がないため、要件に最適です。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 311, "q": "見積および注文プロセスの一環として、ある企業はOAuth 2.0をサポートするドキュメントストレージシステムのRESTエンドポイントにPDFを送信する必要があります。PDFを送信するには、各Salesforceユーザが個別にドキュメントストレージシステムで認証される必要があります。開発者がRESTエンドポイントへの認証を実装するための最適な方法は何ですか？", "choices": ["A. OAuth認証プロバイダを使用した指定ログイン情報", "B. パスワード認証を使用した指定ログイン情報", "C. OAuthトークンカスタム項目を持つ階層カスタム設定", "D. 2つのパスワードカスタム項目を持つ階層カスタム設定"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. 正解です。指定ログイン情報は、外部エンドポイントへのコールアウトと認証を一元管理するSalesforceの標準機能です。認証プロバイダと組み合わせ、「ユーザごと」の認証設定を使用することで、要件である「各Salesforceユーザが個別に認証される」OAuth 2.0フローを安全かつ最適に実装できます。\nB. 指定ログイン情報の使用は正しいアプローチですが、認証タイプが異なります。「パスワード認証」は、基本的なユーザ名とパスワードを使用する認証方式です。要件はOAuth 2.0であるため、この選択肢は適していません。\nC. カスタム設定を使用して認証トークン（特にユーザごとのトークン）を保存することは、古い方法であり推奨されません。トークンが暗号化されず、トークンの更新（リフレッシュ）管理が複雑になるため、セキュリティ上も運用上も問題があります。\nD. この方法は、認証方式がOAuth 2.0であるという要件と一致しません。また、Cと同様に、カスタム設定に認証情報（パスワード）を保存することは安全ではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 312, "q": "非同期プロセスを伴うトリガが正常に実行されたことを、開発者はどのようにアサート（検証）すべきですか？", "choices": ["A. テストクラスですべてのテストデータを作成し、system. runs {} を使用してトリガを起動し、その後アサーションを実行する。", "B. Salesforceにレコードを挿入し、seeAllData=true を使用し、その後アサーションを実行する。", "C. すべてのテストデータを作成し、テストクラスで future を使用し、その後アサーションを実行する。", "D. テストクラスですべてのテストデータを作成し、Test.startTest{} と Test.stopTest {} を呼び出し、その後アサーションを実行する。"], "answer": ["D"], "category": "テスト、デバッグ、リリース", "explanation": "A. system.runs{} という構文はApexに存在しません。System.runAs{} のことかもしれませんが、これはテストを実行するユーザコンテキストを指定するものであり、非同期処理の実行を制御するものではありません。\nB. seeAllData=true の使用は、テストが組織の既存データにアクセスできるようにするものですが、テストデータの分離の原則に反するため非推奨です。また、非同期プロセスの完了を保証するものではありません。\nC. テストクラスが future メソッドを使用しても、トリガによって起動された別の future メソッドの完了を待機させることはできません。\nD. 正解です。Test.startTest() でテストのガバナ制限をリセットした後、トリガを起動するDML（挿入や更新）を実行します。その後 Test.stopTest() を呼び出すと、startTest() 以降にキューに入れられたすべての非同期プロセス（@futureメソッドやQueueableジョブなど）が即座に実行（完了）されます。これにより、stopTest() の後の行で非同期処理の結果を検証（アサート）できます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 313, "q": "Universal Containersは、階層カスタム設定 User_Prefs_c に、チェックボックス項目 Show_Help_c を持って、ユーザのプリファレンスを保存しています。会社レベルのデフォルト（初期値）は組織レベルで保存されていますが、ユーザレベルで上書き（オーバーライド）されるかもしれません。もしユーザがプリファレンスを上書きしていない場合、デフォルトが使用されるべきです。現在のユーザの Show_Help_c プリファレンスは、どのように取得すべきですか？", "choices": ["A. Boolean show = User_Prefs__c.getValues(UserInfo.getUserId()).Show_Help__c;", "B. Boolean show = User_Prefs__c.getInstance().Show_Help__c;", "C. Boolean show = User_Prefs__c.Show_Help__c;", "D. Boolean show = User_Prefs__c.getValues().Show_Help__c;"], "answer": ["B"], "category": "上級デベロッパーの基本", "explanation": "A. getValues(Id) メソッドは、指定されたID（この場合はユーザID）に完全一致する設定レコードのみを取得しようとします。ユーザレベルの上書きが存在しない場合、組織レベルのデフォルト値は自動的に返されません。\nB. 正解です。getInstance() メソッドは、階層カスタム設定の値を取得するための標準的な方法です。現在のユーザの設定が存在すればそれを返し、存在しなければ自動的にプロファイルレベル（もしあれば）、最終的には組織レベルのデフォルト値を返します。\nC. この構文は、Apexでカスタム設定のインスタンスの値を取得する方法として正しくありません。\nD. getValues() という引数なしのメソッドは、階層カスタム設定の値を取得する標準的な方法ではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 314, "q": "開発者が、モックコールアウトを行う前にテストデータを作成するテストクラスを持っていますが、「未コミットの作業が保留中です。コールアウトの前にコミットまたはロールバックしてください」というエラーを受け取るようになりました。このエラーを解決するために、どのステップを実行すべきですか？", "choices": ["A. 挿入とモックコールアウトの両方が Test.stopTest() の後に行われるようにする。", "B. レコードが Test.startTest() ステートメントの前に挿入され、モックコールアウトが @testSetup でアノテーションされたメソッド内で発生するようにする。", "C. 挿入とモックコールアウトの両方が Test.startTest() の後に行われるようにする。", "D. レコードが Test.startTest() ステートメントの前に挿入され、モックコールアウトが Test.startTest() の後に行われるようにする。"], "answer": ["D"], "category": "テスト、デバッグ、リリース", "explanation": "A. Test.stopTest() は、Test.startTest() 以降にキューに入れられた非同期処理を実行するために使用されます。その後に主要なテストロジック（DMLやコールアウト）を配置するのは適切ではありません。\nB. @testSetup メソッドは、テストメソッド実行前に共通のテストデータを作成するためのものであり、このメソッド内でコールアウトを実行することはできません。\nC. これがエラーの直接の原因です。Test.startTest() の後にDML操作（挿入）とコールアウトを同じトランザクションで実行しようとすると、DMLがコミットされていないためエラーが発生します。\nD. 正解です。DML操作（レコード挿入）を Test.startTest() の前に実行してトランザクションをコミットさせます。その後 Test.startTest() で新しいトランザクションコンテキストを開始し、その中でコールアウトを実行すれば、保留中のDMLが存在しないためエラーを回避できます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 315, "q": "あるSalesforce開発者が多国籍企業に雇われ、従業員の福利厚生と獲得したコミッションを経時的に表示するカスタムLightningアプリケーションを構築しています。このアプリケーションは、日付、時刻、数値、通貨、および通貨記号に関して、ユーザのロケールコンテキストを認識し、尊重しなければなりません。Auraコンポーネントを使用する場合、Lightningアプリケーションがユーザのロケールに準拠することを保証するために、開発者はどのアプローチを実装すべきですか？", "choices": ["A. $User グローバル変数を使用して、ユーザのプリファレンスを取得する。", "B. $Label グローバル値プロバイダを使用する。", "C. $Locale 値プロバイダを使用して、ユーザのプリファレンスを取得する。", "D. ユーザのプリファレンスを保存するために、階層カスタム設定を作成する。"], "answer": ["C"], "category": "ユーザインターフェース", "explanation": "A. $User グローバル変数は、現在ログインしているユーザの情報（ID、名前、メールなど）へのアクセスを提供しますが、日付や通貨の フォーマット といったロケール固有の形式設定を直接提供するものではありません。\nB. $Label は、カスタムラベルに保存された テキスト文字列 を翻訳（多言語化）するために使用されます。日付、数値、通貨の フォーマット（例: 1,000.00 vs 1.000,00）を処理するものではありません。\nC. 正解です。Auraの $Locale グローバル値プロバイダは、現在のユーザのロケール設定（日付の形式、数値の区切り文字、通貨記号など）へのアクセスを許可します。これを使用することで、要件通りにロケールを尊重した表示が可能になります。\nD. ユーザのロケール設定は、Salesforceのユーザレコードに既に保存されています。これらの標準設定を$Localeで読み取るのが正しい方法であり、カスタム設定で重複して管理する必要はありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 316, "q": "ある企業が、特定の地域に対するデフォルト情報と削除時の動作を表す複数のカスタムメタデータレコードに、参照データを保存しています。取引先責任者が挿入されるとき、その取引先責任者の住所情報に基づいて、カスタムメタデータレコードからデフォルト情報が取引先責任者に設定されるべきです。さらに、もしユーザがフラグ付けされた地域に属する取引先責任者を削除しようとした場合、ユーザはエラーメッセージを受け取らなければなりません。企業の人的リソースに応じて、これを自動化する2つの方法は何ですか？2つ選択してください", "choices": ["A. リモートアクション", "B. フロービルダー", "C. Apexトリガ", "D. Apex呼び出し可能メソッド"], "answer": ["B", "C"], "category": "ロジックとプロセスの自動化", "explanation": "A. リモートアクション（@RemoteAction）は、主にVisualforceページからApexコントローラメソッドを非同期で呼び出すために使用されます。レコードが挿入または削除される際のサーバサイドの自動化ロジックを実行するトリガとしては機能しません。\nB. 正解です。レコードトリガフロー（特に「保存前」フロー）を使用して、取引先責任者が挿入される際に住所情報を評価し、カスタムメタデータを参照してデフォルト項目を更新できます。また、「削除前」フローを使用して、削除しようとしている取引先責任者がフラグ付き地域に属しているかを確認し、カスタムエラー要素を使用して削除をブロックしエラーを表示することが可能です。\nC. 正解です。before insert トリガを使用して、住所に基づきカスタムメタデータを照会し、新しい取引先責任者レコードの項目を設定できます。また、before delete トリガを使用して、削除対象の取引先責任者がフラグ付き地域に属しているかを確認し、もしそうであれば .addError() メソッドを呼び出してDML操作を中止させ、エラーメッセージを表示できます。\nD. Apex呼び出し可能メソッド（@InvocableMethod）は、それ自体が自動化のトリガではありません。これらは、フローやプロセスビルダー、REST APIなど、他のプロセスから呼び出される再利用可能なApexロジックのブロックです。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 317, "q": "ある企業には、多くのLightningコンポーネントを持つLightningページがあり、その中には参照データをキャッシュするものもあります。このページに、常に最新の参照データが表示されるとは限らないと報告されています。開発者は、Lightningページの問題を分析および診断するために何を使用できますか？", "choices": ["A. Salesforce Lightning InspectorのTransactionsタブ", "B. Salesforce Lightning InspectorのActionsタブ", "C. Salesforce Lightning InspectorのEvent Logタブ", "D. Salesforce Lightning InspectorのStorageタブ"], "answer": ["D"], "category": "上級デベロッパーの基本", "explanation": "A. Transactionsタブは、サーバへのリクエストやコンポーネントのライフサイクルイベントにかかった時間を分析するために使用されます。キャッシュされたデータの内容を直接検査するものではありません。\nB. Actionsタブは、実行されたAuraコントローラのアクションとその詳細を追跡するために使用されます。キャッシュストレージの診断には適していません。\nC. Event Logタブは、ページ上で発行および処理されたイベント（AuraおよびLWCのイベント）を監視するために使用されます。\nD. 正解です。Salesforce Lightning Inspector（ブラウザ拡張機能）のStorageタブは、コンポーネントが使用しているクライアントサイドストレージ（Auraコンポーネントのキャッシュなど）の内容を検査するために設計されています。開発者はこのタブを使って、キャッシュに保存されている参照データが古いかどうかを確認できます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 318, "q": "開発者は、任意の2つのオブジェクトレコード間でSalesforceのName項目を比較する汎用的なApexメソッドを作成したいと考えています。例えば、取引先と商談のName項目、または取引先と取引先責任者のName項目を比較する場合などです。Name項目が存在すると仮定して、開発者はこれをどのように行うべきですか？", "choices": ["A. 各オブジェクトをsObjectにキャストし、sObject.getを使用してName項目を比較する。", "B. describe() 関数を使用して、各Name項目の値を比較する。", "C. Salesforce メタデータAPIを使用して、各オブジェクトの値を抽出し、Name項目を比較する。", "D. string.Replace() メソッドを使用して、各Name項目の内容を解析し、その結果を比較する。"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. 正解です。Apexでは、取引先や商談など、すべてのSalesforceレコードは汎用的な sObject 型として扱うことができます。sObject 型の変数に対して .get('FieldName') メソッドを使用すると、実行時に項目名を文字列で指定して、その項目の値（この場合は 'Name'）を動的に取得できます。これにより、異なるオブジェクトタイプ間でも汎用的に値を比較できます。\nB. スキーマのdescribeメソッド（sObjectType.getDescribe()など）は、オブジェクトの定義や項目のプロパティ（型、ラベル、存在確認など）といった メタデータ を調べるために使用されます。レコードの 実際のデータ値 （例: 'ABC商事'）を取得するために使用するものではありません。\nC. Salesforce メタデータAPIを使用して、各Name項目の値を比較する。 - メタデータAPIは、オブジェクトの定義、ページレイアウト、Apexクラスといった 設定（メタデータ） を読み書きするためのAPIです。個々のレコード（データ）の値を取得・比較する用途には使用しません。\nD. string.Replace() は文字列を置換するためのメソッドです。Name項目の値を取得した 後 に使用することはできますが、そもそも異なるオブジェクトからName項目の値を 取得する という問題の核心を解決するものではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 319, "q": "Salesforce Platformデベロッパーが、新しいアプリケーションを本番環境にデプロイする任務を負ったチームを率いています。チームはソース駆動開発（source-driven development）を使用しており、アプリケーションが正常にデプロイされたことを確認したいと考えています。デプロイが成功したことを検証するために、どのツールまたはメカニズムを使用すべきですか？", "choices": ["A. Force.com 移行ツール", "B. Salesforce DX CLI", "C. Apexテスト実行", "D. Salesforce Inspector"], "answer": ["B"], "category": "テスト、デバッグ、リリース", "explanation": "A. Force.com 移行ツール（Ant移行ツール）は、メタデータをデプロイするために使用されるツールの一つです。デプロイを 実行 することはできますが、ソース駆動開発の文脈において、デプロイ状況を 検証 するための最新のメカニズムとしてはSalesforce DX CLIが推奨されます。\nB. 正解です。Salesforce DX CLI（コマンドラインインターフェース）は、ソース駆動開発におけるデプロイプロセス全体を管理するための中核的なツールです。force:source:deploy コマンドでデプロイを実行し、force:source:deploy:report コマンド（または --wait パラメータ）を使用して、デプロイのステータス（成功、失敗、保留中）をプログラムで確認（検証）できます。\nC. Apexテスト実行は、デプロイプロセスの一部として、コードの品質やカバレッジを保証するために実行されます。デプロイによってメタデータ自体が本番環境に正常に移行されたかどうかを 検証 するツールではありません。\nD. Salesforce Inspectorは、主にデータやメタデータ、デバッグログをリアルタイムで 検査 するために開発者が使用するブラウザ拡張機能です。自動化されたデプロイプロセスの成功を検証するためのツールではありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 320, "q": "開発者は、組織内のすべてのカスタムオブジェクトのドロップダウンリストを表示するLightning Webコンポーネントを作成しており、ユーザはそこから選択します。Apexメソッドがデータを準備し、コンポーネントに返します。開発者は、レスポンスに含めるオブジェクトを決定するために何をすべきですか？", "choices": ["A. sObjectのdescribe結果で isCustom() の値を確認する。", "B. @salesforce/schema からすべてのカスタムオブジェクトのリストをインポートする。", "C. sObjectのdescribe結果で getObjectType() の値が 'Custom' か 'Standard' かを確認する。", "D. Schemaクラスの getCustomObjects() メソッドを使用する。"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. 正解です。Schema.getGlobalDescribe() を使用して組織内の全オブジェクトのマップを取得した後、各オブジェクトの DescribeSObjectResult（describe結果）を調べます。この結果に含まれる isCustom() メソッドは、そのオブジェクトがカスタムオブジェクトである場合に true を返すため、要件を満たす正しい方法です。\nB. @salesforce/schema は、Apexではなく、LWCのJavaScript側で使用されるものです。また、これは すべて のオブジェクトを動的に取得するためではなく、特定 のオブジェクトや項目スキーマを静的にインポートするために使用されます。\nC. DescribeSObjectResult クラスには、getObjectType() というメソッドは存在しません。getSObjectType() というメソッドはありますが、これは 'Custom' のような文字列ではなく、オブジェクトの Schema.SObjectType トークンを返します。\nD. Apexの Schema クラスには、getCustomObjects() という名前の便利なメソッドは存在しません。開発者は Schema.getGlobalDescribe() を使用して すべて のオブジェクトを取得し、Aで説明したように isCustom() メソッドで絞り込む必要があります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 321, "q": "ユーザが、カスタムLightning Webコンポーネント（LWC）のボタンが入力したデータを保存していないと報告しています。ボタンはクリックされているように見えますが、LWCは単にそこにあるだけで、何もしていないように見えます。開発者は、エラーメッセージが適切に表示されるようにするために何を使用すべきですか？", "choices": ["A. DMLステートメントを囲む try-catch ブロックを追加する。", "B. allOrNone を false に設定して Database メソッドを使用する。", "C. apex:messages/ タグをコンポーネントに追加する。", "D. エラーメッセージを表示するために JavaScript と HTML を追加する。"], "answer": ["D"], "category": "ユーザインターフェース", "explanation": "A. これはApexコントローラ（サーバサイド）で行われるべきエラーの キャッチ 処理です。しかし、Apexでエラーをキャッチするだけでは、LWC（クライアントサイド）のユーザインターフェースに自動的にエラーは表示されません。\nB. これはApex側でDML例外を発生させずに部分的な保存を許可する方法です。エラーを Database.SaveResult オブジェクトで取得できますが、これもLWCにエラーを 表示する 解決策には直接なりません。\nC. <apex:messages/> はVisualforceページで使用されるタグです。Lightning Webコンポーネント（LWC）では使用できません。\nD. 正解です。LWCでApexメソッドを呼び出した際にエラーが発生した場合（例: catch(error) ブロック）、LWCのJavaScriptがそのエラーを受け取る必要があります。その後、開発者はJavaScriptを使用してエラーメッセージを変数に格納し、HTMLテンプレート（例: 条件付きで表示されるテキストブロック）を使用してその変数をユーザに表示する必要があります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 322, "q": "ビジネスルールにより、新しい取引先が作成される際には、常に対応する取引先責任者も作成される必要があります。カスタム画面を開発する際に、もし取引先責任者の作成が失敗した場合に、取引先も作成されないように保証するためには何が使用できますか？", "choices": ["A. try-catchブロックと共に setSavepoint() と rollback() を使用する。", "B. allOrNone を true に設定して Database.insert メソッドを使用する。", "C. 取引先責任者の挿入が失敗した場合に Database.delete メソッドを使用する。", "D. 取引先責任者の入力規則を無効化し、トリガでデフォルト値を設定する。"], "answer": ["A"], "category": "ロジックとプロセスの自動化", "explanation": "A. 正解です。Apexで複数のDML操作（例: 1. 取引先の挿入、2. 取引先責任者の挿入）を1つの論理トランザクションとして扱いたい場合に使用します。setSavepoint() で取引先挿入後にセーブポイントを設定し、try-catch ブロック内で取引先責任者の挿入を試みます。もし取引先責任者の挿入が失敗（catch）した場合、Database.rollback() を呼び出すことで、トランザクションをセーブポイントまで（つまり取引先が挿入される前まで）戻すことができます。\nB. Database.insert(records, allOrNone) メソッドの allOrNone パラメータは、単一のDML操作（つまり1つのリスト）内のレコード群に適用されます。この問題のように、取引先の挿入（DML 1）と取引先責任者の挿入（DML 2）という 2つの異なるDML操作 をまたいでトランザクションを制御することはできません。\nC. これは、エラーが発生した後に手動でデータを元に戻そうとする（補正する）アプローチです。しかし、もし取引先の削除が（例えば他の自動化によって）失敗した場合、データが不整合な状態（取引先だけが存在する）で残ってしまいます。rollback() を使用する方がはるかに安全でトランザクションの原子性を保証できます。\nD. これは、取引先責任者の作成が失敗する 原因（入力規則違反）を取り除こうとするものですが、トランザクションの制御という要件（失敗した場合に取引先も作成しない）を満たしません。また、入力規則以外（例: 必須項目の欠落）で失敗する可能性は残ります。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 323, "q": "ある開発者が、取引先のトリガを正常にアサートするテストクラスを作成しました。これはサンドボックス環境では正しく起動し、データを更新します。カスタムプロファイルを持つSalesforce管理者が、このトリガを変更セット経由で本番環境にデプロイしようとしましたが、テストクラスが「権限が不十分です」エラーで失敗しました。この問題を修正するために、開発者は何をすべきですか？", "choices": ["A. 本番環境で「すべてのテストを管理者ユーザとして実行」を有効にするよう設定する。", "B. System.runAs() をテストクラスに追加し、正しいオブジェクト権限を持つユーザとしてトリガを実行する。", "C. seeallData=true をテストクラスに追加し、本番環境の共有モデル内で動作するようにする。", "D. Test.startTest() がテストクラスの For ループ内にないことを確認する。"], "answer": ["B"], "category": "テスト、デバッグ、リリース", "explanation": "A. この設定は、SalesforceのUIから手動でテストを実行する際の動作に影響しますが、デプロイ時に実行されるテストの権限コンテキストを修正するものではありません。\nB. 正解です。デプロイを実行するユーザ（この場合はカスタムプロファイルの管理者）が、トリガ内で実行される操作（特定の項目へのアクセスなど）に必要な権限を持っていないためにエラーが発生しています。System.runAs() を使用して、テスト内で適切な権限を持つユーザを作成し、そのユーザとしてDML操作（トリガの起動）を実行することで、権限不足エラーを回避できます。\nC. seeAllData=true の使用は、テストが組織の既存データに依存することになるため非推奨です。また、この問題はオブジェクトや項目の権限（プロファイル）が原因であり、レコードの共有設定が原因ではありません。\nD. Test.startTest() をループ内で呼び出すことはガバナ制限違反になりますが、「権限が不十分です」というエラーとは関係ありません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 324, "q": "Universal Containersは、Salesforceを使用して order__c オブジェクトで注文を追跡しています。order__c オブジェクトの組織の共有設定は非公開です。order__c オブジェクトには、Quality_Controller__c というカスタム項目があり、これはユーザへの参照項目で、指定されたユーザがその注文の品質管理を実行していることを示すために使用されます。Quality_Controller 項目に設定されたユーザに自動的に参照のみアクセス権を付与するには、何を使用すべきですか？", "choices": ["A. レコードの所有権", "B. 条件に基づく共有", "C. Apexによる管理共有", "D. ユーザによる管理共有"], "answer": ["C"], "category": "上級デベロッパーの基本", "explanation": "A. レコードの所有権は、通常、参照、編集、削除を含むフルアクセスを提供します。要件は「参照のみ」のアクセス権であり、所有者とは別のユーザに付与する必要があるため、不適切です。\nB. 条件に基づく共有ルールは、レコードの条件に基づいて ロール や 公開グループ にアクセス権を付与します。項目で指定された 特定のユーザ に対して動的にアクセス権を付与することはできません。\nC. 正解です。組織の共有設定が非公開の場合、Quality_Controller__c 項目に設定された特定のユーザにアクセス権を自動的に付与するには、プログラムによる共有（共有レコードの作成）が必要です。Apex（通常はトリガ）を使用して Order__Share レコードを作成し、アクセスレベルを「参照のみ」に設定することで、この要件を満たせます。\nD. これは「手動共有」とも呼ばれ、ユーザがUIの「共有」ボタンを使って手動でアクセス権を付与するものです。要件である「自動的に」付与するというプロセスには当てはまりません。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 325, "q": "開発者は、ユーザが選択した製品のケースをカスタムLightningページから直接作成できるLightning Webコンポーネントを作成するよう任されました。ユーザが項目の意味をよりよく理解できるように、コンポーネントの入力項目は、製品の画像の上に非線形で表示されます。Lightning Webコンポーネントからのケース作成を実装するために、開発者はどの2つのコンポーネントを使用すべきですか？ 2つ選択してください", "choices": ["A. lightning-record-edit-form", "B. lightning-input-field", "C. lightning-input", "D. lightning-record-form"], "answer": ["C", "D"], "category": "ユーザインターフェース", "explanation": "A. このコンポーネントは、lightning-input-field (B) と組み合わせて使用され、ある程度のカスタムレイアウトを許可します。しかし、「画像の上に非線形」というピクセル単位での自由な配置要件を満たすには、Cの lightning-input ほどの完全な制御はできません。\nB. このコンポーネントは、lightning-record-edit-form (A) のコンテナ内部で使用されることが前提であり、単体では機能しません。\nC. 正解です。「非線形」で「画像の上に配置する」という要件は、CSS（例: 絶対配置など）による完全なレイアウト制御を意味します。lightning-input は、自動レイアウトに縛られない基本的な入力要素であるため、CSSで自由にスタイリングしてこのカスタムUIを実現するために必要です。\nD. 正解です。lightning-input (C) を使用してカスタムUIを構築した場合、入力されたデータを保存するロジックが必要です。Apexクラスを別途作成する代わりに、lightning-record-form コンポーネントを（例えば非表示で）ページに配置し、object-api-name を指定します。そして、JavaScript側で lightning-input から収集した値を fields オブジェクトとして構築し、this.template.querySelector('lightning-record-form').submit(fields) のように submit メソッドを呼び出すことで、標準のレコード作成機能を利用できます。", "difficulty": 1, "helpLinks": [], "examTags": []}, {"id": 326, "q": "Universal Containers（UC）に関する以下の情報を前提とします:\n\nUCはSalesforceで顧客を取引先として表しています。\n\nすべての顧客は、UCのすべてのシステムで一意となるユニークな C
